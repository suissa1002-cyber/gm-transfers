name: tests

# נועל את נתיב המדיה היוצאת של WhatsApp — רץ אוטומטית על כל שינוי בקבצים
# שיכולים לשבור אותו, כדי שלא יישבר שוב בלי שנדע (קרה כמה פעמים).
on:
  push:
    paths:
      - 'wa.py'
      - 'db.py'
      - 'main.py'
      - 'tests/**'
      - '.github/workflows/tests.yml'
  pull_request:
  workflow_dispatch:

jobs:
  wa-media-regression:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps
        run: pip install requests
      - name: WhatsApp outgoing-media regression test
        run: python3 tests/test_wa_media.py
      - name: Auto-balance / order-routing regression test
        run: python3 tests/test_auto_balance.py
      - name: Boomerang transfer reconcile regression test
        run: python3 tests/test_boomerang.py
      - name: Variant color-availability regression test
        run: python3 tests/test_variant_stock.py
      - name: Repair-quote free-text intent regression test
        run: python3 tests/test_repair_intent.py
      - name: Order-status customer message regression test
        run: python3 tests/test_order_status_msg.py
