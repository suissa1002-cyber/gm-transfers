services:
  - type: web
    name: gm-transfers
    runtime: docker
    region: frankfurt
    plan: free
    dockerfilePath: ./Dockerfile
    autoDeploy: true
    healthCheckPath: /health
    envVars:
      - key: TZ
        value: Asia/Jerusalem
      - key: POLL_INTERVAL_SEC
        value: "30"
      - key: POLL_LOOKBACK_DAYS
        value: "3"
      - key: RECEIVE_REMINDER_HOURS
        value: "3"
      - key: RECEIVE_ESCALATE_HOURS
        value: "24"
      - key: DIGEST_HOUR
        value: "9"
      - key: DIGEST_DAYS
        value: "sun,mon,tue,wed,thu"
      # ─── יש להגדיר ב-Render UI / secrets ───
      # - DATABASE_URL          (Postgres; אם לא מוגדר → SQLite ב-/data, נמחק בכל deploy)
      # - APP_BASE_URL          (https://gm-transfers.onrender.com — ל-deep links)
      # - NEWORDER_API_TOKEN
      # - NEWORDER_BASE_URL     (ברירת מחדל https://neworderapi.azurewebsites.net)
      # - NEWORDER_STORE_GUID
      # - TELEGRAM_BOT_TOKEN
      # - TELEGRAM_MANAGERS_CHAT_ID  (ברירת מחדל 448181407 — אסי)
      # - TELEGRAM_BRANCH_CHATS      (JSON: {"2":"-100...","1":"-100..."})
      # - ADMIN_PASSWORD             (סיסמה לקונסולת הניהול / סניף אתר — חובה בפרודקשן)
      # אם DATABASE_URL לא מוגדר — מומלץ להוסיף גם:
      # - TRANSFERS_DB_PATH = /data/transfers.db  (+ Persistent Disk ב-Render)
