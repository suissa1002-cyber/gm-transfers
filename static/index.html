<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Green Mobile Рђћ ОДОюОЎОўОф ОћОбОЉОеОЋОф</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='88'%3E­ЪЊд%3C/text%3E%3C/svg%3E">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%233b82f6'/%3E%3Ctext x='50' y='52' font-size='62' text-anchor='middle' dominant-baseline='central'%3E­ЪЊд%3C/text%3E%3C/svg%3E">
<style>
  :root{
    --bg:#0e1116; --card:#171c24; --card2:#212834; --line:#2c3442;
    --txt:#e8edf4; --muted:#94a3b8; --green:#1fbf6b; --red:#e5484d;
    --amber:#f5a524; --blue:#3b82f6;
    --maxw:1500px;
  }
  body.light{
    --bg:#eef1f6; --card:#ffffff; --card2:#f1f4f9; --line:#d7dee8;
    --txt:#18222f; --muted:#5e6b7d; --green:#12a356; --red:#d23b40;
    --amber:#b8860b; --blue:#2563eb;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{font-family:-apple-system,Segoe UI,Roboto,Arial,"Heebo",sans-serif;
       background:var(--bg);color:var(--txt);font-size:15px}
  header{display:flex;align-items:center;justify-content:space-between;gap:16px;
         padding:14px 24px;background:var(--card);border-bottom:1px solid var(--line);
         position:sticky;top:0;z-index:20}
  header .brand{font-weight:800;font-size:20px;white-space:nowrap}
  header .right{display:flex;align-items:center;gap:10px;font-size:14px;color:var(--muted);flex-wrap:wrap}
  header .right b{color:var(--txt)}
  button{font-family:inherit;cursor:pointer;border:none;border-radius:10px;
         padding:9px 15px;font-size:14px;font-weight:600}
  .btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--line)}
  .btn-ghost:hover{color:var(--txt);border-color:var(--blue)}
  .btn-primary{background:var(--blue);color:#fff}
  .wrap{max-width:var(--maxw);margin:0 auto;padding:24px}
  .muted{color:var(--muted)}
  h1.title{font-size:22px;margin:0 0 18px}
  /* ОЉОЌОЎОеОф ОАОаОЎОБ */
  .picker{display:flex;flex-direction:column;gap:14px;align-items:center;
          justify-content:center;min-height:72vh;text-align:center}
  .picker h1{font-size:26px;margin:0}
  .branch-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
               gap:14px;width:100%;max-width:680px}
  .branch-grid button{padding:30px 18px;font-size:19px;background:var(--card2);color:var(--txt);
                      border:1px solid var(--line)}
  .branch-grid button:hover{border-color:var(--blue);transform:translateY(-2px);transition:.12s}
  .branch-grid button.admin{border-color:var(--amber);color:var(--amber)}
  /* ОюОЋОЌ ОЏОеОўОЎОАОЎОЮ (ОњОеОЎОЊ ОЊОАОДОўОЋОц) */
  .board-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(330px,1fr));gap:14px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;
        padding:18px;cursor:pointer;transition:.12s}
  .card:hover{border-color:var(--blue);transform:translateY(-2px)}
  .card .top{display:flex;justify-content:space-between;align-items:center;gap:10px}
  .card .op{font-weight:800;font-size:17px}
  .card .meta{color:var(--muted);font-size:13px;margin-top:6px}
  .pill{padding:4px 11px;border-radius:999px;font-size:13px;font-weight:700;white-space:nowrap}
  .pill.in_transit{background:rgba(245,165,36,.15);color:var(--amber)}
  .pill.partial{background:rgba(59,130,246,.15);color:var(--blue)}
  .pill.received{background:rgba(31,191,107,.15);color:var(--green)}
  .progress{height:9px;background:var(--card2);border-radius:999px;margin-top:14px;overflow:hidden}
  .progress > i{display:block;height:100%;background:var(--green);border-radius:999px;transition:width .2s}
  .banner{background:rgba(245,165,36,.1);border:1px solid var(--amber);color:var(--amber);
          border-radius:12px;padding:12px 16px;margin-bottom:18px;font-weight:700}
  /* ОДОЋОЉОЎОЎОф ОАОеОЎОДОћ ОъОћОЎОеОћ Рђћ ОъОъОЋОеОЏОќОф ОЋОљОАОфОўОЎОф */
  .board-scan{max-width:640px;margin:0 auto 14px;text-align:center}
  .board-scan .scan-icon{font-size:30px;line-height:1;margin-bottom:6px}
  .board-scan .scan-input{margin-top:6px}
  .lastscan{max-width:640px;margin:0 auto 26px;min-height:60px;display:flex;align-items:center;
            justify-content:center;gap:10px;border-radius:14px;padding:14px 20px;
            font-size:21px;font-weight:800;text-align:center;transition:.15s}
  .lastscan.ok{background:rgba(31,191,107,.12);border:1px solid var(--green);color:var(--green)}
  .lastscan.err{background:rgba(229,72,77,.1);border:1px solid var(--red);color:var(--red)}
  .lastscan.warn{background:rgba(245,165,36,.12);border:1px solid var(--amber);color:var(--amber)}
  .lastscan.idle{color:var(--muted);border:1px dashed var(--line);font-weight:600;font-size:16px}
  .mtag{font-size:11px;font-weight:700;border-radius:6px;padding:1px 7px;margin-inline-start:6px;white-space:nowrap}
  .mtag.ok{background:rgba(31,191,107,.15);color:var(--green)}
  .mtag.warn{background:rgba(245,165,36,.2);color:var(--amber)}
  .badge-manual{background:rgba(245,165,36,.2);color:var(--amber);border-radius:6px;padding:2px 7px;font-size:11px;font-weight:700;margin-inline-start:6px;white-space:nowrap}
  .mis-alert{border:1px solid var(--red);background:rgba(229,72,77,.06);border-radius:14px;padding:16px;margin-bottom:20px}
  .mis-title{color:var(--red);font-weight:800;font-size:18px}
  .tabs{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap}
  .tabs>button{background:var(--card);border:1px solid var(--line);color:var(--muted);border-radius:10px;padding:10px 18px;font-weight:700}
  .tabs>button.active{background:var(--blue);color:#fff;border-color:var(--blue)}
  .tabgroup{display:inline-flex;border:1px solid var(--line);border-radius:10px;overflow:hidden;background:var(--card)}
  .tabgroup button{background:transparent;border:none;color:var(--muted);padding:10px 18px;font-weight:700;border-radius:0;white-space:nowrap}
  .tabgroup button+button{border-inline-start:1px solid var(--line)}
  .tabgroup button:hover{color:var(--txt)}
  .tabgroup button.active{background:var(--blue);color:#fff}
  .admin th.sortable{cursor:pointer;user-select:none;white-space:nowrap}
  .admin th.sortable:hover{color:var(--blue)}
  .admin th .arr{opacity:.5;font-size:11px}
  .rebal-bar{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-bottom:16px}
  .rebal-bar select,.rebal-bar input{font-family:inherit;font-size:14px;padding:9px 12px;border-radius:10px;border:1px solid var(--line);background:var(--card);color:var(--txt)}
  .rebal-bar input{min-width:240px;outline:none} .rebal-bar input:focus{border-color:var(--blue)}
  td.r-zero{color:var(--red);font-weight:800} td.r-surplus{color:var(--green);font-weight:800}
  .pl-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
  .pl-row select{flex:1;font-family:inherit;font-size:14px;padding:9px;border-radius:10px;border:1px solid var(--line);background:var(--card2);color:var(--txt)}
  .pl-row input{font-family:inherit;font-size:14px;padding:9px;border-radius:10px;border:1px solid var(--line);background:var(--card2);color:var(--txt)}
  .plan-group{margin-bottom:22px}
  .plan-head{display:flex;align-items:center;gap:10px;font-size:16px;margin-bottom:10px;flex-wrap:wrap}
  .plan-head .ttl{white-space:nowrap}
  .plan-actions{display:flex;gap:6px;margin-inline-start:auto;background:var(--card);
                border:1px solid var(--line);border-radius:12px;padding:4px}
  .plan-actions button{padding:7px 11px;font-size:13px;border-radius:9px;border:none;background:transparent;
                       color:var(--muted);display:inline-flex;align-items:center;gap:5px;white-space:nowrap}
  .plan-actions button:hover{background:var(--bg);color:var(--txt)}
  .plan-actions .pa-accent{color:var(--blue);font-weight:700}
  .plan-actions .pa-accent:hover{background:rgba(37,99,235,.12)}
  .plan-actions .pa-danger:hover{background:rgba(229,72,77,.12);color:var(--red)}
  .plan-actions .pa-sep{width:1px;background:var(--line);margin:3px 2px}
  .btn-req-in{background:var(--green);color:#fff;font-weight:700}
  /* ­Ъћј ОъОюОљОЎ ОЌОЎ */
  .ls-check{display:inline-flex;align-items:center;gap:7px;border:1px solid var(--line);border-radius:10px;
            padding:9px 12px;background:var(--card);cursor:pointer;font-size:13px;color:var(--muted);
            white-space:nowrap;user-select:none}
  .ls-check input{min-width:0 !important;width:16px;height:16px;padding:0 !important;margin:0;
                  accent-color:var(--blue);cursor:pointer;flex:none}
  .ls-check:has(input:checked){color:var(--txt);border-color:var(--blue)}
  td.ls-has{color:var(--green);font-weight:800;text-align:center}
  td.ls-zero{color:var(--muted);text-align:center}
  td.ls-neg{color:var(--red);font-weight:800;text-align:center}
  td.ls-wait{color:var(--muted);text-align:center;opacity:.6}
  .ls-live{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:700;color:var(--green)}
  .ls-live .dot{width:8px;height:8px;border-radius:50%;background:var(--green);animation:lspulse 1.6s infinite}
  @keyframes lspulse{0%,100%{opacity:1}50%{opacity:.35}}
  table.admin tr.ls-row{cursor:pointer}
  .ls-chipline{display:flex;flex-wrap:wrap;gap:8px;margin:10px 0 14px}
  .ls-bchip{border:1px solid var(--line);border-radius:10px;padding:8px 14px;background:var(--card2);font-weight:700;display:flex;gap:8px;align-items:center}
  .ls-bchip b.q-has{color:var(--green)} .ls-bchip b.q-zero{color:var(--muted)} .ls-bchip b.q-neg{color:var(--red)}
  table.serials{width:100%;border-collapse:collapse;font-size:14px}
  table.serials th{color:var(--muted);font-weight:600;text-align:right;padding:6px 8px;border-bottom:1px solid var(--line);font-size:12px}
  table.serials td{padding:7px 8px;border-bottom:1px solid var(--line)}
  table.serials tr.srow{cursor:pointer} table.serials tr.srow:hover{background:var(--bg)}
  tr.sdetail td{background:var(--bg);font-size:13px;color:var(--txt)}
  table.admin tr.has-req{background:rgba(31,191,107,.08)}
  table.admin tr.has-req:hover{background:rgba(31,191,107,.14)}
  .lastscan .sub{font-size:14px;opacity:.85;font-weight:600}
  .card.flash{border-color:var(--green)!important;box-shadow:0 0 0 2px var(--green) inset;transition:.15s}
  /* ОЕОЎОЊОЋОе ОЉОДОЕОф ОћОбОЉОеОћ */
  .bcast{max-width:640px;margin:0 auto 16px;display:flex;align-items:center;gap:14px;cursor:pointer;
         background:linear-gradient(135deg,#2563eb,#1e40af);color:#fff;border-radius:16px;padding:14px 18px;
         box-shadow:0 4px 20px rgba(37,99,235,.35);animation:bcpulse 2s ease-in-out infinite}
  @keyframes bcpulse{0%,100%{box-shadow:0 4px 20px rgba(37,99,235,.35)}50%{box-shadow:0 4px 28px rgba(37,99,235,.6)}}
  .bcast .bc-ic{font-size:28px;line-height:1}
  .bcast .bc-txt{display:flex;flex-direction:column;line-height:1.35;flex:1}
  .bcast .bc-txt b{font-size:17px} .bcast .bc-txt span{font-size:13px;opacity:.9}
  .bcast .bc-x{background:rgba(255,255,255,.2);color:#fff;border:none;border-radius:10px;
               width:34px;height:34px;font-size:16px;cursor:pointer}
  .bcast .bc-x:hover{background:rgba(255,255,255,.35)}
  /* ОАОЋОеОД ОъОдОюОъОћ (ОъОЋОЉОЎОЎОю) */
  .btn-cam{margin-top:12px;width:100%;background:var(--blue);color:#fff;border-radius:12px;
           padding:13px 18px;font-size:16px;font-weight:700}
  .cam-overlay{position:fixed;inset:0;background:#000;z-index:80;display:flex;
               flex-direction:column;align-items:center;justify-content:center}
  .cam-overlay video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
  .cam-frame{position:relative;z-index:2;width:70%;max-width:360px;height:110px;
             border:2px solid rgba(255,255,255,.9);border-radius:12px;
             box-shadow:0 0 0 9999px rgba(0,0,0,.45);overflow:hidden}
  .cam-line{position:absolute;left:0;right:0;height:3px;background:linear-gradient(90deg,transparent,var(--red),transparent);
            box-shadow:0 0 10px 2px var(--red);animation:scanline 1.5s ease-in-out infinite}
  @keyframes scanline{0%{top:8%}50%{top:88%}100%{top:8%}}
  .cam-hint{position:absolute;bottom:96px;z-index:3;color:#fff;font-weight:700;font-size:17px;
            text-align:center;padding:0 24px;text-shadow:0 1px 5px #000}
  .cam-close{position:absolute;top:18px;left:18px;z-index:3;background:rgba(0,0,0,.55);
             color:#fff;border-color:rgba(255,255,255,.45)}
  .cam-status{position:absolute;bottom:54px;z-index:3;color:#cfe;font-size:13px;
              text-align:center;padding:6px 14px;background:rgba(0,0,0,.5);border-radius:999px;text-shadow:0 1px 3px #000}
  .empty{text-align:center;color:var(--muted);padding:64px 0;font-size:17px}
  /* ОъОАОџ ОДОюОЎОўОћ Рђћ ОЊОЋ-ОўОЋОеОЎ ОЉОЊОАОДОўОЋОц */
  .scan-layout{display:grid;grid-template-columns:380px 1fr;gap:22px;align-items:start}
  .scan-side{position:sticky;top:88px}
  .panel{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:20px}
  .panel h2{margin:0 0 4px;font-size:19px}
  .scan-input{width:100%;padding:20px;font-size:22px;text-align:center;border-radius:14px;
              border:2px solid var(--blue);background:var(--card2);color:var(--txt);outline:none;margin-top:14px}
  .count{font-size:16px;color:var(--muted);text-align:center;margin-top:12px}
  .count b{color:var(--txt);font-size:20px}
  .emp{margin-top:14px;font-size:13px;color:var(--muted);text-align:center}
  .emp a{color:var(--blue);cursor:pointer}
  .items-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:10px}
  .item{display:flex;align-items:center;gap:12px;background:var(--card);border:1px solid var(--line);
        border-radius:12px;padding:13px 15px}
  .item.received{border-color:var(--green);background:rgba(31,191,107,.07)}
  .item.redirected{border-color:var(--amber);background:rgba(245,165,36,.07)}
  .item.missing{border-color:var(--red);background:rgba(229,72,77,.06)}
  .item .tick{width:28px;height:28px;border-radius:50%;border:2px solid var(--line);
              display:flex;align-items:center;justify-content:center;font-size:16px;flex:0 0 auto}
  .item.received .tick{background:var(--green);border-color:var(--green);color:#fff}
  .item.redirected .tick{background:var(--amber);border-color:var(--amber);color:#fff}
  .item.missing .tick{background:var(--red);border-color:var(--red);color:#fff}
  .item.redirected .who{color:var(--amber)} .item.missing .who{color:var(--red)}
  .pill.closed{background:rgba(148,163,184,.18);color:var(--muted)}
  .finish-btn{margin-top:12px;width:100%}
  .item .name{font-weight:600}
  .item .sub{color:var(--muted);font-size:12px;direction:ltr;text-align:right;font-family:monospace;margin-top:2px;
             user-select:text;cursor:text}
  .item .who{color:var(--green);font-size:11px;margin-top:2px}
  .done-banner{background:var(--green);color:#fff;border-radius:14px;padding:16px;
               text-align:center;font-size:19px;font-weight:800;margin-bottom:16px}
  .row-back{margin-bottom:14px}
  a.link{color:var(--blue);text-decoration:none;cursor:pointer;font-weight:600}
  /* ОўОЉОюОф ОаОЎОћОЋОю */
  .chips{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:20px}
  .chip{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px;text-align:center}
  .chip b{display:block;font-size:30px} .chip span{font-size:13px;color:var(--muted)}
  .chip.danger{border-color:var(--red)} .chip.danger b{color:var(--red)}
  .chip{cursor:pointer;transition:.12s} .chip:hover{border-color:var(--blue)}
  .chip.active{border-color:var(--blue);box-shadow:0 0 0 2px var(--blue) inset}
  .filters{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-bottom:16px}
  .filters input,.filters select{font-family:inherit;font-size:14px;padding:9px 12px;border-radius:10px;
    border:1px solid var(--line);background:var(--card);color:var(--txt);outline:none}
  .filters input{min-width:210px} .filters input:focus,.filters select:focus{border-color:var(--blue)}
  .filters .dlabel{display:flex;align-items:center;gap:6px;color:var(--muted);font-size:13px}
  .filters input[type=date]{min-width:auto;padding:8px 10px;color-scheme:dark}
  body.light .filters input[type=date]{color-scheme:light}
  table.admin{width:100%;border-collapse:collapse;background:var(--card);border:1px solid var(--line);
              border-radius:14px;overflow:hidden}
  table.admin th,table.admin td{padding:12px 14px;text-align:right;border-bottom:1px solid var(--line);font-size:14px}
  table.admin th{background:var(--card2);color:var(--muted);font-weight:700;font-size:13px}
  table.admin tr:last-child td{border-bottom:none}
  table.admin tbody tr{cursor:pointer}
  table.admin tbody tr:hover{background:var(--card2)}
  table.admin tr.overdue{background:rgba(229,72,77,.06)}
  table.admin tr.overdue:hover{background:rgba(229,72,77,.12)}
  .badge-late{background:var(--red);color:#fff;border-radius:6px;padding:2px 8px;font-size:11px;font-weight:700}
  .prog-cell{font-weight:700;white-space:nowrap}
  /* toast + modal */
  .toast{position:fixed;left:50%;transform:translateX(-50%);bottom:32px;
         padding:18px 34px;border-radius:14px;font-size:22px;font-weight:800;
         color:#fff;z-index:60;box-shadow:0 8px 30px rgba(0,0,0,.45);opacity:0;transition:.15s;pointer-events:none}
  .toast.show{opacity:1}
  .toast.ok{background:var(--green)} .toast.err{background:var(--red)}
  .loading{position:fixed;inset:0;z-index:90;display:none;flex-direction:column;align-items:center;
           justify-content:center;gap:14px;background:rgba(0,0,0,.28)}
  body.light .loading{background:rgba(255,255,255,.55)}
  .loading .spinner{width:46px;height:46px;border:4px solid var(--line);border-top-color:var(--blue);
                    border-radius:50%;animation:spin .8s linear infinite}
  .loading span{color:var(--txt);font-weight:700;background:var(--card);padding:7px 16px;border-radius:10px;
                border:1px solid var(--line)}
  @keyframes spin{to{transform:rotate(360deg)}}
  .overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:50;
           display:flex;align-items:center;justify-content:center}
  .modal{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:26px;
         width:90%;max-width:380px;text-align:center}
  .modal h3{margin:0 0 6px;font-size:20px}
  .modal input{width:100%;padding:14px;font-size:17px;border-radius:12px;border:2px solid var(--line);
               background:var(--card2);color:var(--txt);outline:none;margin:14px 0;text-align:center}
  .modal input:focus{border-color:var(--blue)}
  .modal .err{color:var(--red);font-size:13px;min-height:18px}
  /* РћђРћђ Ops Hub: ОфОцОеОЎОў ОЉОЋОеОњОе + ОћОўОъОбОф ОљОцОюОЎОДОдОЎОЋОф РћђРћђ */
  .burger{background:transparent;border:1px solid var(--line);color:var(--txt);font-size:19px;cursor:pointer;
          padding:6px 12px;border-radius:10px;line-height:1}
  .burger:hover{background:var(--card2);border-color:var(--blue)}
  .drawer-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:64;opacity:0;pointer-events:none;transition:.2s}
  .drawer-backdrop.open{opacity:1;pointer-events:auto}
  .drawer{position:fixed;top:0;right:0;height:100%;width:310px;max-width:85vw;background:var(--card);
          border-inline-start:1px solid var(--line);z-index:65;transform:translateX(100%);transition:transform .22s;
          display:flex;flex-direction:column;box-shadow:-8px 0 30px rgba(0,0,0,.25)}
  .drawer.open{transform:none}

// РћђРћђ ОбОеОЏОф ОаОЋОЕОљ (ОЏОћОћ/ОЉОћОЎОе) РћђРћђ
function applyTheme(){
  const light = S.theme==='light';
  document.body.classList.toggle('light', light);
  const b=document.getElementById('themeBtn'); if(b) b.textContent = light?'Рўђ№ИЈ ОЉОћОЎОе':'­ЪїЎ ОЏОћОћ';
}
function toggleTheme(){ S.theme = (S.theme==='light')?'dark':'light';
  localStorage.setItem('tr_theme',S.theme); applyTheme(); }

// РћђРћђ ОАОљОЋОаОЊ РћђРћђ
let actx=null;
function beep(ok){ try{
  actx=actx||new (window.AudioContext||window.webkitAudioContext)();
  const o=actx.createOscillator(),g=actx.createGain();o.connect(g);g.connect(actx.destination);
  o.frequency.value=ok?880:220;g.gain.value=0.08;o.start();o.stop(actx.currentTime+(ok?0.12:0.32));
}catch(e){} }
function vibrate(ok){ if(navigator.vibrate) navigator.vibrate(ok?40:[60,40,60]); }
// ОљОќОбОДОћ Рђћ ОдОюОЎОю ОЉОЋОюОў ОЕОЌОЋОќОе ОЏОъОћ ОцОбОъОЎОЮ (ОюОћОбОЉОеОћ ОаОЏОаОАОф)
function alarm(){
  try{
    actx=actx||new (window.AudioContext||window.webkitAudioContext)();
    if(actx.state==='suspended') actx.resume();
    const seq=[880,1175,880,1175,880];
    seq.forEach((f,i)=>{ const o=actx.createOscillator(),g=actx.createGain();
      o.connect(g);g.connect(actx.destination); o.frequency.value=f; o.type='square';
      const t=actx.currentTime+i*0.22; g.gain.setValueAtTime(0.0001,t);
      g.gain.exponentialRampToValueAtTime(0.12,t+0.02); g.gain.exponentialRampToValueAtTime(0.0001,t+0.2);
      o.start(t); o.stop(t+0.21); });
  }catch(e){}
}
// ОЏОЋОфОеОф ОюОЕОЋОаОЎОф ОъОћОЉОћОЉОф ОбОЊ ОЕОЌОЋОќОеОЎОЮ ОюОЊОБ
let _titleTimer=null; const _origTitle=document.title;
function flashTitle(msg){
  if(_titleTimer || document.hasFocus()) return;
  let on=false;
  _titleTimer=setInterval(()=>{ document.title=(on=!on)?('­Ъћ┤ '+msg):_origTitle; },800);
  const stop=()=>{ if(_titleTimer){clearInterval(_titleTimer);_titleTimer=null;} document.title=_origTitle;
    window.removeEventListener('focus',stop); };
  window.addEventListener('focus',stop);
}
// ОћОфОеОљОф ОъОбОеОЏОф + ОдОюОЎОю + ОћОЉОћОЋОЉ ОбОю ОћОбОЉОеОЋОф ОЌОЊОЕОЋОф
function notifyNew(fresh){
  const n=fresh.length;
  const title = n>1 ? `­ЪЊд ${n} ОћОбОЉОеОЋОф ОЌОЊОЕОЋОф ОаОЏОаОАОЋОф!` : '­ЪЊд ОћОбОЉОеОћ ОЌОЊОЕОћ ОаОЏОаОАОф!';
  const body = fresh.map(t=>`Оъ${t.from_branch_name} ┬и ${t.total_units} ОцОеОЎОўОЎОЮ`).join('\n');
  if(window.Notification && Notification.permission==='granted'){
    try{ const ntf=new Notification(title,{body, tag:'gm-transfer', renotify:true});
      ntf.onclick=()=>{ window.focus(); S.view='board'; render(); ntf.close(); };
      setTimeout(()=>{ try{ntf.close();}catch(e){} }, 12000); }catch(e){}
  }
  alarm(); flashTitle(title);
}
function detectNewTransfers(list){
  const ids=list.map(t=>t.op_id);
  if(!S.knownOps){ S.knownOps=new Set(ids); return; }   // ОўОбОЎОаОћ ОеОљОЕОЋОаОћ Рђћ ОЉОАОЎОА, ОЉОюОЎ ОћОфОеОљОћ
  const fresh=list.filter(t=>!S.knownOps.has(t.op_id));
  S.knownOps=new Set(ids);
  if(fresh.length) notifyNew(fresh);
}
function requestNotif(){
  if(!window.Notification){ toast('ОћОЊОцОЊОцОЪ ОюОљ ОфОЋОъОџ ОЉОћОфОеОљОЋОф',false); return; }
  Notification.requestPermission().then(()=>{ render(); });
}
// ОћОфОеОљОћ ОбОю ОЕОЎОЊОЋОе ОЉОДОЕОф ОћОбОЉОеОћ ОюОъОАОџ
function detectBroadcast(bc){
  const at=(bc&&bc.active)?bc.broadcast_at:null;
  if(S._knownBcast===undefined){ S._knownBcast=at; return; }   // ОўОбОЎОаОћ ОеОљОЕОЋОаОћ Рђћ ОЉОАОЎОА
  if(at && at!==S._knownBcast){
    S._knownBcast=at;
    const n=(bc.lines||[]).length, title='­ЪЊА ОЉОДОЕОф ОћОбОЉОеОћ ОЌОЊОЕОћ ОъОћОљОфОе';
    const body=`${n} ОцОеОЎОўОЎОЮ ОюОћОбОЉОеОћ`;
    if(window.Notification && Notification.permission==='granted'){
      try{ const ntf=new Notification(title,{body, tag:'gm-bcast', renotify:true});
        ntf.onclick=()=>{ window.focus(); S.view='board'; render(); ntf.close(); };
        setTimeout(()=>{ try{ntf.close();}catch(e){} }, 12000); }catch(e){}
    }
    alarm(); flashTitle(title);
  } else { S._knownBcast=at; }
}
function openBroadcast(){
  const bc=S.broadcast; if(!bc||!bc.lines||!bc.lines.length) return;
  openHTMLWindow(transferRequestHTML(bc.from_name||'ОћОљОфОе', bc.lines));
}
async function dismissBroadcast(){

// fetch ОбОЮ timeout (AbortController) Рђћ ОЕОюОљ ОфОЎОфОДОб ОЉОДОЕОћ ОюОаОдОЌ (ОДОЋОюОЊ-ОАОўОљОеОў/ОеОЕОф ОЌОюОЕОћ ОЉОъОЋОЉОЎОЎОю)
function fetchT(url,opts,ms){
  opts=opts||{}; const ctrl=new AbortController();
  const id=setTimeout(()=>ctrl.abort(),ms||30000);
  return fetch(url,{...opts,signal:ctrl.signal}).finally(()=>clearTimeout(id));
}
async function api(path,opts,ms){
  opts=opts||{}; opts.headers=opts.headers||{};
  if(S.adminKey) opts.headers['X-Admin-Key']=S.adminKey;
  const r=await fetchT(path,opts,ms||30000);
  if(!r.ok){ const e=new Error('http '+r.status); e.status=r.status; throw e; }
  return r.json();
}

// РћђРћђ ОъОЋОЊОљОюОЎОЮ РћђРћђ
function modal({title,sub,placeholder,value,type,onok}){
  const root=document.getElementById('modalRoot');
  root.innerHTML=`<div class="overlay"><div class="modal">
    <h3>${title}</h3><div class="muted">${sub||''}</div>
    <input id="mInput" type="${type||'text'}" placeholder="${placeholder||''}" value="${value||''}">

    <button class="btn-primary" style="width:100%" id="mOk">ОљОЎОЕОЋОе</button>
  </div></div>`;
  const inp=document.getElementById('mInput'); inp.focus(); inp.select();
  const submit=async()=>{
    const v=inp.value.trim(); if(!v) return;
    const err=await onok(v);
    if(err){ document.getElementById('mErr').textContent=err; inp.select(); }
    else root.innerHTML='';
  };
  document.getElementById('mOk').onclick=submit;

// РћђРћђ ОаОЎОћОЋОю ОцОЋОДОЋОА ОюОЕОЊОћ ОћОАОеОЎОДОћ (ОАОЋОеОД = ОъОДОюОЊОф) РћђРћђ

// РћђРћђ ОфОЎОДОЋОЪ ОцОеОЎОАОф ОъОДОюОЊОф: ОАОеОЎОДОћ ОЉОъОДОюОЊОф ОбОЉОеОЎОф ОћОЋОцОЏОф ОљОЋОфОЎОЋОф ОюОўОЎОаОЎОЋОф ОюОбОЉОеОЎОЋОф. ОаОъОЎОе ОЌОќОеОћ. РћђРћђ
const _HE2EN = {
  '/':'Q',"'":'W','ОД':'E','Ое':'R','Ољ':'T','Оў':'Y','ОЋ':'U','ОЪ':'I','ОЮ':'O','Оц':'P',
  'ОЕ':'A','ОЊ':'S','Оњ':'D','ОЏ':'F','Об':'G','ОЎ':'H','ОЌ':'J','Ою':'K','Оџ':'L',
  'Оќ':'Z','ОА':'X','ОЉ':'C','Оћ':'V','Оа':'B','Оъ':'N','Од':'M'
};
function fixHebrewLayout(s){
  if(!s || !/[ољ-О┐]/.test(s)) return s;   // ОљОЎОЪ ОљОЋОфОЎОЋОф ОбОЉОеОЎОЋОф Рђћ ОюОћОЕОљОЎОе
  return s.split('').map(ch => _HE2EN[ch] !== undefined ? _HE2EN[ch] : ch).join('');
}

// РћђРћђ ОќОЎОћОЋОЎ ОЎОдОеОЪ/ОъОЋОфОњ ОъОЕОЮ ОћОъОЋОдОе (ОљОЎОЪ ОЕОЊОћ ОЎОдОеОЪ ОЉ-NewOrder; ОћОъОЋОфОњ ОЉОЕОЮ) РћђРћђ
const _BRANDS=[
  ['Apple',['apple','iphone','ipad','macbook',' imac','airpods','apple watch','magsafe']],
  ['Samsung',['samsung','galaxy']],
  ['Xiaomi',['xiaomi','redmi','poco','mi band','xiomi']],
  ['Google',['google','pixel']],
  ['Sony',['sony','playstation','ps5','ps4','dualsense']],
  ['JBL',['jbl']],['Oppo',['oppo']],['OnePlus',['oneplus','one plus']],['Realme',['realme']],
  ['Honor',['honor']],['Huawei',['huawei']],['Motorola',['motorola','moto ']],['Nokia',['nokia']],
  ['Nothing',['nothing']],['TCL',['tcl']],['Lenovo',['lenovo']],['Asus',['asus','rog ']],
  ['HP',['hewlett','hp ']],['Dell',['dell']],['AOC',['aoc']],['LG',['lg ']],
  ['Blackview',['blackview']],['Nubia',['nubia']],['ZTE',['zte']],['Tecno',['tecno']],['Infinix',['infinix']],
  ['Anker',['anker']],['Baseus',['baseus']],['Belkin',['belkin']],['Ugreen',['ugreen']],['WUW',['wuw']],
  ['Hoco',['hoco']],['Remax',['remax']],['Devia',['devia']],['Recci',['recci']],['Green',['green lion','green ']],
  ['Microsoft',['microsoft','xbox','surface']],['Nintendo',['nintendo']],
  ['Logitech',['logitech']],['Razer',['razer']],['Bose',['bose']],['Marshall',['marshall']],['Beats',['beats']],
  ['Energizer',['energizer']],['Duracell',['duracell']],['Varta',['varta']],['CMF',['cmf ']],
];
function brandOf(name){
  const n=' '+String(name||'').toLowerCase().replace(/[\-]/g,' ')+' ';
  for(const [brand,toks] of _BRANDS){ for(const t of toks){ if(n.includes(t)) return brand; } }
  return '';
}

// РћђРћђ ОќОЎОћОЋОЎ ОљОЋОцОЪ ОћОДОюОў: ОАОЋОеОД (ОъОћОЎОе) / ОЎОЊОаОЎ / ОћОЊОЉОДОћ РћђРћђ
function attachScan(inp, onSubmit){
  let times=[], pasted=false;
  inp.addEventListener('paste', ()=>{ pasted=true; });
  inp.addEventListener('keydown', async (e)=>{
    if(e.key==='Enter'){
      const code=fixHebrewLayout(inp.value.trim());   // ОфОЎОДОЋОЪ ОъОДОюОЊОф ОбОЉОеОЎОф
      const method=detectMethod(times, pasted, code);
      times=[]; pasted=false; inp.value='';
      if(code) await onSubmit(code, method);
      return;
    }
    if(e.key && e.key.length===1) times.push(performance.now());
  });
}
function detectMethod(times, pasted, code){
  if(pasted) return 'paste';
  const n=times.length;
  if(n>=2){ const per=(times[n-1]-times[0])/(n-1); return per<35 ? 'scanner' : 'manual'; }
  if((code||'').length>2 && n<=1) return 'paste';   // ОбОеОџ ОЕОћОЋОцОЎОб ОЉОюОЎ ОћОДОЕОЋОф
  return 'manual';
}
const METHOD_LABEL={scanner:'­ЪЊи ОАОЋОеОД', camera:'­ЪЊИ ОъОдОюОъОћ', manual:'Рїе№ИЈ ОЎОЊОаОЎ', paste:'­ЪЊІ ОћОЊОЉОДОћ'};
function methodTag(m){
  if(m==='scanner') return `<span class="mtag ok">${METHOD_LABEL.scanner}</span>`;
  if(m==='camera')  return `<span class="mtag ok">${METHOD_LABEL.camera}</span>`;
  if(m==='manual')  return `<span class="mtag warn">${METHOD_LABEL.manual}</span>`;
  if(m==='paste')   return `<span class="mtag warn">${METHOD_LABEL.paste}</span>`;
  return '';
}

// РћђРћђ ОАОЋОеОД ОъОдОюОъОћ (ОъОЋОЉОЎОЎОю ОЉОюОЉОЊ) РћђРћђ
const IS_MOBILE = (matchMedia('(pointer:coarse)').matches) || /Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
let _camStream=null,_camRAF=null,_camDetector=null,_zxingReader=null;
function openCameraNow(){

  else openCamera(c=>doScanBoard(c,'camera'));
}
function camStatus(msg){ const e=document.getElementById('camStatus'); if(e) e.textContent=msg; }
function loadScript(src){ return new Promise(res=>{ const s=document.createElement('script');
  s.src=src; s.onload=()=>res(true); s.onerror=()=>res(false); document.head.appendChild(s); }); }
async function loadZxing(){
  if(window.ZXing) return true;
  if(await loadScript('https://cdn.jsdelivr.net/npm/@zxing/library@0.21.3/umd/index.min.js') && window.ZXing) return true;
  await loadScript('https://unpkg.com/@zxing/library@0.21.3/umd/index.min.js');
  return !!window.ZXing;
}
async function openCamera(onResult){
  const root=document.getElementById('modalRoot');
  root.innerHTML=`<div class="cam-overlay">
    <video id="camVideo" playsinline muted autoplay></video>
    <div class="cam-frame"><div class="cam-line"></div></div>
    <div class="cam-hint">ОъОДОЮ ОљОф ОћОЉОеОДОЋОЊ ОћОАОцОдОЎОцОЎ ОЉОфОЋОџ ОћОъОАОњОеОф</div>
    <div class="cam-status" id="camStatus">ОъОљОфОЌОю ОъОдОюОъОћРђд</div>
    <button class="cam-close btn-ghost" onclick="closeCamera()">РюЋ ОАОњОЋОе</button>
  </div>`;
  const video=document.getElementById('camVideo');
  // ОЉОЌОЎОеОф ОъОаОЋОб: native ОеОД ОљОЮ ОЉОљОъОф ОЎОЕ ОцОЋОеОъОўОЎОЮ ОаОфОъОЏОЎОЮ; ОљОЌОеОф ZXing
  let engine='zxing';
  if('BarcodeDetector' in window){
    try{ const fmts=await window.BarcodeDetector.getSupportedFormats();
      if(fmts && fmts.length){ engine='native'; _camDetector=new window.BarcodeDetector(); } }catch(e){}
  }
  let mfr=null;
  if(engine!=='native'){
    camStatus('ОўОЋОбОЪ ОъОаОЋОб ОАОеОЎОДОћРђд');
    if(!(await loadZxing())){ camStatus('ОўОбОЎОаОф ОъОаОЋОб ОћОАОеОЎОДОћ ОаОЏОЕОюОћ Рђћ ОЉОЊОЋОД ОљОЎОаОўОеОаОў'); return; }
    mfr=new ZXing.MultiFormatReader();
  }
  // ОъОдОюОъОћ ОљОЌОф + ОюОЋОюОљОћ ОљОЌОф ОюОЕОаОЎ ОћОъОаОЋОбОЎОЮ; ОъОцОбОаОЌОЎОЮ ОеОД ОљОф ОљОќОЋОе ОћОъОАОњОеОф (ОЏОЎОЋОЋОЪ ОъОЊОЋОЎОД)
  try{
    _camStream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment',width:{ideal:1280},height:{ideal:720}}});
    video.srcObject=_camStream; await video.play();
    const tr=_camStream.getVideoTracks()[0]; try{ await tr.applyConstraints({advanced:[{focusMode:'continuous'}]}); }catch(e){}
  } catch(e){ camStatus('ОљОЎОЪ ОњОЎОЕОћ ОюОъОдОюОъОћ Рђћ ОљОЕОе ОћОеОЕОљОћ ОЋОаОАОћ ОЕОЋОЉ'); return; }
  camStatus('ОъОаОЋОб: '+(engine==='native'?'ОъОЋОЉОаОћ':'ZXing')+' ┬и ОъОЌОцОЕ ОЉОеОДОЋОЊРђд');
  const canvas=document.createElement('canvas'), ctx=canvas.getContext('2d');
  const tick=async()=>{
    if(!_camStream) return;
    if(video.videoWidth){
      const vw=video.videoWidth, vh=video.videoHeight;
      // ОљОќОЋОе ОъОеОЏОќОЎ ОдОе ОћОфОЋОљОЮ ОюОъОАОњОеОф Рђћ ОъОЉОЋОЊОЊ ОЉОеОДОЋОЊ ОЎОЌОЎОЊ ОъОфОЋОџ ОЏОъОћ ОдОцОЋОцОЎОЮ
      const cw=Math.floor(vw*0.7), ch=Math.floor(vh*0.18);
      const cx=(vw-cw)>>1, cy=(vh-ch)>>1;
      canvas.width=cw; canvas.height=ch;
      ctx.drawImage(video,cx,cy,cw,ch,0,0,cw,ch);
      try{
        if(engine==='native'){
          const codes=await _camDetector.detect(canvas);
          if(codes&&codes.length){ onCamHit(codes[0].rawValue,onResult); return; }
        } else {
          const src=new ZXing.HTMLCanvasElementLuminanceSource(canvas);
          const bb=new ZXing.BinaryBitmap(new ZXing.HybridBinarizer(src));
          try{ const r=mfr.decode(bb); if(r){ onCamHit(r.getText(),onResult); return; } }
          catch(e){} finally{ try{ mfr.reset(); }catch(_){} }
        }
      }catch(e){}
    }
    _camRAF=requestAnimationFrame(tick);
  };
  _camRAF=requestAnimationFrame(tick);
}
function onCamHit(code,onResult){ beep(true); vibrate(true); closeCamera(); if(code) onResult(String(code).trim()); }
function closeCamera(){
  if(_camRAF){ cancelAnimationFrame(_camRAF); _camRAF=null; }
  if(_camStream){ _camStream.getTracks().forEach(t=>t.stop()); _camStream=null; }
  if(_zxingReader){ try{_zxingReader.reset();}catch(e){} _zxingReader=null; }
  _camDetector=null;
  const root=document.getElementById('modalRoot'); if(root) root.innerHTML='';
}

                 :(S._boardErr?'<div class="empty">ОЉОбОЎОЎОф ОеОЕОф Рђћ ОъОфОЌОЉОе ОъОЌОЊОЕРђд ­Ъћё</div>':'<div class="empty">ОљОЎОЪ ОЏОеОњОб ОћОбОЉОеОЋОф ОЉОЊОеОџ ОљОюОЎОџ ­ЪјЅ</div>')}`;
  if(needEmp){

    if(el){ el.classList.add('flash'); setTimeout(()=>{el&&el.classList.remove('flash');},900); } S._flashOp=null; }

// ОАОеОЎОДОћ ОЉОеОъОф ОћОюОЋОЌ Рђћ ОъОЕОЎОЎОЏОф ОљОЋОўОЋОъОўОЎОф ОюОћОбОЉОеОћ ОћОаОЏОЋОаОћ (ОЉОюОЎ op_id)
async function doScanBoard(code, method){
  if(!S.employee) return;
  let res;
  try{ res=await api('/api/scan',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({branch_id:Number(S.branchId),code,employee:S.employee,method})}); }
  catch(e){ S.lastScan={ok:false,message:'ОЕОњОЎОљОф ОеОЕОф',code}; beep(false); await renderBoard(document.getElementById('app'), true); return; }
  if(res.matched){
    beep(true);vibrate(true);
    const it=res.item||{}, t=res.transfer||{};
    S.lastScan={ok:true, name:it.name||'ОаОДОюОў', op:t.op_id, prog:`${t.received_units}/${t.total_units}`, method};
    S._flashOp=t.op_id;
  } else {
    beep(false);vibrate(false);
    const mr=res.misroute;
    if(mr) S.lastScan={ok:false, misroute:mr.type, message:mr.message, name:mr.product_name||'', code};
    else   S.lastScan={ok:false, message:res.message||'ОюОљ ОЕОЎОЎОџ ОюОљОБ ОћОбОЉОеОћ ОаОЏОаОАОф', code};
  }
  await renderBoard(document.getElementById('app'), true);
}
function fmtTime(iso){ if(!iso)return''; const d=new Date(iso); if(isNaN(d))return iso;
  return d.toLocaleString('he-IL',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}); }
const STATUS={in_transit:'ОъОъОфОЎОЪ ОюОАОеОЎОДОћ',partial:'ОЌОюОДОЎ',received:'ОаОДОюОў',closed:'ОаОАОњОе (ОЌОЋОАОе)'};
function cardHtml(t){
  const pct=t.total_units?Math.round(100*t.received_units/t.total_units):0;

// РћђРћђ ОъОАОџ ОДОюОЎОўОћ РћђРћђ
// ОЕОЮ ОаОдОЎОњ ОфОДОЎОЪ: ОюОцОЌОЋОф 2 ОфОЋОЋОЎОЮ, ОъОЏОЎОю ОљОЋОф, ОЋОЉОюОЎ ОАОцОеОЋОф (ОЕОюОљ ОЎОќОЎОаОЋ ОАОеОЎОљОю/ОЉОеОДОЋОЊ ОЉОўОбОЋОф)
function validEmployee(v){
  v=(v||'').trim();
  if(v.length<2) return false;
  if(/\d/.test(v)) return false;                 // ОЎОЕ ОАОцОеОћ Рєњ ОЏОаОеОљОћ ОАОеОЎОљОю/ОЉОеОДОЋОЊ
  if(!/[A-Za-zољ-О┐]/.test(v)) return false;  // ОЌОЎОЎОЉ ОљОЋОф
  return true;
}
function submitEmployee(v){
  if(!validEmployee(v)){ toast('ОћОќОЪ ОЕОЮ ОаОдОЎОњ (ОљОЋОфОЎОЋОф ОЉОюОЉОЊ, ОюОљ ОъОАОцОе/ОАОеОЎОљОю)', false); return false; }
  setEmployee(v.trim()); return true;
}

function renderScan(app){

  app.innerHTML=`
    <div class="row-back"><a class="link" onclick="backToBoard()">Рєљ ОЌОќОеОћ ${S._fromAdmin?'ОюОаОЎОћОЋОю':'ОюОюОЋОЌ'}</a></div>
    <div class="scan-layout">
      <div class="scan-side">
        <div class="panel">

          ${needEmp
            ? `<input id="empInput" class="scan-input" autocomplete="off" placeholder="ОъОЎ ОДОЋОюОў? ОЕОЮ ОћОаОдОЎОњ">

            : `<input id="scanInput" class="scan-input" autocomplete="off" placeholder="ОАОеОЋОД ОъОЏОЕОЎОеРђд">
               ${IS_MOBILE?`<button class="btn-cam" onclick="openCameraNow()">­ЪЊИ ОАОеОЋОД ОъОћОъОдОюОъОћ</button>`:''}
               <div class="count">ОаОДОюОўОЋ <b>${t.received_units}</b> / <b>${t.total_units}</b></div>
               <div class="emp">ОДОЋОюОў: <b>${S.employee}</b> ┬и <a onclick="changeEmployee()">ОћОЌОюОБ</a></div>
               ${t.received_units<t.total_units
                 ? `<button class="btn-ghost finish-btn" onclick="finishReceiving()">ОАОЎОЎОЮ ОДОюОЎОўОћ ┬и ${t.total_units-t.received_units} ОЌОАОеОЎОЮ</button>`
                 : `<button class="btn-primary finish-btn" onclick="backToBoard()">РюЊ ОАОЎОЋОЮ</button>`}`}
        </div>
      </div>
      <div>
        ${done?`<div class="done-banner">РюЊ ОћОЏОю ОаОДОюОў Рђћ ${t.received_units}/${t.total_units}</div>`:''}
        <div class="items-grid">${t.items.map(itemHtml).join('')}</div>
      </div>
    </div>`;
  if(needEmp){
    const e=document.getElementById('empInput'); try{e.focus();}catch(x){}
    e.addEventListener('keydown',ev=>{ if(ev.key!=='Enter')return;
      const v=e.value.trim(); if(!v)return; if(submitEmployee(v)) render(); });
    return;   // ОбОЊОЎОЎОЪ ОюОљ ОДОЋОЕОеОЎОЮ ОАОеОЎОДОћ Рђћ ОДОЋОЊОЮ ОЕОЮ
  }
  const inp=document.getElementById('scanInput');
  attachScan(inp, (code,method)=>doScan(code,method));

function itemHtml(it){
  const st=Number(it.received||0);
  const sub = it.serial ? it.serial : (it.barcode?('ОЉОеОДОЋОЊ: '+it.barcode):'Рђћ ОюОюОљ ОАОеОЎОљОю Рђћ');
  let cls='', tick='', who='';
  if(st===1){ cls='received'; tick='РюЊ';
    who=(it.received_by&&!String(it.received_by).startsWith('branch:'))?`ОаОДОюОў ОбО┤ОЎ ${it.received_by} ${methodTag(it.received_method)}`:''; }
  else if(st===2){ cls='redirected'; tick='Рєф'; who=`ОћОЋОцОаОћ Рђћ ${it.received_by||'ОаОДОюОў ОЉОАОаОЎОБ ОљОЌОе'}`; }
  else if(st===3){ cls='missing'; tick='РюЌ'; who='ОЌОЋОАОе Рђћ ОюОљ ОћОњОЎОб'; }
  return `<div class="item ${cls}">
    <div class="tick">${tick}</div>
    <div style="flex:1;min-width:0">
      <div class="name">${it.name||it.product_id}</div>
      <div class="sub">${sub}</div>
      ${who?`<div class="who">${who}</div>`:''}
    </div>
  </div>`;
}
async function doScan(code, method){
  if(!S.employee) return;   // ОюОљ ОљОъОЋОе ОюОДОеОЋОф Рђћ ОЕОЊОћ ОћОАОеОЎОДОћ ОъОЋОцОЎОб ОеОД ОљОЌОеОЎ ОЕОЮ
  let res;
  try{ res=await api('/api/scan',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({branch_id:Number(S.branchId),code,op_id:S.op.op_id,employee:S.employee,method})});
  }catch(e){ toast('ОЕОњОЎОљОф ОеОЕОф',false); beep(false); return; }
  if(res.matched){ beep(true);vibrate(true);
    toast(`РюЊ ОаОДОюОў ${METHOD_LABEL[method]||''}`,true); S.op=res.transfer; render(); }
  else{ beep(false);vibrate(false);
    toast((res.misroute&&res.misroute.message)||res.message||'ОюОљ ОЕОЎОЎОџ',false); }
}

function planCountFor(pid){
  const lines=((S.planData||{}).lines)||[];
  return lines.filter(l=>String(l.product_id)===String(pid)).length;
}
function setRebalFilter(v){ S.rebalFilter=v; renderRebalance(); }
function setRebalSearch(v){ S.rebalSearch=v; S._refocusRebal=true; renderRebalance(); }
function rebalFiltered(){
  const d=S.rebalanceData||{items:[]};
  let items=(d.items||[]);
  if(S.rebalFilter && S.rebalFilter!=='all') items=items.filter(i=>i.kind===S.rebalFilter);
  if(S.rebalBranch){ const b=Number(S.rebalBranch);
    items=items.filter(i=>(i.needs||[]).includes(b)||(i.surplus||[]).includes(b)); }
  if(S.rebalMfr) items=items.filter(i=>brandOf(i.name)===S.rebalMfr);
  const q=(S.rebalSearch||'').trim().toLowerCase();
  if(q){ const q2=fixHebrewLayout(S.rebalSearch.trim()).toLowerCase();
    items=items.filter(i=>{ const blob=((i.name||'')+' '+(i.product_id||'')).toLowerCase();
      return blob.includes(q) || (q2 && blob.includes(q2)); }); }
  return items;
}
async function runRebalanceScan(){
  showLoading('ОАОЋОеОД ОъОюОљОЎ ОЉОЏОю ОћОАОаОЎОцОЎОЮРђд (~1-2 ОЊОДО│)');
  try{ await api('/api/admin/rebalance-scan',{method:'POST'}); }catch(e){ hideLoading(); return; }
  const before=(S.rebalanceData&&S.rebalanceData.last_scan)||'';
  let tries=0;
  const iv=setInterval(async()=>{
    tries++;
    let d; try{ d=await api('/api/admin/rebalance'); }catch(e){ return; }
    if((d.last_scan||'')!==before || tries>45){
      clearInterval(iv); S.rebalanceData=d; hideLoading();
      if(S.view==='admin' && S.adminTab==='rebalance') renderRebalance();
    }
  }, 4000);
}

function _csv(s){ s=String(s==null?'':s); return /[",\n]/.test(s)?'"'+s.replace(/"/g,'""')+'"':s; }
function exportRebalCSV(){
  const d=S.rebalanceData||{items:[],branches:[]}; const branches=d.branches||[];
  const items=rebalFiltered();
  const head=['ОъОЋОдОе','ОъОД"Оў','ОАОЋОњ',...branches.map(b=>b.name),'ОЌОАОе ОЉ','ОбОЋОЊОБ ОЉ'];
  const lines=[head.join(',')];
  items.forEach(it=>{ lines.push([_csv(it.name),it.product_id,it.kind==='serial'?'ОАОеОЎОљОюОЎ':'ОЉОеОДОЋОЊ',
    ...branches.map(b=>(it.stock||{})[String(b.id)]||0),
    _csv((it.needs_names||[]).join(' | ')),_csv((it.surplus_names||[]).join(' | '))].join(',')); });
  const blob=new Blob(['№╗┐'+lines.join('\n')],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download='rebalance-'+new Date().toISOString().slice(0,10)+'.csv'; a.click();
}

// РћђРћђ ОбОЋОеОџ ОЉОДОЕОф ОћОбОЉОеОћ (ОфОЋОъОџ ОЏОъОћ ОЕОЋОеОЋОф ОюОцОеОЎОў) РћђРћђ
function openPlanEditor(pid){
  const it=((S.rebalanceData||{}).items||[]).find(x=>String(x.product_id)===String(pid));
  if(!it) return;
  const branches=(S.rebalanceData||{}).branches||[];
  // ОўОбОЪ ОДОЋОЊОЮ ОљОф ОћОЕОЋОеОЋОф ОћОЕОъОЋОеОЋОф ОюОЉОДОЕОћ ОюОъОЋОдОе ОќОћ (ОбОеОЎОЏОћ ОљОъОЎОфОЎОф)
  const existing=(((S.planData||{}).lines)||[]).filter(l=>String(l.product_id)===String(pid));
  let lines;
  if(existing.length){
    lines=existing.map(l=>({from:l.from_branch,to:l.to_branch,qty:l.qty}));
  } else {
    const sur=it.surplus||[], need=it.needs||[]; lines=[];
    for(let i=0;i<Math.min(sur.length,need.length);i++) lines.push({from:sur[i],to:need[i],qty:1});
    if(!lines.length) lines.push({from:sur[0]||(branches[0]||{}).id, to:need[0]||(branches[0]||{}).id, qty:1});
  }
  S._planEdit={it,branches,lines};
  renderPlanEditor();
}
function renderPlanEditor(){
  const {it,branches,lines}=S._planEdit;
  const opt=(sel)=>branches.map(b=>{ const q=(it.stock||{})[String(b.id)]||0;
    return `<option value="${b.id}" ${b.id===sel?'selected':''}>${b.name} (${q})</option>`; }).join('');
  const rowsHtml=lines.map((ln,i)=>`<div class="pl-row">
    <select onchange="planLineChange(${i},'from',this.value)">${opt(ln.from)}</select><span>Рєљ</span>
    <select onchange="planLineChange(${i},'to',this.value)">${opt(ln.to)}</select>
    <input type="number" min="1" value="${ln.qty}" onchange="planLineChange(${i},'qty',this.value)" style="width:62px">
    <button class="btn-ghost" onclick="planRemoveLine(${i})">РюЋ</button>
  </div>`).join('');
  document.getElementById('modalRoot').innerHTML=`<div class="overlay"><div class="modal" style="max-width:540px;text-align:right">
    <h3 style="text-align:center">ОћОЋОАОцОћ ОюОЉОДОЕОф ОћОбОЉОеОћ</h3>

    <div class="muted" style="text-align:center;margin-bottom:12px;font-family:monospace">${it.product_id}</div>
    <div class="muted" style="font-size:12px;margin-bottom:8px">ОъОАОаОЎОБ Рєљ ОюОАОаОЎОБ ┬и ОЏОъОЋОф (ОЉОъОАОцОе: ОъОюОљОЎ ОаОЋОЏОЌОЎ)</div>
    <div id="planLines">${lines.length?rowsHtml:'<div class="muted" style="text-align:center;padding:14px;color:var(--red)">ОљОЎОЪ ОЕОЋОеОЋОф Рђћ ОЕОъОЎОеОћ ОфОАОЎОе ОљОф ОћОЉОДОЕОћ ОюОъОЋОдОе ОќОћ</div>'}</div>
    <button class="btn-ghost" onclick="planAddLine()" style="margin:8px 0">РъЋ ОћОЋОАОБ ОЕОЋОеОћ</button>
    <div style="display:flex;gap:8px;margin-top:10px">
      <button class="btn-primary" style="flex:1" onclick="savePlan()">${lines.length?'ОЕОъОЋОе ОюОЉОДОЕОћ':'ОћОАОе ОЉОДОЕОћ'}</button>
      <button class="btn-ghost" onclick="closeModal()">ОЉОЎОўОЋОю</button>
    </div>
  </div></div>`;
}
function planLineChange(i,f,v){ S._planEdit.lines[i][f]= f==='qty'?Math.max(1,parseInt(v)||1):Number(v); }
function planAddLine(){ const {it,branches,lines}=S._planEdit; const sur=it.surplus||[], need=it.needs||[];
  lines.push({from:sur[0]||(branches[0]||{}).id, to:need[0]||(branches[0]||{}).id, qty:1}); renderPlanEditor(); }
function planRemoveLine(i){ S._planEdit.lines.splice(i,1); renderPlanEditor(); }   // ОюОљ ОАОЋОњОе Рђћ ОъОљОцОЕОе ОЕОъОЎОеОћ ОеОЎОДОћ = ОћОАОеОћ
async function savePlan(){
  const {it,lines}=S._planEdit;
  const valid=lines.filter(l=>Number(l.from)!==Number(l.to))
    .map(l=>({product_id:it.product_id,name:it.name,from_branch:Number(l.from),to_branch:Number(l.to),qty:Number(l.qty)||1}));
  const removing = lines.length===0;
  if(!removing && !valid.length){ toast('ОЉОЌОе ОъОДОЋОе ОЋОЎОбОЊ ОЕОЋОаОЎОЮ',false); return; }
  closeModal(); showLoading('ОЕОЋОъОеРђд');
  // ОћОЌОюОцОћ: ОъОЋОЌОД ОљОф ОЕОЋОеОЋОф ОћОъОЋОдОе ОћОДОЎОЎОъОЋОф ОЋОъОЏОаОЎОА ОљОф ОћОЌОЊОЕОЋОф (ОеОЎОД = ОћОАОеОф ОћОЉОДОЕОћ)
  try{ await api('/api/admin/plan/replace',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({product_id:it.product_id, lines:valid})}); }catch(e){}
  try{ S.planData=await api('/api/admin/plan'); S.planCount=(S.planData.lines||[]).length; }catch(e){}
  hideLoading();
  if(S.adminTab==='plan') renderPlan(); else renderRebalance();   // ОбОЊОЏОЋОЪ ОЌОЎОЋОЋОЎ "ОЉОЉОДОЕОћ"
  toast(removing?'ОћОЉОДОЕОћ ОћОЋОАОеОћ':'ОаОЕОъОе ОюОЉОДОЕОф ОћОћОбОЉОеОћ РюЊ', !removing);
}

async function broadcastBranch(fromBranch){

// РћђРћђ ­ЪЏњ ОћОъОюОдОЋОф ОћОќОъОаОћ РћђРћђ
async function loadReco(spinner){
  if(spinner) showLoading('ОъОЌОЕОЉ ОћОъОюОдОЋОф ОћОќОъОаОћРђд');
  let qs=`?days=${S.recoDays}&target_days=${S.recoTarget}`;
  if(S.recoBranch) qs+=`&branch=${S.recoBranch}`;
  try{ S.recoData=await api('/api/admin/recommendations'+qs); }catch(e){}
  try{ const o=await api('/api/admin/order-plan'); S.orderData=o; S.orderCount=(o.lines||[]).length; }catch(e){}
  if(spinner) hideLoading();
  if(S.view==='admin' && S.adminTab==='reco') renderReco();
}
function setRecoDays(v){ S.recoDays=Number(v)||30; loadReco(true); }
function setRecoBranch(v){ S.recoBranch=v; loadReco(true); }
function setRecoTarget(v){ S.recoTarget=Math.max(1,parseInt(v)||21); loadReco(true); }
function setRecoKind(v){ S.recoKind=v; renderReco(); }
function setRecoSupplier(v){ S.recoSupplier=v; renderReco(); }
function setRecoCategory(v){ S.recoCategory=v; renderReco(); }
function setRecoMfr(v){ S.recoMfr=v; renderReco(); }
function setRecoSearch(v){ S.recoSearch=v; S._refocusReco=true; renderReco(); }
function orderQtyFor(pid){ const l=((S.orderData||{}).lines||[]).find(x=>String(x.product_id)===String(pid)); return l?l.qty:0; }
function recoFiltered(){
  let items=((S.recoData||{}).items||[]).slice();
  if(S.recoKind!=='all') items=items.filter(i=>i.kind===S.recoKind);
  if(S.recoSupplier) items=items.filter(i=>(i.supplier||'')===S.recoSupplier);
  if(S.recoCategory) items=items.filter(i=>(i.category||'')===S.recoCategory);
  if(S.recoMfr) items=items.filter(i=>brandOf(i.name)===S.recoMfr);
  const q=(S.recoSearch||'').trim().toLowerCase();
  if(q){ const q2=fixHebrewLayout(S.recoSearch.trim()).toLowerCase();
    items=items.filter(i=>{ const blob=((i.name||'')+' '+(i.product_id||'')+' '+(i.barcode||'')).toLowerCase();
      return blob.includes(q)||(q2&&blob.includes(q2)); }); }
  const sc=S.recoSort;
  if(sc&&sc.col){ const dir=sc.dir==='asc'?1:-1;
    items=items.slice().sort((a,b)=>((Number(a[sc.col])||0)-(Number(b[sc.col])||0))*dir
      || String(a.name).localeCompare(String(b.name))); }
  return items;
}
function setRecoSort(col){
  const s=S.recoSort||{};
  if(s.col===col) s.dir=(s.dir==='desc'?'asc':'desc'); else { s.col=col; s.dir='desc'; }
  S.recoSort={col:s.col,dir:s.dir}; renderReco();
}

function orderFiltered(){

  return lines;
}

function setRemovalsTo(v){ S.removalsTo=v; if(S.removalsFrom&&S.removalsTo) loadRemovals(true); }
function clearRemovalsRange(){ S.removalsFrom=''; S.removalsTo=''; loadRemovals(true); }
function setRemovalsMfr(v){ S.removalsMfr=v; renderRemovals(); }
function setRemovalsSearch(v){ S.removalsSearch=v; S._refocusRemovals=true; renderRemovals(); }
function removalsFiltered(){
  let rows=((S.removalsData||{}).rows||[]).slice();

      return blob.includes(q)||(q2&&blob.includes(q2)); }); }

}

    <div class="muted" style="margin-bottom:10px;font-size:13px">ОћОЋОеОЊОЋОф ОъОюОљОЎ ОЉОАОаОЎОБ <b>ОъОеОюОЋОњ</b> (ОЌОдОЎ-ОДОЋОцОћ) Рђћ ОаОАОцОеОЋОф ОЏОъОЏОЎОеОЋОф ОЉОћОъОюОдОЋОф ОћОћОќОъОаОћ. ${note}.</div>
    <div class="rebal-bar">
      <input id="removalsSearch" placeholder="­Ъћј ОЌОЎОцОЋОЕ ОъОЋОдОе / ОъОДО┤Оў / ОАОеОЎОљОю / ОбОЋОЉОЊ / ОъОАО│ ОцОбОЋОюОћ" value="${(S.removalsSearch||'').replace(/"/g,'&quot;')}" oninput="setRemovalsSearch(this.value)">

async function runRemovalsIngest(){
  showLoading('ОљОЋОАОБ ОћОЋОеОЊОЋОф ОъОюОљОЎРђд');

  setTimeout(()=>{ loadRemovals(false); hideLoading(); toast('ОљОЎОАОЋОБ ОћОЋОеОЊОЋОф ОеОЦ ОЉОеОДОб Рђћ ОЎОфОбОЊОЏОЪ ОЉОДОеОЋОЉ',true); }, 2500);

// РћђРћђ ­Ъћј ОъОюОљОЎ ОЌОЎ Рђћ ОЌОЎОцОЋОЕ ОЊОЎОаОъОЎ (ОДОўОюОЋОњ ОъОДОЋОъОЎ) + ОъОюОљОЎ ОЉОќОъОЪ ОљОъОф ОъОћОДОЋОцОћ РћђРћђ
const LS_SHOW_CAP=50, LS_LIVE_CAP=LS_SHOW_CAP, LS_TTL_MS=30000, LS_CHUNK=8;
async function loadLiveCatalog(spinner){
  if(spinner) showLoading('ОўОЋОбОЪ ОДОўОюОЋОњ ОЌОЎОцОЋОЕРђд');
  try{ const d=await api('/api/admin/live-search/catalog'); S.lsCat=d.items||[]; S.lsCatAt=d.updated_at; }
  catch(e){ S.lsCat=S.lsCat||[]; }
  if(spinner) hideLoading();
  if(S.view==='admin'&&S.adminTab==='live') renderLive();
}
function setLsQuery(v){ S.lsQuery=v; S.lsSerialHits=null; S._refocusLs=true; renderLive(); }
function setLsKind(v){ S.lsKind=v; renderLive(); }
function setLsCategory(v){ S.lsCategory=v; renderLive(); }
function setLsMfr(v){ S.lsMfr=v; renderLive(); }
function setLsStock(v){ S.lsStock=v; renderLive(); }
function lsFiltered(){
  let items=(S.lsCat||[]);
  items=items.filter(i=>i.active);   // ОюОљ-ОцОбОЎОюОЎОЮ ОюОљ ОъОЋОдОњОЎОЮ (ОъОД"ОўОЎОЮ ОЕОаОАОњОеОЋ ОЉОДОЋОцОћ)
  if(S.lsStock) items=items.filter(i=>(i.stock||0)>0);   // ОеОД ОбОЮ ОъОюОљОЎ (ОюОцОЎ ОћОДОўОюОЋОњ; ОћОЏОъОЋОЎОЋОф ОбОдОъОЪ ОЌОЎОЋОф)
  if(S.lsKind!=='all') items=items.filter(i=>i.kind===S.lsKind);
  if(S.lsCategory) items=items.filter(i=>(i.category||'')===S.lsCategory);
  if(S.lsMfr) items=items.filter(i=>brandOf(i.name)===S.lsMfr);
  const q=(S.lsQuery||'').trim();
  const hasFilter=S.lsKind!=='all'||S.lsCategory||S.lsMfr;
  if(q.length<2 && !hasFilter) return null;   // ОбОЋОЊ ОљОЎОЪ ОъОћ ОюОћОдОЎОњ Рђћ ОъОЌОЏОЎОЮ ОюОћОДОюОЊОћ
  if(q.length>=2){
    // ОЌОЎОцОЋОЕ ОЌОЏОЮ: ОъОцОдОюОЎОЮ ОюОъОЎОюОЎОЮ Рђћ ОЏОю ОъОЎОюОћ ОЌОЎОЎОЉОф ОюОћОЋОцОЎОб ОљОЎОцОЕОћОЋ ОЉОЕОЮ/ОъОД"Оў/ОЉОеОДОЋОЊ,
    // ОЉОюОЎ ОфОюОЋОф ОЉОАОЊОе ОЕОЉОЋ ОћОъОЋОдОе ОеОЕОЋОЮ ОЉОДОЋОцОћ ("a57 navy" ОЎОъОдОљ "OPPO A57 ... Navy")
    const toks=q.toLowerCase().split(/\s+/).filter(Boolean);
    const toks2=fixHebrewLayout(q).toLowerCase().split(/\s+/).filter(Boolean);
    const alt=toks2.join(' ')!==toks.join(' ');
    items=items.filter(i=>{
      const blob=((i.name||'')+' '+(i.product_id||'')+' '+(i.barcode||'')).toLowerCase();
      return toks.every(t=>blob.includes(t))||(alt&&toks2.every(t=>blob.includes(t)));
    });
    const ql=q.toLowerCase();
    items.sort((a,b)=>{
      const score=x=>{
        if(String(x.product_id)===q||String(x.barcode)===q) return 0;        // ОћОфОљОъОћ ОъОЊОЋОЎОДОф
        const n=String(x.name||'').toLowerCase();
        if(n.includes(ql)) return 1;                                          // ОћОЉОЎОўОЋОЎ ОЏОеОдОБ ОЉОЕОЮ
        return 2;                                                             // ОъОЎОюОЎОЮ ОъОцОЋОќОеОЋОф
      };
      return score(a)-score(b)
        ||((b.stock||0)-(a.stock||0))                                         // ОбОЮ ОъОюОљОЎ ОДОЋОЊОЮ
        ||String(a.name).localeCompare(String(b.name),'he');
    });
  } else items=items.slice().sort((a,b)=>((b.stock||0)-(a.stock||0))||String(a.name).localeCompare(String(b.name),'he'));
  // ОаОъОдОљОЋ ОюОцОЎ ОАОеОЎОљОю (ОњОЮ ОЌОюОДОЎ) Рђћ ОъОДОЊОЎОъОЎОЮ ОљОф ОћОъОЋОдОеОЎОЮ ОюОеОљОЕ ОћОеОЕОЎОъОћ (ОњОЮ ОљОЮ ОљОЎОЪ ОъОюОљОЎ ОЉОДОўОюОЋОњ)
  if(S.lsSerialHits&&S.lsSerialHits.length){
    const pids=[...new Set(S.lsSerialHits.map(h=>String(h.product_id)))];
    pids.reverse().forEach(pid=>{
      if(!items.some(x=>String(x.product_id)===pid)){
        const hit=(S.lsCat||[]).find(x=>String(x.product_id)===pid);
        if(hit) items.unshift(hit);
      }
    });
  }
  return items;
}
let _lsSerialT=null;
function lsMaybeSerial(q){
  const qq=fixHebrewLayout(q).trim();
  if(!/^\d{3,}$/.test(qq)) return;   // ОДОўОб ОъОАОцОеОЎ (3+ ОАОцОеОЋОф) Рђћ ОЎОЎОфОЏОЪ ОАОеОЎОљОю ОЌОюОДОЎ
  clearTimeout(_lsSerialT);
  _lsSerialT=setTimeout(async()=>{
    if((S.lsQuery||'').trim()!==q) return;
    try{ const d=await api('/api/admin/live-search/serial?q='+encodeURIComponent(qq));
      if((S.lsQuery||'').trim()!==q) return;
      const m=(d&&d.matches)||[];
      if(JSON.stringify(m)!==JSON.stringify(S.lsSerialHits||[])){
        S.lsSerialHits=m; S._refocusLs=true; renderLive();
      }
    }catch(e){}
  },300);
}
function fmtClock(iso){ if(!iso) return ''; const d=new Date(iso); return isNaN(d)?'':d.toLocaleTimeString('he-IL'); }
function lsRow(it,live){
  const pid=String(it.product_id);
  const hits=(S.lsSerialHits||[]).filter(h=>String(h.product_id)===pid);
  const serBadge=hits.length
    ?` <span class="mtag ok" style="direction:ltr">${hits[0].serial}${hits.length>1?' +'+(hits.length-1):''}</span>`:'';
  const c=S.lsLive[pid];
  const fresh=c&&!c.err&&Date.now()-c.at<LS_TTL_MS;
  const bcells=(S.branchList||[]).map(b=>{
    if(!live) return `<td class="ls-wait">Рђћ</td>`;
    if(fresh){ const q=((c.data.branches||[]).find(x=>String(x.id)===String(b.id))||{}).qty||0;
      return `<td id="lsb-${pid}-${b.id}" class="${q>0?'ls-has':(q<0?'ls-neg':'ls-zero')}">${q}</td>`; }
    return `<td id="lsb-${pid}-${b.id}" class="ls-wait">РЈ│</td>`;
  }).join('');
  const tcell=live?(fresh?('­ЪЪб '+fmtClock(c.data.fetched_at)):(c&&c.err?'ОЕОњОЎОљОф ОДОЋОцОћ':'Рђд')):'ОдОъОдОЮ ОюОфОдОЋОњОћ ОЌОЎОћ';
  return `<tr class="ls-row" onclick='openLiveDetail(${JSON.stringify(pid)})'>
    <td style="direction:ltr;text-align:right;font-family:monospace">${pid}</td>
    <td><div style="display:flex;align-items:center;justify-content:space-between;gap:8px">
      <span>${it.name}${it.active?'':' <span class="mtag warn">ОюОљ ОцОбОЎОю</span>'}</span>${serBadge||''}</div></td>
    <td>${it.kind==='serial'?'­ЪЊ▒':'­ЪЈи№ИЈ'}</td>
    <td class="muted">${it.category||'Рђћ'}</td>
    ${bcells}
    <td id="lst-${pid}" class="muted" style="font-size:11px;white-space:nowrap">${tcell}</td>
  </tr>`;
}
let _lsLiveT=null;
function lsScheduleLive(list){ clearTimeout(_lsLiveT); _lsLiveT=setTimeout(()=>lsFetchLive(list,0),350); }
async function lsFetchLive(list,attempt){
  const seq=++S.lsSeq, now=Date.now();
  const todo=list.filter(i=>{const c=S.lsLive[String(i.product_id)];return !(c&&!c.err&&now-c.at<LS_TTL_MS);});
  // ОЉОъОаОЋОф ОЕОю LS_CHUNK ОЉОъОДОЉОЎОю Рђћ ОћОЕОЋОеОЋОф ОћОеОљОЕОЋОаОЋОф ОаОдОЉОбОЋОф ОъОЎОЊ, ОЋОюОљ ОъОдОЎОцОЎОЮ ОљОф ОћОДОдОЉ ОћОъОЕОЋОфОБ
  for(let k=0;k<todo.length;k+=LS_CHUNK){
    if(seq!==S.lsSeq) return;   // ОћОъОЕОфОъОЕ ОћОДОюОЎОЊ ОбОЋОЊ Рђћ ОъОцОАОЎОДОЎОЮ, ОЌОЎОцОЋОЕ ОЌОЊОЕ ОЏОЉОе ОеОЦ
    await Promise.all(todo.slice(k,k+LS_CHUNK).map(async i=>{
      const pid=String(i.product_id);
      try{ const d=await api('/api/admin/live-stock/'+encodeURIComponent(pid),null,45000);
        S.lsLive[pid]={at:Date.now(),data:d}; }
      catch(e){ S.lsLive[pid]={at:Date.now(),err:true}; }
      if(seq===S.lsSeq) lsPaint(pid);
    }));
  }
  // ОаОЎОАОЎОЋОЪ ОЌОЋОќОе ОљОЋОўОЋОъОўОЎ ОюОЕОЋОеОЋОф ОЕОаОЏОЕОюОЋ (ОћОДОЋОцОћ ОбОъОЋОАОћ/ОћОДОдОЉ ОћОъОЕОЋОфОБ ОфОцОЋОА) Рђћ ОбОЊ 3 ОцОбОъОЎОЮ
  if(seq!==S.lsSeq) return;
  const failed=list.filter(i=>{const c=S.lsLive[String(i.product_id)];return c&&c.err;});
  if(failed.length && (attempt||0)<3)
    setTimeout(()=>{ if(seq===S.lsSeq) lsFetchLive(failed,(attempt||0)+1); },5000);
}
function lsPaint(pid){
  const c=S.lsLive[pid]; if(!c) return;
  (S.branchList||[]).forEach(b=>{
    const el=document.getElementById('lsb-'+pid+'-'+b.id); if(!el) return;
    if(c.err){ el.textContent='Рџа№ИЈ'; el.className='ls-wait'; return; }
    const q=((c.data.branches||[]).find(x=>String(x.id)===String(b.id))||{}).qty||0;
    el.textContent=q; el.className=q>0?'ls-has':(q<0?'ls-neg':'ls-zero');
  });
  const t=document.getElementById('lst-'+pid);
  if(t) t.textContent=c.err?'­ЪћЂ ОъОаОАОћ ОЕОЋОЉРђд':('­ЪЪб '+fmtClock(c.data.fetched_at));
}
function renderLive(){
  const app=document.getElementById('app');
  const cat=S.lsCat||[];
  const items=lsFiltered();
  const act=cat.filter(i=>i.active);
  const cats=[...new Set(act.map(i=>i.category).filter(Boolean))].sort();
  const mfrs=[...new Set(act.map(i=>brandOf(i.name)).filter(Boolean))].sort();
  const opt=(v,sel,lbl)=>`<option value="${v}" ${String(sel)===String(v)?'selected':''}>${lbl}</option>`;
  const shown=(items||[]).slice(0,LS_SHOW_CAP);
  const liveCount=Math.min(shown.length,LS_LIVE_CAP);
  let body='';
  if(!cat.length)
    body=`<div class="empty">РЈ│ ОДОўОюОЋОњ ОћОЌОЎОцОЋОЕ ОбОЋОЊ ОюОљ ОаОЉОаОћ Рђћ ОаОАОћ ОЕОЋОЉ ОЉОбОЋОЊ ~ОЊОДОћ<br><button class="btn-ghost" style="margin-top:10px" onclick="loadLiveCatalog(true)">ОўОбОЪ ОЕОЋОЉ</button></div>`;
  else if(items===null)
    body=`<div class="empty">­Ъћј ОћОДОюОЊ ОЕОЮ ОъОЋОдОе / ОъОДО┤Оў / ОЉОеОДОЋОЊ / ОАОеОЎОљОю Рђћ ОћОеОЕОЎОъОћ ОъОдОўОъОдОъОф ОфОЋОџ ОЏОЊОЎ ОћОДОюОЊОћ</div>`;
  else if(!items.length){
    const isNum=/^\d{3,}$/.test(fixHebrewLayout((S.lsQuery||'').trim()));
    body=`<div class="empty">${isNum?'ОъОЌОцОЕ ОюОцОЎ ОъОАОцОе ОАОЎОЊОЋОеОЎРђд':'ОюОљ ОаОъОдОљОЋ ОъОЋОдОеОЎОЮ ОъОфОљОЎОъОЎОЮ'}</div>`;
  } else body=`

    <table class="admin"><thead><tr>
      <th>ОъОДО┤Оў</th><th>ОъОЋОдОе</th><th>ОАОЋОњ</th><th>ОДОўОњОЋОеОЎОћ</th>
      ${(S.branchList||[]).map(b=>`<th style="text-align:center">${b.name}</th>`).join('')}
      <th>ОбОЊОЏОЋОЪ</th>
    </tr></thead><tbody>${shown.map((it,i)=>lsRow(it,i<LS_LIVE_CAP)).join('')}</tbody></table>

  app.innerHTML=`<h1 class="title">­ЪЏа№ИЈ ОаОЎОћОЋОю ОљОЋОцОеОдОЎОћ</h1>${adminTabsHTML()}

async function openLiveDetail(pid){

  try{ d=await api('/api/admin/live-stock/'+encodeURIComponent(pid)+(it.kind==='serial'?'?serials=1':''),null,45000); }catch(e){}
  hideLoading();
  if(!d){ toast('ОюОљ ОаОЎОфОЪ ОюОДОеОЋОљ ОъОћОДОЋОцОћ ОЏОеОњОб',false); return; }
  S._lsDetail={it,d,open:null};

async function refreshLiveDetail(){
  const D=S._lsDetail; if(!D) return;
  showLoading('ОъОеОбОаОЪ ОъОћОДОЋОцОћРђд');
  try{ const d=await api('/api/admin/live-stock/'+encodeURIComponent(D.it.product_id)+'?fresh=1'+(D.it.kind==='serial'?'&serials=1':''),null,45000);
    D.d=d; S.lsLive[String(D.it.product_id)]={at:Date.now(),data:d}; }
  catch(e){ toast('ОЕОњОЎОљОћ ОЉОеОбОаОЋОЪ',false); }
  hideLoading(); renderLiveDetail();

function renderLiveDetail(){
  const D=S._lsDetail; if(!D) return;
  const {it,d}=D;
  const hitSet=new Set((S.lsSerialHits||[]).filter(h=>String(h.product_id)===String(it.product_id)).map(h=>String(h.serial)));
  const chipClickable=it.kind!=='serial';   // ОЉОъОЋОдОеОЎ ОЉОеОДОЋОЊ ОћОДОЋОЉОЎОЋОф ОбОдОъОЪ ОцОЋОфОЌОЋОф ОЉОДОЕОф ОћОбОЉОеОћ
  const chips=(d.branches||[]).map(b=>{
    const q=b.qty||0, cls=q>0?'q-has':(q<0?'q-neg':'q-zero');
    const click=(chipClickable&&q>0)?` style="cursor:pointer" onclick="lsQtyTransfer(${b.id},${q})" title="ОЉОДОЕОф ОћОбОЉОеОћ Оъ${b.name}"`:'';
    return `<div class="ls-bchip"${click}>${b.name} <b class="${cls}">${q}</b></div>`;
  }).join('');
  let serHtml='';
  if(it.kind==='serial'){
    if(d.serials_error) serHtml='<div class="muted">Рџа№ИЈ ОюОљ ОаОЎОфОЪ ОюОДОеОЋОљ ОљОф ОћОАОеОЎОљОюОЎОЮ ОЏОеОњОб</div>';
    else if(!(d.serials||[]).length) serHtml='<div class="muted">ОљОЎОЪ ОЎОЌОЎОЊОЋОф ОАОеОЎОљОюОЎОЋОф ОќОъОЎОаОЋОф ОЉОДОЋОцОћ</div>';
    else{
      // ОДОЎОЉОЋОЦ ОюОцОЎ ОАОаОЎОБ (ОЉОАОЊОе ОћОд'ОЎОцОЎОЮ), ОЋОЉОфОЋОџ ОЏОю ОАОаОЎОБ ОюОцОЎ ОфОљОеОЎОџ ОДОюОЎОўОћ
      const bOrder={}; (d.branches||[]).forEach((b,i)=>bOrder[String(b.id)]=i);
      const sorted=d.serials.slice().sort((a,b)=>
        ((bOrder[String(a.branch_id)]!==undefined?bOrder[String(a.branch_id)]:99)-(bOrder[String(b.branch_id)]!==undefined?bOrder[String(b.branch_id)]:99))
        ||String(a.insert_date).localeCompare(String(b.insert_date))
        ||String(a.serial).localeCompare(String(b.serial)));
      D.sorted=sorted;
      serHtml=`<div style="font-weight:700;margin-bottom:6px">ОЎОЌОЎОЊОЋОф ОЉОДОЋОцОћ (${d.serials.length})</div>
      <table class="serials"><thead><tr><th>ОАОеОЎОљОю</th><th>ОАОаОЎОБ</th><th>ОаОДОюОў</th><th>ОАОцОД</th><th>ОљОЌОеОЎОЋОф</th><th>ОАОўОўОЋОА</th></tr></thead><tbody>
      ${sorted.map((s,i)=>{
        const st=s.status===1?'<span style="color:var(--green);font-weight:700">ОќОъОЎОЪ</span>':('ОАОўОўОЋОА '+s.status);
        const dt=s.insert_date?new Date(s.insert_date):null;
        const ds=dt&&!isNaN(dt)?dt.toLocaleDateString('he-IL'):'';
        const war=(s.warranty||'Рђћ')+(s.warranty_months?(' ┬и '+Math.round(s.warranty_months)+' ОЌО│'):'');
        const mark=hitSet.has(String(s.serial))?' style="background:rgba(31,191,107,.10)"':'';
        return `<tr class="srow"${mark} onclick="lsSerialTransfer(${i})" title="ОЉОДОЕОф ОћОбОЉОеОћ ОюОАОаОЎОБ ОљОЌОе">
          <td style="direction:ltr;text-align:right;font-family:monospace">${s.serial}</td>
          <td style="font-weight:700">${s.branch_name||s.branch_id||''}</td><td>${ds}</td>
          <td>${s.supplier||'Рђћ'}</td><td>${war}</td><td>${st}</td></tr>`;
      }).join('')}</tbody></table>
      <div class="muted" style="font-size:12px;margin-top:6px">­ЪЊА ОюОЌОЎОдОћ ОбОю ОЕОЋОеОф ОАОеОЎОљОю Рђћ ОЉОДОЕОф ОћОбОЉОеОћ ОюОАОаОЎОБ ОљОЌОе</div>`;
    }
  }
  document.getElementById('modalRoot').innerHTML=`<div class="overlay"><div class="modal" style="max-width:940px;text-align:right;max-height:84vh;overflow:auto">
    <h3 style="margin-bottom:2px">${it.name}</h3>
    <div class="muted" style="font-family:monospace;direction:ltr;text-align:right">${it.product_id}${it.barcode?(' ┬и '+it.barcode):''}</div>
    <div style="display:flex;align-items:center;gap:10px;margin:10px 0 4px">
      <span class="ls-live"><span class="dot"></span> ОЌОЎ ОъОћОДОЋОцОћ ┬и ${fmtClock(d.fetched_at)}</span>
      <button class="btn-ghost" style="padding:5px 10px;font-size:12px" onclick="refreshLiveDetail()">­Ъћё ОеОбОаОЪ</button>
    </div>
    <div class="ls-chipline">${chips}</div>
    ${chipClickable?'<div class="muted" style="font-size:12px;margin:-6px 0 10px">­ЪЊА ОюОЌОЎОдОћ ОбОю ОАОаОЎОБ ОбОЮ ОъОюОљОЎ Рђћ ОЉОДОЕОф ОћОбОЉОеОћ ОъОъОаОЋ</div>':''}
    ${serHtml}
    <div style="display:flex;margin-top:14px"><button class="btn-ghost" style="flex:1" onclick="closeModal()">ОАОњОЋОе</button></div>
  </div></div>`;
}

// РћђРћђ ОЉОДОЕОф ОћОбОЉОеОћ ОъОфОЋОџ ОъОюОљОЎ ОЌОЎ: ОАОеОЎОљОю ОАОцОдОЎОцОЎ ОљОЋ ОЏОъОЋОф ОъОъОЋОдОе ОЉОеОДОЋОЊ РћђРћђ

function lsBranchName(id){ const b=(S.branchList||[]).find(x=>String(x.id)===String(id)); return b?b.name:String(id); }
function lsSerialTransfer(i){
  const D=S._lsDetail; if(!D||!D.sorted) return;
  const s=D.sorted[i]; if(!s||!s.branch_id) return;
  lsTransferDialog({
    title:'ОЉОДОЕОф ОћОбОЉОеОф ОъОЏОЕОЎОе', sub:D.it.name,
    info:`ОАОеОЎОљОю <b style="font-family:monospace;direction:ltr;unicode-bidi:embed">${s.serial}</b> ┬и ОаОъОдОљ ОЉ<b>${s.branch_name}</b>`,
    from:s.branch_id, maxQty:1, fixedQty:true,
    line:(to)=>({product_id:String(D.it.product_id), name:`${D.it.name} Рђћ ОАОеОЎОљОю ${s.serial}`,
                 from_branch:Number(s.branch_id), to_branch:to, qty:1})
  });
}
function lsQtyTransfer(bid,avail){
  const D=S._lsDetail; if(!D) return;
  lsTransferDialog({
    title:'ОЉОДОЕОф ОћОбОЉОеОф ОъОюОљОЎ', sub:D.it.name,
    info:`Оъ<b>${lsBranchName(bid)}</b> ┬и ОќОъОЎОЪ: <b>${avail}</b>`,
    from:bid, maxQty:Math.max(1,Math.floor(avail)), fixedQty:false,
    line:(to,qty)=>({product_id:String(D.it.product_id), name:D.it.name,
                     from_branch:Number(bid), to_branch:to, qty})
  });
}

    </div>

    <div class="muted" style="text-align:center;font-size:12px;margin-top:10px">ОћОЉОДОЕОћ ОфОДОцОЋОЦ ОЉОюОЋОЌ ОћОДОюОЎОўОћ ОЕОю ОћОАОаОЎОБ ОћОъОЌОќОЎОД ОЋОфОфОЋОЋОАОБ ОюОўОљОЉ ­ЪЊЮ ОЉОДОЕОЋОф ОћОбОЉОеОћ</div>
  </div></div>`;
}
async function lsSendTransfer(){
  const cfg=S._lsTransfer; if(!cfg) return;
  const to=Number(document.getElementById('ltTo').value);
  let qty=1;
  if(!cfg.fixedQty) qty=Math.max(1,Math.min(cfg.maxQty,parseInt(document.getElementById('ltQty').value)||1));
  const line=cfg.line(to,qty);
  showLoading('ОЕОЋОюОЌ ОЉОДОЕОћРђд');
  try{
    await api('/api/admin/plan',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({lines:[line]})});
    await api('/api/admin/broadcast',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({branch_id:Number(cfg.from)})});
    toast('ОћОЉОДОЕОћ ОЕОЋОЊОеОћ ОюОАОаОЎОБ '+lsBranchName(cfg.from)+' ­ЪЊА',true);
  }catch(e){ toast('ОЕОњОЎОљОћ ОЉОЕОюОЎОЌОф ОћОЉОДОЕОћ',false); }
  hideLoading();
  S._lsTransfer=null;
  renderLiveDetail();
}

function renderAdmin(){
  if(S.adminTab==='live') return S.lsCat?renderLive():loadLiveCatalog(true);
  if(S.adminTab==='rebalance') return S.rebalanceData?renderRebalance():loadRebalance(true);
  if(S.adminTab==='plan') return S.planData?renderPlan():loadPlan(true);
  if(S.adminTab==='reco') return S.recoData?renderReco():loadReco(true);
  if(S.adminTab==='order') return S.orderData?renderOrder():loadOrder(true);
  if(S.adminTab==='removals') return S.removalsData?renderRemovals():loadRemovals(true);
  const app=document.getElementById('app');
  const f=S.adminFilters;
  const data=S.adminData||{summary:{},transfers:[],misroutes:[]};
  const s=data.summary||{}, order={in_transit:0,partial:1,received:2,closed:3};
  let rows=(data.transfers||[]).slice(); const total=rows.length;
  if(f.q){
    const raw=f.q.trim().toLowerCase();
    const fixed=fixHebrewLayout(f.q.trim()).toLowerCase();   // ОњОЮ ОљОЮ ОћОЋОДОюОЊ ОАОеОЎОљОю ОЉОъОДОюОЊОф ОбОЉОеОЎОф

      const blob=(String(t.op_id)+' '+t.from_branch_name+' '+t.to_branch_name+' '+(t.employee||'')+' '+
                  ((t.receivers||[]).join(' '))+' '+(t.items_search||'')).toLowerCase();
      return blob.includes(raw) || (fixed && blob.includes(fixed));
    });
  }
  if(f.from) rows=rows.filter(t=>String(t.from_branch_id)===String(f.from));
  if(f.to)   rows=rows.filter(t=>String(t.to_branch_id)===String(f.to));
  if(f.fromDate) rows=rows.filter(t=>(t.created_at||'').slice(0,10) >= f.fromDate);
  if(f.toDate)   rows=rows.filter(t=>(t.created_at||'').slice(0,10) <= f.toDate);

      <div class="mis-title">­ЪџЕ ОъОЏОЕОЎОеОЎОЮ ОюОљ ОЉОъОДОЋОЮ (${misroutes.length})</div>
      <div class="muted" style="margin-bottom:10px;font-size:13px">ОъОЏОЕОЎОеОЎОЮ ОЕОаОАОеОДОЋ ОЉОАОаОЎОБ ОЕОљОЎОаОЋ ОћОАОаОЎОБ ОЕОљОюОЎОЋ ОћОЮ ОъОЕОЋОЎОЏОЎОЮ ОЉОДОЋОцОћ. ОЎОЎОАОњОе ОљОЋОўОЋОъОўОЎОф ОЏОЕОЎОЎОДОюОўОЋ ОЉОАОаОЎОБ ОћОаОЏОЋОЪ.</div>
      <table class="admin"><thead><tr>

    </tr></thead><tbody>${rows.map(adminRow).join('')}</tbody></table>`
    :'<div class="empty">ОљОЎОЪ ОћОбОЉОеОЋОф ОЕОфОЋОљОъОЋОф ОюОАОЎОаОЋОЪ</div>'}`;
  if(S._refocusFilter){ const fq=document.getElementById('fq'); if(fq){ fq.focus(); const v=fq.value; fq.value=''; fq.value=v; } S._refocusFilter=false; }
}
function fmtAge(h){ h=h||0; if(h<1)return Math.round(h*60)+' ОЊОДО│'; if(h<48)return Math.round(h)+'ОЕО│'; return Math.round(h/24)+' ОЎОъОЎОЮ'; }
function adminRow(t){
  return `<tr class="${t.overdue?'overdue':''}" onclick="adminOpen('${t.op_id}')">
    <td><span class="pill ${t.status}">${STATUS[t.status]||t.status}</span></td>
    <td><b>${t.op_id}</b> ${t.overdue?'<span class="badge-late">ОЉОљОЎОЌОЋОе 24ОЕО│+</span>':''}${t.missing_count?` <span class="badge-late">РюЌ ${t.missing_count} ОЌОЋОАОе</span>`:''}${t.redirected_count?` <span class="badge-manual">Рєф ${t.redirected_count} ОћОЋОцОаОћ</span>`:''}</td>
    <td>${t.from_branch_name} Рєњ ${t.to_branch_name}</td>
    <td>${fmtTime(t.created_at)}</td>
    <td>${t.employee||'Рђћ'}</td>
    <td class="prog-cell">${t.received_units}/${t.total_units}</td>
    <td>${(t.receivers&&t.receivers.length)?t.receivers.join(', '):'Рђћ'}${t.manual_count?` <span class="badge-manual">Рїе№ИЈ ${t.manual_count} ОюОљ ОЉОАОЋОеОД</span>`:''}</td>
    <td>${t.status==='received'&&t.received_at?fmtTime(t.received_at):'Рђћ'}</td>
  </tr>`;
}
function misRow(m){
  return `<tr>
    <td style="font-family:monospace;direction:ltr;text-align:right">${m.serial}</td>
    <td>${m.product_name||''}</td>
    <td>${m.scanned_branch_name||''}</td>
    <td><b style="color:var(--red)">${m.expected_branch_name||''}</b></td>
    <td>${m.scanned_by||'Рђћ'}</td>
    <td>${fmtTime(m.created_at)}</td>
    <td><button class="btn-ghost" onclick="resolveMisroute(${m.id})">ОАОъОЪ ОЏОўОЋОцОю</button></td>
  </tr>`;
}
async function resolveMisroute(id){
  showLoading('ОАОЋОњОе ОЌОеОЎОњОћРђд');
  try{ await api('/api/admin/misroute/'+id+'/resolve',{method:'POST'}); }catch(e){}
  await loadAdmin(false); hideLoading();
}
async function adminOpen(opId){
  showLoading();
  try{ S.op=await api('/api/transfers/'+opId); }catch(e){ hideLoading(); return; }
  hideLoading(); S._fromAdmin=true; S.view='scan'; render();
}

// РћђРћђ ОћОфОеОљОЋОф ОеОДОб: ОЉОЋОЊОД ОћОбОЉОеОЋОф ОаОЏОаОАОЋОф ОЌОЊОЕОЋОф ОЉОЏОю ОъОдОЉ (ОњОЮ ОљОЮ ОюОљ ОбОю ОъОАОџ ОћОюОЋОЌ) РћђРћђ
function startNotifPoll(){ clearInterval(S.notifTimer);
  S.notifTimer=setInterval(async()=>{
    if(!S.branchId) return;
    let list; try{ list=await api('/api/transfers?branch_id='+S.branchId); }catch(e){ return; }
    detectNewTransfers(list);
    let bc; try{ bc=await api('/api/broadcast?branch_id='+S.branchId); }catch(e){ return; }
    detectBroadcast(bc);
  }, 20000); }

// РћђРћђ polling ОеОДОб РћђРћђ
function startPoll(){ clearInterval(S.pollTimer);
  S.pollTimer=setInterval(()=>{ const a=document.getElementById('app');
    if(S.view==='board'){
      // ОюОљ ОъОеОбОаОаОЎОЮ ОфОЋОџ ОЏОЊОЎ ОћОДОюОЊОћ/ОАОеОЎОДОћ ОцОбОЎОюОћ ОЏОЊОЎ ОюОљ ОюОЕОЉОЕ
      const bs=document.getElementById('boardScan');
      if(bs && document.activeElement===bs && bs.value) return;
      renderBoard(a, true);
    } else if(S.view==='admin'){
      if(['rebalance','reco','order','removals','live'].includes(S.adminTab)) return;   // ОаОфОЋОаОЎОЮ ОъОЌОЋОЕОЉОЎОЮ/ОбОеОЎОЏОћ/ОЌОЎОцОЋОЕ ОЌОЎ Рђћ ОюОљ ОъОеОбОаОаОЎОЮ ОљОЋОўОЋОъОўОЎОф
      const ae=document.activeElement;   // ОљОю ОфОеОбОаОЪ ОфОЋОџ ОЏОЊОЎ ОЕОЎОъОЋОЕ ОЉОАОЎОаОЋОЪ
      if(ae && ae.closest && ae.closest('.filters')) return;
      loadAdmin(false);   // ОеОбОаОЋОЪ ОЕОДОў ОЉОеОДОб
    }
  },15000); }

// РћђРћђ deep-link ?op= РћђРћђ
async function handleDeepLink(){
  const op=new URLSearchParams(location.search).get('op');
  if(op && S.branchId){ try{ await openScan(op); }catch(e){} }
}

// РћђРћђ init РћђРћђ
// ОЕОЋОъОе ОцОЋОДОЋОА ОбОю ОЕОЊОћ ОћОАОеОЎОДОћ Рђћ ОљОЉОю ОюОљ ОњОЋОаОЉ ОЉОЌОЎОеОф ОўОДОАОў (ОћОбОфОДОф ОЉОеОДОЋОЊ/ОАОеОЎОљОю) ОљОЋ ОДОюОЎОД ОбОю ОцОеОЎОў
document.addEventListener('click', (e)=>{
  if(window.getSelection && String(window.getSelection()).trim()) return;   // ОћОъОЕОфОъОЕ ОъОАОъОЪ ОўОДОАОў
  const t=e.target;
  if(t.closest && t.closest('.item, .serial, .sub, a, button, input, select, textarea, .arow, table, .drawer, .embed-frame')) return;
  focusScan();
});
(async()=>{
  loadState(); applyTheme();
  try{ S.cfg=await (await fetchT('/api/config',{},15000)).json(); }catch(e){}
  try{ S.branchList=await (await fetchT('/api/branches',{},15000)).json(); }catch(e){}
  try{ render(); }catch(e){ hideLoading(); }
  applyTheme();
  if(S.branchId){ startPoll(); startNotifPoll(); handleDeepLink(); }
})();
</script>
</body>
</html>
