    return requestBranchChange(id,name);
  }
  finishPick(id,name);
}
async function requestBranchChange(id,name){
  showLoading('שולח בקשת אישור למנהל…');
  let st='';
  try{
    const r=await fetchT('/api/device/branch-change',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({token:S.deviceToken, to_branch:String(id)})},20000);
    st=(await r.json()).status;
  }catch(e){}
  hideLoading();
  if(st==='approved'){ finishPick(id,name); return; }
  if(st!=='pending'){ toast('שליחת הבקשה נכשלה — נסה שוב',false); return; }
  document.getElementById('modalRoot').innerHTML=`<div class="overlay"><div class="modal" style="max-width:380px;text-align:center">
    <div style="font-size:38px">🔁</div>
    <h3 style="margin:8px 0 4px">בקשת מעבר ל${escW(name)}</h3>
    <div class="muted" id="brchgStat" style="margin-bottom:14px">נשלחה בקשה למנהל בטלגרם — ממתין לאישור…</div>
    <button class="btn-ghost" style="width:100%" onclick="closeModal();S._brchgStop=1">ביטול המתנה</button>
  </div></div>`;
  S._brchgStop=0;
  for(let i=0;i<75;i++){           // עד 5 דקות
    await new Promise(r=>setTimeout(r,4000));
    if(S._brchgStop) return;
    try{
      const r=await (await fetchT('/api/device/branch-status?token='+encodeURIComponent(S.deviceToken),{},15000)).json();
      if(r.status==='approved' && String(r.to)===String(id)){ closeModal(); toast('המעבר אושר ✓',true); finishPick(id,name); return; }
      if(r.status==='denied'){ closeModal(); toast('המנהל דחה את הבקשה',false); return; }
    }catch(e){}
  }
  const el=document.getElementById('brchgStat'); if(el) el.textContent='לא התקבל אישור — נסה שוב מאוחר יותר';
}
function finishPick(id,name){
  localStorage.setItem('tr_branch_id',id); localStorage.setItem('tr_branch_name',name);
  // מחשב הניהול (סניף אתר) נוחת על לוח הבית; שאר הסניפים על לוח הקליטה
  const _adminPC=Number(id)===S.cfg.admin_branch_id&&(!S.cfg.admin_required||S.adminKey);
  S.branchId=id; S.branchName=name; S.view=_adminPC?'home':'board'; render(); startPoll(); startNotifPoll();
}

// ── לוח בהעברה ──
async function renderBoard(app, silent){
  if(!silent) showLoading();
  let list=[], loadErr=false; try{ list=await api('/api/transfers?branch_id='+S.branchId); }catch(e){ loadErr=true; }
  let bc=null; try{ bc=await api('/api/broadcast?branch_id='+S.branchId); }catch(e){}
  if(!silent) hideLoading();
  S._boardErr=loadErr;
  // קולד-סטארט (Render Free נרדם): הבקשה נכשלה כי השרת מתעורר — מציגים חיווי ומנסים שוב מהר
  if(loadErr && S.view==='board'){
    S._wakeTries=(S._wakeTries||0)+1;
    app.innerHTML=`<h1 class="title" style="display:flex;align-items:center;gap:8px">${ico('inbox',19)} קליטת מכשירים נכנסים</h1>
      <div class="empty" style="padding-top:50px">⏳ מתחבר לשרת…<br>
      <span class="muted" style="font-size:14px">בכניסה ראשונה זה לוקח עד דקה (השרת מתעורר). מתחבר אוטומטית${S._wakeTries>1?` · ניסיון ${S._wakeTries}`:''}.</span></div>`;
    clearTimeout(S._wakeT);
    S._wakeT=setTimeout(()=>{ if(S.view==='board') renderBoard(app, true); }, 4000);
    return;
  }
  S._wakeTries=0; clearTimeout(S._wakeT);
  detectNewTransfers(list);   // התראה על העברות חדשות
  detectBroadcast(bc);        // התראה על שידור בקשת העברה
  if(S.view!=='board') return;   // המשתמש ניווט בינתיים — אל תדרוס
  S.transfers=list;
  S.broadcast=(bc&&bc.active)?bc:null;
  // טייל נפרד לכל סניף יעד — בקשות לאותו יעד מתרכזות יחד
  const bcHtml = S.broadcast
    ? (S.broadcast.groups||[]).map(g=>`<div class="bcast" onclick="openBroadcast(${g.to_branch})">
         <div class="bc-ic">${ico('radio',24)}</div>
         <div class="bc-txt"><b>בקשת העברה אל ${g.to_name}</b><span>${(g.lines||[]).length} פריטים · ${fmtTime(g.latest)} · לחץ לצפייה</span></div>
       </div>`).join('') : '';
  const needEmp=!S.employee;
  const notifBtn = (window.Notification && Notification.permission!=='granted')
    ? `<button class="btn-ghost" style="margin-bottom:12px;display:inline-flex;align-items:center;gap:6px" onclick="requestNotif()">${ico('bell',14)} הפעל התראות להעברה נכנסת</button>` : '';
  const pending=list.reduce((a,t)=>a+(t.total_units-t.received_units),0);
  const ls=S.lastScan;
  const okCls = (ls&&(ls.method==='manual'||ls.method==='paste'))?'warn':'ok';
  const lastHtml = needEmp ? '' : (ls
    ? (ls.ok
       ? `<div class="lastscan ${okCls}">✓ ${ls.name||'נקלט'} <span class="sub">· פעולה ${ls.op} (${ls.prog})</span> ${methodTag(ls.method)}</div>`
       : `<div class="lastscan err">✗ ${ls.message}${ls.name?` <span class="sub">· ${ls.name}</span>`:''}${ls.code?` <span class="sub" style="unicode-bidi:isolate;direction:ltr;font-family:monospace">· ${ls.code}</span>`:''}</div>`)
    : `<div class="lastscan idle">המכשיר האחרון שתסרוק יוצג כאן</div>`);
  app.innerHTML=`
    ${branchTabsHTML()}
    <h1 class="title" style="display:flex;align-items:center;gap:8px">${ico('inbox',19)} קליטת מכשירים נכנסים</h1>
    <div style="text-align:center">${notifBtn}</div>
    ${bcHtml}
    <div class="panel board-scan">
      ${needEmp
        ? `<div class="scan-icon">👤</div>
           <input id="empInput" class="scan-input" autocomplete="off" placeholder="מי קולט? שם הנציג">
           <div class="count" style="color:var(--amber)">הזן את שמך ולחץ Enter כדי להתחיל לסרוק</div>`
        : `<div class="scan-icon">📷</div>
           <input id="boardScan" class="scan-input" autocomplete="off" placeholder="סרוק מכשיר…">
           ${IS_MOBILE?`<button class="btn-cam" onclick="openCameraNow()">📸 סרוק מהמצלמה</button>`:''}
           <div class="count">${list.length} העברות פתוחות · <b>${pending}</b> מכשירים ממתינים</div>
           <div class="emp">קולט: <b>${S.employee}</b> · <a onclick="changeEmployee()">החלף</a></div>`}
    </div>
    ${lastHtml}
    ${list.length?`<div class="board-grid">${list.map(cardHtml).join('')}</div>`
                 :(S._boardErr?'<div class="empty">בעיית רשת — מתחבר מחדש… 🔄</div>':'<div class="empty">אין כרגע העברות בדרך אליך 🎉</div>')}`;
  if(needEmp){
    const e=document.getElementById('empInput'); try{e.focus();}catch(x){}
    e.addEventListener('keydown',ev=>{ if(ev.key!=='Enter')return; const v=e.value.trim(); if(!v)return; if(submitEmployee(v)) render(); });
    return;
  }
  const inp=document.getElementById('boardScan');
  attachScan(inp, (code,method)=>doScanBoard(code,method));
  focusScan();
  if(S._flashOp){ const el=document.querySelector(`[data-op="${S._flashOp}"]`);
    if(el){ el.classList.add('flash'); setTimeout(()=>{el&&el.classList.remove('flash');},900); } S._flashOp=null; }
}
// סריקה ברמת הלוח — משייכת אוטומטית להעברה הנכונה (בלי op_id)
async function doScanBoard(code, method){
  if(!S.employee) return;
  let res;
  try{ res=await api('/api/scan',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({branch_id:Number(S.branchId),code,employee:S.employee,method})}); }
  catch(e){ S.lastScan={ok:false,message:'שגיאת רשת',code}; beep(false); await renderBoard(document.getElementById('app'), true); return; }
  if(res.matched){
    beep(true);vibrate(true);
    const it=res.item||{}, t=res.transfer||{};
    S.lastScan={ok:true, name:it.name||'נקלט', op:t.op_id, prog:`${t.received_units}/${t.total_units}`, method};
    S._flashOp=t.op_id;
  } else {
    beep(false);vibrate(false);
    const mr=res.misroute;
    if(mr) S.lastScan={ok:false, misroute:mr.type, message:mr.message, name:mr.product_name||'', code};
    else   S.lastScan={ok:false, message:res.message||'לא שייך לאף העברה נכנסת', code};
  }
  await renderBoard(document.getElementById('app'), true);
}
function fmtTime(iso){ if(!iso)return''; const d=new Date(iso); if(isNaN(d))return iso;
  return d.toLocaleString('he-IL',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}); }
const STATUS={in_transit:'ממתין לסריקה',partial:'חלקי',received:'נקלט',closed:'נסגר (חוסר)'};
function cardHtml(t){
  const pct=t.total_units?Math.round(100*t.received_units/t.total_units):0;
  return `<div class="card" data-op="${t.op_id}" onclick="openScan('${t.op_id}')">
    <div class="top"><div class="op">פעולה ${t.op_id}</div><div class="pill ${t.status}">${STATUS[t.status]||t.status}</div></div>
    <div class="meta">מ<b>${t.from_branch_name}</b> · ${fmtTime(t.created_at)} · ${t.employee||''}</div>
    <div class="meta"><b>${t.received_units}/${t.total_units}</b> נקלטו</div>
    <div class="progress"><i style="width:${pct}%"></i></div>
  </div>`;
}

// ── מסך קליטה ──
// שם נציג תקין: לפחות 2 תווים, מכיל אות, ובלי ספרות (שלא יזינו סריאל/ברקוד בטעות)
function validEmployee(v){
  v=(v||'').trim();
  if(v.length<2) return false;
  if(/\d/.test(v)) return false;                 // יש ספרה → כנראה סריאל/ברקוד
  if(!/[A-Za-z֐-׿]/.test(v)) return false;  // חייב אות
  return true;
}
function submitEmployee(v){
  if(!validEmployee(v)){ toast('הזן שם נציג (אותיות בלבד, לא מספר/סריאל)', false); return false; }
  setEmployee(v.trim()); return true;
}

async function openScan(opId){ showLoading();
  try{ S.op=await api('/api/transfers/'+opId); }catch(e){ hideLoading(); return; }
  hideLoading(); S.view='scan'; render(); }
function setEmployee(name){ S.employee=name; localStorage.setItem('tr_employee',name); }
function changeEmployee(){ S.employee=null; localStorage.removeItem('tr_employee'); render(); }
function renderScan(app){
  const t=S.op, done=t.total_units>0 && t.received_units>=t.total_units;
  const needEmp=!S.employee;   // קודם כל מזהים מי קולט — לפני סריקה
  app.innerHTML=`
    <div class="row-back"><a class="link" onclick="backToBoard()">← חזרה ${S._fromAdmin?'לניהול':'ללוח'}</a></div>
    <div class="scan-layout">
      <div class="scan-side">
        <div class="panel">
          <h2>פעולה ${t.op_id}</h2>
          <div class="muted">מ<b style="color:var(--txt)">${t.from_branch_name}</b> → ${t.to_branch_name}<br>${fmtTime(t.created_at)} · ${t.employee||''}</div>
          ${needEmp
            ? `<input id="empInput" class="scan-input" autocomplete="off" placeholder="מי קולט? שם הנציג">
               <div class="count" style="color:var(--amber)">הזן את שמך ולחץ Enter כדי להתחיל לסרוק</div>`
            : `<input id="scanInput" class="scan-input" autocomplete="off" placeholder="סרוק מכשיר…">
               ${IS_MOBILE?`<button class="btn-cam" onclick="openCameraNow()">📸 סרוק מהמצלמה</button>`:''}
               <div class="count">נקלטו <b>${t.received_units}</b> / <b>${t.total_units}</b></div>
               <div class="emp">קולט: <b>${S.employee}</b> · <a onclick="changeEmployee()">החלף</a></div>
               ${t.received_units<t.total_units
                 ? `<button class="btn-ghost finish-btn" onclick="finishReceiving()">סיים קליטה · ${t.total_units-t.received_units} חסרים</button>`
                 : `<button class="btn-primary finish-btn" onclick="backToBoard()">✓ סיום</button>`}`}
        </div>
      </div>
      <div>
        ${done?`<div class="done-banner">✓ הכל נקלט — ${t.received_units}/${t.total_units}</div>`:''}
        <div class="items-grid">${t.items.map(itemHtml).join('')}</div>
      </div>
    </div>`;
  if(needEmp){
    const e=document.getElementById('empInput'); try{e.focus();}catch(x){}
    e.addEventListener('keydown',ev=>{ if(ev.key!=='Enter')return;
      const v=e.value.trim(); if(!v)return; if(submitEmployee(v)) render(); });
    return;   // עדיין לא קושרים סריקה — קודם שם
  }
  const inp=document.getElementById('scanInput');
  attachScan(inp, (code,method)=>doScan(code,method));
  focusScan();
}
function itemHtml(it){
  const st=Number(it.received||0);
  const noScan = !((it.serial||'').trim()) && !((it.barcode||'').trim());  // ללא סריאל וללא ברקוד
  const sub = it.serial ? it.serial : (it.barcode?('ברקוד: '+it.barcode):'— ללא סריאל —');
  let cls='', tick='', who='';
  if(st===1){ cls='received'; tick='✓';
    who=(it.received_by&&!String(it.received_by).startsWith('branch:'))?`נקלט ע״י ${it.received_by} ${methodTag(it.received_method)}`:''; }
  else if(st===2){ cls='redirected'; tick='↪'; who=`הופנה — ${it.received_by||'נקלט בסניף אחר'}`; }
  else if(st===3){ cls='missing'; tick='✗'; who='חוסר — לא הגיע'; }
  return `<div class="item ${cls}">
    <div class="tick">${tick}</div>
    <div style="flex:1;min-width:0">
      <div class="name">${it.name||it.product_id}</div>
      <div class="sub">${sub}</div>
      ${who?`<div class="who">${who}</div>`:''}
    </div>
    ${(st===0 && noScan) ? `<button class="btn-manual-recv" onclick="manualReceive(${it.id})">✓ קלוט ידנית</button>` : ''}
  </div>`;
}
async function manualReceive(itemId){
  // קליטה ידנית לפריט ללא סריאל/ברקוד (אין מה לסרוק) — דורש שם נציג + אישור.
  if(!S.employee){ toast('בחר/י שם נציג קודם',false); return; }
  if(!confirm('לקלוט פריט זה ידנית (ללא סריקה)?')) return;
  let res;
  try{ res=await api('/api/scan/manual',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({op_id:S.op.op_id,item_id:itemId,employee:S.employee})}); }
  catch(e){ toast('שגיאת רשת',false); return; }
  if(res.matched){ beep(true);vibrate(true); toast('✓ נקלט ידנית',true); S.op=res.transfer; render(); }
  else { beep(false); toast(res.message||'נכשל',false); }
}
async function doScan(code, method){
  if(!S.employee) return;   // לא אמור לקרות — שדה הסריקה מופיע רק אחרי שם
  let res;
  try{ res=await api('/api/scan',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({branch_id:Number(S.branchId),code,op_id:S.op.op_id,employee:S.employee,method})});
  }catch(e){ toast('שגיאת רשת',false); beep(false); return; }
  if(res.matched){ beep(true);vibrate(true);
    toast(`✓ נקלט ${METHOD_LABEL[method]||''}`,true); S.op=res.transfer; render(); }
  else{ beep(false);vibrate(false);
    toast((res.misroute&&res.misroute.message)||res.message||'לא שייך',false); }
}
function backToBoard(){ S.view=S._fromAdmin?'admin':'board'; S._fromAdmin=false; S.op=null; render(); }

// סיים קליטה — אם חסרים פריטים, סגירה עם סיבה (רישום חוסר)
function finishReceiving(){
  const t=S.op, missing=t.items.filter(i=>Number(i.received||0)===0);
  if(!missing.length){ backToBoard(); return; }
  const root=document.getElementById('modalRoot');
  root.innerHTML=`<div class="overlay"><div class="modal" style="max-width:460px;text-align:right">
    <h3 style="text-align:center">סגירת קליטה</h3>
    <div class="muted" style="text-align:center;margin-bottom:10px">${missing.length} פריטים לא נסרקו. הסגירה תרשום אותם כחוסר ותוציא את ההעברה מהלוח.</div>
    <div style="max-height:150px;overflow:auto;margin-bottom:12px;border:1px solid var(--line);border-radius:10px;padding:8px">
      ${missing.map(i=>`<div class="sub" style="padding:3px 0">• ${i.name||i.product_id} <span style="opacity:.7">${i.serial||i.barcode||''}</span></div>`).join('')}
    </div>
    <div class="muted" style="margin-bottom:6px">סיבה:</div>
    <select id="closeReason" style="width:100%;font-size:15px;padding:12px;border-radius:10px;border:1px solid var(--line);background:var(--card2);color:var(--txt);margin-bottom:14px">
      <option value="חוסר אמיתי — לא הגיע">חוסר אמיתי — לא הגיע</option>
      <option value="הגיע לסניף אחר">הגיע לסניף אחר</option>
      <option value="טעות בהעברה — לא היה אמור להגיע">טעות בהעברה — לא היה אמור להגיע</option>
    </select>
    <div style="display:flex;gap:8px">
      <button class="btn-primary" style="flex:1" id="closeConfirm">סגור עם חוסר</button>
      <button class="btn-ghost" onclick="closeModal()">ביטול</button>
    </div>
  </div></div>`;
  document.getElementById('closeConfirm').onclick=async()=>{
    const reason=document.getElementById('closeReason').value;
    closeModal(); showLoading('סוגר קליטה…');
    try{ await api('/api/transfers/'+t.op_id+'/close',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({reason,by:S.employee})}); }catch(e){}
    hideLoading(); backToBoard();
  };
}

// ── ניהול אופרציה ──
function toggleAdmin(){ if(S.view==='admin'){ S.view='board'; render(); } else { S.view='admin'; loadAdmin(true); } }
function branchOpts(sel,allLabel){
  let o=`<option value="">${allLabel}</option>`;
  (S.branchList||[]).forEach(b=>{ o+=`<option value="${b.id}" ${String(b.id)===String(sel)?'selected':''}>${b.name}</option>`; });
  return o;
}
function adminFetchDays(){ const f=S.adminFilters;
  if(f.fromDate){ const diff=Math.ceil((Date.now()-new Date(f.fromDate).getTime())/86400000)+1;
    return Math.min(Math.max(diff,1),365); }
  return 30; }
// סינון לפי סניף/סטטוס/חיפוש = מיידי (על נתונים מקומיים); שינוי טווח תאריכים = שליפה מחדש
function setFilter(k,v){ S.adminFilters[k]=v; if(k==='q')S._refocusFilter=true;
  if(k==='fromDate') loadAdmin(true); else renderAdmin(); }
function setStatusChip(k){ S.adminFilters.status=(S.adminFilters.status===k)?'':k; renderAdmin(); }
function clearFilters(){ S.adminFilters={q:'',from:'',to:'',status:'',fromDate:'',toDate:''}; renderAdmin(); }

async function loadAdmin(spinner){
  if(spinner) showLoading('טוען נתוני ניהול…');
  try{ S.adminData=await api('/api/admin/overview?days='+adminFetchDays()); }
  catch(e){ if(e&&e.status===401){ S.adminKey=null; localStorage.removeItem('tr_admin_key');
      if(S.view==='admin') document.getElementById('app').innerHTML='<div class="empty">נדרשת סיסמת ניהול. בחר מחדש את סניף אתר.</div>';
      if(spinner) hideLoading(); return; } }
  if(spinner) hideLoading();
  if(S.view==='admin') renderAdmin();   // אל תדרוס מסך אחר אם המשתמש ניווט בינתיים (למשל נכנס להעברה)
}

    </div>

function setAdminTab(tab){
  S.adminTab=tab;
  if(tab==='wcorders'){ S.newOrdersCount=0; }   // נכנס לטאב — מאפס את ספירת ההזמנות החדשות
  if(tab!=='wa') document.body.classList.remove('wa-mode');
  if(tab==='live'){ if(!S.lsCat) loadLiveCatalog(true); else renderLive(); }
  else if(tab==='rebalance'){ if(!S.rebalanceData) loadRebalance(true); else renderRebalance(); }
  else if(tab==='plan'){ loadPlan(true); }
  else if(tab==='reco'){ if(!S.recoData) loadReco(true); else renderReco(); }
  else if(tab==='order'){ loadOrder(true); }
  else if(tab==='removals'){ if(!S.removalsData) loadRemovals(true); else renderRemovals(); }
  else if(tab==='wcorders'){ renderWcOrders(); }
  else if(tab==='wa'){ if(!S.waConvs) loadWa(true); else renderWa(); }
  else renderAdmin();
}
async function loadPlan(spinner){
  if(spinner) showLoading('טוען בקשות העברה…');
  try{ S.planData=await api('/api/admin/plan'); S.planCount=(S.planData.lines||[]).length; }catch(e){}
  if(spinner) hideLoading();
  if(S.view==='admin' && S.adminTab==='plan') renderPlan();
}
async function loadRebalance(spinner){
  if(spinner) showLoading('טוען איזון מלאי…');
  try{ S.rebalanceData=await api('/api/admin/rebalance'); }catch(e){}
  try{ S.planData=await api('/api/admin/plan'); S.planCount=(S.planData.lines||[]).length; }catch(e){}
  if(spinner) hideLoading();
  if(S.view==='admin' && S.adminTab==='rebalance') renderRebalance();
}
function planCountFor(pid){
  const lines=((S.planData||{}).lines)||[];
  return lines.filter(l=>String(l.product_id)===String(pid)).length;
}
function planNoteFor(pid){
  const lines=((S.planData||{}).lines)||[];
  const l=lines.find(l=>String(l.product_id)===String(pid)&&(l.note||'').trim());
  return l?l.note:'';
}
function setRebalFilter(v){ S.rebalFilter=v; renderRebalance(); }
function setRebalSearch(v){ S.rebalSearch=v; S._refocusRebal=true; renderRebalance(); }
function rebalFiltered(){
  const d=S.rebalanceData||{items:[]};
  let items=(d.items||[]);
  if(S.rebalFilter && S.rebalFilter!=='all') items=items.filter(i=>i.kind===S.rebalFilter);
  if(S.rebalBranch){ const b=Number(S.rebalBranch);
    items=items.filter(i=>(i.needs||[]).includes(b)||(i.surplus||[]).includes(b)); }
  if(S.rebalMfr) items=items.filter(i=>brandOf(i.name)===S.rebalMfr);
  const q=(S.rebalSearch||'').trim().toLowerCase();
  if(q){ const q2=fixHebrewLayout(S.rebalSearch.trim()).toLowerCase();
    items=items.filter(i=>{ const blob=((i.name||'')+' '+(i.product_id||'')).toLowerCase();
      return blob.includes(q) || (q2 && blob.includes(q2)); }); }
  return items;
}
async function runRebalanceScan(){
  showLoading('סורק מלאי בכל הסניפים… (~1-2 דק׳)');
  try{ await api('/api/admin/rebalance-scan',{method:'POST'}); }catch(e){ hideLoading(); return; }
  const before=(S.rebalanceData&&S.rebalanceData.last_scan)||'';
  let tries=0;
  const iv=setInterval(async()=>{
    tries++;
    let d; try{ d=await api('/api/admin/rebalance'); }catch(e){ return; }
    if((d.last_scan||'')!==before || tries>45){
      clearInterval(iv); S.rebalanceData=d; hideLoading();
      if(S.view==='admin' && S.adminTab==='rebalance') renderRebalance();
    }
  }, 4000);
}
function rebalRow(it, branches){
  const cells=branches.map(b=>{ const q=(it.stock||{})[String(b.id)]||0;
    const cls=q===0?'r-zero':(q>=2?'r-surplus':''); return `<td class="${cls}">${q}</td>`; }).join('');
  const pc=planCountFor(it.product_id);
  const btn=pc>0
    ? `<button class="btn-req-in" onclick='openPlanEditor(${JSON.stringify(it.product_id)})'>✓ בבקשה (${pc})</button>`
    : `<button class="btn-ghost" onclick='openPlanEditor(${JSON.stringify(it.product_id)})'>➕ לבקשה</button>`;
  // קליק-ימני על פריט סריאלי → הערה חופשית לסניף (רשמי/eSIM וכו'); 📝 = יש הערה
  const note=planNoteFor(it.product_id);
  const nq=(note||'').replace(/"/g,'&quot;');
  const noteTag=note?` <span title="${nq}" style="cursor:pointer" onclick='openNoteEditor(${JSON.stringify(String(it.product_id))})'>📝</span>`:'';
  const ctx=it.kind==='serial'
    ? ` oncontextmenu='event.preventDefault();openNoteEditor(${JSON.stringify(String(it.product_id))})' title="קליק ימני: הערה לסניף"`
    : '';
  return `<tr class="${pc>0?'has-req':''}"${ctx}>
    <td style="direction:ltr;text-align:right;font-family:monospace">${it.product_id||''}</td>
    <td>${it.name}${noteTag}</td>
    <td>${it.kind==='serial'?'📱 סריאלי':'🏷️ ברקוד'}</td>
    ${cells}
    <td style="color:var(--red);font-weight:700">${(it.needs_names||[]).join(', ')}</td>
    <td style="color:var(--green);font-weight:700">${(it.surplus_names||[]).join(', ')}</td>
    <td>${btn}</td>
  </tr>`;
}
function setRebalBranch(v){ S.rebalBranch=v; renderRebalance(); }
function setRebalMfr(v){ S.rebalMfr=v; renderRebalance(); }

function _csv(s){ s=String(s==null?'':s); return /[",\n]/.test(s)?'"'+s.replace(/"/g,'""')+'"':s; }
function exportRebalCSV(){
  const d=S.rebalanceData||{items:[],branches:[]}; const branches=d.branches||[];
  const items=rebalFiltered();
  const head=['מוצר','מק"ט','סוג',...branches.map(b=>b.name),'חסר ב','עודף ב'];
  const lines=[head.join(',')];
  items.forEach(it=>{ lines.push([_csv(it.name),it.product_id,it.kind==='serial'?'סריאלי':'ברקוד',
    ...branches.map(b=>(it.stock||{})[String(b.id)]||0),
    _csv((it.needs_names||[]).join(' | ')),_csv((it.surplus_names||[]).join(' | '))].join(',')); });
  const blob=new Blob(['﻿'+lines.join('\n')],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download='rebalance-'+new Date().toISOString().slice(0,10)+'.csv'; a.click();
}

// ── עורך בקשת העברה (תומך כמה שורות לפריט) ──
function openPlanEditor(pid){
  const it=((S.rebalanceData||{}).items||[]).find(x=>String(x.product_id)===String(pid));
  if(!it) return;
  const branches=(S.rebalanceData||{}).branches||[];
  // טען קודם את השורות השמורות לבקשה למוצר זה (עריכה אמיתית)
  const existing=(((S.planData||{}).lines)||[]).filter(l=>String(l.product_id)===String(pid));
  let lines;
  if(existing.length){
    lines=existing.map(l=>({from:l.from_branch,to:l.to_branch,qty:l.qty}));
  } else {
    const sur=it.surplus||[], need=it.needs||[]; lines=[];
    for(let i=0;i<Math.min(sur.length,need.length);i++) lines.push({from:sur[i],to:need[i],qty:1});
    if(!lines.length) lines.push({from:sur[0]||(branches[0]||{}).id, to:need[0]||(branches[0]||{}).id, qty:1});
  }
  S._planEdit={it,branches,lines};
  renderPlanEditor();
}

  const {it,branches,lines}=S._planEdit;

    <div id="planLines">${lines.length?rowsHtml:'<div class="muted" style="text-align:center;padding:14px;color:var(--red)">אין שורות — שמירה תסיר את הבקשה למוצר זה</div>'}</div>

      <button class="btn-ghost" onclick="closeModal()">ביטול</button>

function planAddLine(){ const {it,branches,lines}=S._planEdit; const sur=it.surplus||[], need=it.needs||[];
  lines.push({from:sur[0]||(branches[0]||{}).id, to:need[0]||(branches[0]||{}).id, qty:1}); renderPlanEditor(); }
function planRemoveLine(i){ S._planEdit.lines.splice(i,1); renderPlanEditor(); }   // לא סוגר — מאפשר שמירה ריקה = הסרה
async function savePlan(){
  const {it,lines}=S._planEdit;

    .map(l=>({product_id:it.product_id,name:it.name,from_branch:Number(l.from),to_branch:Number(l.to),qty:Number(l.qty)||1}));

  closeModal(); showLoading('שומר…');

  try{ await api('/api/admin/plan/replace',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({product_id:it.product_id, lines:valid})}); }catch(e){}
  try{ S.planData=await api('/api/admin/plan'); S.planCount=(S.planData.lines||[]).length; }catch(e){}

// ── שינוי שידור לסניף אחר (re-route): בוחר סניף מקור חדש לפי מלאי חי ──

  }).join('');
  const el=document.getElementById('rrBody');
  if(el) el.outerHTML=`<div>${rows||'<div class="muted" style="text-align:center;padding:12px">אין סניפים אחרים זמינים</div>'}</div>`;

async function doReroute(lineId, branchId){
  try{ await api('/api/admin/plan/reroute',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({line_id:lineId,from_branch:branchId})}); }
  catch(e){ alert('שגיאה בשינוי השידור'); return; }
  closeModal();
  try{ S.planData=await api('/api/admin/plan'); S.planCount=(S.planData.lines||[]).length; }catch(e){}

}

// ── הערה חופשית לסניף על פריט (קליק ימני באיזון-מלאי) ──

async function saveNote(pid){
  const txt=(document.getElementById('noteTxt')||{}).value||'';
  const it=(((S.rebalanceData||{}).items)||[]).find(x=>String(x.product_id)===String(pid))||{};
  try{ await api('/api/admin/plan/note',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({product_id:String(pid),note:txt,from_branch:(it.surplus||[])[0]||0,to_branch:(it.needs||[])[0]||0,name:it.name||''})}); }
  catch(e){ alert('שגיאה בשמירת ההערה'); return; }
  closeModal();
  try{ S.planData=await api('/api/admin/plan'); S.planCount=(S.planData.lines||[]).length; }catch(e){}
  if(S.adminTab==='plan') renderPlan(); else renderRebalance();
}

function sendWa(){
  var n=String((prompt('מספר וואטסאפ של העובד (למשל 0501234567):')||'')).replace(/\\D/g,'');
  if(!n) return;
  if(n.charAt(0)==='0')n='972'+n.slice(1); else if(n.slice(0,3)!=='972')n='972'+n;
  var st=document.getElementById('waStatus');
  if(!(window.opener && window.opener.transferSendWaLink)){ if(st){st.style.color='#b45309';st.textContent='פתח מחדש את הרשימה מהמערכת כדי לשלוח';} return; }
  if(st){ st.style.color='#5e6b7d'; st.textContent='שולח…'; }
  window.opener.transferSendWaLink(n, WA_FROM, WA_LINES).then(function(res){
    if(!st) return;
    if(res==='sent'){ st.style.color='#16a34a'; st.textContent='✓ נשלח קישור לרשימה לעובד בוואטסאפ'; }
    else { st.style.color='#dc2626'; st.textContent='❌ השליחה נכשלה — בדוק את המספר ונסה שוב'; }

}

function openHTMLWindow(html){

function openTransferRequestPage(fromBranch){

// נקרא מחלון הרשימה (window.opener) — שולח לעובד קישור לעמוד הרשימה מהמספר העסקי
async function transferSendWaLink(phone, from_name, lines){
  try{
    const r=await api('/api/transfer/send-wa',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({phone, from_name, lines})},45000);
    return (r&&r.sent)?'sent':'fail';
  }catch(e){ return 'fail'; }
}
async function broadcastBranch(fromBranch){
  const d=S.planData||{lines:[]};
  const lines=(d.lines||[]).filter(l=>String(l.from_branch)===String(fromBranch));
  if(!lines.length){ toast('אין שורות לסניף זה',false); return; }
  const fn=lines[0].from_name;
  if(!confirm('לשדר את הבקשה למסך הקליטה של סניף '+fn+'?\nהיא תופיע שם כפקודה לתצוגה (ללא סריקה).')) return;
  showLoading();
  try{
    const r=await api('/api/admin/broadcast',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({branch_id:Number(fromBranch)})});
    toast('שודר לסניף '+fn+' ('+(r.lines||lines.length)+' שורות)',true);
  }catch(e){ toast('שגיאה בשידור',false); }
  hideLoading();
}
function exportPlanCSV(fromBranch){
  const d=S.planData||{lines:[]}; let lines=d.lines||[];
  if(fromBranch!==undefined && fromBranch!==null && fromBranch!=='') lines=lines.filter(l=>String(l.from_branch)===String(fromBranch));
  const head=['מסניף','מק"ט','מוצר','כמות','לסניף'];
  const rows=[head.join(',')];
  lines.forEach(l=>rows.push([_csv(l.from_name),l.product_id,_csv(l.name),l.qty,_csv(l.to_name)].join(',')));
  const blob=new Blob(['﻿'+rows.join('\n')],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  const tag=(fromBranch&&lines[0])?('-'+lines[0].from_name):'';
  a.download='בקשת-העברה'+tag+'-'+new Date().toISOString().slice(0,10)+'.csv'; a.click();
}

async function loadReco(spinner){
  if(spinner) showLoading('מחשב המלצות הזמנה…');
  let qs=`?days=${S.recoDays}&target_days=${S.recoTarget}`;
  if(S.recoBranch) qs+=`&branch=${S.recoBranch}`;
  try{ S.recoData=await api('/api/admin/recommendations'+qs); }catch(e){}
  try{ const o=await api('/api/admin/order-plan'); S.orderData=o; S.orderCount=(o.lines||[]).length; }catch(e){}
  if(spinner) hideLoading();
  if(S.view==='admin' && S.adminTab==='reco') renderReco();
}
function setRecoDays(v){ S.recoDays=Number(v)||30; loadReco(true); }
function setRecoBranch(v){ S.recoBranch=v; loadReco(true); }
function setRecoTarget(v){ S.recoTarget=Math.max(1,parseInt(v)||21); loadReco(true); }
function setRecoKind(v){ S.recoKind=v; renderReco(); }
function setRecoSupplier(v){ S.recoSupplier=v; renderReco(); }
function setRecoCategory(v){ S.recoCategory=v; renderReco(); }
function setRecoMfr(v){ S.recoMfr=v; renderReco(); }
function setRecoSearch(v){ S.recoSearch=v; S._refocusReco=true; renderReco(); }
function orderQtyFor(pid){ const l=((S.orderData||{}).lines||[]).find(x=>String(x.product_id)===String(pid)); return l?l.qty:0; }
function recoFiltered(){
  let items=((S.recoData||{}).items||[]).slice();
  if(S.recoKind!=='all') items=items.filter(i=>i.kind===S.recoKind);
  if(S.recoSupplier) items=items.filter(i=>(i.supplier||'')===S.recoSupplier);
  if(S.recoCategory) items=items.filter(i=>(i.category||'')===S.recoCategory);
  if(S.recoMfr) items=items.filter(i=>brandOf(i.name)===S.recoMfr);
  const q=(S.recoSearch||'').trim().toLowerCase();
  if(q){ const q2=fixHebrewLayout(S.recoSearch.trim()).toLowerCase();
    items=items.filter(i=>{ const blob=((i.name||'')+' '+(i.product_id||'')+' '+(i.barcode||'')).toLowerCase();
      return blob.includes(q)||(q2&&blob.includes(q2)); }); }
  const sc=S.recoSort;
  if(sc&&sc.col){ const dir=sc.dir==='asc'?1:-1;
    items=items.slice().sort((a,b)=>((Number(a[sc.col])||0)-(Number(b[sc.col])||0))*dir
      || String(a.name).localeCompare(String(b.name))); }
  return items;
}
function setRecoSort(col){
  const s=S.recoSort||{};
  if(s.col===col) s.dir=(s.dir==='desc'?'asc':'desc'); else { s.col=col; s.dir='desc'; }
  S.recoSort={col:s.col,dir:s.dir}; renderReco();
}
function recoArr(col){ const s=S.recoSort||{}; if(s.col!==col) return '<span class="arr">↕</span>'; return `<span class="arr">${s.dir==='desc'?'▼':'▲'}</span>`; }

// ── 💬 וואטסאפ (ConnectOp) — inbox + שיחה + מענה עם אכיפת חלון 24ש בצד שרת ──
function escW(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
// ראשי תיבות (2 אותיות): מילה ראשונה+אחרונה, מדלג על אימוג'י; מילה אחת → 2 אותיות
function waInitials(name, phone){
  const s = String(name||'').trim();
  const words = s.split(/\s+/).map(w=>{ for(const ch of w){ if(/[\p{L}\p{N}]/u.test(ch)) return ch; } return ''; }).filter(Boolean);
  if(words.length>=2) return words[0]+words[words.length-1];
  if(words.length===1){ let o=''; for(const ch of s){ if(/[\p{L}\p{N}]/u.test(ch)){ o+=ch; if(o.length>=2) break; } } return o||'?'; }
  const d = String(phone||'').replace(/\D/g,''); return d.slice(-2) || '?';
}
// אווטאר עגול — לבן עם מסגרת ירוקה (var(--green)) + ראשי תיבות, או תמונה שהועלתה ידנית.
// (מטא לא חושפת תמונת פרופיל אמיתית — לכן ראשי תיבות בברירת מחדל / העלאה ידנית פר-לקוח.)
function waAvatar(name, phone, size, pic){
  size = size || 34;
  if(pic){
    return `<span class="wa-avatar" style="width:${size}px;height:${size}px;background-image:url('${escW(pic)}')"></span>`;
  }
  return `<span class="wa-avatar" style="width:${size}px;height:${size}px;font-size:${Math.round(size*0.4)}px">${escW(waInitials(name,phone))}</span>`;
}
// Enter שולח רק במחשב (מקלדת פיזית); במובייל Enter = שורה חדשה, שולחים בכפתור — כמו וואטסאפ
function waEnterSend(ev, fn){
  if(ev.key==='Enter' && !ev.shiftKey && !window.matchMedia('(pointer: coarse)').matches){
    ev.preventDefault(); fn();
  }
}

function waListHTML(rows){
  let html=rows.map(waConvRow).join('');
  const q=(S.waSearch||'').trim();
  const srv=S.waSrvResults;
  if(q.length>=2 && srv && srv.q===q){
    const localPhones=new Set(rows.map(c=>c.phone));
    const extra=(srv.rows||[]).filter(c=>!localPhones.has(c.phone));
    if(extra.length)
      html+=`<div class="muted" style="padding:7px 12px;font-size:11.5px;border-top:1px solid var(--line)">🌐 מכל אנשי הקשר (${extra.length})</div>`
           +extra.map(waConvRow).join('');
    else if(!rows.length)
      html+='<div class="muted" style="padding:7px 12px;font-size:11.5px">לא נמצא גם בחיפוש כלל אנשי הקשר</div>';
  } else if(q.length>=2 && (!srv||srv.q!==q)){
    html+='<div class="muted" style="padding:7px 12px;font-size:11.5px">🌐 מחפש בכל אנשי הקשר…</div>';
  }
  return html||'<div class="empty">אין שיחות</div>';
}
let _waSrvTimer=null;
function waServerSearch(){
  const q=(S.waSearch||'').trim();
  clearTimeout(_waSrvTimer);
  if(q.length<2){ S.waSrvResults=null; return; }
  _waSrvTimer=setTimeout(async()=>{
    try{ const r=await api('/api/admin/wa/search?q='+encodeURIComponent(q));
         if((S.waSearch||'').trim()===q){
           S.waSrvResults={q, rows:r.conversations||[]};
           const pane=document.getElementById('waListPane');
           if(pane) pane.innerHTML=waListHTML(waFiltered());
         } }catch(e){}
  },450);
}

function waIsUnread(c){ return !!(c.unread && c.ts>(waSeen()[c.phone]||0)); }
function updateWaBadge(convs){
  // ארכיון לא נספר — אחרת סימון "כולל ארכיון" מקפיץ את הבאדג' על שיחות ישנות
  const n=(convs||[]).filter(c=>!c.archived&&(waIsUnread(c)||c.awaiting_agent)).length;
  const el=document.getElementById('waBadge');
  if(el){ el.style.display=n?'block':'none'; el.textContent=n>9?'9+':n; }
  if(S._waBadgePrev!==undefined && n>S._waBadgePrev){
    const title='💬 הודעת וואטסאפ חדשה';
    if(window.Notification && Notification.permission==='granted'){
      try{ const ntf=new Notification(title,{body:'נכנסה הודעה חדשה ב-GreenOS', tag:'gm-wa', renotify:true});
        ntf.onclick=()=>{ window.focus(); openWaTab(); ntf.close(); };
        setTimeout(()=>{ try{ntf.close();}catch(e){} }, 12000); }catch(e){}
    }

  }
  S._waBadgePrev=n;
}

function waOrdAddPaint(){
  const box=document.getElementById('woAddRes'); if(!box) return;
  const q=(S.waOrdAddQ||'').trim();
  if(!S.lsCat){ box.innerHTML='<div class="muted" style="font-size:12px;padding:4px">טוען קטלוג…</div>'; return; }
  if(q.length<2){ box.innerHTML='<div class="muted" style="font-size:12px;padding:4px">הקלד 2+ תווים</div>'; return; }
  // חיפוש חכם זהה למלאי החי: טוקנים (לא תלוי סדר) + נפילה לפריסת מקלדת עברית + מיון לפי רלוונטיות
  const toks=q.toLowerCase().split(/\s+/).filter(Boolean);
  const toks2=fixHebrewLayout(q).toLowerCase().split(/\s+/).filter(Boolean);
  const alt=toks2.join(' ')!==toks.join(' ');
  let hits=(S.lsCat||[]).filter(it=>{
    if(it.active===false) return false;
    const blob=((it.name||'')+' '+(it.product_id||'')+' '+(it.barcode||'')).toLowerCase();
    return toks.every(t=>blob.includes(t))||(alt&&toks2.every(t=>blob.includes(t)));
  });
  const ql=q.toLowerCase();
  hits.sort((a,b)=>{
    const score=x=>{ if(String(x.product_id)===q||String(x.barcode)===q) return 0;
      const n=String(x.name||'').toLowerCase(); if(n.includes(ql)) return 1; return 2; };
    return score(a)-score(b)||((b.stock||0)-(a.stock||0))||String(a.name).localeCompare(String(b.name),'he');
  });
  hits=hits.slice(0,10);
  const busy=S.waOrdAddBusy;
  box.innerHTML=hits.length?hits.map(it=>{
    const isBusy=busy&&String(busy)===String(it.product_id);
    return `<div style="display:flex;align-items:center;gap:7px;padding:6px 8px;border:1px solid var(--line);border-radius:9px;margin-top:4px;background:var(--card2);${busy?'opacity:.6;pointer-events:none':'cursor:pointer'}"
         ${busy?'':`onclick="waOrdExtraPick('${escW(String(it.product_id))}')"`}>
      <span style="flex:1;min-width:0;font-size:12.5px"><b>${escW(it.name)}</b>
        <span class="muted" style="font-size:10.5px;direction:ltr;font-family:monospace"> ${escW(String(it.product_id))}</span></span>
      ${isBusy?'<span class="wa-uri-wait" style="font-size:11.5px">מוסיף…</span>':'<span style="color:#16a34a;font-weight:700">＋</span>'}
    </div>`;}).join(''):'<div class="muted" style="font-size:12px;padding:4px">לא נמצא בקטלוג</div>';
}
async function waOrdExtraPick(pid){
  if(S.waOrdAddBusy) return;            // כבר בטעינה — מונע לחיצה כפולה
  waOrderSaveInputs();
  const cat=(S.lsCat||[]).find(x=>String(x.product_id)===String(pid))||{};
  S.waOrdAddBusy=String(pid); waOrdAddPaint();   // חיווי inline על השורה (ה-overlay הגלובלי מוסתר מאחורי המודאל)
  let d=null;
  try{ d=await api('/api/admin/wc-link/'+encodeURIComponent(pid)+'?pos=1&fallback=1&name='+encodeURIComponent(cat.name||''),null,45000); }catch(e){}
  S.waOrdAddBusy=null;
  const found=!!(d&&d.found&&d.id);
  let price=found?(Number(d.price)||0):(d&&d.pos_price!=null&&Number(d.pos_price)>1?Number(d.pos_price):0);
  // הקופה כבר קובעת צבע+נפח (variants.fixed). המשתמש בוחר רק את שאר המאפיינים (switch_attrs: SIM, אחריות).
  const hasSwitch=found&&d.variants&&(d.variants.switch_attrs||[]).length>0;
  let variation_id=(found&&d.type==='variation')?d.id:0;
  let sel={}, fixedLabel='';
  if(found&&d.variants){
    const mine={}; (d.attributes||[]).forEach(a=>{ mine[a.name]=a.option; });
    (d.variants.switch_attrs||[]).forEach(sa=>{ sel[sa.name]=mine[sa.name]||sa.options[0]; });
    fixedLabel=(d.variants.fixed||[]).map(a=>a.option).filter(Boolean).join(' · ');
  }
  const x={
    sku:String(pid), name:(found?d.name:cat.name)||String(pid), price:price, qty:1, found:found,
    wc_id:found?(d.type==='variation'?d.parent_id:d.id):0,
    variation_id:variation_id, variants:hasSwitch?d.variants:null, sel:sel, fixedLabel:fixedLabel};
  if(hasSwitch) _waOrdExtraResolve(x);   // מצמיד וריאציה+מחיר לפי הבחירה ההתחלתית
  (S.waOrd.extras=S.waOrd.extras||[]).push(x);
  S.waOrdAddOpen=false; S.waOrdAddQ='';
  waOrderRender();
  if(hasSwitch) toast('בחר SIM / אחריות בשורת הפריט',true);
  else if(!price) toast('לא נמצא מחיר לפריט — הזן מחיר ידנית בשורה',false);
}
// מצמיד variation_id + מחיר לשורת מוצר נוסף לפי הבחירה הנוכחית של ה-switch_attrs
function _waOrdExtraResolve(x){
  if(!x||!x.variants) return;
  const v=x.variants;
  const m=(v.options||[]).find(c=>(v.switch_attrs||[]).every(sa=>String(c.attrs[sa.name]||'')===String(x.sel[sa.name]||'')));
  if(m){ x.variation_id=m.id; x.price=Number(m.price)||x.price; }
}
// בחירת ערך למאפיין מתחלף בשורת מוצר נוסף (לפי אינדקסים — בטוח לערכים בעברית; התאמה אוטומטית כמו באתר/preview)
function waOrdExtraSelAttr(i,ai,oi){
  waOrderSaveInputs();
  const x=(S.waOrd.extras||[])[i]; if(!x||!x.variants) return;
  const v=x.variants; const sa=(v.switch_attrs||[])[ai]; if(!sa) return;
  const name=sa.name, opt=sa.options[oi]; if(opt==null) return;
  x.sel[name]=opt;
  const exact=(v.options||[]).some(c=>(v.switch_attrs||[]).every(sa=>String(c.attrs[sa.name]||'')===String(x.sel[sa.name]||'')));
  if(!exact){
    const withClicked=(v.options||[]).filter(c=>String(c.attrs[name]||'')===String(opt));
    if(withClicked.length){
      let best=withClicked[0], bestScore=-1;
      withClicked.forEach(c=>{ const score=(v.switch_attrs||[]).reduce((a,sa)=>a+(String(c.attrs[sa.name]||'')===String(x.sel[sa.name]||'')?1:0),0); if(score>bestScore){ bestScore=score; best=c; } });
      (v.switch_attrs||[]).forEach(sa=>{ x.sel[sa.name]=best.attrs[sa.name]||''; });
    }
  }
  _waOrdExtraResolve(x);
  waOrderRender();
}
function waOrdExtraSet(i,k,v){
  waOrderSaveInputs();
  const x=(S.waOrd.extras||[])[i]; if(!x) return;
  x[k]=(k==='name')?String(v):(k==='qty')?Math.max(1,Number(v)||1):Math.max(0,Number(v)||0);
  waOrderRender();
}
function waOrdExtraDel(i){
  waOrderSaveInputs();
  (S.waOrd.extras||[]).splice(i,1);
  waOrderRender();
}

function waPayOpen(r){
  const old=document.getElementById('waPayModal'); if(old) old.remove();
  const div=document.createElement('div');
  div.id='waPayModal'; div.className='wa-lb'; div.style.cursor='default';
  const fmt=v=>'₪'+Number(v||0).toLocaleString('he-IL');
  div.innerHTML=`<div onclick="event.stopPropagation()" style="background:var(--card);border:1px solid var(--line);border-radius:16px;width:min(560px,96vw);height:min(760px,92vh);display:flex;flex-direction:column;overflow:hidden">
    <div style="display:flex;justify-content:space-between;align-items:center;padding:10px 14px;border-bottom:1px solid var(--line);gap:8px">
      <b style="font-size:13.5px;white-space:nowrap">הזמנה #${r.number} · ${fmt(r.total)}</b>
      <span id="waPayStat" class="muted" style="font-size:12px;flex:1;text-align:left">ממתין לתשלום…</span>
      <button class="btn-ghost" onclick="waPayClose()" title="סגירה — ההזמנה נשארת פתוחה">✕</button>
    </div>
    <iframe src="${r.pay_link}" allow="payment *" style="flex:1;border:0;width:100%;background:#fff"></iframe>
  </div>`;
  div.onclick=()=>waPayClose();
  document.body.appendChild(div);
  S.waPayOrder=r;
  // polling fallback — גם אם הודעת הסיום מה-iframe לא תגיע, נתפוס את התשלום מהשרת
  // (הזמנת WC → paystatus; קישור כללי ללא הזמנה → status לפי pru)
  const stUrl=r.order_id?('/api/admin/wa/order/paystatus/'+r.order_id):('/api/admin/pay/status/'+r.pru);
  let n=0;
  if(S.waPayPoll) clearInterval(S.waPayPoll);
  S.waPayPoll=setInterval(async()=>{
    n++;
    if(n>150||!document.getElementById('waPayModal')){ clearInterval(S.waPayPoll); S.waPayPoll=null; return; }
    try{
      const st=await api(stUrl);
      if(st.paid) waPaySuccess(st);
    }catch(e){}
  },6000);
}
function waPayClose(){
  if(S.waPayPoll){ clearInterval(S.waPayPoll); S.waPayPoll=null; }
  const m=document.getElementById('waPayModal'); if(m) m.remove();
  const r=S.waPayOrder; S.waPayOrder=null;
  if(r) toast('הזמנה #'+r.number+' נשארה פתוחה (ממתינה לתשלום)',true);
}
function waPaySuccess(st){
  if(S.waPayPoll){ clearInterval(S.waPayPoll); S.waPayPoll=null; }
  const r=S.waPayOrder||{}; S.waPayOrder=null;
  const m=document.getElementById('waPayModal'); if(m) m.remove();
  toast('התשלום אושר ✓ '+(r.order_id?('הזמנה #'+(r.number||'')+' עברה לטיפול'):(r.number||''))+(st&&st.approval?' · אישור '+st.approval:''),true);
  const ta=document.getElementById('waText');
  if(ta&&S.waPhone){ ta.value='התשלום התקבל בהצלחה ✓ ההזמנה שלך בטיפול. תודה שקנית בגרין מובייל 💚'; ta.focus(); }
}
window.addEventListener('message',async ev=>{

  const r=S.waPayOrder; if(!r) return;
  const stat=document.getElementById('waPayStat');

    if(stat) stat.textContent='מאמת תשלום…';
    try{ const st=await api(r.order_id?('/api/admin/wa/order/paystatus/'+r.order_id):('/api/admin/pay/status/'+r.pru)); if(st.paid){ waPaySuccess(st); return; } }catch(e){}

  } else if(stat){ stat.textContent='התשלום לא הושלם — אפשר לנסות שוב'; stat.style.color='#dc2626'; }
});

function waStockMatches(q){
  q=(q||'').trim().toLowerCase(); if(q.length<2) return [];
  const toks=q.split(/\s+/);
  const fx=fixHebrewLayout(q).toLowerCase(); const ftoks=fx.split(/\s+/);
  const out=[];
  for(const it of (S.lsCat||[])){
    const blob=((it.name||'')+' '+(it.product_id||'')+' '+(it.barcode||'')).toLowerCase();
    if(!(toks.every(t=>blob.includes(t))||ftoks.every(t=>blob.includes(t)))) continue;
    let sc=Math.min(Number(it.stock)||0,5);
    if(String(it.product_id)===q||String(it.barcode||'')===q) sc+=100;
    if((it.name||'').toLowerCase().includes(q)) sc+=20;
    out.push({it,sc});
  }
  return out.sort((a,b)=>b.sc-a.sc).slice(0,8).map(x=>x.it);
}
function waStockPaint(){
  const box=document.getElementById('waStockRes'); if(!box) return;
  const q=(S.waStockQ||'').trim();
  if(!S.lsCat){ box.innerHTML='<div class="muted" style="font-size:12px">טוען קטלוג…</div>'; return; }
  if(q.length<2){ box.innerHTML='<div class="muted" style="font-size:12px">הקלד 2+ תווים — שם מוצר, מק״ט או ברקוד.<br>לחיצה על תוצאה = מלאי חי מהקופה + חלונית האתר.</div>'; return; }
  const rows=waStockMatches(q);
  if(!rows.length){ box.innerHTML='<div class="muted" style="font-size:12px">לא נמצא בקטלוג</div>'; return; }
  box.innerHTML=rows.map(it=>{
    const pid=String(it.product_id);
    const open=S.waStockPid===pid;
    return `<div class="wa-stk ${open?'open':''}" onclick="waStockPick('${pid}')">

function waUriWarmup(){
  // ברגע שהפאנל נפתח — הגשר טוען את ההקשר ברקע; השאלה האמיתית תרוץ על סשן חם (מהיר)
  const ph=S.waPhone; if(!ph) return;

  if(Date.now()-(S.waUriWarm[ph]||0)<25*60*1000) return;

  api('/api/admin/wa/uri/ask',{method:'POST',headers:{'Content-Type':'application/json'},

function waUriChat(){ S.waUriChats=S.waUriChats||{}; return S.waUriChats[S.waPhone]=S.waUriChats[S.waPhone]||[]; }
// פענוח תשובת אורי לטקסט + טיוטה ([DRAFT]…[/DRAFT]) — משותף ל-poll ולטעינת היסטוריה
function waUriParse(ans){
  let t=ans||''; const out={text:t};
  const dm=t.match(/\[DRAFT\]\s*([\s\S]*?)\s*\[\/DRAFT\]/);
  if(dm){ out.draft=dm[1].trim(); out.text=t.replace(dm[0],'').trim(); }
  return out;
}
// טעינת היסטוריית השיחה עם אורי מהשרת — להמשכיות בין מכשירים (אייפון↔מחשב)
async function waUriLoadHistory(phone){
  phone=phone||S.waPhone; if(!phone) return;
  S.waUriLoaded=S.waUriLoaded||{};
  if(S.waUriLoaded[phone]) return;                       // כבר נטען בסשן הזה
  S.waUriChats=S.waUriChats||{};
  if((S.waUriChats[phone]||[]).length) { S.waUriLoaded[phone]=true; return; } // כבר יש שיחה פעילה
  S.waUriLoaded[phone]=true;
  try{
    const r=await api('/api/admin/wa/uri/history?phone='+encodeURIComponent(phone));
    const jobs=(r&&r.jobs)||[]; if(!jobs.length) return;
    const chat=[];
    jobs.forEach(j=>{
      chat.push({role:'user', text:j.question||''});
      if(j.status==='error'){ chat.push({role:'uri', status:'error', text:j.answer||'שגיאה'}); }
      else { const p=waUriParse(j.answer); chat.push({role:'uri', status:'done', text:p.text, draft:p.draft}); }
    });
    // אם בינתיים המשתמש כבר התחיל לכתוב לשיחה הזו — לא דורסים
    if(!(S.waUriChats[phone]||[]).length) S.waUriChats[phone]=chat;
    if(S.waPhone===phone) waUriPaint();
  }catch(e){ S.waUriLoaded[phone]=false; }               // כשל — נאפשר ניסיון חוזר
}

async function waUriAsk(){
  const inp=document.getElementById('waUriInput');
  const q=(inp&&inp.value||'').trim(); if(!q||!S.waPhone) return;
  const chat=waUriChat();
  // "שלח בשעה HH:MM" — תזמון שליחה בצד שרת (GreenOS תמיד פעיל), לא תלוי בסשן/אורי
  const tm=q.match(/^(שלח|תשלח|שגר)\b[\s\S]*?(\d{1,2}:\d{2})/);
  if(tm){
    const d=[...chat].reverse().find(m=>m.role==='uri'&&m.draft);
    if(d){ if(inp) inp.value=''; chat.push({role:'user', text:q}); waUriPaint(); waUriScheduleDraft(d.draft, tm[2]); return; }
  }
  // "שלח" וחברותיה — שליחה מיידית של הטיוטה האחרונה, בלי סיבוב נוסף אצל אורי
  if(/^(שלח|תשלח|שגר|אשר|מאשר|אשר ושלח|שלח עכשיו|שלח ללקוח)[.!]*$/.test(q)){
    const d=[...chat].reverse().find(m=>m.role==='uri'&&m.draft);
    if(d){ if(inp) inp.value=''; chat.push({role:'user', text:q}); waUriPaint(); waUriSendDraftText(d.draft); return; }
  }
  chat.push({role:'user', text:q});
  const aMsg={role:'uri', status:'pending', text:''};
  chat.push(aMsg);
  if(inp) inp.value='';
  waUriPaint();
  try{
    const r=await api('/api/admin/wa/uri/ask',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({phone:S.waPhone, question:q})});
    waUriPoll(r.id, aMsg);
  }catch(e){ aMsg.status='error'; aMsg.text='שליחת הבקשה נכשלה'; waUriPaint(); }
}
async function waUriPoll(jid, msg, tries){
  tries=tries||0;
  if(tries>170){ msg.status='error'; msg.text='תם הזמן (8 דק׳) — ייתכן שגשר אורי כבוי'; waUriPaint(); return; }
  try{
    const r=await api('/api/admin/wa/uri/job/'+jid);
    if(r.status==='done'){
      let t=r.answer||'';
      const dm=t.match(/\[DRAFT\]\s*([\s\S]*?)\s*\[\/DRAFT\]/);
      if(dm){ msg.draft=dm[1].trim(); msg.text=t.replace(dm[0],'').trim(); }
      else msg.text=t;
      msg.status='done'; waUriPaint(); return;
    }
    if(r.status==='error'){ msg.status='error'; msg.text=r.answer||'שגיאה אצל אורי'; waUriPaint(); return; }
  }catch(e){}
  setTimeout(()=>waUriPoll(jid,msg,tries+1),3000);
}

async function waUriSendDraftText(text){
  // שליחת טיוטת אורי ללקוח — ישירות, בלי סיבוב נוסף מול המודל (מיידי)
  if(!text||!S.waPhone) return;

    const r=await api('/api/admin/wa/send',{method:'POST',headers:{'Content-Type':'application/json'},

        body:JSON.stringify({phone:S.waPhone, name:(conv.name||'').split(' ')[0], body:text})});
      st.status='done'; st.sys=true; st.text='✓ נשלח ללקוח כתבנית (מחוץ לחלון 24ש׳)';
    } else { st.status='done'; st.sys=true; st.text='✓ נשלח ללקוח'; }

  waUriPaint();
}

function waPicTryPaste(e){
  if(!S._waPicMenu || !S.waPhone) return false;
  const cd=e.clipboardData; if(!cd) return false;
  let f=null;
  for(const it of (cd.items||[])){ if(it.kind==='file'&&(it.type||'').startsWith('image/')){ f=it.getAsFile(); if(f) break; } }
  if(!f && cd.files && cd.files.length){ for(const cf of cd.files){ if((cf.type||'').startsWith('image/')){ f=cf; break; } } }
  if(!f) return false;
  e.preventDefault(); S._waPicMenu=false; _waPicSend(f); return true;  // flag סינכרוני — מונע טיפול כפול

function waBubble(m){
  const media=(m.media||[]).map(x=>{
    if(x.type==='image'||x.type==='sticker')
      return `<img class="wa-img" src="${escW(x.url)}" loading="lazy" onload="waScrollBottom()" onclick="waLightbox('${escW(x.url)}')" title="הגדל">`;
    if(x.type==='video') return `<video class="wa-img" src="${escW(x.url)}" controls preload="metadata"></video>`;
    if(x.type==='audio') return `<audio src="${escW(x.url)}" controls style="max-width:100%"></audio>`;
    return `<a href="${escW(x.url)}" target="_blank" class="wa-doc">📎 ${escW(x.caption||'קובץ מצורף')}</a>`;
  }).join('');
  // כשיש מדיה — מסתירים את ה-placeholder הטקסטואלי ([image] וכו'), משאירים caption אמיתי
  let txt=(m.text||'').trim();
  if(media) txt=txt.replace(/\[(image|video|audio|document|file|sticker)[^\]]*\]/g,'').trim();
  // לחיצת כפתור של הלקוח (טמפלייט quick-reply / בוט) — מסמנים בבירור "👆 לחץ/ה"
  const isChoice=m.direction==='in'&&(m.kind==='button'||m.kind==='interactive');
  const mark=m.kind==='template'?`<div class="wa-mark">📋 תבנית · <span style="direction:ltr">${escW(m.tpl||'')}</span></div>`
            :isChoice?'<div class="wa-mark" style="color:#16a34a">👆 לחץ/ה על כפתור</div>'
            :m.kind==='interactive'?'<div class="wa-mark">🤖 בוט</div>':'';
  // ציטוט (reply): הודעה שמגיבה להודעה ספציפית. בלחיצת כפתור הציטוט הוא רק הטמפלייט
  // ("הודעה קודמת" מבלבל) — אז לא מציגים אותו; הטקסט עצמו הוא שם הכפתור שנלחץ.
  const quote=(m.reply_to&&!isChoice)?`<div class="wa-quote" ${m.reply_preview?'':'style="opacity:.6"'}>${escW(m.reply_preview||'הודעה קודמת')}</div>`:'';
  // לחיצה ארוכה (מובייל) / קליק ימני (דסקטופ) על הבועה ← תפריט השב/העתק
  const press=m.id?` data-mid="${escW(String(m.id))}" data-prev="${escW(String((m.text||'').slice(0,90)))}" data-full="${escW(String(m.text||''))}"
    onpointerdown="waBubPress(event,this)" onpointerup="waBubRelease()" onpointercancel="waBubRelease()"
    onpointermove="waBubMove(event)" oncontextmenu="waBubCtx(event,this)"`:'';
  // הודעה יוצאת שנכשלה — מציגים את **סיבת** הכשל בגלוי (לא רק ⚠), עם תרגום ידידותי.
  const failNote=(m.direction==='out'&&m.status==='failed')
    ? `<div class="wa-fail">⚠ לא נמסר ללקוח${m.err?' · '+escW(humanWaErr(m.err)):''}</div>` : '';
  return `<div class="wa-b ${m.direction==='in'?'wa-in':'wa-out'}"${press}>${mark}${quote}${media}${escW(txt)}${failNote}<div class="wa-t">${m.ts?fmtTime(new Date(m.ts*1000).toISOString()):''}${waTicks(m)}</div></div>`;
}
// תרגום קוד שגיאת Meta לסיבה ידידותית בעברית (נשמר ה-raw כ-fallback).
function humanWaErr(err){
  const e=String(err||'');
  if(/131026/.test(e)) return 'המספר לא מקבל וואטסאפ (לא רשום בוואטסאפ / חסם אותנו)';
  if(/131047/.test(e)) return 'מחוץ לחלון 24 שעות — נדרשת תבנית מאושרת';
  if(/131051/.test(e)) return 'סוג הודעה לא נתמך';
  if(/131000|368|131049/.test(e)) return 'נחסם זמנית ע״י מטא — נסה/י שוב מאוחר יותר';
  if(/470/.test(e)) return 'חלון ההודעות נסגר — נדרשת תבנית';
  return e;
}
// סימוני מסירה/קריאה (וי) על הודעות יוצאות — לפי סטטוס ממטא (sent/delivered/read/failed).
// ✓ אפור = נשלח · ✓✓ אפור = נמסר · ✓✓ כחול = נקרא · ⚠ אדום = נכשל. בלי סטטוס — כלום.
function waTicks(m){
  if(m.direction!=='out') return '';
  const st=m.status||'';
  if(st==='failed') return ` <span class="wa-tk" title="${escW('נכשל'+(m.err?' — '+humanWaErr(m.err):''))}" style="color:#e5484d;cursor:help">⚠</span>`;
  if(st!=='sent'&&st!=='delivered'&&st!=='read') return '';
  const col=st==='read'?'#34b7f1':'var(--muted)';
  const ttl=st==='read'?'נקרא':st==='delivered'?'נמסר':'נשלח';
  const a=`M1 6 L4 9 L9.6 2.6`, b=`M6 6 L9 9 L16.6 1.8`;
  const dd=st==='sent'
    ?`<path d="${a}" fill="none" stroke="${col}" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>`
    :`<path d="${a}" fill="none" stroke="${col}" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><path d="${b}" fill="none" stroke="${col}" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>`;
  return ` <span class="wa-tk" title="${ttl}" style="display:inline-block;vertical-align:-1px"><svg viewBox="0 0 18 12" width="15" height="10">${dd}</svg></span>`;
}

// fallback ברמת המסמך: אם הדביקו תמונה כשהפוקוס לא בתיבת ההודעה (לחצו על השיחה
// ואז Cmd/Ctrl+V) — נתפוס גם את זה, אבל רק כששיחת WhatsApp פתוחה ולא מדביקים
// לתוך שדה קלט אחר (כדי לא לחטוף הדבקות במקומות אחרים).
if(!window._waPasteDocBound){
  window._waPasteDocBound=true;
  document.addEventListener('paste', function(e){
    try{
      if(!S || !S.waPhone) return;                 // אין שיחה פתוחה
      if(waPicTryPaste(e)) return;                 // תפריט תמונת הלקוח פתוח → תמונת פרופיל
      const t=e.target;
      if(t && t.id==='waText') return;             // התיבה כבר מטופלת ב-onpaste
      if(t && (t.tagName==='INPUT'||t.tagName==='TEXTAREA'||t.isContentEditable)) return; // שדה אחר — לא לגעת
      const cd=e.clipboardData; if(!cd) return;
      const hasImg=[].some.call(cd.items||[], it=>it.kind==='file'&&(it.type||'').startsWith('image/'))
                 || [].some.call(cd.files||[], f=>(f.type||'').startsWith('image/'));
      if(hasImg) waPaste(e);
    }catch(_){}
  });
}
function waPaste(e){
  if(waPicTryPaste(e)) return;       // תפריט תמונת הלקוח פתוח → תמונת פרופיל (קודם לצ'אט)
  // הדבקת תמונה מה-clipboard → פריוויו בתיבת ההקלדה (לא שליחה עיוורת).
  // עמיד למגוון מקורות: items עם type image/*, clipboardData.files (macOS/Safari),
  // ו-fallback ל-file item גם בלי type מדויק.
  const cd=e.clipboardData; if(!cd) return;
  let f=null;
  const items=cd.items||[];
  // 1) items עם type image/* (צילום מסך, "העתק תמונה")
  for(const it of items){
    if(it.kind==='file' && (it.type||'').startsWith('image/')){ f=it.getAsFile(); if(f) break; }
  }
  // 2) clipboardData.files — חלק מהדפדפנים/מערכות חושפים תמונה מודבקת כאן
  if(!f && cd.files && cd.files.length){
    for(const cf of cd.files){ if((cf.type||'').startsWith('image/')){ f=cf; break; } }
  }
  // 3) fallback: כל file item שמתברר כתמונה גם בלי type מדויק
  if(!f){
    for(const it of items){
      if(it.kind==='file'){ const g=it.getAsFile&&it.getAsFile(); if(g && (g.type||'').startsWith('image/')){ f=g; break; } }
    }
  }
  if(f){ e.preventDefault(); waStageFile(f, f.name||'pasted_image.png'); }
}

function waStageFile(f, name){

  if(f.size>15*1024*1024){ toast('קובץ גדול מדי (מקס׳ 15MB)',false); return; }
  showLoading('מעלה ושולח קובץ…');
  try{
    const fd=new FormData(); fd.append('phone',S.waPhone); fd.append('file',f,name||f.name||'file');
    const cap=(document.getElementById('waText')||{}).value||'';
    if(cap.trim()) fd.append('caption',cap.trim());
    const r=await api('/api/admin/wa/send-file',{method:'POST',body:fd},180000);
    hideLoading();
    if(r && r.sent){
      toast('הקובץ נשלח ✓',true);
      const ta=document.getElementById('waText'); if(ta) ta.value='';
      waClearPending();
      setTimeout(()=>loadWaThread(true),1500);
    } else if(r && r.needs_template){
      // מחוץ לחלון 24ש — לא משדרים "נשלח". משאירים את התמונה בתצוגה כדי שאפשר לנסות שוב.
      toast('הלקוח מחוץ לחלון 24 שעות — אי אפשר לשלוח תמונה (רק תבנית טקסט)',false);
    } else {
      toast('שליחת הקובץ נכשלה — נסה שוב',false);
    }
  }catch(e){
    hideLoading();
    let msg='שליחת קובץ נכשלה';
    try{ if(e.status===502) msg+=' — '+(e.detail||'בדוק חלון 24ש׳ / טוקן'); }catch(_){}
    toast(msg,false);
  }
}

// ── Web Push (PWA): התראות גם כשהאפליקציה סגורה. באייפון — חובה "הוסף למסך הבית" קודם ──
function urlB64ToU8(b64){ const pad='='.repeat((4-b64.length%4)%4); const raw=atob((b64+pad).replace(/-/g,'+').replace(/_/g,'/'));
  return Uint8Array.from([...raw].map(c=>c.charCodeAt(0))); }
async function waSWReady(){
  if(!('serviceWorker' in navigator)) return null;
  try{ return await navigator.serviceWorker.register('/sw.js'); }catch(e){ return null; }
}
async function waPushBtnState(){
  const btn=document.getElementById('waPushBtn'); if(!btn) return;
  if(!('serviceWorker' in navigator)||!('PushManager' in window)){ btn.innerHTML=ico('bellOff',16); btn.title='הדפדפן לא תומך / לא מותקן כאפליקציה'; return; }
  try{ const reg=await navigator.serviceWorker.getRegistration();
       const sub=reg&&await reg.pushManager.getSubscription();
       if(sub&&Notification.permission==='granted'){ btn.innerHTML=ico('bell',16); btn.style.color='#16a34a'; btn.title='התראות פעילות במכשיר הזה ✓ (לחץ לבדיקה)'; btn.onclick=waPushTest; }
       else { btn.innerHTML=ico('bellOff',16); btn.style.color=''; btn.title='הפעל התראות במכשיר הזה'; btn.onclick=waEnablePush; }
  }catch(e){}
}
async function waEnablePush(){
  if(!('serviceWorker' in navigator)||!('PushManager' in window)){
    toast('באייפון: קודם שתף ← "הוסף למסך הבית", ואז להפעיל התראות מתוך האפליקציה',false); return; }
  try{
    const perm=await Notification.requestPermission();
    if(perm!=='granted'){ toast('ההרשאה נדחתה — אפשר לאפשר בהגדרות',false); return; }
    const reg=await waSWReady(); if(!reg){ toast('רישום service worker נכשל',false); return; }
    const {key}=await api('/api/admin/wa/push/key');
    if(!key){ toast('מפתח push חסר בשרת',false); return; }
    const sub=await reg.pushManager.subscribe({userVisibleOnly:true, applicationServerKey:urlB64ToU8(key)});
    const r=await api('/api/admin/wa/push/subscribe',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({sub:sub.toJSON(), ua:navigator.userAgent})});
    toast(`התראות הופעלו ✓ (${r.devices} מכשירים רשומים)`,true);
    waPushBtnState(); drawerPushState();
  }catch(e){ toast('הפעלת התראות נכשלה — '+(e.message||e),false); }
}

function renderWaThread(){

  // ברענון הפולינג. קופצים לתחתית רק אם הוא כבר היה למטה (או פתיחה ראשונה).
  const oldMsgs=document.getElementById('waMsgs');
  let nearBottom=true, prevTop=0;
  if(oldMsgs){ prevTop=oldMsgs.scrollTop;
    nearBottom=(oldMsgs.scrollHeight - oldMsgs.scrollTop - oldMsgs.clientHeight) < 120; }
  // שימור הקלדה ופוקוס בשדות (waText / waUriInput) — הרינדור מהפולינג מחק אותם
  const keep={};
  ['waText','waUriInput','waStockQ'].forEach(id=>{ const el=document.getElementById(id);
    if(el) keep[id]={v:el.value, f:document.activeElement===el, s:el.selectionStart}; });
  p.innerHTML=waThreadHTML();
  const newMsgs=document.getElementById('waMsgs');
  if(newMsgs) newMsgs.scrollTop = nearBottom ? newMsgs.scrollHeight : prevTop;
  if(S.waPanel&&S.waPanelMode==='stock') waStockPaint();   // התוצאות נצבעות מחדש אחרי רינדור
  for(const [id,k] of Object.entries(keep)){
    const el=document.getElementById(id); if(!el) continue;
    if(k.v) el.value=k.v;
    if(k.f){ el.focus(); try{ el.selectionStart=el.selectionEnd=k.s; }catch(e){} }
  }
}

// ── 🔤 זיהוי/תיקון פריסת מקלדת הפוכה (עברית שהוקלדה ב-EN ולהפך) ──
// כשמקלידים עברית בפריסת אנגלית כל אות יוצאת לפי מיקום המקש: "שלום"→"akuo".
// המרה חד-חד-ערכית → אפשר לזהות וגם לתקן.
const _KB_EN2HE={q:'/',w:"'",e:'ק',r:'ר',t:'א',y:'ט',u:'ו',i:'ן',o:'ם',p:'פ',
 a:'ש',s:'ד',d:'ג',f:'כ',g:'ע',h:'י',j:'ח',k:'ל',l:'ך',';':'ף',
 z:'ז',x:'ס',c:'ב',v:'ה',b:'נ',n:'מ',m:'צ',',':'ת','.':'ץ','/':'.'};
const _KB_HE2EN=(()=>{const m={};for(const k in _KB_EN2HE)m[_KB_EN2HE[k]]=k;return m;})();
function kbConvert(text, dir){
  // dir='en2he' או 'he2en'
  const map = dir==='he2en' ? _KB_HE2EN : _KB_EN2HE;
  let out='';
  for(const ch of (text||'')){ const low=ch.toLowerCase(); out += (map[low]!==undefined?map[low]:ch); }
  return out;
}
function kbSwap(text){
  // המרה דו-כיוונית אוטומטית לפי תוכן הטקסט
  const heCount=(text.match(/[֐-׿]/g)||[]).length;
  const enCount=(text.match(/[a-zA-Z]/g)||[]).length;
  return heCount>=enCount ? kbConvert(text,'he2en') : kbConvert(text,'en2he');
}
function waKbSwap(){
  const ta=document.getElementById('waText'); if(!ta||!(ta.value||'').trim()) return;
  ta.value=kbSwap(ta.value); ta.focus();
}

function kbWrongLayout(text){
  // מחזיר את העברית המתוקנת אם הטקסט נראה כמו עברית שהוקלדה בטעות בפריסת אנגלית:
  // אין בו עברית, ≥4 אותיות לטיניות, לא URL, ו**אין בו מילה אנגלית/מותג מוכרים** (שזו אנגלית מכוונת).
  const t=(text||'').trim();
  if(/[֐-׿]/.test(t)) return null;                 // כבר יש עברית — לא הפוך
  if(/https?:|www\.|@|\.co|\.com|\.il/i.test(t)) return null; // קישור/אימייל — לא לגעת
  const letters=(t.match(/[a-zA-Z]/g)||[]).length;
  if(letters<4) return null;                                 // קצר מדי (ok / JBL)
  if(letters/Math.max(1,t.replace(/\s/g,'').length) < 0.6) return null; // רובו לא אותיות
  const words=t.toLowerCase().split(/[^a-z]+/).filter(Boolean);
  if(words.some(w=>_EN_WORDS.has(w))) return null;  // מילה אנגלית אמיתית → לא חירבוש
  const fixed=kbConvert(t,'en2he');
  return /[֐-׿]{3,}/.test(fixed) ? fixed : null;   // התוצאה אכן עברית
}
async function sendWaMsg(){
  const ta=document.getElementById('waText'); if(!ta) return;
  if(S.waPending){ const p=S.waPending; return waSendBlob(p.blob, p.name); }  // תמונה מצורפת → נשלחת עם הטקסט ככיתוב
  let text=(ta.value||'').trim(); if(!text) return;
  // 🔤 בדיקת פריסה הפוכה לפני שליחה — תופס "חירבוש" גם כשלא שמת לב
  const fix=kbWrongLayout(text);
  if(fix && fix!==text){
    if(confirm('נראה שכתבת בפריסת מקלדת הפוכה 🔤\n\nהתכוונת:\n"'+fix+'"\n\nאישור = לתקן ולשלוח · ביטול = לשלוח כמו שזה')){
      text=fix; ta.value=fix;
    }
  }
  const btn=document.getElementById('waSendBtn'); if(btn) btn.disabled=true;
  const rep=S.waReplyTo||null;
  try{
    const r=await api('/api/admin/wa/send',{method:'POST',headers:{'Content-Type':'application/json'},
                       body:JSON.stringify({phone:S.waPhone,text,
                         reply_to:(rep&&rep.id)||'', reply_preview:(rep&&rep.preview)||''})});
    if(r.sent&&rep){ S.waReplyTo=null; }
    if(r.needs_template){
      if(confirm('השיחה מחוץ לחלון 24 השעות — טקסט חופשי לא יימסר אצל הלקוח.\n\nלשלוח כתבנית מאושרת (new_message)? ההודעה תקופל לשורה אחת.')){
        const conv=(S.waConvs||[]).find(c=>c.phone===S.waPhone)||{};
        await api('/api/admin/wa/send-template',{method:'POST',headers:{'Content-Type':'application/json'},
                   body:JSON.stringify({phone:S.waPhone,name:(conv.name||'').split(' ')[0],body:text})});
        toast('נשלח כתבנית ✓',true); ta.value='';
        setTimeout(()=>loadWaThread(true),1200);
        if(S.wpop&&S.wpop.open) setTimeout(wpopAfterSend,1000);   // 💬 צף: ענית → השיחה נסגרת/עוברת לבא בתור
      }
    } else {
      toast('נשלח ✓',true); ta.value='';
      // מענה ידני → השתלטות אוטומטית: הבוט מושתק לשיחה (השרת סימן), נעדכן את החיווי
      if(!S.waBotHandoff){ S.waBotHandoff=true;
        const cv=(S.waConvs||[]).find(c=>c.phone===S.waPhone); if(cv) cv.handoff=true; }
      // אופטימי: מציגים את ההודעה מיד (לפני הרענון מהשרת) — תחושת שליחה מיידית
      if(S.waThread&&S.waThread.phone===S.waPhone){
        S.waThread.messages.push({id:'opt-'+Date.now(),direction:'out',text:text,kind:null,media:[],
          ts:Math.floor(Date.now()/1000),status:'sent',reply_to:(rep&&rep.id)||null,reply_preview:(rep&&rep.preview)||''});
        waRerender();
      } else { waRerender(); }
      setTimeout(()=>loadWaThread(true),1200);
      if(S.wpop&&S.wpop.open) setTimeout(wpopAfterSend,1000);   // 💬 צף: ענית → השיחה נסגרת/עוברת לבא בתור
    }
  }catch(e){ toast('שליחה נכשלה — '+(e.status===502?'שגיאת ConnectOp':'תקלה'),false); }
  if(btn) btn.disabled=false;
}

function waRefreshMsgsOnly(){
  const box=document.getElementById('waMsgs'); if(!box) return;
  const t=S.waThread; if(!t || t.phone!==S.waPhone) return;
  const msgs=(t.messages||[]).filter(m=>m.text||(m.media&&m.media.length));
  const sig=msgs.length+'|'+((msgs[msgs.length-1]||{}).id||'')+'|'+msgs.map(m=>m.status||'').join('');
  if(box._sig===sig) return;   // אין שינוי — לא מרנדרים (בלי הבהוב/קפיצת גלילה)
  const nearBottom=box.scrollHeight-box.scrollTop-box.clientHeight<80;

  box.innerHTML=msgs.map(waBubble).join('')||'<div class="empty">אין הודעות בשיחה</div>';
  box._sig=sig;
  if(nearBottom) box.scrollTop=box.scrollHeight; else box.scrollTop=prevTop+(box.scrollHeight-prevH);
}

//  💬 חלון WhatsApp צף — מענה מהיר מכל מקום במערכת (מלאי/הזמנות/...)
//  מארח את פאנל-השיחה הקיים (#waThreadPane) בחלון צף מתחתית המסך, כך
//  שכל הפיצ'רים (אורי ✨, מוכנות ⚡, תבניות, צירוף 📎, חלון 24ש, ציטוט,
//  תיקון-מקלדת) עובדים מילה-במילה כמו בטאב המלא — בלי שכפול קוד.
//  טריגר: הודעה נכנסת בשיחה עם handoff=true (צריך-אנושי / נציג חי).
//  עונה → נסגר; נפתח שוב כשהלקוח חוזר או כשלקוח אחר ממתין לאנושי.
// ════════════════════════════════════════════════════════════════════
function wpopInit(){ if(!S.wpop) S.wpop={open:false,phone:'',queue:[],snooze:{},min:false}; return S.wpop; }
function wpopEligible(c){
  if(!c || c.archived) return false;
  // (א) ביקש נציג וטרם נענה ע"י אדם — גם אם הבוט שלח הודעת-העברה אחרונה (unread=false);
  // (ב) שיחה אנושית מתמשכת שהלקוח הגיב בה מחדש (handoff + לא-נקרא).
  return !!c.awaiting_agent || (!!c.handoff && waIsUnread(c));
}
function wpopQueue(convs){
  // שיחות שמצריכות אותך עכשיו: handoff + לא-נקרא, שלא הושתקו ידנית (snooze), זמן יורד
  const w=wpopInit();
  return (convs||[]).filter(c=>wpopEligible(c) && (c.ts||0)>(w.snooze[c.phone]||0))
                    .sort((a,b)=>(b.ts||0)-(a.ts||0)).map(c=>c.phone);
}
function wpopConsider(convs){
  if(!S.adminKey) return;                                 // רק קונסולת הניהול
  if(S.view==='admin'&&S.adminTab==='wa') return;          // בטאב המלא — אין צורך בצף
  const w=wpopInit();
  w.queue=wpopQueue(convs);
  if(w.open){ wpopRenderBar(); return; }                   // כבר פתוח — רק עדכון מונה הממתינים
  if(w.queue.length) wpopOpen(w.queue[0]);
}
function wpopEnsure(){
  let el=document.getElementById('wpop');
  if(!el){
    el=document.createElement('div'); el.id='wpop';
    el.innerHTML='<div class="wpop-bar" id="wpopBar"></div>'+
                 '<div class="wpop-host"><div class="wa-thread" id="waThreadPane"></div></div>';
    document.body.appendChild(el);
  }
  return el;
}
async function wpopOpen(phone){
  if(S.view==='admin'&&S.adminTab==='wa') return;          // נמנע כפילות #waThreadPane מול הטאב
  const w=wpopInit();
  w.open=true; w.phone=phone; w.min=false;
  S.waPhone=phone; S.waThread=null; S.waReplyTo=null; S.waPanel=false;
  const el=wpopEnsure(); el.classList.remove('wpop-min');
  wpopRenderBar();
  const pane=document.getElementById('waThreadPane');
  if(pane) pane.innerHTML='<div class="empty" style="margin:auto">טוען שיחה…</div>';
  const conv=(S.waConvs||[]).find(c=>c.phone===phone);
  if(conv) waMarkSeen(phone, conv.ts||Math.floor(Date.now()/1000));
  await loadWaThread(false);                               // ממלא #waThreadPane דרך renderWaThread
  wpopRenderBar();                                         // עדכון צ'יפ חלון-24ש אחרי שהגיע ה-thread
  wpopStartPoll();
  setTimeout(()=>{ const t=document.getElementById('waText'); if(t) t.focus(); }, 220);
}
function wpopRenderBar(){
  const w=wpopInit(); const bar=document.getElementById('wpopBar'); if(!bar) return;
  const conv=(S.waConvs||[]).find(c=>c.phone===w.phone)||{name:w.phone};
  const total=Math.max(1,w.queue.length);
  let idx=w.queue.indexOf(w.phone); if(idx<0) idx=0;
  const t=S.waThread; const win=(t&&t.phone===w.phone)?(t.window||null):null;
  const winChip=win?(win.in_window?`<span class="wpop-win ok" title="חלון 24ש פתוח">🟢 ${win.hours_left}ש׳</span>`
                                  :`<span class="wpop-win no" title="מחוץ ל-24ש — תבנית בלבד">🔴 24ש׳</span>`):'';
  const nav=w.queue.length>1?`<span class="wpop-nav">
      <button onclick="wpopNav(-1)" ${idx<=0?'disabled':''} title="הקודם">‹</button>
      <span title="שיחות שממתינות למענה">${idx+1}/${total}</span>
      <button onclick="wpopNav(1)" ${idx>=total-1?'disabled':''} title="הבא">›</button></span>`:'';
  bar.innerHTML=`${nav}<b>${escW(conv.name||w.phone)}</b>${winChip}`+
    `<span class="wpop-ph">+${escW(w.phone)}</span>`+
    `<button class="wpop-x" onclick="wpopOpenInTab()" title="פתח בטאב המלא">⤢</button>`+
    `<button class="wpop-x" onclick="wpopMin()" title="מזער">▁</button>`+
    `<button class="wpop-x" onclick="wpopClose()" title="סגור">✕</button>`;
}
function wpopNav(dir){
  const w=wpopInit(); if(!w.queue.length) return;
  let i=w.queue.indexOf(w.phone); if(i<0) i=0;
  i=Math.min(w.queue.length-1, Math.max(0, i+dir));
  const ph=w.queue[i]; if(ph && ph!==w.phone) wpopOpen(ph);
}
function wpopMin(){ const w=wpopInit(); w.min=!w.min; const el=document.getElementById('wpop'); if(el) el.classList.toggle('wpop-min', w.min); }
function wpopOpenInTab(){ const w=wpopInit(); const ph=w.phone; wpopClose(); openWaTab(); setTimeout(()=>{ try{ openWaConv(ph); }catch(e){} }, 80); }
function wpopClose(){
  const w=wpopInit();
  if(w.phone){ const c=(S.waConvs||[]).find(x=>x.phone===w.phone);
    w.snooze[w.phone]=Math.max(w.snooze[w.phone]||0, (c&&c.ts)||Math.floor(Date.now()/1000)); }
  w.open=false; wpopStopPoll();
  const el=document.getElementById('wpop'); if(el) el.remove();
  if(!(S.view==='admin'&&S.adminTab==='wa')){ S.waPhone=''; S.waThread=null; }  // משחרר את מצב-השיחה לטאב
}
function wpopStartPoll(){ wpopStopPoll();
  S.wpopTimer=setInterval(async()=>{ const w=S.wpop; if(!w||!w.open){ wpopStopPoll(); return; }
    if(S.waPhone===w.phone){ try{ await loadWaThread(true); }catch(e){} wpopRenderBar(); }
  }, 4000); }
function wpopStopPoll(){ if(S.wpopTimer){ clearInterval(S.wpopTimer); S.wpopTimer=null; } }
function wpopAfterSend(){
  // אסי ענה → השיחה טופלה: משתיקים ועוברים לבא-בתור / סוגרים (לפי הספק)
  const w=S.wpop; if(!w||!w.open) return;
  const ph=w.phone, now=Math.floor(Date.now()/1000);
  const c=(S.waConvs||[]).find(x=>x.phone===ph);
  w.snooze[ph]=Math.max(w.snooze[ph]||0, (c&&c.ts)||now, now);
  const rest=wpopQueue(S.waConvs).filter(p=>p!==ph);
  if(rest.length) wpopOpen(rest[0]); else wpopClose();
}
function waRerender(){ if(S.wpop&&S.wpop.open) renderWaThread(); else renderWa(); }

function lsFiltered(){
  let items=(S.lsCat||[]);
  items=items.filter(i=>i.active);   // לא-פעילים לא מוצגים (מק"טים שנסגרו בקופה)
  if(S.lsStock) items=items.filter(i=>(i.stock||0)>0);   // רק עם מלאי (לפי הקטלוג; הכמויות עצמן חיות)
  if(S.lsKind!=='all') items=items.filter(i=>i.kind===S.lsKind);
  if(S.lsCategory) items=items.filter(i=>(i.category||'')===S.lsCategory);
  if(S.lsMfr) items=items.filter(i=>brandOf(i.name)===S.lsMfr);
  const q=(S.lsQuery||'').trim();
  const hasFilter=S.lsKind!=='all'||S.lsCategory||S.lsMfr;
  if(q.length<2 && !hasFilter) return null;   // עוד אין מה להציג — מחכים להקלדה
  if(q.length>=2){
    // חיפוש חכם: מפצלים למילים — כל מילה חייבת להופיע איפשהו בשם/מק"ט/ברקוד,
    // בלי תלות בסדר שבו המוצר רשום בקופה ("a57 navy" ימצא "OPPO A57 ... Navy")
    const toks=q.toLowerCase().split(/\s+/).filter(Boolean);
    const toks2=fixHebrewLayout(q).toLowerCase().split(/\s+/).filter(Boolean);
    const alt=toks2.join(' ')!==toks.join(' ');
    items=items.filter(i=>{
      const blob=((i.name||'')+' '+(i.product_id||'')+' '+(i.barcode||'')).toLowerCase();
      return toks.every(t=>blob.includes(t))||(alt&&toks2.every(t=>blob.includes(t)));
    });
    const ql=q.toLowerCase();
    items.sort((a,b)=>{
      const score=x=>{
        if(String(x.product_id)===q||String(x.barcode)===q) return 0;        // התאמה מדויקת
        const n=String(x.name||'').toLowerCase();
        if(n.includes(ql)) return 1;                                          // הביטוי כרצף בשם
        return 2;                                                             // מילים מפוזרות
      };
      return score(a)-score(b)
        ||((b.stock||0)-(a.stock||0))                                         // עם מלאי קודם
        ||String(a.name).localeCompare(String(b.name),'he');
    });
  } else items=items.slice().sort((a,b)=>((b.stock||0)-(a.stock||0))||String(a.name).localeCompare(String(b.name),'he'));
  // נמצאו לפי סריאל (גם חלקי) — מקדימים את המוצרים לראש הרשימה (גם אם אין מלאי בקטלוג)
  if(S.lsSerialHits&&S.lsSerialHits.length){
    const pids=[...new Set(S.lsSerialHits.map(h=>String(h.product_id)))];
    pids.reverse().forEach(pid=>{
      if(!items.some(x=>String(x.product_id)===pid)){
        const hit=(S.lsCat||[]).find(x=>String(x.product_id)===pid);
        if(hit) items.unshift(hit);
      }
    });
  }
  return items;
}

  clearTimeout(_lsSerialT);
  _lsSerialT=setTimeout(async()=>{
    if((S.lsQuery||'').trim()!==q) return;
    try{ const d=await api('/api/admin/live-search/serial?q='+encodeURIComponent(qq));

      }
    }catch(e){}
  },300);
}

function lsResvAttr(bo){

// אייקוני אתר — תור נפרד לגמרי מהמלאי החי: WordPress איטי לא מעכב את מספרי המלאי
async function lsFetchWc(list){
  if(S.lsWcOff) return;
  const seq=S.lsSeq, now=Date.now();
  const todo=list.filter(i=>{const w=S.lsWc[String(i.product_id)];return !(w&&now-w.at<900000);});
  for(let k=0;k<todo.length;k+=6){
    if(seq!==S.lsSeq) return;
    await Promise.all(todo.slice(k,k+6).map(async i=>{
      const pid=String(i.product_id);
      try{ const d=await api('/api/admin/wc-link/'+encodeURIComponent(pid),null,30000);
        if(d&&d.available===false){ S.lsWcOff=true; return; }
        S.lsWc[pid]={at:Date.now(),data:d};
      }catch(e){ S.lsWc[pid]={at:Date.now(),data:null}; }
      if(seq===S.lsSeq) lsPaintWc(pid);
    }));
  }
}
async function lsFetchLive(list,attempt){
  const seq=++S.lsSeq, now=Date.now();
  const todo=list.filter(i=>{const c=S.lsLive[String(i.product_id)];return !(c&&!c.err&&now-c.at<LS_TTL_MS);});
  // במנות של LS_CHUNK במקביל — השורות הראשונות נצבעות מיד, ולא מציפים את הקצב המשותף
  for(let k=0;k<todo.length;k+=LS_CHUNK){
    if(seq!==S.lsSeq) return;   // המשתמש הקליד עוד — מפסיקים, חיפוש חדש כבר רץ
    await Promise.all(todo.slice(k,k+LS_CHUNK).map(async i=>{
      const pid=String(i.product_id);
      try{ const d=await api('/api/admin/live-stock/'+encodeURIComponent(pid),null,45000);
        S.lsLive[pid]={at:Date.now(),data:d}; }
      catch(e){ S.lsLive[pid]={at:Date.now(),err:true}; }
      if(seq===S.lsSeq) lsPaint(pid);
    }));
  }
  // ניסיון חוזר אוטומטי לשורות שנכשלו (הקופה עמוסה/הקצב המשותף תפוס) — עד 3 פעמים
  if(seq!==S.lsSeq) return;
  const failed=list.filter(i=>{const c=S.lsLive[String(i.product_id)];return c&&c.err;});
  if(failed.length && (attempt||0)<3)
    setTimeout(()=>{ if(seq===S.lsSeq) lsFetchLive(failed,(attempt||0)+1); },5000);
}

function wcQuickSel(name,opt){
  const Q=S._wcQuick; if(!Q) return;
  Q.sel[name]=opt;
  // התאמה אוטומטית (כמו באתר): אם הצירוף לא קיים — מצמידים את שאר המאפיינים
  // לצירוף הקיים הקרוב ביותר ששומר על מה שנלחץ עכשיו
  const v=Q.d.variants;
  if(v){
    const exact=(v.options||[]).some(c=>v.switch_attrs.every(sa=>String(c.attrs[sa.name]||'')===String(Q.sel[sa.name]||'')));
    if(!exact){
      const withClicked=(v.options||[]).filter(c=>String(c.attrs[name]||'')===String(opt));
      if(withClicked.length){
        let best=withClicked[0], bestScore=-1;
        withClicked.forEach(c=>{
          const score=v.switch_attrs.reduce((a,sa)=>a+(String(c.attrs[sa.name]||'')===String(Q.sel[sa.name]||'')?1:0),0);
          if(score>bestScore){ bestScore=score; best=c; }
        });
        v.switch_attrs.forEach(sa=>{ Q.sel[sa.name]=best.attrs[sa.name]||''; });
      }
    }
  }
  renderWcQuick();
}

    // אפשרות שלא משתלבת עם שאר הבחירות הנוכחיות — מעומעמת (לחיצה תתאים אוטומטית)
