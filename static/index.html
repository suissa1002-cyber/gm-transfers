function waUriMsgHTML(m,idx){
  if(m.role==='user')
    return `<div class="wa-uri-q">${escW(m.text)}</div>`;
  if(m.status==='pending')
    return `<div class="wa-uri-a wa-uri-wait">⏳ אורי עובד על זה…</div>`;
  if(m.status==='error')
    return `<div class="wa-uri-a" style="border-color:#dc2626">❌ ${escW(m.text||'שגיאה')}</div>`;
  if(m.sys)
    return `<div class="wa-uri-a" style="border-color:rgba(34,197,94,.45);color:#16a34a;font-weight:700">${escW(m.text)}</div>`;
  if(m.draft)
    return `<div class="wa-uri-a">
      ${m.text?`<div class="muted" style="font-size:12px;margin-bottom:7px">${escW(m.text)}</div>`:''}
      <div style="background:rgba(34,197,94,.13);border:1px solid rgba(34,197,94,.32);border-radius:12px;padding:9px 11px;white-space:pre-wrap;font-size:13px;word-break:break-word;overflow-wrap:anywhere">${escW(m.draft)}</div>
      <div style="display:flex;gap:6px;margin-top:7px;flex-wrap:wrap">
        <button class="btn-primary" style="padding:5px 13px;font-size:12.5px" onclick="waUriSendDraft(${idx})">📤 שלח ללקוח</button>
        <button class="btn-ghost" style="padding:4px 9px;font-size:12px;display:inline-flex;align-items:center;gap:5px" onclick="waUriToReply(${idx})">${ico('download',13)} לתיבה לעריכה</button>
        <button class="btn-ghost" style="padding:4px 9px;font-size:12px" onclick="navigator.clipboard.writeText((S.waUriChats[S.waPhone][${idx}].draft)||'');toast('הועתק ✓',true)">📋</button>
      </div>
      <div class="muted" style="font-size:10.5px;margin-top:4px">או כתוב "שלח" לשליחה · "תתקן …" לגרסה חדשה</div>
    </div>`;
  return `<div class="wa-uri-a">${escW(m.text)}
    <div style="display:flex;gap:6px;margin-top:7px">
      <button class="btn-ghost" style="padding:4px 9px;font-size:12px;display:inline-flex;align-items:center;gap:5px" onclick="waUriToReply(${idx})">${ico('download',13)} לתיבת המענה</button>
      <button class="btn-ghost" style="padding:4px 9px;font-size:12px" onclick="navigator.clipboard.writeText(S.waUriChats[S.waPhone][${idx}].text);toast('הועתק ✓',true)">📋</button>
    </div></div>`;
}
function waUriPaint(){
  const p=document.getElementById('waPanelBox');
  if(!(p && S.waPanelMode==='uri')) return;
  const inp=document.getElementById('waUriInput');
  const keep=inp?{v:inp.value, f:document.activeElement===inp, s:inp.selectionStart}:null;
  p.innerHTML=waUriHTML();
  const m=document.getElementById('waUriMsgs'); if(m) m.scrollTop=m.scrollHeight;
  if(keep){ const el=document.getElementById('waUriInput');
    if(el){ if(keep.v) el.value=keep.v;
      if(keep.f){ el.focus(); try{ el.selectionStart=el.selectionEnd=keep.s; }catch(e){} } } }
}
async function waUriCheckBridge(){
  try{ const r=await api('/api/admin/wa/uri/status'); S.waUriAlive=r.alive; }
  catch(e){ S.waUriAlive=null; }
  waUriPaint();
}
async function waUriAsk(){
  const inp=document.getElementById('waUriInput');
  const q=(inp&&inp.value||'').trim(); if(!q||!S.waPhone) return;
  const chat=waUriChat();
  // "שלח" וחברותיה — שליחה מיידית של הטיוטה האחרונה, בלי סיבוב נוסף אצל אורי
  if(/^(שלח|תשלח|שגר|אשר|מאשר|אשר ושלח|שלח עכשיו|שלח ללקוח)[.!]*$/.test(q)){
    const d=[...chat].reverse().find(m=>m.role==='uri'&&m.draft);
    if(d){ if(inp) inp.value=''; chat.push({role:'user', text:q}); waUriPaint(); waUriSendDraftText(d.draft); return; }
  }
  chat.push({role:'user', text:q});
  const aMsg={role:'uri', status:'pending', text:''};
  chat.push(aMsg);
  if(inp) inp.value='';
  waUriPaint();
  try{
    const r=await api('/api/admin/wa/uri/ask',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({phone:S.waPhone, question:q})});
    waUriPoll(r.id, aMsg);
  }catch(e){ aMsg.status='error'; aMsg.text='שליחת הבקשה נכשלה'; waUriPaint(); }
}
async function waUriPoll(jid, msg, tries){
  tries=tries||0;
  if(tries>170){ msg.status='error'; msg.text='תם הזמן (8 דק׳) — ייתכן שהגשר במק כבוי'; waUriPaint(); return; }
  try{
    const r=await api('/api/admin/wa/uri/job/'+jid);
    if(r.status==='done'){
      let t=r.answer||'';
      const dm=t.match(/\[DRAFT\]\s*([\s\S]*?)\s*\[\/DRAFT\]/);
      if(dm){ msg.draft=dm[1].trim(); msg.text=t.replace(dm[0],'').trim(); }
      else msg.text=t;
      msg.status='done'; waUriPaint(); return;
    }
    if(r.status==='error'){ msg.status='error'; msg.text=r.answer||'שגיאה אצל אורי'; waUriPaint(); return; }
  }catch(e){}
  setTimeout(()=>waUriPoll(jid,msg,tries+1),3000);
}
function waUriToReply(idx){
  const m=(waUriChat()||[])[idx]; if(!m) return;
  const ta=document.getElementById('waText');
  if(ta){ ta.value=m.draft||m.text; ta.focus(); toast('הטיוטה בתיבה — ערוך ושלח',true); }
}
async function waUriSendDraft(idx){
  const m=(waUriChat()||[])[idx]; if(m) waUriSendDraftText(m.draft||m.text);
}
async function waUriSendDraftText(text){
  // שליחת טיוטת אורי ללקוח — ישירות, בלי סיבוב נוסף מול המודל (מיידי)
  if(!text||!S.waPhone) return;
  const chat=waUriChat();
  const st={role:'uri', status:'pending', text:''};
  chat.push(st); waUriPaint();
  try{
    const r=await api('/api/admin/wa/send',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({phone:S.waPhone, text})});
    if(r.needs_template){
      const conv=(S.waConvs||[]).find(c=>c.phone===S.waPhone)||{};
      await api('/api/admin/wa/send-template',{method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({phone:S.waPhone, name:(conv.name||'').split(' ')[0], body:text})});
      st.status='done'; st.sys=true; st.text='✓ נשלח ללקוח כתבנית (מחוץ לחלון 24ש׳)';
    } else { st.status='done'; st.sys=true; st.text='✓ נשלח ללקוח'; }
    setTimeout(()=>loadWaThread(true),1200);
  }catch(e){ st.status='error'; st.text='השליחה נכשלה — '+(e.status===502?'שגיאת ConnectOp':'תקלה'); }
  waUriPaint();
}

function waMediaHTML(){
  const m=S.waMedia;
  if(!m||m.phone!==S.waPhone) return '<div class="muted">טוען מדיה…</div>';
  const items=m.items||[];
  if(!items.length) return '<div class="muted">אין מדיה בשיחה</div>';
  const imgs=items.filter(x=>x.type==='image'||x.type==='sticker');
  const other=items.filter(x=>x.type!=='image'&&x.type!=='sticker');
  return `
    ${imgs.length?`<div class="wa-gal">${imgs.map(x=>`<img src="${escW(x.url)}" loading="lazy" onclick="waLightbox('${escW(x.url)}')" title="${x.ts?fmtTime(new Date(x.ts*1000).toISOString()):''}">`).join('')}</div>`:''}
    ${other.map(x=>`<a class="wa-doc" style="display:block;margin-top:5px" href="${escW(x.url)}" target="_blank">
      ${x.type==='video'?'🎬':x.type==='audio'?'🎵':'📎'} ${escW(x.caption||x.type)} <span class="muted" style="font-size:11px">${x.ts?fmtTime(new Date(x.ts*1000).toISOString()):''}</span></a>`).join('')}`;
}
async function loadWaMedia(){
  const phone=S.waPhone; if(!phone) return;
  try{ const r=await api('/api/admin/wa/media/'+encodeURIComponent(phone));
       if(S.waPhone===phone){ S.waMedia={phone, items:r.media||[]};
         const b=document.getElementById('waMediaBox'); if(b) b.innerHTML=waMediaHTML(); } }
  catch(e){}
}

  const phone=S.waPhone; if(!phone) return;
  loadWaMedia();   // גלריה נטענת במקביל
  if(!S.waTags){ try{ S.waTags=(await api('/api/admin/wa/tags')).tags||[]; }catch(e){ S.waTags=[]; } }
  try{ const c=await api('/api/admin/wa/contact/'+encodeURIComponent(phone));
       if(S.waPhone===phone){ S.waContact=c; const p=document.getElementById('waPanelBox'); if(p) p.innerHTML=waPanelHTML(); } }

function waExport(){
  const t=S.waThread; if(!t) return;
  const conv=(S.waConvs||[]).find(c=>c.phone===S.waPhone)||{name:S.waPhone};
  const lines=(t.messages||[]).filter(m=>m.text).map(m=>
    `[${m.ts?new Date(m.ts*1000).toLocaleString('he-IL'):''}] ${m.direction==='in'?(conv.name||'לקוח'):'גרין מובייל'}: ${m.text.trim()}`);
  const blob=new Blob(['﻿'+lines.join('\n')],{type:'text/plain;charset=utf-8'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download=`whatsapp_${S.waPhone}_${new Date().toISOString().slice(0,10)}.txt`;
  a.click(); URL.revokeObjectURL(a.href);
}
function waLightbox(url){
  const d=document.createElement('div'); d.className='wa-lb';
  d.onclick=()=>d.remove();
  d.innerHTML=`<img src="${escW(url)}"><span class="wa-lb-x">✕</span>`;
  const esc=e=>{ if(e.key==='Escape'){ d.remove(); document.removeEventListener('keydown',esc); } };
  document.addEventListener('keydown',esc);
  document.body.appendChild(d);
}
function waBubble(m){
  const media=(m.media||[]).map(x=>{
    if(x.type==='image'||x.type==='sticker')
      return `<img class="wa-img" src="${escW(x.url)}" loading="lazy" onload="waScrollBottom()" onclick="waLightbox('${escW(x.url)}')" title="הגדל">`;
    if(x.type==='video') return `<video class="wa-img" src="${escW(x.url)}" controls preload="metadata"></video>`;
    if(x.type==='audio') return `<audio src="${escW(x.url)}" controls style="max-width:100%"></audio>`;
    return `<a href="${escW(x.url)}" target="_blank" class="wa-doc">📎 ${escW(x.caption||'קובץ מצורף')}</a>`;
  }).join('');
  // כשיש מדיה — מסתירים את ה-placeholder הטקסטואלי ([image] וכו'), משאירים caption אמיתי
  let txt=(m.text||'').trim();
  if(media) txt=txt.replace(/\[(image|video|audio|document|file|sticker)[^\]]*\]/g,'').trim();
  const mark=m.kind==='template'?`<div class="wa-mark">📋 תבנית · <span style="direction:ltr">${escW(m.tpl||'')}</span></div>`
            :m.kind==='interactive'?'<div class="wa-mark">🤖 בוט</div>':'';
  // ציטוט (reply): הודעה שמגיבה להודעה ספציפית — מציגים את הקטע המצוטט בראש הבועה
  const quote=m.reply_to?`<div class="wa-quote" ${m.reply_preview?'':'style="opacity:.6"'}>${escW(m.reply_preview||'הודעה קודמת')}</div>`:'';
  // לחיצה ארוכה (מובייל) / קליק ימני (דסקטופ) על הבועה ← תפריט השב/העתק
  const press=m.id?` data-mid="${escW(String(m.id))}" data-prev="${escW(String((m.text||'').slice(0,90)))}" data-full="${escW(String(m.text||''))}"
    onpointerdown="waBubPress(event,this)" onpointerup="waBubRelease()" onpointercancel="waBubRelease()"
    onpointermove="waBubMove(event)" oncontextmenu="waBubCtx(event,this)"`:'';
  return `<div class="wa-b ${m.direction==='in'?'wa-in':'wa-out'}"${press}>${mark}${quote}${media}${escW(txt)}<div class="wa-t">${m.ts?fmtTime(new Date(m.ts*1000).toISOString()):''}</div></div>`;
}
let _bubT=null,_bubXY=null;
function waBubPress(e,el){
  waBubRelease(); _bubXY=[e.clientX,e.clientY];
  _bubT=setTimeout(()=>{ _bubT=null; waReplyMenu(e.clientX,e.clientY,el.dataset.mid,el.dataset.prev,el.dataset.full); },450);
}
function waBubMove(e){ if(_bubT&&_bubXY&&(Math.abs(e.clientX-_bubXY[0])>8||Math.abs(e.clientY-_bubXY[1])>8)) waBubRelease(); }
function waBubRelease(){ if(_bubT){ clearTimeout(_bubT); _bubT=null; } }
function waBubCtx(e,el){ e.preventDefault(); waReplyMenu(e.clientX,e.clientY,el.dataset.mid,el.dataset.prev,el.dataset.full); }
function waReplyMenu(x,y,mid,prev,full){
  const old=document.getElementById('waBubMenu'); if(old) old.remove();
  const wrap=document.createElement('div');
  wrap.id='waBubMenu';
  wrap.style.cssText='position:fixed;inset:0;z-index:130';
  wrap.onclick=()=>wrap.remove();
  const mx=Math.min(Math.max(10,x-70),window.innerWidth-160);
  const my=Math.min(Math.max(10,y-90),window.innerHeight-110);
  wrap.innerHTML=`<div style="position:fixed;left:${mx}px;top:${my}px;background:var(--card);border:1px solid var(--line);border-radius:12px;box-shadow:0 10px 34px rgba(0,0,0,.3);overflow:hidden;min-width:150px" onclick="event.stopPropagation()">
    <div style="padding:11px 15px;cursor:pointer;font-size:14px;display:flex;align-items:center;gap:9px" onmouseover="this.style.background='var(--card2)'" onmouseout="this.style.background=''"
         onclick="document.getElementById('waBubMenu').remove();waReplySet('${escW(mid||'')}','${escW(prev||'')}')">↩ השב להודעה</div>
    <div style="padding:11px 15px;cursor:pointer;font-size:14px;display:flex;align-items:center;gap:9px;border-top:1px solid var(--line)" onmouseover="this.style.background='var(--card2)'" onmouseout="this.style.background=''"
         onclick="navigator.clipboard.writeText(this.parentElement.dataset.full||'');document.getElementById('waBubMenu').remove();toast('הועתק ✓',true)">📋 העתק</div>
  </div>`;
  wrap.firstElementChild.dataset.full=full||prev||'';
  document.body.appendChild(wrap);
}

async function waSendFile(inp){
  const f=inp.files&&inp.files[0]; inp.value=''; if(!f) return;
  waSendBlob(f, f.name);
}
function waPaste(e){
  // הדבקת תמונה מה-clipboard ישירות לשיחה
  const items=(e.clipboardData&&e.clipboardData.items)||[];
  for(const it of items){
    if(it.kind==='file' && it.type.startsWith('image/')){
      e.preventDefault();
      const f=it.getAsFile();
      if(f && confirm('לשלוח את התמונה שהודבקה ללקוח?')) waSendBlob(f, 'pasted_image.png');
      return;
    }
  }
}
async function waSendBlob(f, name){
  if(!S.waPhone) return;
  if(f.size>15*1024*1024){ toast('קובץ גדול מדי (מקס׳ 15MB)',false); return; }
  showLoading('מעלה ושולח קובץ…');
  try{
    const fd=new FormData(); fd.append('phone',S.waPhone); fd.append('file',f,name||f.name||'file');
    const cap=(document.getElementById('waText')||{}).value||'';
    if(cap.trim()) fd.append('caption',cap.trim());
    const r=await api('/api/admin/wa/send-file',{method:'POST',body:fd},180000);
    hideLoading(); toast('הקובץ נשלח ✓',true);
    const ta=document.getElementById('waText'); if(ta) ta.value='';
    setTimeout(()=>loadWaThread(true),1500);
  }catch(e){
    hideLoading();
    let msg='שליחת קובץ נכשלה';
    try{ if(e.status===502) msg+=' — '+(e.detail||'בדוק חלון 24ש׳ / טוקן'); }catch(_){}
    toast(msg,false);
  }
}

// ── Web Push (PWA): התראות גם כשהאפליקציה סגורה. באייפון — חובה "הוסף למסך הבית" קודם ──
function urlB64ToU8(b64){ const pad='='.repeat((4-b64.length%4)%4); const raw=atob((b64+pad).replace(/-/g,'+').replace(/_/g,'/'));
  return Uint8Array.from([...raw].map(c=>c.charCodeAt(0))); }
async function waSWReady(){
  if(!('serviceWorker' in navigator)) return null;
  try{ return await navigator.serviceWorker.register('/sw.js'); }catch(e){ return null; }
}
async function waPushBtnState(){
  const btn=document.getElementById('waPushBtn'); if(!btn) return;
  if(!('serviceWorker' in navigator)||!('PushManager' in window)){ btn.innerHTML=ico('bellOff',16); btn.title='הדפדפן לא תומך / לא מותקן כאפליקציה'; return; }
  try{ const reg=await navigator.serviceWorker.getRegistration();
       const sub=reg&&await reg.pushManager.getSubscription();
       if(sub&&Notification.permission==='granted'){ btn.innerHTML=ico('bell',16); btn.style.color='#16a34a'; btn.title='התראות פעילות במכשיר הזה ✓ (לחץ לבדיקה)'; btn.onclick=waPushTest; }
       else { btn.innerHTML=ico('bellOff',16); btn.style.color=''; btn.title='הפעל התראות במכשיר הזה'; btn.onclick=waEnablePush; }
  }catch(e){}
}
async function waEnablePush(){
  if(!('serviceWorker' in navigator)||!('PushManager' in window)){
    toast('באייפון: קודם שתף ← "הוסף למסך הבית", ואז להפעיל התראות מתוך האפליקציה',false); return; }
  try{
    const perm=await Notification.requestPermission();
    if(perm!=='granted'){ toast('ההרשאה נדחתה — אפשר לאפשר בהגדרות',false); return; }
    const reg=await waSWReady(); if(!reg){ toast('רישום service worker נכשל',false); return; }
    const {key}=await api('/api/admin/wa/push/key');
    if(!key){ toast('מפתח push חסר בשרת',false); return; }
    const sub=await reg.pushManager.subscribe({userVisibleOnly:true, applicationServerKey:urlB64ToU8(key)});
    const r=await api('/api/admin/wa/push/subscribe',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({sub:sub.toJSON(), ua:navigator.userAgent})});
    toast(`התראות הופעלו ✓ (${r.devices} מכשירים רשומים)`,true);
    waPushBtnState();
  }catch(e){ toast('הפעלת התראות נכשלה — '+(e.message||e),false); }
}

  try{ const r=await api('/api/admin/wa/push/test',{method:'POST'});

function setLsQuery(v){

function lsFiltered(){
  let items=(S.lsCat||[]);
  items=items.filter(i=>i.active);   // לא-פעילים לא מוצגים (מק"טים שנסגרו בקופה)
  if(S.lsStock) items=items.filter(i=>(i.stock||0)>0);   // רק עם מלאי (לפי הקטלוג; הכמויות עצמן חיות)
  if(S.lsKind!=='all') items=items.filter(i=>i.kind===S.lsKind);
  if(S.lsCategory) items=items.filter(i=>(i.category||'')===S.lsCategory);
  if(S.lsMfr) items=items.filter(i=>brandOf(i.name)===S.lsMfr);
  const q=(S.lsQuery||'').trim();
  const hasFilter=S.lsKind!=='all'||S.lsCategory||S.lsMfr;
  if(q.length<2 && !hasFilter) return null;   // עוד אין מה להציג — מחכים להקלדה
  if(q.length>=2){
    // חיפוש חכם: מפצלים למילים — כל מילה חייבת להופיע איפשהו בשם/מק"ט/ברקוד,
    // בלי תלות בסדר שבו המוצר רשום בקופה ("a57 navy" ימצא "OPPO A57 ... Navy")
    const toks=q.toLowerCase().split(/\s+/).filter(Boolean);
    const toks2=fixHebrewLayout(q).toLowerCase().split(/\s+/).filter(Boolean);
    const alt=toks2.join(' ')!==toks.join(' ');
    items=items.filter(i=>{
      const blob=((i.name||'')+' '+(i.product_id||'')+' '+(i.barcode||'')).toLowerCase();
      return toks.every(t=>blob.includes(t))||(alt&&toks2.every(t=>blob.includes(t)));
    });
    const ql=q.toLowerCase();
    items.sort((a,b)=>{
      const score=x=>{
        if(String(x.product_id)===q||String(x.barcode)===q) return 0;        // התאמה מדויקת
        const n=String(x.name||'').toLowerCase();
        if(n.includes(ql)) return 1;                                          // הביטוי כרצף בשם
        return 2;                                                             // מילים מפוזרות
      };
      return score(a)-score(b)
        ||((b.stock||0)-(a.stock||0))                                         // עם מלאי קודם
        ||String(a.name).localeCompare(String(b.name),'he');
    });
  } else items=items.slice().sort((a,b)=>((b.stock||0)-(a.stock||0))||String(a.name).localeCompare(String(b.name),'he'));
  // נמצאו לפי סריאל (גם חלקי) — מקדימים את המוצרים לראש הרשימה (גם אם אין מלאי בקטלוג)
  if(S.lsSerialHits&&S.lsSerialHits.length){
    const pids=[...new Set(S.lsSerialHits.map(h=>String(h.product_id)))];
    pids.reverse().forEach(pid=>{
      if(!items.some(x=>String(x.product_id)===pid)){
        const hit=(S.lsCat||[]).find(x=>String(x.product_id)===pid);
        if(hit) items.unshift(hit);
      }
    });
  }
  return items;
}

// אייקוני אתר — תור נפרד לגמרי מהמלאי החי: WordPress איטי לא מעכב את מספרי המלאי
async function lsFetchWc(list){
  if(S.lsWcOff) return;
  const seq=S.lsSeq, now=Date.now();
  const todo=list.filter(i=>{const w=S.lsWc[String(i.product_id)];return !(w&&now-w.at<900000);});
  for(let k=0;k<todo.length;k+=6){
    if(seq!==S.lsSeq) return;
    await Promise.all(todo.slice(k,k+6).map(async i=>{
      const pid=String(i.product_id);
      try{ const d=await api('/api/admin/wc-link/'+encodeURIComponent(pid),null,30000);
        if(d&&d.available===false){ S.lsWcOff=true; return; }
        S.lsWc[pid]={at:Date.now(),data:d};
      }catch(e){ S.lsWc[pid]={at:Date.now(),data:null}; }
      if(seq===S.lsSeq) lsPaintWc(pid);
    }));
  }
}
async function lsFetchLive(list,attempt){
  const seq=++S.lsSeq, now=Date.now();
  const todo=list.filter(i=>{const c=S.lsLive[String(i.product_id)];return !(c&&!c.err&&now-c.at<LS_TTL_MS);});
  // במנות של LS_CHUNK במקביל — השורות הראשונות נצבעות מיד, ולא מציפים את הקצב המשותף
  for(let k=0;k<todo.length;k+=LS_CHUNK){
    if(seq!==S.lsSeq) return;   // המשתמש הקליד עוד — מפסיקים, חיפוש חדש כבר רץ
    await Promise.all(todo.slice(k,k+LS_CHUNK).map(async i=>{
      const pid=String(i.product_id);
      try{ const d=await api('/api/admin/live-stock/'+encodeURIComponent(pid),null,45000);
        S.lsLive[pid]={at:Date.now(),data:d}; }
      catch(e){ S.lsLive[pid]={at:Date.now(),err:true}; }
      if(seq===S.lsSeq) lsPaint(pid);
    }));
  }
  // ניסיון חוזר אוטומטי לשורות שנכשלו (הקופה עמוסה/הקצב המשותף תפוס) — עד 3 פעמים
  if(seq!==S.lsSeq) return;
  const failed=list.filter(i=>{const c=S.lsLive[String(i.product_id)];return c&&c.err;});
  if(failed.length && (attempt||0)<3)
    setTimeout(()=>{ if(seq===S.lsSeq) lsFetchLive(failed,(attempt||0)+1); },5000);
}
function lsPaint(pid){
  const c=S.lsLive[pid]; if(!c) return;
  (S.branchList||[]).forEach(b=>{
    const el=document.getElementById('lsb-'+pid+'-'+b.id); if(!el) return;
    if(c.err){ el.textContent='⚠️'; el.className='ls-wait'; el.removeAttribute('title'); return; }
    const bo=(c.data.branches||[]).find(x=>String(x.id)===String(b.id))||{};
    const q=bo.qty||0; const r=lsResvAttr(bo);
    el.innerHTML=q+r.dot; el.className=q>0?'ls-has':(q<0?'ls-neg':'ls-zero');
    el.style.background=r.style?r.style.replace(/^;background:/,'').split(';')[0]:'';
    el.style.borderRadius=r.style?'8px':'';
    if(r.title){ el.title=r.title.replace(/^title="|"$/g,''); } else el.removeAttribute('title');
  });
  const t=document.getElementById('lst-'+pid);
  if(t) t.textContent=c.err?'🔁 מנסה שוב…':('🟢 '+fmtClock(c.data.fetched_at));
}

function wcQuickSel(name,opt){
  const Q=S._wcQuick; if(!Q) return;
  Q.sel[name]=opt;
  // התאמה אוטומטית (כמו באתר): אם הצירוף לא קיים — מצמידים את שאר המאפיינים
  // לצירוף הקיים הקרוב ביותר ששומר על מה שנלחץ עכשיו
  const v=Q.d.variants;
  if(v){
    const exact=(v.options||[]).some(c=>v.switch_attrs.every(sa=>String(c.attrs[sa.name]||'')===String(Q.sel[sa.name]||'')));
    if(!exact){
      const withClicked=(v.options||[]).filter(c=>String(c.attrs[name]||'')===String(opt));
      if(withClicked.length){
        let best=withClicked[0], bestScore=-1;
        withClicked.forEach(c=>{
          const score=v.switch_attrs.reduce((a,sa)=>a+(String(c.attrs[sa.name]||'')===String(Q.sel[sa.name]||'')?1:0),0);
          if(score>bestScore){ bestScore=score; best=c; }
        });
        v.switch_attrs.forEach(sa=>{ Q.sel[sa.name]=best.attrs[sa.name]||''; });
      }
    }
  }
  renderWcQuick();
}

// עדכון רק של אזור התוצאות — בלי לגעת בשדה החיפוש (כדי שמקלדת iOS לא תתאפס בכל הקלדה)
function lsUpdateResults(){
  const box=document.getElementById('lsResults'); if(!box) return;
  const cat=S.lsCat||[];
  const items=lsFiltered();
  const shown=(items||[]).slice(0,LS_SHOW_CAP);
  const liveCount=Math.min(shown.length,LS_LIVE_CAP);
  let body='';
  if(!cat.length)
    body=`<div class="empty">⏳ קטלוג החיפוש עוד לא נבנה — נסה שוב בעוד ~דקה<br><button class="btn-ghost" style="margin-top:10px" onclick="loadLiveCatalog(true)">טען שוב</button></div>`;
  else if(items===null)
    body=`<div class="empty">🔎 הקלד שם מוצר / מק״ט / ברקוד / סריאל — הרשימה מצטמצמת תוך כדי הקלדה</div>`;
  else if(!items.length){
    const isNum=/^\d{3,}$/.test(fixHebrewLayout((S.lsQuery||'').trim()));
    body=`<div class="empty">${isNum?'מחפש לפי מספר סידורי…':'לא נמצאו מוצרים מתאימים'}</div>`;
  } else {

    const capNote=items.length>LS_LIVE_CAP?`<div class="muted" style="margin-bottom:8px;font-size:13px">⚡ מלאי חי מוצג ל-${liveCount} הראשונים — צמצם את החיפוש לתצוגה חיה מלאה</div>`:'';
    const overNote=items.length>LS_SHOW_CAP?`<div class="muted" style="margin-top:8px">מציג ${LS_SHOW_CAP} מתוך ${items.length} — צמצם את החיפוש</div>`:'';
    body=isMobile
      ?`${capNote}<div class="ls-cards">${shown.map((it,i)=>lsCard(it,i<LS_LIVE_CAP)).join('')}</div>${overNote}`
      :`${capNote}<table class="admin"><thead><tr>
      <th>מק״ט</th><th>מוצר</th><th>סוג</th><th>קטגוריה</th>
      ${(S.branchList||[]).map(b=>`<th style="text-align:center">${b.name}</th>`).join('')}
      <th style="text-align:center">אתר</th><th>עדכון</th>
    </tr></thead><tbody>${shown.map((it,i)=>lsRow(it,i<LS_LIVE_CAP)).join('')}</tbody></table>${overNote}`;
  }
  box.innerHTML=body;
  const cnt=document.getElementById('lsCount'); if(cnt) cnt.textContent=items?`מציג ${shown.length} מתוך ${items.length}`:'';
  // עדכון כפתור הניקוי לפי המצב (בלי לבנות מחדש את ה-input)
  const wrap=document.querySelector('.ls-searchwrap');
  if(wrap){ let x=wrap.querySelector('.ls-clear');
    if(S.lsQuery&&!x){ x=document.createElement('button'); x.className='ls-clear'; x.title='נקה חיפוש'; x.textContent='✕'; x.onclick=()=>setLsQuery(''); wrap.appendChild(x); }
    else if(!S.lsQuery&&x){ x.remove(); } }
  if(items&&shown.length) lsScheduleLive(shown.slice(0,LS_LIVE_CAP));
  lsMaybeSerial((S.lsQuery||'').trim());
}
// סטטוס דינמי לסריאל: בהעברה / משוריין (מ-DB שלנו) — גובר על "זמין"
function dynStatusHtml(s){
  if(!s||!s.dyn_kind) return '';
  if(s.dyn_kind==='transit') return `<span style="color:var(--amber);font-weight:800;display:inline-flex;align-items:center;gap:4px">${ico('truck',12)} בהעברה ל${s.dyn_branch||'?'}</span>`;
  if(s.dyn_kind==='reserved') return `<span style="color:var(--blue);font-weight:800;display:inline-flex;align-items:center;gap:4px">${ico('radio',12)} משוריין ל${s.dyn_branch||'?'}</span>`;

async function openLiveDetail(pid,focusBranch){
  const it=(S.lsCat||[]).find(x=>String(x.product_id)===String(pid)); if(!it) return;
  showLoading('קורא מלאי חי מהקופה…');

  try{ d=await api('/api/admin/live-stock/'+encodeURIComponent(pid)+(it.kind==='serial'?'?serials=1':''),null,45000); }catch(e){}

function lsDetailFilter(bid){
  const D=S._lsDetail; if(!D) return;

}
async function refreshLiveDetail(){
  const D=S._lsDetail; if(!D) return;
  showLoading('מרענן מהקופה…');
  try{ const d=await api('/api/admin/live-stock/'+encodeURIComponent(D.it.product_id)+'?fresh=1'+(D.it.kind==='serial'?'&serials=1':''),null,45000);
    D.d=d; S.lsLive[String(D.it.product_id)]={at:Date.now(),data:d}; }
  catch(e){ toast('שגיאה ברענון',false); }
  hideLoading(); renderLiveDetail();
}
function renderLiveDetail(){
  const D=S._lsDetail; if(!D) return;
  const {it,d}=D;
  const hitSet=new Set((S.lsSerialHits||[]).filter(h=>String(h.product_id)===String(it.product_id)).map(h=>String(h.serial)));
  const chipClickable=it.kind!=='serial';   // במוצרי ברקוד הקוביות עצמן פותחות בקשת העברה
  const chips=(d.branches||[]).map(b=>{
    const q=b.qty||0, cls=q>0?'q-has':(q<0?'q-neg':'q-zero');
    // מוצר סריאלי: לחיצה על סניף מסננת את טבלת הסריאלים+אחריות לסניף הזה
    const click=(it.kind==='serial')
      ?` style="cursor:pointer${D.filterBranch===b.id?';outline:2px solid var(--green);border-radius:9px':''}" onclick="lsDetailFilter(${b.id})" title="הצג את הסריאלים של ${b.name}"`
      :((chipClickable&&q>0)?` style="cursor:pointer" onclick="lsQtyTransfer(${b.id},${q})" title="בקשת העברה מ${b.name}"`:'');
    return `<div class="ls-bchip"${click}>${b.name} <b class="${cls}">${q}</b></div>`;
  }).join('');
  let serHtml='';
  if(it.kind==='serial'){
    if(d.serials_error) serHtml='<div class="muted">⚠️ לא ניתן לקרוא את הסריאלים כרגע</div>';
    else if(!(d.serials||[]).length) serHtml='<div class="muted">אין יחידות סריאליות זמינות בקופה</div>';
    else{
      // קיבוץ לפי סניף (בסדר הצ'יפים), ובתוך כל סניף לפי תאריך קליטה
      const bOrder={}; (d.branches||[]).forEach((b,i)=>bOrder[String(b.id)]=i);
      const sorted=d.serials.slice().sort((a,b)=>
        ((bOrder[String(a.branch_id)]!==undefined?bOrder[String(a.branch_id)]:99)-(bOrder[String(b.branch_id)]!==undefined?bOrder[String(b.branch_id)]:99))
        ||String(a.insert_date).localeCompare(String(b.insert_date))
        ||String(a.serial).localeCompare(String(b.serial)));
      const view=(D.filterBranch!=null)?sorted.filter(s=>Number(s.branch_id)===D.filterBranch):sorted;
      D.sorted=view;
      serHtml=`<div style="font-weight:700;margin-bottom:6px;display:flex;align-items:center;gap:10px">
        <span>יחידות בקופה (${view.length}${D.filterBranch!=null?(' מתוך '+d.serials.length):''})</span>
        ${D.filterBranch!=null?`<span class="muted" style="font-size:12.5px;font-weight:400">מציג רק את <b>${lsBranchName(D.filterBranch)}</b></span>
        <button class="btn-ghost" style="padding:3px 10px;font-size:12px" onclick="lsDetailFilter(${D.filterBranch})">הצג הכל</button>`:''}</div>
      ${(()=>{S._lsBd={}; S._lsBdUsed={}; (d.branches||[]).forEach(b=>{ if(b.dyn_kind&&!['transit'].includes('')) S._lsBd[String(b.id)]=b; }); return '';})()}
      ${view.length?'':'<div class="muted" style="margin:6px 0 10px">אין יחידות זמינות בסניף הזה</div>'}
      <table class="serials"><thead><tr><th>סריאל</th><th>סניף</th><th>נקלט</th><th>ספק</th><th>אחריות</th><th>סטטוס</th></tr></thead><tbody>
      ${view.map((s,i)=>{
        let st=dynStatusHtml(s);
        if(!st && s.status===1){
          const bd=(S._lsBd||{})[String(s.branch_id)];
          const used=(S._lsBdUsed[String(s.branch_id)]=S._lsBdUsed[String(s.branch_id)]||{n:0});
          if(bd && used.n<Number(bd.dyn_n||0)){
            used.n++;
            st=`<span style="color:var(--blue);font-weight:700;display:inline-flex;align-items:center;gap:4px" title="בקשת העברה פתוחה מהסניף (${bd.dyn_n} יח׳) — הסניף בוחר את היחידה בפועל">${ico(bd.dyn_kind==='transit'?'truck':'radio',12)} ${bd.dyn_kind==='transit'?'בהעברה':'משוריין'} ל${bd.dyn_to||'?'}</span>`;
          } else st='<span style="color:var(--green);font-weight:700">זמין</span>';
        } else if(!st) st='סטטוס '+s.status;
        const dt=s.insert_date?new Date(s.insert_date):null;
        const ds=dt&&!isNaN(dt)?dt.toLocaleDateString('he-IL'):'';
        const war=(s.warranty||'—')+(s.warranty_months?(' · '+Math.round(s.warranty_months)+' ח׳'):'');
        const mark=hitSet.has(String(s.serial))?' style="background:rgba(31,191,107,.10)"':'';
        return `<tr class="srow"${mark} onclick="lsSerialTransfer(${i})" title="בקשת העברה לסניף אחר">
          <td style="direction:ltr;text-align:right;font-family:monospace">${s.serial}</td>
          <td style="font-weight:700">${s.branch_name||s.branch_id||''}</td><td>${ds}</td>
          <td>${s.supplier||'—'}</td><td>${war}</td><td>${st}</td></tr>`;
      }).join('')}</tbody></table>
      <div class="muted" style="font-size:12px;margin-top:6px"><span style="display:inline-flex;vertical-align:-2px">${ico('radio',12)}</span> לחיצה על שורת סריאל — בקשת העברה לסניף אחר</div>`;
    }
  }
  document.getElementById('modalRoot').innerHTML=`<div class="overlay"><div class="modal" style="max-width:940px;text-align:right;max-height:84vh;overflow:auto">
    <h3 style="margin-bottom:2px">${it.name}</h3>
    <div class="muted" style="font-family:monospace;direction:ltr;text-align:right">${it.product_id}${it.barcode?(' · '+it.barcode):''}</div>
    <div style="display:flex;align-items:center;gap:10px;margin:10px 0 4px">
      <span class="ls-live"><span class="dot"></span> חי מהקופה · ${fmtClock(d.fetched_at)}</span>
      <button class="btn-ghost" style="padding:5px 10px;font-size:12px" onclick="refreshLiveDetail()">🔄 רענן</button>
    </div>
    <div class="ls-chipline">${chips}</div>
    ${chipClickable?`<div class="muted" style="font-size:12px;margin:-6px 0 10px"><span style="display:inline-flex;vertical-align:-2px">${ico('radio',12)}</span> לחיצה על סניף עם מלאי — בקשת העברה ממנו</div>`:''}
    ${serHtml}
    <div style="display:flex;margin-top:14px"><button class="btn-ghost" style="flex:1" onclick="closeModal()">סגור</button></div>
  </div></div>`;
}

// ── בקשת העברה מתוך מלאי חי: סריאל ספציפי או כמות ממוצר ברקוד ──
// משתמש במנגנון הקיים: שורת transfer_plan + שידור 📡 ללוח הקליטה של הסניף המחזיק.
function lsBranchName(id){ const b=(S.branchList||[]).find(x=>String(x.id)===String(id)); return b?b.name:String(id); }
function lsSerialTransfer(i){
  const D=S._lsDetail; if(!D||!D.sorted) return;
  const s=D.sorted[i]; if(!s||!s.branch_id) return;
  lsTransferDialog({
    title:'בקשת העברת מכשיר', sub:D.it.name,
    info:`סריאל <b style="font-family:monospace;direction:ltr;unicode-bidi:embed">${s.serial}</b> · נמצא ב<b>${s.branch_name}</b>`,
    from:s.branch_id, maxQty:1, fixedQty:true,
    line:(to)=>({product_id:String(D.it.product_id), name:`${D.it.name} — סריאל ${s.serial}`,
                 from_branch:Number(s.branch_id), to_branch:to, qty:1, serial:String(s.serial)})
  });
}
function lsQtyTransfer(bid,avail){
  const D=S._lsDetail; if(!D) return;
  lsTransferDialog({
    title:'בקשת העברת מלאי', sub:D.it.name,
    info:`מ<b>${lsBranchName(bid)}</b> · זמין: <b>${avail}</b>`,
    from:bid, maxQty:Math.max(1,Math.floor(avail)), fixedQty:false,
    line:(to,qty)=>({product_id:String(D.it.product_id), name:D.it.name,
                     from_branch:Number(bid), to_branch:to, qty})
  });
}
function lsTransferDialog(cfg){
  S._lsTransfer=cfg;
  const opts=(S.branchList||[]).filter(b=>Number(b.id)!==Number(cfg.from))
    .map(b=>`<option value="${b.id}">${b.name}</option>`).join('');
  document.getElementById('modalRoot').innerHTML=`<div class="overlay"><div class="modal" style="max-width:460px;text-align:right">
    <h3 style="text-align:center;display:flex;align-items:center;justify-content:center;gap:7px">${ico('radio',16)} ${cfg.title}</h3>
    <div style="text-align:center;font-weight:700">${cfg.sub}</div>
    <div class="muted" style="text-align:center;margin:6px 0 14px;font-size:14px">${cfg.info}</div>
    ${cfg.fixedQty?'':`<div style="display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:12px">
      <span>כמות:</span><input id="ltQty" type="number" min="1" max="${cfg.maxQty}" value="1" style="width:90px;font-size:18px;text-align:center;margin:0"></div>`}
    <div style="display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:16px">
      <span>העבר אל:</span>
      <select id="ltTo" style="font-family:inherit;font-size:16px;padding:9px 14px;border-radius:10px;border:1px solid var(--line);background:var(--card2);color:var(--txt)">${opts}</select>
    </div>
    <div style="display:flex;gap:8px">
      <button class="btn-primary" style="flex:1" onclick="lsSendTransfer()">שלח בקשה</button>
      <button class="btn-ghost" onclick="renderLiveDetail()">ביטול</button>
    </div>
    <div class="muted" style="text-align:center;font-size:12px;margin-top:10px">הבקשה תקפוץ בלוח הקליטה של הסניף המחזיק ותתווסף לטאב 📝 בקשות העברה</div>
  </div></div>`;
}
async function lsSendTransfer(){
  const cfg=S._lsTransfer; if(!cfg) return;
  const to=Number(document.getElementById('ltTo').value);
  let qty=1;
  if(!cfg.fixedQty) qty=Math.max(1,Math.min(cfg.maxQty,parseInt(document.getElementById('ltQty').value)||1));
  const line=cfg.line(to,qty);
  showLoading('שולח בקשה…');
  try{
    const r=await api('/api/admin/plan',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({lines:[line]})});
    if(r&&r.pending){
      // העברה בין שני סניפים אחרים — נשלחה לאישור מנהל בטלגרם ותשודר אוטומטית עם האישור
      toast('הבקשה נשלחה לאישור מנהל 📲 — תשודר אוטומטית כשתאושר',true);
    } else {
      // שידור ממוקד — רק השורות שנוספו עכשיו (מצטרפות לטייל של אותו יעד אם כבר קיים)
      await api('/api/admin/broadcast',{method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({branch_id:Number(cfg.from), line_ids:(r&&r.ids)||null})});
      toast('הבקשה שודרה לסניף '+lsBranchName(cfg.from),true);
    }
  }catch(e){ toast('שגיאה בשליחת הבקשה',false); }
  hideLoading();
  S._lsTransfer=null;
  renderLiveDetail();
}

function wcoFmtD(d){ if(!d) return ''; const x=new Date(d+'T00:00:00'); return isNaN(x)?d:x.toLocaleDateString('he-IL'); }

function wcoCalToggle(){
  const el=document.getElementById('wcoCal'); if(!el) return;
  if(el.style.display!=='none'){ el.style.display='none'; return; }
  const W=S.wco;
  W.calMonth=W.calMonth||new Date().toISOString().slice(0,7);   // YYYY-MM
  W.calPick=null;
  el.style.display='block';
  wcoCalPaint();
}
function wcoCalPaint(){
  const el=document.getElementById('wcoCal'); if(!el) return;
  const W=S.wco;
  const [y,m]=W.calMonth.split('-').map(Number);
  const first=new Date(y,m-1,1), days=new Date(y,m,0).getDate();
  const pad=(first.getDay())%7;                  // ראשון=0 — השבוע העברי
  const today=new Date().toISOString().slice(0,10);
  const dstr=d=>`${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
  const inRange=ds=>W.after&&W.before&&ds>=W.after&&ds<=W.before;
  let cells='';
  for(let i=0;i<pad;i++) cells+='<span></span>';
  for(let d=1;d<=days;d++){
    const ds=dstr(d);
    const sel=(W.calPick===ds)||(W.after===ds&&!W.calPick)||(W.before===ds&&!W.calPick);
    cells+=`<button class="wco-day ${sel?'sel':''} ${inRange(ds)&&!W.calPick?'rng':''} ${ds===today?'today':''}"
      onclick="wcoCalPick('${ds}')">${d}</button>`;
  }
  const mName=new Date(y,m-1,1).toLocaleDateString('he-IL',{month:'long',year:'numeric'});
  el.innerHTML=`<div style="position:absolute;top:0;inset-inline-start:0;z-index:60;background:var(--card);border:1px solid var(--line);border-radius:14px;box-shadow:0 12px 40px rgba(0,0,0,.25);padding:12px;width:286px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
      <button class="btn-ghost" style="padding:3px 10px" onclick="wcoCalNav(1)">‹</button>
      <b style="font-size:14px">${mName}</b>
      <button class="btn-ghost" style="padding:3px 10px" onclick="wcoCalNav(-1)">›</button>
    </div>
    <div class="muted" style="display:grid;grid-template-columns:repeat(7,1fr);text-align:center;font-size:11px;margin-bottom:4px">
      <span>א</span><span>ב</span><span>ג</span><span>ד</span><span>ה</span><span>ו</span><span>ש</span></div>
    <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px">${cells}</div>
    <div class="muted" style="font-size:11px;margin-top:8px;text-align:center">${W.calPick?'בחר עד-תאריך (אותו יום = יום בודד)':'בחר מ-תאריך'}</div>
  </div>`;
}
function wcoCalNav(dir){
  const W=S.wco; const [y,m]=W.calMonth.split('-').map(Number);
  const nd=new Date(y, m-1+dir, 1);
  W.calMonth=`${nd.getFullYear()}-${String(nd.getMonth()+1).padStart(2,'0')}`;
  wcoCalPaint();
}
function wcoCalPick(ds){
  const W=S.wco;
  if(!W.calPick){ W.calPick=ds; wcoCalPaint(); return; }
  let a=W.calPick, b=ds;
  if(b<a){ const t=a; a=b; b=t; }
  W.after=a; W.before=b; W.calPick=null; W.page=1;
  loadWcOrders(); renderWcOrders();
}

      <button class="btn-primary" style="padding:8px 14px" onclick="wcoSetStatus(${d.id})">עדכן סטטוס</button>
      <a class="btn-ghost" style="text-decoration:none;padding:8px 12px" target="_blank" href="${escW(d.admin_url)}">פתח ב-WC ↗</a>
      ${d.cargo?`<button class="btn-ghost" style="padding:8px 12px;border-color:#0369a1;color:#0369a1;display:inline-flex;align-items:center;gap:6px" onclick="wcoCargoLabel(${d.id})">${ico('truck',14)} תווית Cargo</button>`
        :`<button class="btn-ghost" style="padding:8px 12px;border-color:#0369a1;color:#0369a1;display:inline-flex;align-items:center;gap:6px" onclick="wcoCargoCreate(${d.id},${(d.ship_tag||'').includes('tlv')?'true':'false'})">${ico('truck',14)} צור משלוח Cargo</button>`}
      ${['cancelled','failed','refunded'].includes(d.status)?`<button class="btn-ghost" style="padding:8px 12px;border-color:#b91c1c;color:#b91c1c;display:inline-flex;align-items:center;gap:6px" onclick="wcoTrash(${d.id})">${ico('trash',14)} העבר לפח</button>`:''}
    </div>
    <div style="display:flex;gap:8px;margin-top:12px">
      <input id="wcoNote" placeholder="הוסף הערה פנימית להזמנה…" style="flex:1;min-width:0;padding:8px 10px;border-radius:9px;border:1px solid var(--line);background:var(--bg);color:var(--txt);font-size:13px"
             onkeydown="if(event.key==='Enter')wcoAddNote(${d.id})">
      <button class="btn-ghost" onclick="wcoAddNote(${d.id})">➕</button>
    </div>
  </div></div>`;
}
async function wcoCargoCreate(oid,pickup){
  if(!confirm('ליצור משלוח Cargo להזמנה זו'+(pickup?' (נקודת איסוף)':'')+'?')) return;
  showLoading('יוצר משלוח ב-Cargo…');
  try{
    const r=await api('/api/admin/orders/'+oid+'/cargo',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({pickup:!!pickup})},120000);
    toast(r.existing?'כבר קיים משלוח להזמנה ✓':'המשלוח נוצר ב-Cargo ✓',true);
    if(r.pdf) window.open(r.pdf,'_blank');
    openWcOrder(oid);
  }catch(e){ toast('יצירת המשלוח נכשלה — ודא שתוסף הגשר מותקן',false); }
  hideLoading();
}
async function wcoCargoLabel(oid){
  showLoading('מביא תווית…');
  try{
    const r=await api('/api/admin/orders/'+oid+'/cargo-label',null,60000);
    if(r.pdf) window.open(r.pdf,'_blank');
    else toast('אין תווית זמינה',false);
  }catch(e){ toast('התווית לא זמינה',false); }
  hideLoading();
}
async function wcoTrash(oid){
  // אישור כפול — מחיקה לפח (שחזור אפשרי מתוך WC, אבל לא מכאן)
  if(!confirm('להעביר את ההזמנה לפח?')) return;
  if(!confirm('אישור נוסף: ההזמנה תוסר מהרשימות. להמשיך?')) return;
  showLoading('מעביר לפח…');
  try{
    await api('/api/admin/orders/'+oid,{method:'DELETE'},45000);
    toast('ההזמנה הועברה לפח ✓',true);
    closeModal(); loadWcOrders();
  }catch(e){ toast(e.status===400?'אפשר להעביר לפח רק הזמנות שבוטלו/נכשלו':'ההעברה לפח נכשלה',false); }
  hideLoading();
}
async function wcoSetStatus(oid){
  const st=(document.getElementById('wcoSt')||{}).value; if(!st) return;
  showLoading('מעדכן סטטוס…');
  try{
    await api('/api/admin/orders/'+oid+'/status',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({status:st})},45000);
    toast('הסטטוס עודכן ✓',true);
    closeModal(); loadWcOrders();
  }catch(e){ toast('עדכון הסטטוס נכשל',false); }
  hideLoading();
}
async function wcoAddNote(oid){
  const el=document.getElementById('wcoNote'); const note=(el&&el.value||'').trim(); if(!note) return;
  try{
    await api('/api/admin/orders/'+oid+'/note',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({note})},30000);
    toast('ההערה נוספה ✓',true); if(el) el.value='';
    openWcOrder(oid);
  }catch(e){ toast('הוספת ההערה נכשלה',false); }
}
function renderAdmin(){
  if(S.adminTab==='live') return S.lsCat?renderLive():loadLiveCatalog(true);
  if(S.adminTab==='wa') return S.waConvs?renderWa():loadWa(true);
  if(S.adminTab==='rebalance') return S.rebalanceData?renderRebalance():loadRebalance(true);
  if(S.adminTab==='plan') return S.planData?renderPlan():loadPlan(true);
  if(S.adminTab==='reco') return S.recoData?renderReco():loadReco(true);
  if(S.adminTab==='order') return S.orderData?renderOrder():loadOrder(true);
  if(S.adminTab==='removals') return S.removalsData?renderRemovals():loadRemovals(true);
  if(S.adminTab==='wcorders') return renderWcOrders();
  const app=document.getElementById('app');
  const f=S.adminFilters;
  const data=S.adminData||{summary:{},transfers:[],misroutes:[]};
  const s=data.summary||{}, order={in_transit:0,partial:1,received:2,closed:3};
  let rows=(data.transfers||[]).slice(); const total=rows.length;
  if(f.q){
    const raw=f.q.trim().toLowerCase();
    const fixed=fixHebrewLayout(f.q.trim()).toLowerCase();   // גם אם הוקלד סריאל במקלדת עברית
    rows=rows.filter(t=>{
      const blob=(String(t.op_id)+' '+t.from_branch_name+' '+t.to_branch_name+' '+(t.employee||'')+' '+
                  ((t.receivers||[]).join(' '))+' '+(t.items_search||'')).toLowerCase();
      return blob.includes(raw) || (fixed && blob.includes(fixed));
    });
  }
  if(f.from) rows=rows.filter(t=>String(t.from_branch_id)===String(f.from));
  if(f.to)   rows=rows.filter(t=>String(t.to_branch_id)===String(f.to));
  if(f.fromDate) rows=rows.filter(t=>(t.created_at||'').slice(0,10) >= f.fromDate);
  if(f.toDate)   rows=rows.filter(t=>(t.created_at||'').slice(0,10) <= f.toDate);
  if(f.status==='overdue') rows=rows.filter(t=>t.overdue);
  else if(f.status) rows=rows.filter(t=>t.status===f.status);
  // החדשים למעלה (לפי תאריך ההעברה, יורד)
  rows.sort((a,b)=> String(b.created_at||'').localeCompare(String(a.created_at||'')));
  const chip=(key,count,label,danger)=>`<div class="chip ${danger?'danger':''} ${f.status===key?'active':''}" onclick="setStatusChip('${key}')"><b>${count||0}</b><span>${label}</span></div>`;
  const active = f.q||f.from||f.to||f.status||f.fromDate||f.toDate;
  const misroutes=data.misroutes||[];
  app.innerHTML=`
    <h1 class="title">🛠️ ניהול אופרציה — כל הסניפים</h1>
    ${adminTabsHTML()}
    ${misroutes.length?`<div class="mis-alert">
      <div class="mis-title">🚩 מכשירים לא במקום (${misroutes.length})</div>
      <div class="muted" style="margin-bottom:10px;font-size:13px">מכשירים שנסרקו בסניף שאינו הסניף שאליו הם משויכים בקופה. ייסגר אוטומטית כשייקלטו בסניף הנכון.</div>
      <table class="admin"><thead><tr>
        <th>סריאל</th><th>מוצר</th><th>הגיע לסניף</th><th>שייך לסניף</th><th>נסרק ע״י</th><th>מתי</th><th></th>
      </tr></thead><tbody>${misroutes.map(misRow).join('')}</tbody></table>
    </div>`:''}
    <div class="chips">
      ${chip('overdue',s.overdue,'באיחור (24ש׳+)',true)}
      ${chip('in_transit',s.in_transit,'ממתינים לסריקה')}
      ${chip('partial',s.partial,'בסריקה חלקית')}
      ${chip('received',s.received,'נקלטו')}
    </div>
    <div class="filters">
      <input id="fq" placeholder="🔎 חיפוש — פעולה / עובד / סריאל / ברקוד" value="${f.q||''}" oninput="setFilter('q',this.value)">
      <select onchange="setFilter('from',this.value)" title="סניף מקור">${branchOpts(f.from,'מקור — הכל')}</select>
      <span class="muted">→</span>
      <select onchange="setFilter('to',this.value)" title="סניף יעד">${branchOpts(f.to,'יעד — הכל')}</select>
      <label class="dlabel">מתאריך <input type="date" value="${f.fromDate}" onchange="setFilter('fromDate',this.value)"></label>
      <label class="dlabel">עד <input type="date" value="${f.toDate}" onchange="setFilter('toDate',this.value)"></label>
      ${active?`<button class="btn-ghost" onclick="clearFilters()">נקה ✕</button>`:''}
      <span class="muted" style="margin-inline-start:auto">מציג <b>${rows.length}</b> מתוך ${total}</span>
    </div>
    ${rows.length?`<table class="admin"><thead><tr>
      <th>סטטוס</th><th>פעולה</th><th>מסלול</th><th>הועבר</th><th>יצר</th><th>נקלט</th><th>קלט ע״י</th><th>התקבל</th>
    </tr></thead><tbody>${rows.map(adminRow).join('')}</tbody></table>`
    :'<div class="empty">אין העברות שתואמות לסינון</div>'}`;
  if(S._refocusFilter){ const fq=document.getElementById('fq'); if(fq){ fq.focus(); const v=fq.value; fq.value=''; fq.value=v; } S._refocusFilter=false; }
}
function fmtAge(h){ h=h||0; if(h<1)return Math.round(h*60)+' דק׳'; if(h<48)return Math.round(h)+'ש׳'; return Math.round(h/24)+' ימים'; }
function adminRow(t){
  return `<tr class="${t.overdue?'overdue':''}" onclick="adminOpen('${t.op_id}')">
    <td><span class="pill ${t.status}">${STATUS[t.status]||t.status}</span></td>
    <td><b>${t.op_id}</b> ${t.overdue?'<span class="badge-late">באיחור 24ש׳+</span>':''}${t.missing_count?` <span class="badge-late">✗ ${t.missing_count} חוסר</span>`:''}${t.redirected_count?` <span class="badge-manual">↪ ${t.redirected_count} הופנה</span>`:''}</td>
    <td>${t.from_branch_name} → ${t.to_branch_name}</td>
    <td>${fmtTime(t.created_at)}</td>
    <td>${t.employee||'—'}</td>
    <td class="prog-cell">${t.received_units}/${t.total_units}</td>
    <td>${(t.receivers&&t.receivers.length)?t.receivers.join(', '):'—'}${t.manual_count?` <span class="badge-manual">⌨️ ${t.manual_count} לא בסורק</span>`:''}</td>
    <td>${t.status==='received'&&t.received_at?fmtTime(t.received_at):'—'}</td>
  </tr>`;
}
function misRow(m){
  return `<tr>
    <td style="font-family:monospace;direction:ltr;text-align:right">${m.serial}</td>
    <td>${m.product_name||''}</td>
    <td>${m.scanned_branch_name||''}</td>
    <td><b style="color:var(--red)">${m.expected_branch_name||''}</b></td>
    <td>${m.scanned_by||'—'}</td>
    <td>${fmtTime(m.created_at)}</td>
    <td><button class="btn-ghost" onclick="resolveMisroute(${m.id})">סמן כטופל</button></td>
  </tr>`;
}
async function resolveMisroute(id){
  showLoading('סוגר חריגה…');
  try{ await api('/api/admin/misroute/'+id+'/resolve',{method:'POST'}); }catch(e){}
  await loadAdmin(false); hideLoading();
}
async function adminOpen(opId){
  showLoading();
  try{ S.op=await api('/api/transfers/'+opId); }catch(e){ hideLoading(); return; }
  hideLoading(); S._fromAdmin=true; S.view='scan'; render();
}

// ── התראות רקע: בודק העברות נכנסות חדשות בכל מצב (גם אם לא על מסך הלוח) ──
function startNotifPoll(){ clearInterval(S.notifTimer);
  S.notifTimer=setInterval(async()=>{
    if(!S.branchId) return;
    // 💬 התראות וואטסאפ — רק במחשב הניהול (סניף אתר + סיסמה), גם כשלא בטאב
    const isAdminPC=S.cfg&&Number(S.branchId)===S.cfg.admin_branch_id&&(!S.cfg.admin_required||S.adminKey);
    if(isAdminPC && !(S.view==='admin'&&S.adminTab==='wa')){   // בטאב עצמו loadWaSilent כבר מטפל
      try{ const d=await api('/api/admin/wa/conversations');
           S.waConvs=d.conversations||[]; updateWaBadge(S.waConvs); }catch(e){}
    }
    // 🎉 הזמנות חדשות מהאתר — רק במחשב הניהול (cache-buster נגד קאש edge)
    if(isAdminPC){
      try{ const od=await api('/api/admin/orders/latest?t='+Date.now()); detectNewOrders(od.orders||[]); }catch(e){}
    }
    let list; try{ list=await api('/api/transfers?branch_id='+S.branchId); }catch(e){ return; }
    detectNewTransfers(list);
    let bc; try{ bc=await api('/api/broadcast?branch_id='+S.branchId); }catch(e){ return; }
    detectBroadcast(bc);
  }, 20000); }

// ── polling רקע ──
function startPoll(){ clearInterval(S.pollTimer);
  S.pollTimer=setInterval(()=>{ const a=document.getElementById('app');
    if(S.view==='board'){
      if(S.branchTab==='live'||S.branchTab==='wcorders') return;   // טאבים עם חיפוש/עריכה — אין רענון לוח שידרוס
      // לא מרעננים תוך כדי הקלדה/סריקה פעילה כדי לא לשבש
      const bs=document.getElementById('boardScan');
      if(bs && document.activeElement===bs && bs.value) return;
      renderBoard(a, true);
    } else if(S.view==='admin'){
      if(S.adminTab==='wa'){ waPollTick(); return; }   // וואטסאפ: רענון שקט של רשימה+שיחה
      if(['rebalance','reco','order','removals','live','wcorders'].includes(S.adminTab)) return;   // נתונים מחושבים/עריכה/חיפוש חי — לא מרעננים אוטומטית
      const ae=document.activeElement;   // אל תרענן תוך כדי שימוש בסינון
      if(ae && ae.closest && ae.closest('.filters')) return;
      loadAdmin(false);   // רענון שקט ברקע
    }
  },15000); }

// ── deep-link ?op= / ?wa=1&phone= ──
function waConvWhenReady(ph, tries){
  // פתיחת שיחה ברגע שהרשימה נטענה — בלי תלות במהירות העלייה (פתיחה קרה של PWA)
  tries=tries||0;
  if((S.waConvs||[]).length||tries>30){ try{ openWaConv(ph); }catch(e){} return; }
  setTimeout(()=>waConvWhenReady(ph,tries+1), 400);
}
async function handleDeepLink(){
  const q=new URLSearchParams(location.search);
  const op=q.get('op');
  if(op && S.branchId){ try{ await openScan(op); }catch(e){} }
  if(q.get('wa')==='1' && S.branchId){
    openWaTab();
    const ph=q.get('phone');
    if(ph) waConvWhenReady(ph);
  }
  if(q.get('orders')==='1' && S.branchId){ try{ openOrdersTab(); }catch(e){} }
}
// לחיצה על התראת push כשהאפליקציה כבר פתוחה — ה-SW שולח הודעה במקום reload
function navPhoneOf(d){
  // טלפון מהנתונים, או חילוץ מה-URL (התראות מגרסה ישנה נושאות אותו רק שם)
  if(d&&d.phone) return String(d.phone);
  try{ return new URLSearchParams(String(d&&d.url||'').split('?')[1]||'').get('phone')||''; }catch(e){ return ''; }
}
if('serviceWorker' in navigator){
  navigator.serviceWorker.addEventListener('message', (e)=>{
    const d=e.data||{};
    if(!S.branchId) return;
    if(d.type==='open-orders'){ try{ openOrdersTab(); }catch(e){} return; }
    if(d.type!=='open-wa') return;
    openWaTab();
    const ph=navPhoneOf(d);
    if(ph) waConvWhenReady(ph);
  });
}
// iOS מתעלם לעיתים מ-URL בהתראה — ה-SW שומר את היעד ב-IndexedDB ואנחנו קוראים אותו
// בעלייה ובכל חזרה לפוקוס (כיסוי לאפליקציה סגורה/ברקע כאחד)
function navPendingTake(){
  return new Promise((res)=>{
    try{
      const r=indexedDB.open('gm-nav',1);
      r.onupgradeneeded=()=>r.result.createObjectStore('kv');
      r.onsuccess=()=>{
        try{
          const tx=r.result.transaction('kv','readwrite');
          const st=tx.objectStore('kv');
          const g=st.get('pending');
          g.onsuccess=()=>{ const v=g.result; st.delete('pending'); res(v||null); };
          g.onerror=()=>res(null);
        }catch(e){ res(null); }
      };
      r.onerror=()=>res(null);
    }catch(e){ res(null); }
  });
}
async function navPendingApply(){
  const p=await navPendingTake();
  if(!p || !S.branchId || Date.now()-(p.at||0)>10*60*1000) return;
  // התראת הזמנה (url עם orders=1) → טאב ההזמנות; אחרת — שיחת וואטסאפ
  if(String(p.url||'').indexOf('orders=1')>=0){ try{ openOrdersTab(); }catch(e){} return; }
  const ph=navPhoneOf(p);
  openWaTab();
  if(ph) waConvWhenReady(ph);
}
document.addEventListener('visibilitychange', ()=>{ if(document.visibilityState==='visible'){ navPendingApply(); waBadgeClear(); } });
// ניקוי המונה האדום מאייקון האפליקציה כשנכנסים (iOS PWA)
function waBadgeClear(){ try{ if(navigator.clearAppBadge) navigator.clearAppBadge().catch(()=>{}); }catch(e){} }

// ── init ──
// שומר פוקוס על שדה הסריקה — אבל לא גונב בחירת טקסט (העתקת ברקוד/סריאל) או קליק על פריט
document.addEventListener('click', (e)=>{
  if(window.getSelection && String(window.getSelection()).trim()) return;   // המשתמש מסמן טקסט
  const t=e.target;
  if(t.closest && t.closest('.item, .serial, .sub, a, button, input, select, textarea, .arow, table, .drawer, .embed-frame')) return;
  focusScan();
});
async function bootApp(){
  try{ S.branchList=await (await fetchT('/api/branches',{},15000)).json(); }catch(e){}
  try{ render(); }catch(e){ hideLoading(); }
  applyTheme();
  waSWReady();   // רישום service worker (PWA/push) — לא חוסם
  if(S.branchId){ startPoll(); startNotifPoll(); handleDeepLink(); navPendingApply(); waBadgeClear(); }
}
(async()=>{
  loadState(); applyTheme();
  S.deviceToken=deviceToken();
  try{ S.cfg=await (await fetchT('/api/config',{},15000)).json(); }catch(e){}
  // רישום מכשיר שקט: מאושר/קיים → ממשיך רגיל; חדש לגמרי → מסך בקשת גישה
  try{
    const st=await deviceRegister('');
    if(st==='pending') return devicePendingScreen('');
    if(st==='denied') return deviceDeniedScreen();
    return bootApp();                      // approved
  }catch(e){
    if(String(e.message||'').includes('שם')) return deviceAskScreen('');   // מכשיר חדש — נדרש שם
    return bootApp();                      // תקלת רשת/קולד-סטארט — ממשיכים; האכיפה בשרת תחליט
  }
})();
</script>
