    const avail=o=>(d.variants.options||[]).some(c=>String(c.attrs[sa.name]||'')===String(o)
      &&others.every(x=>String(c.attrs[x.name]||'')===String(sel[x.name]||'')));
    return `<div style="margin:10px 0 2px;text-align:center">
      <div class="muted" style="font-size:12px;margin-bottom:5px">${label}</div>
      <div style="display:flex;gap:6px;justify-content:center;flex-wrap:wrap">
        ${sa.options.map(o=>`<button class="wcq-btn ${String(sel[sa.name])===String(o)?'on':(avail(o)?'':'off')}" onclick='wcQuickSel(${JSON.stringify(sa.name)},${JSON.stringify(o)})'>${o}</button>`).join('')}
      </div></div>`;
  }).join('');
  const sale=cur.sale_price&&cur.sale_price!==''&&Number(cur.sale_price)<Number(cur.regular_price||0);
  const priceHtml=comboMissing?`<span class="muted">הצירוף הזה לא קיים באתר</span>`
    :(sale?`<span style="text-decoration:line-through;color:var(--muted);font-size:16px">${fmt(cur.regular_price)}</span> <b style="color:var(--green);font-size:26px">${fmt(cur.price)}</b>`
          :`<b style="color:var(--green);font-size:26px">${fmt(cur.price)}</b>`);
  const pos=d.pos_price!=null&&d.pos_price!==''?Number(d.pos_price):null;
  // השוואת מחיר קופה↔אתר — רלוונטית רק לוואריאציה שמחוברת למק"ט הזה בקופה
  let cmp='';
  if(!comboMissing){
    if(isPosVar){
      cmp=pos==null?''
        :(pos<=1?`<div class="muted" style="font-size:13px">מחיר בקופה לא מוגדר (מתומחר במכירה)</div>`
        :(Math.round(pos)===Math.round(Number(cur.price))
        ?`<div class="muted" style="font-size:13px">מחיר בקופה: ${fmt(pos)} <span style="color:var(--green);font-weight:800">✅ תואם</span></div>`
        :`<div style="font-size:13px;color:var(--red);font-weight:800">❗ מחיר בקופה: ${fmt(pos)} — פער מול האתר</div>`));
    } else {
      cmp=`<div class="muted" style="font-size:12px">וריאציה אחות באתר${cur.sku?` (מק״ט ${cur.sku})`:''} — המק״ט שבקופה הוא ${pid}</div>`;
    }
  }
  const body=`
    ${cur.image?`<div style="background:#fff;border-radius:14px;padding:10px;text-align:center;margin-bottom:12px;border:1px solid var(--line)"><img src="${cur.image}" style="max-height:200px;max-width:100%;object-fit:contain"></div>`:''}
    <div style="font-weight:800;font-size:17px;text-align:center">${d.name}</div>
    ${fixed?`<div class="muted" style="text-align:center;font-size:13px;margin-top:2px">${fixed}</div>`:''}
    ${switches}
    <div style="text-align:center;margin:10px 0 4px">${priceHtml}</div>
    <div style="text-align:center;margin-bottom:14px">${cmp}</div>
    <div style="display:flex;gap:8px">
      <a class="btn-primary" style="flex:1;display:flex;align-items:center;justify-content:center;text-decoration:none;padding:13px;border-radius:12px${comboMissing?';opacity:.4;pointer-events:none':''}" href="${cur.permalink}" target="_blank" rel="noopener">לעמוד המלא באתר ↗</a>
      ${isAdminCtx()?`<button class="btn-ghost" style="display:flex;align-items:center;gap:6px;border-color:#16a34a;color:#16a34a;padding:13px 16px;border-radius:12px" onclick='closeModal();waOrderOpen(${JSON.stringify(String(pid))})' title="צור הזמנה ללקוח">${ico('cart',16)} הזמנה</button>`:''}
    </div>`;
  document.getElementById('modalRoot').innerHTML=`<div class="overlay"><div class="modal" style="max-width:430px;text-align:right;position:relative;max-height:88vh;overflow:auto">
    <button class="dr-x" style="position:absolute;top:10px;inset-inline-start:10px" onclick="closeModal()">✕</button>
    ${body}
    <button class="btn-ghost" style="width:100%;margin-top:10px" onclick="closeModal()">סגור</button>
  </div></div>`;
}

// עדכון רק של אזור התוצאות — בלי לגעת בשדה החיפוש (כדי שמקלדת iOS לא תתאפס בכל הקלדה)
function lsUpdateResults(){
  const box=document.getElementById('lsResults'); if(!box) return;
  const cat=S.lsCat||[];
  const items=lsFiltered();
  const shown=(items||[]).slice(0,LS_SHOW_CAP);
  const liveCount=Math.min(shown.length,LS_LIVE_CAP);
  let body='';
  if(!cat.length)
    body=`<div class="empty">⏳ קטלוג החיפוש עוד לא נבנה — נסה שוב בעוד ~דקה<br><button class="btn-ghost" style="margin-top:10px" onclick="loadLiveCatalog(true)">טען שוב</button></div>`;
  else if(items===null)
    body=`<div class="empty">🔎 הקלד שם מוצר / מק״ט / ברקוד / סריאל — הרשימה מצטמצמת תוך כדי הקלדה</div>`;
  else if(!items.length){
    const isNum=/^\d{3,}$/.test(fixHebrewLayout((S.lsQuery||'').trim()));
    body=`<div class="empty">${isNum?'מחפש לפי מספר סידורי…':'לא נמצאו מוצרים מתאימים'}</div>`;
  } else {
    const isMobile=window.matchMedia('(max-width:760px)').matches;
    const capNote=items.length>LS_LIVE_CAP?`<div class="muted" style="margin-bottom:8px;font-size:13px">⚡ מלאי חי מוצג ל-${liveCount} הראשונים — צמצם את החיפוש לתצוגה חיה מלאה</div>`:'';
    const overNote=items.length>LS_SHOW_CAP?`<div class="muted" style="margin-top:8px">מציג ${LS_SHOW_CAP} מתוך ${items.length} — צמצם את החיפוש</div>`:'';
    body=isMobile
      ?`${capNote}<div class="ls-cards">${shown.map((it,i)=>lsCard(it,i<LS_LIVE_CAP)).join('')}</div>${overNote}`
      :`${capNote}<table class="admin"><thead><tr>
      <th>מק״ט</th><th>מוצר</th><th>סוג</th><th>קטגוריה</th>
      ${(S.branchList||[]).map(b=>`<th style="text-align:center">${b.name}</th>`).join('')}
      <th style="text-align:center">אתר</th><th>עדכון</th>
    </tr></thead><tbody>${shown.map((it,i)=>lsRow(it,i<LS_LIVE_CAP)).join('')}</tbody></table>${overNote}`;
  }
  box.innerHTML=body;
  const cnt=document.getElementById('lsCount'); if(cnt) cnt.textContent=items?`מציג ${shown.length} מתוך ${items.length}`:'';
  // עדכון כפתור הניקוי לפי המצב (בלי לבנות מחדש את ה-input)
  const wrap=document.querySelector('.ls-searchwrap');
  if(wrap){ let x=wrap.querySelector('.ls-clear');
    if(S.lsQuery&&!x){ x=document.createElement('button'); x.className='ls-clear'; x.title='נקה חיפוש'; x.textContent='✕'; x.onclick=()=>setLsQuery(''); wrap.appendChild(x); }
    else if(!S.lsQuery&&x){ x.remove(); } }
  if(items&&shown.length) lsScheduleLive(shown.slice(0,LS_LIVE_CAP));
  lsMaybeSerial((S.lsQuery||'').trim());
}
// סטטוס דינמי לסריאל: בהעברה / משוריין (מ-DB שלנו) — גובר על "זמין"
function dynStatusHtml(s){
  if(!s||!s.dyn_kind) return '';
  if(s.dyn_kind==='transit') return `<span style="color:var(--amber);font-weight:800;display:inline-flex;align-items:center;gap:4px">${ico('truck',12)} בהעברה ל${s.dyn_branch||'?'}</span>`;
  if(s.dyn_kind==='reserved') return `<span style="color:var(--blue);font-weight:800;display:inline-flex;align-items:center;gap:4px">${ico('radio',12)} משוריין ל${s.dyn_branch||'?'}</span>`;
  return '';
}
async function openLiveDetail(pid,focusBranch){
  const it=(S.lsCat||[]).find(x=>String(x.product_id)===String(pid)); if(!it) return;
  showLoading('קורא מלאי חי מהקופה…');
  let d=null;
  try{ d=await api('/api/admin/live-stock/'+encodeURIComponent(pid)+(it.kind==='serial'?'?serials=1':''),null,45000); }catch(e){}
  hideLoading();
  if(!d){ toast('לא ניתן לקרוא מהקופה כרגע',false); return; }
  S._lsDetail={it,d,open:null,filterBranch:(focusBranch!=null?Number(focusBranch):null)};
  renderLiveDetail();
}
function lsDetailFilter(bid){
  const D=S._lsDetail; if(!D) return;
  D.filterBranch=(D.filterBranch===Number(bid)?null:Number(bid));
  renderLiveDetail();
}
async function refreshLiveDetail(){
  const D=S._lsDetail; if(!D) return;
  showLoading('מרענן מהקופה…');
  try{ const d=await api('/api/admin/live-stock/'+encodeURIComponent(D.it.product_id)+'?fresh=1'+(D.it.kind==='serial'?'&serials=1':''),null,45000);
    D.d=d; S.lsLive[String(D.it.product_id)]={at:Date.now(),data:d}; }
  catch(e){ toast('שגיאה ברענון',false); }
  hideLoading(); renderLiveDetail();
}
function renderLiveDetail(){
  const D=S._lsDetail; if(!D) return;
  const {it,d}=D;
  const hitSet=new Set((S.lsSerialHits||[]).filter(h=>String(h.product_id)===String(it.product_id)).map(h=>String(h.serial)));
  const chipClickable=it.kind!=='serial';   // במוצרי ברקוד הקוביות עצמן פותחות בקשת העברה
  const chips=(d.branches||[]).map(b=>{
    const q=b.qty||0, cls=q>0?'q-has':(q<0?'q-neg':'q-zero');
    // מוצר סריאלי: לחיצה על סניף מסננת את טבלת הסריאלים+אחריות לסניף הזה
    const click=(it.kind==='serial')
      ?` style="cursor:pointer${D.filterBranch===b.id?';outline:2px solid var(--green);border-radius:9px':''}" onclick="lsDetailFilter(${b.id})" title="הצג את הסריאלים של ${b.name}"`
      :((chipClickable&&q>0)?` style="cursor:pointer" onclick="lsQtyTransfer(${b.id},${q})" title="בקשת העברה מ${b.name}"`:'');
    return `<div class="ls-bchip"${click}>${b.name} <b class="${cls}">${q}</b></div>`;
  }).join('');
  let serHtml='';
  if(it.kind==='serial'){
    if(d.serials_error) serHtml='<div class="muted">⚠️ לא ניתן לקרוא את הסריאלים כרגע</div>';
    else if(!(d.serials||[]).length) serHtml='<div class="muted">אין יחידות סריאליות זמינות בקופה</div>';
    else{
      // קיבוץ לפי סניף (בסדר הצ'יפים), ובתוך כל סניף לפי תאריך קליטה
      const bOrder={}; (d.branches||[]).forEach((b,i)=>bOrder[String(b.id)]=i);
      const sorted=d.serials.slice().sort((a,b)=>
        ((bOrder[String(a.branch_id)]!==undefined?bOrder[String(a.branch_id)]:99)-(bOrder[String(b.branch_id)]!==undefined?bOrder[String(b.branch_id)]:99))
        ||String(a.insert_date).localeCompare(String(b.insert_date))
        ||String(a.serial).localeCompare(String(b.serial)));
      const view=(D.filterBranch!=null)?sorted.filter(s=>Number(s.branch_id)===D.filterBranch):sorted;
      D.sorted=view;
      serHtml=`<div style="font-weight:700;margin-bottom:6px;display:flex;align-items:center;gap:10px">
        <span>יחידות בקופה (${view.length}${D.filterBranch!=null?(' מתוך '+d.serials.length):''})</span>
        ${D.filterBranch!=null?`<span class="muted" style="font-size:12.5px;font-weight:400">מציג רק את <b>${lsBranchName(D.filterBranch)}</b></span>
        <button class="btn-ghost" style="padding:3px 10px;font-size:12px" onclick="lsDetailFilter(${D.filterBranch})">הצג הכל</button>`:''}</div>
      ${(()=>{S._lsBd={}; S._lsBdUsed={}; (d.branches||[]).forEach(b=>{ if(b.dyn_kind&&!['transit'].includes('')) S._lsBd[String(b.id)]=b; }); return '';})()}
      ${view.length?'':'<div class="muted" style="margin:6px 0 10px">אין יחידות זמינות בסניף הזה</div>'}
      <table class="serials"><thead><tr><th>סריאל</th><th>סניף</th><th>נקלט</th><th>ספק</th><th>אחריות</th><th>סטטוס</th></tr></thead><tbody>
      ${view.map((s,i)=>{
        let st=dynStatusHtml(s);
        if(!st && s.status===1){
          const bd=(S._lsBd||{})[String(s.branch_id)];
          const used=(S._lsBdUsed[String(s.branch_id)]=S._lsBdUsed[String(s.branch_id)]||{n:0});
          if(bd && used.n<Number(bd.dyn_n||0)){
            used.n++;
            st=`<span style="color:var(--blue);font-weight:700;display:inline-flex;align-items:center;gap:4px" title="בקשת העברה פתוחה מהסניף (${bd.dyn_n} יח׳) — הסניף בוחר את היחידה בפועל">${ico(bd.dyn_kind==='transit'?'truck':'radio',12)} ${bd.dyn_kind==='transit'?'בהעברה':'משוריין'} ל${bd.dyn_to||'?'}</span>`;
          } else st='<span style="color:var(--green);font-weight:700">זמין</span>';
        } else if(!st) st='סטטוס '+s.status;
        const dt=s.insert_date?new Date(s.insert_date):null;
        const ds=dt&&!isNaN(dt)?dt.toLocaleDateString('he-IL'):'';
        const war=(s.warranty||'—')+(s.warranty_months?(' · '+Math.round(s.warranty_months)+' ח׳'):'');
        const mark=hitSet.has(String(s.serial))?' style="background:rgba(31,191,107,.10)"':'';
        return `<tr class="srow"${mark} onclick="lsSerialTransfer(${i})" title="בקשת העברה לסניף אחר">
          <td style="direction:ltr;text-align:right;font-family:monospace">${s.serial}</td>
          <td style="font-weight:700">${s.branch_name||s.branch_id||''}</td><td>${ds}</td>
          <td>${s.supplier||'—'}</td><td>${war}</td><td>${st}</td></tr>`;
      }).join('')}</tbody></table>
      <div class="muted" style="font-size:12px;margin-top:6px"><span style="display:inline-flex;vertical-align:-2px">${ico('radio',12)}</span> לחיצה על שורת סריאל — בקשת העברה לסניף אחר</div>`;
    }
  }
  document.getElementById('modalRoot').innerHTML=`<div class="overlay"><div class="modal" style="max-width:940px;text-align:right;max-height:84vh;overflow:auto">
    <h3 style="margin-bottom:2px">${it.name}</h3>
    <div class="muted" style="font-family:monospace;direction:ltr;text-align:right">${it.product_id}${it.barcode?(' · '+it.barcode):''}</div>
    <div style="display:flex;align-items:center;gap:10px;margin:10px 0 4px">
      <span class="ls-live"><span class="dot"></span> חי מהקופה · ${fmtClock(d.fetched_at)}</span>
      <button class="btn-ghost" style="padding:5px 10px;font-size:12px" onclick="refreshLiveDetail()">🔄 רענן</button>
    </div>
    <div class="ls-chipline">${chips}</div>
    ${chipClickable?`<div class="muted" style="font-size:12px;margin:-6px 0 10px"><span style="display:inline-flex;vertical-align:-2px">${ico('radio',12)}</span> לחיצה על סניף עם מלאי — בקשת העברה ממנו</div>`:''}
    ${serHtml}
    <div style="display:flex;margin-top:14px"><button class="btn-ghost" style="flex:1" onclick="closeModal()">סגור</button></div>
  </div></div>`;
}

// ── בקשת העברה מתוך מלאי חי: סריאל ספציפי או כמות ממוצר ברקוד ──
// משתמש במנגנון הקיים: שורת transfer_plan + שידור 📡 ללוח הקליטה של הסניף המחזיק.
function lsBranchName(id){ const b=(S.branchList||[]).find(x=>String(x.id)===String(id)); return b?b.name:String(id); }
function lsSerialTransfer(i){
  const D=S._lsDetail; if(!D||!D.sorted) return;
  const s=D.sorted[i]; if(!s||!s.branch_id) return;
  lsTransferDialog({
    title:'בקשת העברת מכשיר', sub:D.it.name,
    info:`סריאל <b style="font-family:monospace;direction:ltr;unicode-bidi:embed">${s.serial}</b> · נמצא ב<b>${s.branch_name}</b>`,
    from:s.branch_id, maxQty:1, fixedQty:true,
    line:(to)=>({product_id:String(D.it.product_id), name:`${D.it.name} — סריאל ${s.serial}`,
                 from_branch:Number(s.branch_id), to_branch:to, qty:1, serial:String(s.serial)})
  });
}
function lsQtyTransfer(bid,avail){
  const D=S._lsDetail; if(!D) return;
  lsTransferDialog({
    title:'בקשת העברת מלאי', sub:D.it.name,
    info:`מ<b>${lsBranchName(bid)}</b> · זמין: <b>${avail}</b>`,
    from:bid, maxQty:Math.max(1,Math.floor(avail)), fixedQty:false,
    line:(to,qty)=>({product_id:String(D.it.product_id), name:D.it.name,
                     from_branch:Number(bid), to_branch:to, qty})
  });
}

    <div class="muted" style="text-align:center;margin:6px 0 14px;font-size:14px">${cfg.info}</div>
    ${cfg.fixedQty?'':`<div style="display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:12px">
      <span>כמות:</span><input id="ltQty" type="number" min="1" max="${cfg.maxQty}" value="1" style="width:90px;font-size:18px;text-align:center;margin:0"></div>`}
    <div style="display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:16px">

      <select id="ltTo" style="font-family:inherit;font-size:16px;padding:9px 14px;border-radius:10px;border:1px solid var(--line);background:var(--card2);color:var(--txt)">${opts}</select>
    </div>
    <div style="display:flex;gap:8px">

async function lsSendTransfer(){

function shipTagHTML(t,size){

// אייקוני סטטוס שיריון/מלאי על שורת הזמנה: שודר / חסר / שודר חלקי (גם שודר וגם חסר) / מק״ט חסר

function bcastBranches(bc){

function ordFlagIcons(o,sz){

// תג סטטוס משלוח חי מ-Cargo (במחסן / הועבר לשליח / בדרך ללקוח / בוצע). הסטטוס גלוי, מספר המעקב בטולטיפ.
function cargoStTag(cs){
  if(!cs || !cs.text) return '';
  const t=cs.text; let col='#6b7280';
  if(/בוצע|נמסר|סופק/.test(t)) col='#16a34a';
  else if(/בדרך|ללקוח|שליח|חלוקה/.test(t)) col='#2563eb';
  else if(/מחסן/.test(t)) col='#d97706';
  const tip='לחץ להעתקת קישור מעקב · Cargo '+(cs.tracking||'')+(cs.line?' · '+cs.line:'')+(cs.driver?' · '+cs.driver:'');
  const click=cs.track_url?` onclick="event.stopPropagation();copyCargoTrack('${escW(cs.track_url)}')" style="cursor:pointer;`:` style="`;
  return `<span class="ord-st" title="${escW(tip)}"${click}color:${col};border-color:${col}55;background:${col}14;display:inline-flex;align-items:center;gap:4px">${ico('truck',12)} ${escW(t)}</span>`;
}
// העתקת קישור מעקב Cargo ללוח (לשליחה ללקוח); אם אין clipboard — פותח בטאב חדש
function copyCargoTrack(url){
  if(!url){ toast('אין קישור מעקב',false); return; }
  if(navigator.clipboard&&navigator.clipboard.writeText)
    navigator.clipboard.writeText(url).then(()=>toast('🔗 קישור מעקב הועתק — אפשר להדביק ללקוח',true),()=>window.open(url,'_blank'));
  else window.open(url,'_blank');
}

function wcoFmtD(d){ if(!d) return ''; const x=new Date(d+'T00:00:00'); return isNaN(x)?d:x.toLocaleDateString('he-IL'); }
// ── יומן טווח: לחיצה ראשונה = מ-תאריך, שנייה = עד-תאריך (אותו יום = יום בודד) ──
function wcoCalToggle(){
  const el=document.getElementById('wcoCal'); if(!el) return;
  if(el.style.display!=='none'){ el.style.display='none'; return; }
  const W=S.wco;
  W.calMonth=W.calMonth||new Date().toISOString().slice(0,7);   // YYYY-MM
  W.calPick=null;
  el.style.display='block';
  wcoCalPaint();
}
function wcoCalPaint(){
  const el=document.getElementById('wcoCal'); if(!el) return;
  const W=S.wco;
  const [y,m]=W.calMonth.split('-').map(Number);
  const first=new Date(y,m-1,1), days=new Date(y,m,0).getDate();
  const pad=(first.getDay())%7;                  // ראשון=0 — השבוע העברי
  const today=new Date().toISOString().slice(0,10);
  const dstr=d=>`${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
  const inRange=ds=>W.after&&W.before&&ds>=W.after&&ds<=W.before;
  let cells='';
  for(let i=0;i<pad;i++) cells+='<span></span>';
  for(let d=1;d<=days;d++){
    const ds=dstr(d);
    const sel=(W.calPick===ds)||(W.after===ds&&!W.calPick)||(W.before===ds&&!W.calPick);
    cells+=`<button class="wco-day ${sel?'sel':''} ${inRange(ds)&&!W.calPick?'rng':''} ${ds===today?'today':''}"
      onclick="wcoCalPick('${ds}')">${d}</button>`;
  }
  const mName=new Date(y,m-1,1).toLocaleDateString('he-IL',{month:'long',year:'numeric'});
  el.innerHTML=`<div style="position:absolute;top:0;inset-inline-start:0;z-index:60;background:var(--card);border:1px solid var(--line);border-radius:14px;box-shadow:0 12px 40px rgba(0,0,0,.25);padding:12px;width:286px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
      <button class="btn-ghost" style="padding:3px 10px" onclick="wcoCalNav(1)">‹</button>
      <b style="font-size:14px">${mName}</b>
      <button class="btn-ghost" style="padding:3px 10px" onclick="wcoCalNav(-1)">›</button>
    </div>
    <div class="muted" style="display:grid;grid-template-columns:repeat(7,1fr);text-align:center;font-size:11px;margin-bottom:4px">
      <span>א</span><span>ב</span><span>ג</span><span>ד</span><span>ה</span><span>ו</span><span>ש</span></div>
    <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px">${cells}</div>
    <div class="muted" style="font-size:11px;margin-top:8px;text-align:center">${W.calPick?'בחר עד-תאריך (אותו יום = יום בודד)':'בחר מ-תאריך'}</div>
  </div>`;
}
function wcoCalNav(dir){
  const W=S.wco; const [y,m]=W.calMonth.split('-').map(Number);
  const nd=new Date(y, m-1+dir, 1);
  W.calMonth=`${nd.getFullYear()}-${String(nd.getMonth()+1).padStart(2,'0')}`;
  wcoCalPaint();
}
function wcoCalPick(ds){
  const W=S.wco;
  if(!W.calPick){ W.calPick=ds; wcoCalPaint(); return; }
  let a=W.calPick, b=ds;
  if(b<a){ const t=a; a=b; b=t; }
  W.after=a; W.before=b; W.calPick=null; W.page=1;
  loadWcOrders(); renderWcOrders();
}

async function wcoLoadCalls(phoneIntl){
  const box=document.getElementById('wcoCalls'); if(!box || box.dataset.loaded) return;

  if(!calls.length){ box.innerHTML='<div class="muted" style="font-size:12.5px">— אין שיחות מתועדות —</div>'; return; }

async function wcoSendInvoice(orderNumber, phoneIntl){
  showLoading('מחפש חשבונית…');
  let invs=[];
  try{ const r=await api('/api/admin/invoices?order='+encodeURIComponent(orderNumber)); invs=(r&&r.invoices)||[]; }
  catch(e){ hideLoading(); toast('שגיאה בחיפוש חשבונית',false); return; }
  hideLoading();
  if(!invs.length){ toast('לא נמצאה חשבונית שנקלטה להזמנה '+orderNumber+' (אולי עוד לא הגיעה למייל)',false); return; }
  const inv=invs[0];
  const lbl=[inv.doc_type||'חשבונית',inv.doc_number?('#'+inv.doc_number):'',inv.total?('₪'+inv.total):''].filter(Boolean).join(' ');
  if(!confirm('לשלוח ללקוח בוואטסאפ את '+lbl+'?')) return;
  showLoading('שולח חשבונית…');
  try{
    const res=await api('/api/admin/invoices/'+inv.id+'/send',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({phone:phoneIntl})},40000);
    hideLoading();
    if(res&&res.sent) toast('החשבונית נשלחה ללקוח ✓',true);
    else if(res&&res.needs_template) toast('הלקוח מחוץ לחלון 24ש — צריך תבנית כדי לשלוח מסמך',false);
    else toast('השליחה נכשלה',false);
  }catch(e){ hideLoading(); toast('השליחה נכשלה',false); }
}

// iOS מתעלם לעיתים מ-URL בהתראה — ה-SW שומר את היעד ב-IndexedDB ואנחנו קוראים אותו
// בעלייה ובכל חזרה לפוקוס (כיסוי לאפליקציה סגורה/ברקע כאחד)
function navPendingTake(){
  return new Promise((res)=>{
    try{
      const r=indexedDB.open('gm-nav',1);
      r.onupgradeneeded=()=>r.result.createObjectStore('kv');
      r.onsuccess=()=>{
        try{
          const tx=r.result.transaction('kv','readwrite');
          const st=tx.objectStore('kv');
          const g=st.get('pending');
          g.onsuccess=()=>{ const v=g.result; st.delete('pending'); res(v||null); };
          g.onerror=()=>res(null);
        }catch(e){ res(null); }
      };
      r.onerror=()=>res(null);
    }catch(e){ res(null); }
  });
}

  if(String(p.url||'').indexOf('orders=1')>=0){ try{ openOrdersTab(); }catch(e){} return; }
  const ph=navPhoneOf(p);

// ── פופאפ שיחות נכנסות מ-1com — כמה שיחות במקביל: שיחה במוקד (כרטיס מלא) + ממוזערות (באנרים מעל) ──
let _pbxKnown={}, _pbxBooted=false, _pbxTimer=null;
let _pbxShown={}, _pbxClosed={}, _pbxFocus=null, _pbxSig='';
let _pbxAnsAt={}, _pbxEnded={}, _pbxTick=null;   // נענה-מתי / הסתיימו-לאחרונה / טיק טיימר
// צליל התראה חד-פעמי כשנכנסת שיחה חדשה לניתוב (ניטור לייב — לכל סניף)
function pbxNotify(){
  try{
    const Ctx=window.AudioContext||window.webkitAudioContext; if(!Ctx) return;
    const ctx=new Ctx(); try{ ctx.resume(); }catch(e){}
    const blip=(f,at,d)=>{ const o=ctx.createOscillator(),g=ctx.createGain(); o.type='sine'; o.frequency.value=f;
      g.gain.setValueAtTime(0,at); g.gain.linearRampToValueAtTime(.22,at+.02); g.gain.linearRampToValueAtTime(0,at+d);
      o.connect(g); g.connect(ctx.destination); o.start(at); o.stop(at+d); };
    const t=ctx.currentTime; blip(660,t,.14); blip(990,t+.16,.22);   // "דינג-דינג" עולה
    setTimeout(()=>{ try{ ctx.close(); }catch(e){} },800);
  }catch(e){}
}
function startPbxPoll(){ if(_pbxTimer) return; pbxPoll(); _pbxTimer=setInterval(pbxPoll,1500); }
async function pbxPoll(){
  if(!S.adminKey) return;
  let cs;
  try{ const r=await api('/api/admin/pbx/live'); cs=(r&&r.calls)||[]; }catch(e){ return; }
  if(!_pbxBooted){ cs.forEach(c=>{ _pbxKnown[c.id]=1; }); _pbxBooted=true; return; }  // בסיס — לא מציגים שיחות שכבר היו בטעינה
  const active={}; cs.forEach(c=>{ active[String(c.id)]=c; });
  cs.forEach(c=>{
    const id=String(c.id);
    if(_pbxClosed[id]) return;
    if(c.status==='answered' && !_pbxAnsAt[id]) _pbxAnsAt[id]=Date.now();   // רגע המענה → התחלת טיימר
    const fresh=!_pbxKnown[id] && !(id in _pbxShown);
    _pbxKnown[id]=1;
    if(id in _pbxEnded) delete _pbxEnded[id];   // חזרה לפעילה (לא סביר)
    _pbxShown[id]=c;
    if(fresh){ _pbxFocus=id; pbxNotify(); }   // שיחה חדשה תופסת מוקד + צליל התראה חד-פעמי
  });
  // שיחה שיצאה מהפעילות → מצב סיום (נענתה/לא-נענתה) ל-10ש' ואז סגירה
  Object.keys(_pbxShown).forEach(id=>{
    if(!active[id]){
      const answered=!!_pbxAnsAt[id];
      _pbxEnded[id]={answered:answered, call:_pbxShown[id],
                     dur:answered?(Date.now()-_pbxAnsAt[id]):0};
      delete _pbxShown[id];
      if(String(_pbxFocus)===id) _pbxFocus=null;
      setTimeout(function(){ delete _pbxEnded[id]; delete _pbxAnsAt[id]; delete _pbxClosed[id]; _pbxSig=''; pbxRender(); }, 10000);
    }
  });
  pbxRender();
}
function pbxFocusCall(id){ _pbxFocus=String(id); _pbxSig=''; pbxRender(); }
function pbxClosePopup(id){
  id=(id==null)?_pbxFocus:String(id);
  if(id!=null){ _pbxClosed[id]=true; delete _pbxShown[id]; delete _pbxEnded[id]; if(_pbxFocus===id) _pbxFocus=null; }
  _pbxSig=''; pbxRender();
}
function pbxFmtElapsed(ms){ ms=Math.max(0,ms|0); const s=Math.floor(ms/1000); return Math.floor(s/60)+':'+('0'+(s%60)).slice(-2); }
function pbxStartTick(){ if(_pbxTick) return; _pbxTick=setInterval(pbxTickUpdate,1000); }
function pbxStopTick(){ if(_pbxTick){ clearInterval(_pbxTick); _pbxTick=null; } }
function pbxTickUpdate(){
  let any=false;
  Object.keys(_pbxShown).forEach(id=>{ if(_pbxAnsAt[id]){ any=true; const el=document.getElementById('pbxTime_'+id); if(el) el.textContent=pbxFmtElapsed(Date.now()-_pbxAnsAt[id]); } });
  if(!any) pbxStopTick();
}
function pbxRender(){
  const aIds=Object.keys(_pbxShown), eIds=Object.keys(_pbxEnded), ids=aIds.concat(eIds);
  let wrap=document.getElementById('pbxWrap');
  if(!ids.length){ if(wrap) wrap.remove(); _pbxSig=''; _pbxFocus=null; pbxStopTick(); return; }
  if(_pbxFocus==null || !(_pbxShown[_pbxFocus]||_pbxEnded[_pbxFocus])) _pbxFocus=ids.slice().sort((a,b)=>Number(b)-Number(a))[0];
  const sig=_pbxFocus+'|'+ids.map(id=>{ const c=_pbxShown[id]; if(c) return id+':a:'+(c.route||'')+':'+(c.matched_name||'')+':'+(c.orders||0)+':'+(c.order_number||'')+':'+(_pbxAnsAt[id]?'1':'0'); const e=_pbxEnded[id]; return id+':e'+(e.answered?'1':'0'); }).sort().join(',');
  if(sig!==_pbxSig){
    _pbxSig=sig;
    if(!wrap){ wrap=document.createElement('div'); wrap.id='pbxWrap';
      wrap.style.cssText='position:fixed;bottom:20px;left:20px;z-index:99999;display:flex;flex-direction:column;gap:7px;align-items:stretch;width:min(340px,92vw);font-family:inherit';
      document.body.appendChild(wrap); }
    const others=ids.filter(id=>id!==String(_pbxFocus)).sort((a,b)=>Number(a)-Number(b));
    wrap.innerHTML=others.map(id=>pbxMiniHTML(id)).join('')+pbxMainHTML(_pbxFocus);
    try{ if(navigator.vibrate) navigator.vibrate(120); }catch(e){}
  }
  // טיימר חי אם יש שיחה פעילה שנענתה
  if(aIds.some(id=>_pbxAnsAt[id])){ pbxStartTick(); pbxTickUpdate(); } else pbxStopTick();
}

  // ── רצועת "דורש טיפול עכשיו" ──
  const ordsOver=(d.ordover&&d.ordover.orders)||[];
  const att=[];

  if(ordsOver.length) att.push(chip(`🛒 ${ordsOver.length} הזמנות באיחור`,"openOrdersTab()"));

  h+= att.length
    ? `<div style="background:rgba(220,38,38,.06);border:1px solid rgba(220,38,38,.25);border-radius:14px;padding:11px 14px;margin-bottom:13px">

    : `<div style="background:rgba(34,197,94,.08);border:1px solid rgba(34,197,94,.25);border-radius:14px;padding:11px 14px;margin-bottom:13px;font-size:13px;color:#16a34a;font-weight:700">✅ הכל תחת שליטה — אין משימות דחופות כרגע</div>`;
  // ── שורת פעולות מהירות ──
  const qa=(txt,onc)=>`<button onclick="${onc}" style="background:var(--card);border:1px solid var(--line);color:var(--txt);border-radius:11px;padding:9px 13px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit">${txt}</button>`;
  h+=`<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px">
    ${qa('💳 קישור תשלום',"if(ensureAdmin(payQuickOpen))payQuickOpen()")}
    ${qa('🛒 הזמנות',"openOrdersTab()")}
    ${qa('💬 וואטסאפ',"openWaTab()")}
    ${qa('📷 סריקת העברה',"S.view='scan';render()")}
    ${qa('📞 מוקד שיחות',"hubGoCrm()")}
  </div>`;
  // ── 💰 סקשן מכירות (היום, מעבר בין סניפים) ──
  const sd=d.sales||{};
  const _il=n=>'₪'+Number(Math.round(n||0)).toLocaleString('en-US');
  const branches=[{id:'',n:'כל הסניפים'},{id:1,n:'גן העיר'},{id:2,n:'סטאר'},{id:3,n:'סיטי'},{id:4,n:'עד הלום'},{id:5,n:'אתר'}];
  const curB=String(S.homeBranch||'');
  const grandTotal=Object.values(sd.by_branch||{}).reduce((s,v)=>s+(v.revenue||0),0);  // "כל הסניפים" = תמיד הסכום הכולל
  const brTile=b=>{ const sel=curB===String(b.id);
    const rev=b.id===''?grandTotal:(((sd.by_branch||{})[b.id]||{}).revenue||0);

      <div style="font-size:12px;font-weight:600">${b.n}</div>

  const tt=sd.today||{revenue:0,count:0,credits:0};
  const per=S.homeSalesPeriod||'today';
  const perLabel=per==='yesterday'?'אתמול':(per==='range'?((sd.from||'')+' – '+(sd.to||'')):'היום');
  const seg=(id,lbl)=>`<button onclick="homeSalesPeriod('${id}')" style="flex:1;background:${per===id?'#16a34a':'transparent'};color:${per===id?'#fff':'var(--txt)'};border:0;border-radius:9px;padding:7px 4px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit">${lbl}</button>`;
  h+=crmCard(
    `<div style="display:flex;align-items:center;gap:8px;margin-bottom:11px"><span style="font-size:17px">💰</span><b style="font-size:15px">מכירות · ${escW(perLabel)}</b>${S.homeSalesLoading?'<span class="muted" style="font-size:12px;margin-inline-start:auto">⏳ מעדכן…</span>':''}</div>
     <div style="display:flex;gap:3px;background:var(--card2);border:1px solid var(--line);border-radius:11px;padding:3px;margin-bottom:12px">${seg('today','היום')}${seg('yesterday','אתמול')}${seg('range','סינון')}</div>
     <div style="display:flex;gap:7px;flex-wrap:wrap;margin-bottom:13px">${branches.map(brTile).join('')}</div>
     <div style="display:flex;gap:10px;margin-bottom:13px">
       <div style="flex:1;text-align:center"><div style="font-size:24px;font-weight:800;color:#16a34a">${_il(tt.revenue)}</div><div class="muted" style="font-size:11px">מכירות</div></div>
       <div style="flex:1;text-align:center"><div style="font-size:24px;font-weight:800">${tt.count||0}</div><div class="muted" style="font-size:11px">עסקאות</div></div>
       <div style="flex:1;text-align:center"><div style="font-size:24px;font-weight:800;color:#dc2626">${_il(tt.credits)}</div><div class="muted" style="font-size:11px">זיכויים</div></div>
     </div>
     <div class="muted" style="font-size:11px;margin-bottom:4px">קצב 14 ימים · <span style="color:#16a34a;font-weight:700">השבוע</span> מול <span style="color:#94a3b8;font-weight:700">שבוע שעבר</span></div>

  // ── רשת כרטיסים ──
  h+=`<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:12px">`;
  // פילוח קטגוריות (דונאט כמו NewOrder)
  const cats=(sd.categories||[]).slice(0,11);
  h+=crmCard(homeHead('🛍️','פילוח קטגוריות',perLabel,"hubGoCrm()")+
    (cats.length?homeDonut(cats)
     :'<div class="muted" style="font-size:13px;padding:6px 0">אין מכירות בתקופה</div>'));
  // מכירות אחרונות היום
  const recent=(sd.recent||[]).slice(0,8);
  h+=crmCard(homeHead('🧾','מכירות אחרונות',((sd.today&&sd.today.count)||0)+' עסקאות',"hubGoCrm()")+

      `<b style="flex:1;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escW(r.name)}</b>

     :'<div class="muted" style="font-size:13px;padding:6px 0">אין מכירות היום</div>'));
  // וואטסאפ — אינבוקס (כל הלא-מאורכבות, כמו בטאב), לא רק ממתינים
  const inbox=waConvs.filter(c=>!c.archived).sort((a,b)=>(b.ts||0)-(a.ts||0));
  const waList=inbox.slice(0,7);
  const _dot=c=>c.awaiting_agent?'🔴':(c.unread?'🟡':'🟢');
  h+=crmCard(homeHead('💬','וואטסאפ — אינבוקס',inbox.length+' שיחות'+(waWaiting?' · '+waWaiting+' ממתינים':''),"openWaTab()")+
    (waList.length?waList.map(c=>homeRow(
       `<span>${_dot(c)}</span>
        <b style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escW(c.name||c.phone)}</b>
        <span class="muted" style="font-size:11px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:130px">${escW((c.last_msg||'').slice(0,42))}</span>`,
       "openWaTab()")).join('')
     :'<div class="muted" style="font-size:13px;padding:6px 0">האינבוקס ריק 👌</div>'));
  // העברות
  const trf=(d.ov&&d.ov.transfers)||[];
  const trfOv=trf.filter(t=>t.overdue).sort((a,b)=>(b.age_hours||0)-(a.age_hours||0)).slice(0,6);
  h+=crmCard(homeHead('📦','העברות',open+' פתוחות · '+overdue+' באיחור',"toggleAdmin()")+
    (trfOv.length?trfOv.map(t=>homeRow(
       `<span>⏰</span><b style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escW(t.from_name||'')} → ${escW(t.to_name||'')}</b>
        <span class="muted" style="font-size:11px">${Math.round(t.age_hours||0)}ש'</span>`,
       "toggleAdmin()")).join('')
     :'<div class="muted" style="font-size:13px;padding:6px 0">אין העברות באיחור 👌</div>'));
  // הורדות מלאי — סיטי היום (שורה מרווחת: שם המוצר למעלה, עובד מתחת)
  h+=crmCard(homeHead('📉','הורדות מלאי — סיטי היום',remRows.length+' פריטים',"S.view='admin';setAdminTab('removals')")+
    (remRows.length?remRows.slice(0,7).map(r=>
       `<div style="padding:8px 0;border-top:1px solid var(--line)">
          <div style="font-size:13px;font-weight:700;line-height:1.3">${escW(r.name||'')}</div>
          <div class="muted" style="font-size:11px;margin-top:2px;font-weight:400">👤 ${escW(r.employee||'—')}</div>
        </div>`).join('')
     :'<div class="muted" style="font-size:13px;padding:6px 0">אין הורדות היום</div>'));
  // שיחות מרכזיה היום + רשימת לא-נענו אחרונות
  const hist=(d.hist&&d.hist.calls)||[];
  const missed=hist.filter(c=>c.direction==='in'&&c.disposition&&c.disposition!=='answered').slice(0,4);
  h+=crmCard(homeHead('📞','שיחות מרכזיה היום',ansTxt+' מענה',"hubGoCrm()")+
    `<div style="display:flex;gap:6px;margin-top:2px">
      <div style="flex:1;text-align:center;padding:6px 0"><div style="font-size:21px;font-weight:800;color:#16a34a">${ct.answered||0}</div><div class="muted" style="font-size:11px">נענו</div></div>
      <div style="flex:1;text-align:center;padding:6px 0"><div style="font-size:21px;font-weight:800;color:#dc2626">${(ct.no_answer||0)+(ct.abandoned||0)}</div><div class="muted" style="font-size:11px">לא נענו</div></div>
      <div style="flex:1;text-align:center;padding:6px 0"><div style="font-size:21px;font-weight:800">${ct.out||0}</div><div class="muted" style="font-size:11px">יוצאות</div></div>
    </div>`+
    (missed.length?`<div class="muted" style="font-size:11px;margin:8px 0 2px;font-weight:700">📵 לא נענו אחרונות</div>`+
      missed.map(c=>homeRow(
        `<span>📵</span><b style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escW(c.matched_name||c.phone||'')}</b>
         <span class="muted" style="font-size:11px;direction:ltr">${escW(_tmt(c.ts))}</span>`,
        "hubGoCrm()")).join('')
     :''));
  // סטטוס מערכת (Sentinel) — מוצג רק כשיש בעיה (ה-KPI למעלה מכסה את "תקין", בלי כפילות)
  if(!sentOk){
    h+=crmCard(homeHead('🔴','סטטוס מערכת (Sentinel)','דורש בדיקה',"hubGo('sentinel')")+
      (sent.stale?'<div style="font-size:13px;padding:4px 0;color:#dc2626">⚠️ סנטינל לא מדווח (אולי כבוי)</div>'
       :(sentIssues.slice(0,5).map(i=>homeRow(`<span>⚠️</span><span style="font-size:12.5px">${escW(typeof i==='string'?i:(i.msg||i.name||i.title||''))}</span>`)).join('')||'<div class="muted" style="font-size:13px;padding:4px 0">—</div>')));
  }
  // 👥 עובדים היום בסניפים (סידור עבודה — סינון ליום הנוכחי)
  const sched=d.sched||{};
  const sdow=new Date().getDay();   // 0=ראשון … 6=שבת (תואם dow ב-roster)
  const schedBr=sched.branches||[];
  const rosterToday=(sched.roster||[]).filter(r=>r.dow===sdow && r.employee);
  const byBr={}; rosterToday.forEach(r=>{ (byBr[r.branch_id]=byBr[r.branch_id]||[]).push(r); });
  h+=crmCard(homeHead('👥','עובדים היום',rosterToday.length+' במשמרת',"window.open('/schedule','_blank')")+
    (rosterToday.length?schedBr.map(b=>{ const emps=byBr[b.id]||[]; if(!emps.length) return '';
      return `<div style="padding:7px 0;border-top:1px solid var(--line)">
        <div style="font-size:13px;font-weight:700">${escW(b.name)}</div>
        <div style="font-size:12px;margin-top:2px;line-height:1.6">${emps.map(e=>`${escW(e.employee)}${e.hours?` <span class="muted" style="font-size:11px">${escW(e.hours)}</span>`:''}`).join(' · ')}</div>
      </div>`; }).join('')
     :'<div class="muted" style="font-size:13px;padding:6px 0">אין שיבוץ להיום</div>'));
  // 💳 צ'קים לפירעון (מתג: היום / רביעי הקרוב / רביעי הבא)
  const cmode=S.homeChecksMode||'today';
  const cdate=_checkDateFor(cmode);
  const cks=(S.homeChecks||[]).filter(c=>c.valueDate===cdate).sort((a,b)=>(b.amount||0)-(a.amount||0));
  const ctot=cks.reduce((s,c)=>s+(c.amount||0),0);
  const cseg=(id,lbl)=>`<button onclick="homeChecksMode('${id}')" style="flex:1;background:${cmode===id?'#16a34a':'transparent'};color:${cmode===id?'#fff':'var(--txt)'};border:0;border-radius:8px;padding:6px 2px;font-size:11.5px;font-weight:600;cursor:pointer;font-family:inherit">${lbl}</button>`;
  h+=crmCard(homeHead('💳','צ׳קים לפירעון',cks.length?_il(ctot):'',"window.open('/checks','_blank')")+
    `<div style="display:flex;gap:3px;background:var(--card2);border:1px solid var(--line);border-radius:10px;padding:3px;margin-bottom:9px">${cseg('today','היום')}${cseg('wed0','רביעי הקרוב')}${cseg('wed1','רביעי הבא')}</div>`+
    (cks.length?cks.slice(0,7).map(c=>homeRow(
       `<b style="flex:1;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escW(c.payee||c.checkNum||'—')}</b>
        <span class="muted" style="font-size:11px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:80px">${escW(c.bank||'')}</span>
        <span style="font-weight:600">${_il(c.amount)}</span>`)).join('')
     :`<div class="muted" style="font-size:13px;padding:6px 0">${S.homeChecks?'אין צ׳קים לתאריך זה':'טוען…'}</div>`));
  // 🛒 הזמנות בטיפול באיחור (status=processing, ישנות מ-48ש)
  const ordAge=o=>{ const t=Date.parse(o.date); return t?Math.floor((Date.now()-t)/3600000):0; };
  const ordSorted=ordsOver.slice().sort((a,b)=>(Date.parse(a.date)||0)-(Date.parse(b.date)||0));  // הישן ביותר קודם
  h+=crmCard(homeHead('🛒','הזמנות בטיפול באיחור',ordsOver.length?ordsOver.length+' באיחור':'',"openOrdersTab()")+
    (ordSorted.length?ordSorted.slice(0,7).map(o=>{ const ag=ordAge(o); const dd=Math.floor(ag/24);
      return homeRow(
       `<span>⏰</span><b style="flex:1;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">#${escW(String(o.number||''))} ${escW(o.name||'')}</b>
        <span class="muted" style="font-size:11px">${dd>0?dd+' י׳':ag+'ש׳'}</span>
        <span style="font-weight:600">${_il(parseFloat(o.total)||0)}</span>`,
       "openOrdersTab()"); }).join('')
     :'<div class="muted" style="font-size:13px;padding:6px 0">אין הזמנות באיחור 👌</div>'));
  // 🧾 חשבוניות איציק היום לפי סניף (שירות חוצה-אפליקציה)
  const inv=S.homeInv||{};
  const invBr=inv.by_branch||{};
  h+=crmCard(homeHead('🧾','חשבוניות איציק היום',inv.count?(inv.count+' · '+_il(inv.total)):'',"hubOpen('invoices')")+
    (Object.keys(invBr).length?Object.entries(invBr).sort((a,b)=>(b[1].total||0)-(a[1].total||0)).map(([b,v])=>homeRow(
       `<b style="flex:1;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escW(b)}</b>
        <span class="muted" style="font-size:11px">${v.count} חשבוניות</span>
        <span style="font-weight:600">${_il(v.total)}</span>`,"hubOpen('invoices')")).join('')
     :`<div class="muted" style="font-size:13px;padding:6px 0">${S.homeInv?(inv.ok===false?'השירות לא זמין כרגע':'אין חשבוניות היום'):'טוען…'}</div>`));
  h+=`</div>`;
  h+=`<div class="muted" style="text-align:center;font-size:11px;margin-top:14px">עודכן ${d._at?fmtTime(new Date(d._at).toISOString()):''} · מתרענן אוטומטית כל 15ש׳</div>`;
  h+=`</div>`;
  app.innerHTML=h;
  }catch(e){ app.innerHTML='<div class="empty" style="margin:50px auto">שגיאה בטעינת לוח הבית · '+escW(String(e&&e.message||e))+'</div>'; }
}
function crmRoutePill(r){ return r?'<span style="background:rgba(31,191,107,.14);color:var(--green,#1fbf6b);font-size:11.5px;font-weight:700;padding:2px 9px;border-radius:20px;white-space:nowrap">'+escW(r)+'</span>':'<span style="color:var(--muted,#94a3b8)">—</span>'; }

    '<h1 class="title" style="display:flex;align-items:center;gap:8px">'+ico('inbox',19)+'מוקד שיחות · CRM</h1>'+
    '<div class="tabs" style="margin:6px 0 16px">'+
      '<button class="'+(_crmView==='history'?'active':'')+'" onclick="crmSetView(\'history\')">'+ico('list',15)+' היסטוריית שיחות</button>'+
      '<button class="'+(_crmView==='missed'?'active':'')+'" onclick="crmSetView(\'missed\')">'+ico('phone',15)+' לא נענו'+(_crmMissedCount()?' · '+_crmMissedCount():'')+'</button>'+
      '<button class="'+(_crmView==='analytics'?'active':'')+'" onclick="crmSetView(\'analytics\')">'+ico('trendDown',15)+' אנליטיקה</button>'+
    '</div>'+

}
// פקד התקופה בלבד (select + קלנדר + צ'יפ טווח) — בלי תווית/שורה, להצבה בשורת פילטרים
function crmPeriodCtl(){
  const selSt='background:var(--card,#171c24);color:var(--txt,#e8edf4);border:1px solid var(--line,#2c3442);border-radius:10px;padding:8px 12px;font-size:13px;min-width:150px';
  const rangeActive=!!(_crmFrom&&_crmTo);
  const periodOpts=[[1,'יום אחרון'],[3,'3 ימים'],[7,'7 ימים'],[14,'14 ימים'],[30,'30 ימים'],[45,'45 ימים'],[60,'60 ימים'],[90,'90 ימים']];
  const periodSelect='<select onchange="crmPeriodChange(this.value)" style="'+selSt+'">'+
    periodOpts.map(o=>'<option value="'+o[0]+'"'+((!rangeActive&&_crmDays===o[0])?' selected':'')+'>'+o[1]+'</option>').join('')+
    '<option value="range"'+(rangeActive?' selected':'')+'>טווח תאריכים מותאם…</option></select>';

async function crmRenderCharts(s){
  try{
    if(!window.Chart){ await loadScript('https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js'); }
    if(!window.Chart) return;
  }catch(e){ return; }
  _crmCharts.forEach(c=>{ try{ c.destroy(); }catch(e){} }); _crmCharts=[];
  const txt='#94a3b8', grid='rgba(148,163,184,.13)';
  const mk=(id,cfg)=>{ const el=document.getElementById(id); if(el) _crmCharts.push(new Chart(el,cfg)); };
  const noLeg={plugins:{legend:{display:false}},responsive:true,maintainAspectRatio:false,
    scales:{x:{ticks:{color:txt,font:{size:10}},grid:{display:false}},y:{ticks:{color:txt,precision:0},grid:{color:grid},beginAtZero:true}}};
  const ser=s.series||[];
  mk('crmChartDays',{type:'bar',data:{labels:ser.map(d=>d.date.slice(5)),datasets:[{data:ser.map(d=>d.count),backgroundColor:'#3b82f6',borderRadius:5}]},options:noLeg});
  const br=(s.branches||[]).slice(0,7);
  mk('crmChartBranch',{type:'doughnut',data:{labels:br.map(b=>crmBranchLabel(b.branch)),datasets:[{data:br.map(b=>b.count),backgroundColor:['#3b82f6','#1fbf6b','#f5a524','#e5484d','#8b5cf6','#06b6d4','#94a3b8'],borderWidth:0}]},options:{plugins:{legend:{position:'right',labels:{color:txt,font:{size:11},boxWidth:12,padding:8}}},responsive:true,maintainAspectRatio:false,cutout:'58%'}});
  const hrs=s.hours||[];
  mk('crmChartHours',{type:'bar',data:{labels:hrs.map(h=>h.hour),datasets:[{data:hrs.map(h=>h.count),backgroundColor:'#1fbf6b',borderRadius:3}]},options:noLeg});
  // ── גרפי CDR (1com): תוצאות לפי יום + פילוח תוצאות ──
  const c=_crmCdr;
  if(c&&c.configured){

      scales:{x:{stacked:true,ticks:{color:txt,font:{size:10}},grid:{display:false}},y:{stacked:true,ticks:{color:txt,precision:0},grid:{color:grid},beginAtZero:true}}};
    mk('crmCdrDays',{type:'bar',data:{labels:cser.map(d=>d.date.slice(5)),datasets:[
      {label:'נענו',data:cser.map(d=>d.answered),backgroundColor:'#1fbf6b',borderRadius:4,stack:'a'},
      {label:'לא נענו',data:cser.map(d=>d.missed),backgroundColor:'#e5484d',borderRadius:4,stack:'a'},
      {label:'יוצאות',data:cser.map(d=>d.out),backgroundColor:'#3b82f6',borderRadius:4,stack:'a'}
    ]},options:stk});
    const dp=c.dispo||[];
    const dcol={answered:'#1fbf6b',no_answer:'#e5484d',busy:'#f5a524',abandoned:'#fb7185',failed:'#8b5cf6',other:'#94a3b8'};
    mk('crmCdrDispo',{type:'doughnut',data:{labels:dp.map(x=>x.label),datasets:[{data:dp.map(x=>x.count),backgroundColor:dp.map(x=>dcol[x.key]||'#94a3b8'),borderWidth:0}]},
      options:{plugins:{legend:{position:'right',labels:{color:txt,font:{size:11},boxWidth:12,padding:8}}},responsive:true,maintainAspectRatio:false,cutout:'58%'}});
  }
}

function crmFilteredCalls(){
  let rows=(_crmCalls||[]);
  const f=_crmHistFilter;
  if(f.kind==='disposition') rows=rows.filter(c=>c.disposition===f.val);
  else if(f.kind==='missed') rows=rows.filter(c=>c.disposition==='no_answer'||c.disposition==='abandoned');
  else if(f.kind==='direction') rows=rows.filter(c=>c.direction===f.val);
  else if(f.kind==='branch') rows=rows.filter(c=>(c.route||'').split(' › ')[0]===f.val);
  const q=(_crmSearch||'').trim().toLowerCase();
  if(q) rows=rows.filter(c=>((c.matched_name||'')+' '+(c.phone||'')+' '+(c.route||'')).toLowerCase().indexOf(q)>-1);
  return rows;
}

// ── ☎️ טלפון WebRTC מוטמע (JsSIP) — שלוחה 202 מול 1com. ענה/נתק/השתק בתוך הפופאפ ──
let _pbxUA=null, _pbxSession=null, _pbxCallTimer=null, _pbxCallStart=0, _pbxSipReg=false, _pbxAnswered=false, _pbxIce=[], _pbxServer='';
async function startPbxSip(){
  if(_pbxUA || !S.adminKey) return;
  let cfg; try{ cfg=await api('/api/admin/pbx/webrtc-config'); }catch(e){ return; }
  if(!cfg || !cfg.enabled || !cfg.wss) return;
  _pbxIce=(cfg.ice&&cfg.ice.length)?cfg.ice:[];   // TURN של 1com — חובה לאודיו דו-כיווני
  _pbxServer=cfg.server||'webrtc.1com.co.il';
  if(typeof JsSIP==='undefined'){
    // npm CDN לא מפרסם bundle דפדפן ל-jssip (/dist 404). הרשמי מ-jssip.net (UMD).
    await loadScript('https://jssip.net/download/releases/jssip-3.10.0.js');
    if(typeof JsSIP==='undefined'){   // גיבוי: bundle +esm של jsdelivr (origin שכבר מורשה)
      try{ const m=await import('https://cdn.jsdelivr.net/npm/jssip@3.13.8/+esm'); window.JsSIP=m.default||m.JsSIP||m; }catch(e){}
    }
    if(typeof JsSIP==='undefined'){ console.warn('[pbx-sip] JsSIP load failed'); return; }
  }
  try{
    const socket=new JsSIP.WebSocketInterface(cfg.wss);
    _pbxUA=new JsSIP.UA({ sockets:[socket], uri:'sip:'+cfg.user+'@'+cfg.server,
      password:cfg.password, register:true, register_expires:300, session_timers:false });
    _pbxUA.on('registered',()=>{ _pbxSipReg=true; console.log('[pbx-sip] registered',cfg.user); const b=document.getElementById('pbxDialBtn'); if(b) b.style.display=''; });
    _pbxUA.on('unregistered',()=>{ _pbxSipReg=false; });
    _pbxUA.on('registrationFailed',(e)=>{ _pbxSipReg=false; console.warn('[pbx-sip] reg failed',e&&e.cause); });
    _pbxUA.on('newRTCSession',(e)=>{ if(e.session.direction==='incoming') pbxHandleIncoming(e.session); });
    _pbxUA.start();
  }catch(err){ console.warn('[pbx-sip] init error',err); _pbxUA=null; }
}
// ── רינגטון מסונתז (Web Audio) — צ'יים מודרני בלולאה, בלי קובץ חיצוני ──
let _pbxRingCtx=null, _pbxRingTimer=null;
function pbxRingStart(){
  pbxRingStop();
  try{
    const Ctx=window.AudioContext||window.webkitAudioContext; if(!Ctx) return;
    _pbxRingCtx=new Ctx(); const ctx=_pbxRingCtx; try{ ctx.resume(); }catch(e){}
    const blip=(freq,at,dur)=>{ const o=ctx.createOscillator(),g=ctx.createGain();
      o.type='sine'; o.frequency.value=freq;
      g.gain.setValueAtTime(0,at); g.gain.linearRampToValueAtTime(.16,at+.02);
      g.gain.setValueAtTime(.16,at+dur-.06); g.gain.linearRampToValueAtTime(0,at+dur);
      o.connect(g); g.connect(ctx.destination); o.start(at); o.stop(at+dur); };
    const pattern=()=>{ if(!_pbxRingCtx) return; const t=ctx.currentTime;
      blip(880,t,.18); blip(1320,t+.22,.24);          // צ'יים עולה (A5→E6)
      blip(880,t+.62,.18); blip(1320,t+.84,.24); };
    pattern(); _pbxRingTimer=setInterval(pattern,2600);
  }catch(e){}
}
function pbxRingStop(){
  if(_pbxRingTimer){ clearInterval(_pbxRingTimer); _pbxRingTimer=null; }
  if(_pbxRingCtx){ try{ _pbxRingCtx.close(); }catch(e){} _pbxRingCtx=null; }
}
function pbxSipNumber(s){ try{ return (s.remote_identity&&s.remote_identity.uri&&s.remote_identity.uri.user)||''; }catch(e){ return ''; } }
function pbxAudioEl(){ let a=document.getElementById('pbxRemoteAudio'); if(!a){ a=document.createElement('audio'); a.id='pbxRemoteAudio'; a.autoplay=true; a.style.display='none'; document.body.appendChild(a); } return a; }
async function pbxHandleIncoming(session){
  if(_pbxSession){ try{ session.terminate({status_code:486}); }catch(e){} return; }   // כבר בשיחה → תפוס
  _pbxSession=session; _pbxAnswered=false;
  const num=pbxSipNumber(session);
  let info={name:'',order_number:'',items:'',orders:0};
  try{ info=await api('/api/admin/pbx/lookup?phone='+encodeURIComponent(num)); }catch(e){}
  pbxShowCallPopup(num, info, 'ringing');
  pbxRingStart();   // 🔔 צלצול במחשב
  session.on('failed',()=>pbxEndCall());
  session.on('ended',()=>pbxEndCall());
  session.on('accepted',()=>pbxOnAccepted(session));
  session.on('confirmed',()=>pbxOnAccepted(session));
  try{ if(navigator.vibrate) navigator.vibrate([300,150,300]); }catch(e){}
}
function pbxAnswer(){
  pbxRingStop();
  if(!_pbxSession) return;
  try{ _pbxSession.answer({ mediaConstraints:{audio:true,video:false}, pcConfig:{ iceServers:_pbxIce } }); }
  catch(e){ console.warn('[pbx-sip] answer err',e); }
}
function pbxOnAccepted(session){
  pbxRingStop();
  try{
    const pc=session.connection;
    if(pc){ const ms=new MediaStream(); pc.getReceivers().forEach(r=>{ if(r.track) ms.addTrack(r.track); });
      const a=pbxAudioEl(); a.srcObject=ms; a.play().catch(()=>{}); }
  }catch(e){}
  _pbxAnswered=true;
  if(!_pbxCallTimer) pbxStartTimer();
  pbxUpdateCallPopup('incall');
}

  try{ const m=_pbxSession.isMuted&&_pbxSession.isMuted().audio;
    if(m) _pbxSession.unmute({audio:true}); else _pbxSession.mute({audio:true}); return !m; }catch(e){ return false; } }

function pbxEndCall(){
  pbxRingStop();

  const a=document.getElementById('pbxRemoteAudio'); if(a){ try{a.srcObject=null;}catch(e){} }
  const div=document.getElementById('pbxCallPop');
  if(div){   // אחרי ניתוק — מציגים את המצב הסופי ~10ש' ואז נעלם
    const num=div._num, who=div._who;
    const dur=('0'+Math.floor(secs/60)).slice(-2)+':'+('0'+(secs%60)).slice(-2);
    const ended = wasAnswered
      ? '<div style="font-size:13px;color:var(--mut,#888);font-weight:800">✓ השיחה הסתיימה · '+dur+'</div>'
      : '<div style="font-size:13px;color:#e23b3b;font-weight:800">📵 שיחה שלא נענתה</div>';
    if(!wasAnswered) div.style.border='1px solid #e23b3b';
    const body=div.querySelector('#pbxCallBody');
    if(body) body.innerHTML=ended+
      '<div style="font-size:17px;font-weight:800;margin-top:6px">'+who+'</div>'+
      '<div style="font-size:11.5px;color:var(--mut,#999);direction:ltr;margin-top:3px">+'+escW(num)+'</div>'+
      '<button onclick="pbxOpenCall(\''+escW(num)+'\')" style="width:100%;margin-top:12px;padding:9px;border:0;border-radius:10px;background:var(--green,#1db954);color:#fff;font-weight:700;cursor:pointer">💬 פתח שיחה</button>';
    setTimeout(()=>{ const x=document.getElementById('pbxCallPop'); if(x) x.remove(); pbxRestoreWrap(); }, 10000);
  } else { pbxRestoreWrap(); }
}
function pbxStartTimer(){ _pbxCallStart=Date.now(); pbxStopTimer();
  _pbxCallTimer=setInterval(()=>{ const el=document.getElementById('pbxCallTime'); if(el){ const s=Math.floor((Date.now()-_pbxCallStart)/1000); el.textContent=('0'+Math.floor(s/60)).slice(-2)+':'+('0'+(s%60)).slice(-2); } },1000); }
function pbxStopTimer(){ if(_pbxCallTimer){ clearInterval(_pbxCallTimer); _pbxCallTimer=null; } }
function pbxShowCallPopup(num, info, state){
  const old=document.getElementById('pbxCallPop'); if(old) old.remove();
  const w=document.getElementById('pbxWrap'); if(w) w.style.display='none';   // מסתירים את כרטיסי הפולינג בזמן שיחת SIP
  const div=document.createElement('div'); div.id='pbxCallPop';
  div._num=num;
  div._who=escW((info&&info.name)||('+'+num));
  div._ord=(info&&info.order_number)?('הזמנה #'+escW(info.order_number)+(info.items?(' · '+escW(info.items)):'')):'';
  div.style.cssText='position:fixed;bottom:20px;left:20px;z-index:100000;width:min(360px,94vw);'+
    'background:var(--card,#fff);border:1px solid var(--line,#e2e8f0);border-radius:18px;'+
    'box-shadow:0 18px 50px rgba(0,0,0,.32);padding:16px 18px;color:var(--txt,#1a2230)';
  div.innerHTML='<div id="pbxCallBody"></div>';
  document.body.appendChild(div);
  pbxUpdateCallPopup(state);
}
function pbxUpdateCallPopup(state){
  const div=document.getElementById('pbxCallPop'); if(!div) return;
  const num=div._num, who=div._who, ord=div._ord; let head, btns;
  if(state==='ringing'){
    head='<div style="font-size:13px;color:var(--green,#1db954);font-weight:700">📞 שיחה נכנסת…</div>';
    btns='<button onclick="pbxAnswer()" style="flex:1;padding:11px;border:0;border-radius:12px;background:#1db954;color:#fff;font-weight:700;cursor:pointer">✅ ענה</button>'+
         '<button onclick="pbxHangup()" style="flex:1;padding:11px;border:0;border-radius:12px;background:#e23b3b;color:#fff;font-weight:700;cursor:pointer">✕ דחה</button>';
  } else if(state==='calling'){
    head='<div style="font-size:13px;color:var(--blue,#3b82f6);font-weight:700">📞 מחייג…</div>';
    btns='<button onclick="pbxHangup()" style="flex:1;padding:11px;border:0;border-radius:12px;background:#e23b3b;color:#fff;font-weight:700;cursor:pointer">📴 בטל</button>';
  } else {
    head='<div style="font-size:13px;color:var(--mut,#888);font-weight:700">🟢 בשיחה · <span id="pbxCallTime">00:00</span></div>';
    btns='<button onclick="pbxMuteBtn(this)" style="flex:1;padding:11px;border:0;border-radius:12px;background:#64748b;color:#fff;font-weight:700;cursor:pointer">🔇 השתק</button>'+
         '<button onclick="pbxTransferUI()" style="flex:1;padding:11px;border:0;border-radius:12px;background:#3b82f6;color:#fff;font-weight:700;cursor:pointer">↪ העברה</button>'+
         '<button onclick="pbxHangup()" style="flex:1;padding:11px;border:0;border-radius:12px;background:#e23b3b;color:#fff;font-weight:700;cursor:pointer">📴 נתק</button>';
  }
  div.querySelector('#pbxCallBody').innerHTML=
    head+'<div style="font-size:17px;font-weight:800;margin-top:6px">'+who+'</div>'+
    (ord?'<div style="font-size:13px;color:var(--mut,#555);margin-top:3px">'+ord+'</div>':'')+
    '<div style="font-size:11.5px;color:var(--mut,#999);direction:ltr;margin-top:3px">+'+escW(num)+'</div>'+
    '<div style="display:flex;gap:8px;margin-top:12px">'+btns+'</div>'+
    '<button onclick="pbxOpenCall(\''+escW(num)+'\')" style="width:100%;margin-top:8px;padding:8px;border:0;border-radius:10px;background:var(--bg2,#f1f5f9);color:var(--txt,#334);font-weight:600;cursor:pointer">💬 פתח שיחת וואטסאפ</button>';
}

// ── חייגן + חיוג יוצא דרך הסופטפון ──
function pbxOpenDialer(prefill){
  if(!_pbxSipReg){ toast('הטלפון-רך לא מחובר',false); return; }
  let d=document.getElementById('pbxDialer'); if(d) d.remove();
  d=document.createElement('div'); d.id='pbxDialer';
  d.style.cssText='position:fixed;bottom:20px;left:20px;z-index:100000;width:250px;background:var(--card,#fff);border:1px solid var(--line,#e2e8f0);border-radius:18px;box-shadow:0 18px 50px rgba(0,0,0,.32);padding:15px;color:var(--txt,#1a2230)';
  const keys=['1','2','3','4','5','6','7','8','9','*','0','#'];
  d.innerHTML='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px"><b style="font-size:14px">☎️ חייגן</b><button onclick="document.getElementById(\'pbxDialer\').remove()" style="background:none;border:0;font-size:18px;cursor:pointer;color:var(--mut,#888)">✕</button></div>'+
    '<input id="pbxDialNum" value="'+escW(prefill||'')+'" placeholder="מספר" inputmode="tel" onkeydown="if(event.key===\'Enter\')pbxDialCall()" style="width:100%;box-sizing:border-box;text-align:center;font-size:20px;letter-spacing:1px;direction:ltr;padding:10px;border-radius:12px;border:1px solid var(--line,#e2e8f0);background:var(--bg2,#f1f5f9);color:var(--txt,#222);margin-bottom:10px">'+
    '<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:7px;direction:ltr">'+
      keys.map(k=>'<button onclick="pbxDialKey(\''+k+'\')" style="padding:12px 0;font-size:18px;font-weight:700;border:1px solid var(--line,#e2e8f0);border-radius:12px;background:var(--bg2,#f1f5f9);color:var(--txt,#222);cursor:pointer">'+k+'</button>').join('')+
    '</div>'+
    '<div style="display:flex;gap:8px;margin-top:10px">'+
      '<button onclick="pbxDialBack()" style="width:50px;padding:12px 0;border:0;border-radius:12px;background:#64748b;color:#fff;font-size:16px;cursor:pointer">⌫</button>'+
      '<button onclick="pbxDialCall()" style="flex:1;padding:12px 0;border:0;border-radius:12px;background:#1db954;color:#fff;font-weight:800;font-size:15px;cursor:pointer">📞 חייג</button>'+
    '</div>';
  document.body.appendChild(d);
  setTimeout(()=>{ const i=document.getElementById('pbxDialNum'); if(i) i.focus(); },50);
}
function pbxDialKey(k){ const i=document.getElementById('pbxDialNum'); if(i) i.value+=k; }
function pbxDialBack(){ const i=document.getElementById('pbxDialNum'); if(i) i.value=i.value.slice(0,-1); }
function pbxDialCall(){ const i=document.getElementById('pbxDialNum'); const n=i?i.value.trim():''; if(!n) return; const d=document.getElementById('pbxDialer'); if(d) d.remove(); pbxPlaceCall(n); }
function pbxPlaceCall(number){
  if(!_pbxUA || !_pbxSipReg){ toast('הטלפון-רך לא מחובר',false); return; }
  if(_pbxSession){ toast('כבר בשיחה פעילה',false); return; }
  const dest=String(number||'').replace(/[^0-9+*#]/g,'');
  if(!dest) return;
  let session;
  try{ session=_pbxUA.call('sip:'+dest+'@'+(_pbxServer||'webrtc.1com.co.il'),
        { mediaConstraints:{audio:true,video:false}, pcConfig:{iceServers:_pbxIce} }); }
  catch(e){ console.warn('[pbx-sip] call err',e); toast('חיוג נכשל',false); return; }
  _pbxSession=session; _pbxAnswered=false;
  pbxShowCallPopup(dest, {name:''}, 'calling');
  api('/api/admin/pbx/lookup?phone='+encodeURIComponent(dest)).then(d=>{ const div=document.getElementById('pbxCallPop'); if(div&&d&&d.name){ div._who=escW(d.name); div._ord=d.order_number?('הזמנה #'+escW(d.order_number)+(d.items?(' · '+escW(d.items)):'')):''; pbxUpdateCallPopup(_pbxAnswered?'incall':'calling'); } }).catch(()=>{});
  session.on('accepted',()=>pbxOnAccepted(session));
  session.on('confirmed',()=>pbxOnAccepted(session));
  session.on('ended',()=>pbxEndCall());
  session.on('failed',()=>pbxEndCall());
}
// ── העברת שיחה (blind transfer / REFER) ──
function pbxTransferUI(){
  const div=document.getElementById('pbxCallPop'); if(!div||!_pbxSession) return;
  const body=div.querySelector('#pbxCallBody'); if(!body) return;
  const exts=[['203','מעבדה'],['200','סיטי'],['201','גן העיר'],['202','הזמנות'],['204','עד הלום']];
  body.innerHTML='<div style="font-size:13px;font-weight:700;margin-bottom:8px">↪ העברת שיחה אל…</div>'+
    '<div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:8px">'+
      exts.map(e=>'<button onclick="pbxDoTransfer(\''+e[0]+'\')" style="padding:9px;border:1px solid var(--line,#e2e8f0);border-radius:10px;background:var(--bg2,#f1f5f9);color:var(--txt,#222);font-weight:700;font-size:12.5px;cursor:pointer">'+e[1]+' · '+e[0]+'</button>').join('')+
    '</div>'+
    '<div style="display:flex;gap:6px">'+
      '<input id="pbxXferNum" placeholder="שלוחה / מספר" inputmode="tel" onkeydown="if(event.key===\'Enter\')pbxDoTransfer(this.value)" style="flex:1;min-width:0;direction:ltr;text-align:center;padding:9px;border-radius:10px;border:1px solid var(--line,#e2e8f0);background:var(--bg2,#f1f5f9);color:var(--txt,#222)">'+
      '<button onclick="pbxDoTransfer(document.getElementById(\'pbxXferNum\').value)" style="padding:9px 14px;border:0;border-radius:10px;background:#1db954;color:#fff;font-weight:700;cursor:pointer">העבר</button>'+
    '</div>'+
    '<button onclick="pbxUpdateCallPopup(\'incall\')" style="width:100%;margin-top:8px;padding:8px;border:0;border-radius:10px;background:var(--bg2,#f1f5f9);color:var(--txt,#334);font-weight:600;cursor:pointer">← חזרה לשיחה</button>';
}
function pbxDoTransfer(target){
  target=String(target||'').replace(/[^0-9+*#]/g,'');
  if(!target||!_pbxSession) return;
  try{
    _pbxSession.refer('sip:'+target+'@'+(_pbxServer||'webrtc.1com.co.il'));
    toast('↪ מעביר שיחה ל-'+target+'…',true);
  }catch(e){ console.warn('[pbx-sip] transfer err',e); toast('העברה נכשלה',false); }
}
async function bootApp(){
  try{ S.branchList=await (await fetchT('/api/branches',{},15000)).json(); }catch(e){}
  try{ render(); }catch(e){ hideLoading(); }
  applyTheme();
  waSWReady();   // רישום service worker (PWA/push) — לא חוסם
  if(S.branchId){ startPoll(); startNotifPoll(); handleDeepLink(); navPendingApply(); waBadgeClear(); }
  startPbxPoll();   // 📞 פופאפ שיחה נכנסת מ-1com (פעיל רק כשיש מפתח אדמין)
  startPbxSip();    // ☎️ טלפון WebRTC מוטמע (ענה/נתק מהמחשב) — admin בלבד
}
(async()=>{
  loadState(); applyTheme();
  S.deviceToken=deviceToken();
  try{ S.cfg=await (await fetchT('/api/config',{},15000)).json(); }catch(e){}
  // רישום מכשיר שקט: מאושר/קיים → ממשיך רגיל; חדש לגמרי → מסך בקשת גישה
  try{
    const st=await deviceRegister('');
    if(st==='pending') return devicePendingScreen('');
    if(st==='denied') return deviceDeniedScreen();
    return bootApp();                      // approved
  }catch(e){
    if(String(e.message||'').includes('שם')) return deviceAskScreen('');   // מכשיר חדש — נדרש שם
    return bootApp();                      // תקלת רשת/קולד-סטארט — ממשיכים; האכיפה בשרת תחליט
  }
})();
</script>
