<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8">
<!-- maximum-scale=1: מבטל את הזום האוטומטי של iOS בכניסה לשדות טפסים (כולל ה-iframe של PayPlus) -->
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>GreenOS — Green Mobile</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='88'%3E📦%3C/text%3E%3C/svg%3E">
<link rel="manifest" href="/static/manifest.webmanifest">
<link rel="apple-touch-icon" href="/static/icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="GreenOS">
<meta name="theme-color" content="#16a34a">
<style>
  :root{
    --bg:#0e1116; --card:#171c24; --card2:#212834; --line:#2c3442;
    --txt:#e8edf4; --muted:#94a3b8; --green:#1fbf6b; --red:#e5484d;
    --amber:#f5a524; --blue:#3b82f6;
    --maxw:1500px;
  }
  body.light{
    --bg:#eef1f6; --card:#ffffff; --card2:#f1f4f9; --line:#d7dee8;
    --txt:#18222f; --muted:#5e6b7d; --green:#12a356; --red:#d23b40;
    --amber:#b8860b; --blue:#2563eb;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{font-family:-apple-system,Segoe UI,Roboto,Arial,"Heebo",sans-serif;
       background:var(--bg);color:var(--txt);font-size:15px}
  header{display:flex;align-items:center;justify-content:space-between;gap:16px;
         padding:14px 24px;background:var(--card);border-bottom:1px solid var(--line);
         position:sticky;top:0;z-index:20}
  header .brand{font-weight:800;font-size:20px;white-space:nowrap}
  header .right{display:flex;align-items:center;gap:10px;font-size:14px;color:var(--muted);flex-wrap:wrap}
  header .right b{color:var(--txt)}
  button{font-family:inherit;cursor:pointer;border:none;border-radius:10px;
         padding:9px 15px;font-size:14px;font-weight:600}
  .btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--line)}
  .btn-ghost:hover{color:var(--txt);border-color:var(--blue)}
  .btn-primary{background:var(--blue);color:#fff}
  .wrap{max-width:var(--maxw);margin:0 auto;padding:24px}
  .muted{color:var(--muted)}
  h1.title{font-size:22px;margin:0 0 18px}
  /* בחירת סניף */
  .picker{display:flex;flex-direction:column;gap:14px;align-items:center;
          justify-content:center;min-height:72vh;text-align:center}
  .picker h1{font-size:26px;margin:0}
  .branch-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
               gap:14px;width:100%;max-width:680px}
  .branch-grid button{padding:30px 18px;font-size:19px;background:var(--card2);color:var(--txt);
                      border:1px solid var(--line)}
  .branch-grid button:hover{border-color:var(--blue);transform:translateY(-2px);transition:.12s}
  .branch-grid button.admin{border-color:var(--amber);color:var(--amber)}
  /* לוח כרטיסים (גריד דסקטופ) */
  .board-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(330px,1fr));gap:14px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;
        padding:18px;cursor:pointer;transition:.12s}
  .card:hover{border-color:var(--blue);transform:translateY(-2px)}
  .card .top{display:flex;justify-content:space-between;align-items:center;gap:10px}
  .card .op{font-weight:800;font-size:17px}
  .card .meta{color:var(--muted);font-size:13px;margin-top:6px}
  .pill{padding:4px 11px;border-radius:999px;font-size:13px;font-weight:700;white-space:nowrap}
  .pill.in_transit{background:rgba(245,165,36,.15);color:var(--amber)}
  .pill.partial{background:rgba(59,130,246,.15);color:var(--blue)}
  .pill.received{background:rgba(31,191,107,.15);color:var(--green)}
  .progress{height:9px;background:var(--card2);border-radius:999px;margin-top:14px;overflow:hidden}
  .progress > i{display:block;height:100%;background:var(--green);border-radius:999px;transition:width .2s}
  .banner{background:rgba(245,165,36,.1);border:1px solid var(--amber);color:var(--amber);
          border-radius:12px;padding:12px 16px;margin-bottom:18px;font-weight:700}
  /* קוביית סריקה מהירה — ממורכזת ואסתטית */
  .board-scan{max-width:640px;margin:0 auto 14px;text-align:center}
  .board-scan .scan-icon{font-size:30px;line-height:1;margin-bottom:6px}
  .board-scan .scan-input{margin-top:6px}
  .lastscan{max-width:640px;margin:0 auto 26px;min-height:60px;display:flex;align-items:center;
            justify-content:center;gap:10px;border-radius:14px;padding:14px 20px;
            font-size:21px;font-weight:800;text-align:center;transition:.15s}
  .lastscan.ok{background:rgba(31,191,107,.12);border:1px solid var(--green);color:var(--green)}
  .lastscan.err{background:rgba(229,72,77,.1);border:1px solid var(--red);color:var(--red)}
  .lastscan.warn{background:rgba(245,165,36,.12);border:1px solid var(--amber);color:var(--amber)}
  .lastscan.idle{color:var(--muted);border:1px dashed var(--line);font-weight:600;font-size:16px}
  .mtag{font-size:11px;font-weight:700;border-radius:6px;padding:1px 7px;margin-inline-start:6px;white-space:nowrap}
  .mtag.ok{background:rgba(31,191,107,.15);color:var(--green)}
  .mtag.warn{background:rgba(245,165,36,.2);color:var(--amber)}
  .badge-manual{background:rgba(245,165,36,.2);color:var(--amber);border-radius:6px;padding:2px 7px;font-size:11px;font-weight:700;margin-inline-start:6px;white-space:nowrap}
  .mis-alert{border:1px solid var(--red);background:rgba(229,72,77,.06);border-radius:14px;padding:16px;margin-bottom:20px}
  .mis-title{color:var(--red);font-weight:800;font-size:18px}
  .tabs{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap}
  .tabs>button{background:var(--card);border:1px solid var(--line);color:var(--muted);border-radius:10px;padding:10px 18px;font-weight:700}
  .tabs>button.active{background:var(--blue);color:#fff;border-color:var(--blue)}
  .tabgroup{display:inline-flex;border:1px solid var(--line);border-radius:10px;overflow:hidden;background:var(--card)}
  .tabgroup button{background:transparent;border:none;color:var(--muted);padding:10px 18px;font-weight:700;border-radius:0;white-space:nowrap}
  .tabgroup button+button{border-inline-start:1px solid var(--line)}
  .tabgroup button:hover{color:var(--txt)}
  .tabgroup button.active{background:var(--blue);color:#fff}
  .admin th.sortable{cursor:pointer;user-select:none;white-space:nowrap}
  .admin th.sortable:hover{color:var(--blue)}
  .admin th .arr{opacity:.5;font-size:11px}
  .rebal-bar{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-bottom:16px}
  .rebal-bar select,.rebal-bar input{font-family:inherit;font-size:14px;padding:9px 12px;border-radius:10px;border:1px solid var(--line);background:var(--card);color:var(--txt)}
  .rebal-bar input{min-width:240px;outline:none} .rebal-bar input:focus{border-color:var(--blue)}
  td.r-zero{color:var(--red);font-weight:800} td.r-surplus{color:var(--green);font-weight:800}
  .pl-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
  .pl-row select{flex:1;font-family:inherit;font-size:14px;padding:9px;border-radius:10px;border:1px solid var(--line);background:var(--card2);color:var(--txt)}
  .pl-row input{font-family:inherit;font-size:14px;padding:9px;border-radius:10px;border:1px solid var(--line);background:var(--card2);color:var(--txt)}
  .plan-group{margin-bottom:22px}
  .plan-head{display:flex;align-items:center;gap:10px;font-size:16px;margin-bottom:10px;flex-wrap:wrap}
  .plan-head .ttl{white-space:nowrap}
  .plan-actions{display:flex;gap:6px;margin-inline-start:auto;background:var(--card);
                border:1px solid var(--line);border-radius:12px;padding:4px}
  .plan-actions button{padding:7px 11px;font-size:13px;border-radius:9px;border:none;background:transparent;
                       color:var(--muted);display:inline-flex;align-items:center;gap:5px;white-space:nowrap}
  .plan-actions button:hover{background:var(--bg);color:var(--txt)}
  .plan-actions .pa-accent{color:var(--blue);font-weight:700}
  .plan-actions .pa-accent:hover{background:rgba(37,99,235,.12)}
  .plan-actions .pa-danger:hover{background:rgba(229,72,77,.12);color:var(--red)}
  .plan-actions .pa-sep{width:1px;background:var(--line);margin:3px 2px}
  .btn-req-in{background:var(--green);color:#fff;font-weight:700}
  /* 🔎 מלאי חי */
  .ls-check{display:inline-flex;align-items:center;gap:7px;border:1px solid var(--line);border-radius:10px;
            padding:9px 12px;background:var(--card);cursor:pointer;font-size:13px;color:var(--muted);
            white-space:nowrap;user-select:none}
  .ls-check input{min-width:0 !important;width:16px;height:16px;padding:0 !important;margin:0;
                  accent-color:var(--blue);cursor:pointer;flex:none}
  .ls-check:has(input:checked){color:var(--txt);border-color:var(--blue)}
  td.ls-has{color:var(--green);font-weight:800;text-align:center}
  td.ls-zero{color:var(--muted);text-align:center}
  td.ls-neg{color:var(--red);font-weight:800;text-align:center}
  td.ls-wait{color:var(--muted);text-align:center;opacity:.6}
  .ls-live{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:700;color:var(--green)}
  .ls-live .dot{width:8px;height:8px;border-radius:50%;background:var(--green);animation:lspulse 1.6s infinite}
  @keyframes lspulse{0%,100%{opacity:1}50%{opacity:.35}}
  table.admin tr.ls-row{cursor:pointer}
  .ls-wc{cursor:pointer;font-size:16px;opacity:.25;filter:grayscale(1);padding:2px 7px;border-radius:7px;display:inline-block}
  .ls-wc.lit{opacity:1;filter:none}
  .ls-wc.wait{opacity:.12}
  .ls-wc:hover{background:var(--bg)}
  .wcq-btn{border:1.5px solid var(--line);background:var(--card2);color:var(--txt);border-radius:10px;
           padding:7px 14px;font-size:13px;font-weight:600;cursor:pointer}
  .wcq-btn.on{border-color:var(--green);color:var(--green);font-weight:800;background:rgba(31,191,107,.08)}
  .wcq-btn.off{opacity:.4}
  /* מלאי חי — שדה חיפוש עם כפתור ניקוי */
  .ls-searchwrap{position:relative;display:inline-flex;min-width:240px;flex:1 1 auto;max-width:430px}
  .ls-searchwrap input{width:100%;min-width:0;padding-inline-end:38px}
  .ls-clear{position:absolute;inset-inline-end:8px;top:50%;transform:translateY(-50%);
            border:none;background:var(--card2);color:var(--muted);border-radius:50%;
            width:24px;height:24px;font-size:12px;cursor:pointer;line-height:1}
  .ls-clear:hover{color:var(--txt);background:var(--bg)}
  /* מלאי חי — תצוגת כרטיסים למובייל */
  .ls-has{color:var(--green);font-weight:800} .ls-zero{color:var(--muted)}
  .ls-neg{color:var(--red);font-weight:800} .ls-wait{color:var(--muted);opacity:.6}
  .ls-cards{display:flex;flex-direction:column;gap:10px}
  .ls-card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:12px 14px;cursor:pointer}
  .ls-card:active{background:var(--card2)}
  .ls-card-top{display:flex;align-items:flex-start;gap:8px}
  .ls-card-name{font-size:15px;flex:1;line-height:1.35}
  .ls-card-sub{color:var(--muted);font-size:12px;margin:4px 0 9px}
  .ls-card-branches{display:flex;flex-wrap:wrap;gap:6px}
  .ls-bq{border:1px solid var(--line);border-radius:9px;padding:4px 10px;font-size:12px;color:var(--muted);
         background:var(--card2);display:inline-flex;gap:6px;align-items:center;white-space:nowrap}
  .ls-bq b{font-size:13px}
  .ls-card-meta{margin-top:8px;font-size:11px;color:var(--muted)}
  .ls-chipline{display:flex;flex-wrap:wrap;gap:8px;margin:10px 0 14px}
  .ls-bchip{border:1px solid var(--line);border-radius:10px;padding:8px 14px;background:var(--card2);font-weight:700;display:flex;gap:8px;align-items:center}
  .ls-bchip b.q-has{color:var(--green)} .ls-bchip b.q-zero{color:var(--muted)} .ls-bchip b.q-neg{color:var(--red)}
  table.serials{width:100%;border-collapse:collapse;font-size:14px}
  table.serials th{color:var(--muted);font-weight:600;text-align:right;padding:6px 8px;border-bottom:1px solid var(--line);font-size:12px}
  table.serials td{padding:7px 8px;border-bottom:1px solid var(--line)}
  table.serials tr.srow{cursor:pointer} table.serials tr.srow:hover{background:var(--bg)}
  tr.sdetail td{background:var(--bg);font-size:13px;color:var(--txt)}
  table.admin tr.has-req{background:rgba(31,191,107,.08)}
  table.admin tr.has-req:hover{background:rgba(31,191,107,.14)}
  .lastscan .sub{font-size:14px;opacity:.85;font-weight:600}
  .card.flash{border-color:var(--green)!important;box-shadow:0 0 0 2px var(--green) inset;transition:.15s}
  /* שידור בקשת העברה */
  .bcast{max-width:640px;margin:0 auto 16px;display:flex;align-items:center;gap:14px;cursor:pointer;
         background:linear-gradient(135deg,#2563eb,#1e40af);color:#fff;border-radius:16px;padding:14px 18px;
         box-shadow:0 4px 20px rgba(37,99,235,.35);animation:bcpulse 2s ease-in-out infinite}
  @keyframes bcpulse{0%,100%{box-shadow:0 4px 20px rgba(37,99,235,.35)}50%{box-shadow:0 4px 28px rgba(37,99,235,.6)}}
  .bcast .bc-ic{font-size:28px;line-height:1}
  .bcast .bc-txt{display:flex;flex-direction:column;line-height:1.35;flex:1}
  .bcast .bc-txt b{font-size:17px} .bcast .bc-txt span{font-size:13px;opacity:.9}
  .bcast .bc-x{background:rgba(255,255,255,.2);color:#fff;border:none;border-radius:10px;
               width:34px;height:34px;font-size:16px;cursor:pointer}
  .bcast .bc-x:hover{background:rgba(255,255,255,.35)}
  /* סורק מצלמה (מובייל) */
  .btn-cam{margin-top:12px;width:100%;background:var(--blue);color:#fff;border-radius:12px;
           padding:13px 18px;font-size:16px;font-weight:700}
  .cam-overlay{position:fixed;inset:0;background:#000;z-index:80;display:flex;
               flex-direction:column;align-items:center;justify-content:center}
  .cam-overlay video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
  .cam-frame{position:relative;z-index:2;width:70%;max-width:360px;height:110px;
             border:2px solid rgba(255,255,255,.9);border-radius:12px;
             box-shadow:0 0 0 9999px rgba(0,0,0,.45);overflow:hidden}
  .cam-line{position:absolute;left:0;right:0;height:3px;background:linear-gradient(90deg,transparent,var(--red),transparent);
            box-shadow:0 0 10px 2px var(--red);animation:scanline 1.5s ease-in-out infinite}
  @keyframes scanline{0%{top:8%}50%{top:88%}100%{top:8%}}
  .cam-hint{position:absolute;bottom:96px;z-index:3;color:#fff;font-weight:700;font-size:17px;
            text-align:center;padding:0 24px;text-shadow:0 1px 5px #000}
  .cam-close{position:absolute;top:18px;left:18px;z-index:3;background:rgba(0,0,0,.55);
             color:#fff;border-color:rgba(255,255,255,.45)}
  .cam-status{position:absolute;bottom:54px;z-index:3;color:#cfe;font-size:13px;
              text-align:center;padding:6px 14px;background:rgba(0,0,0,.5);border-radius:999px;text-shadow:0 1px 3px #000}
  .empty{text-align:center;color:var(--muted);padding:64px 0;font-size:17px}
  /* מסך קליטה — דו-טורי בדסקטופ */
  .scan-layout{display:grid;grid-template-columns:380px 1fr;gap:22px;align-items:start}
  .scan-side{position:sticky;top:88px}
  .panel{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:20px}
  .panel h2{margin:0 0 4px;font-size:19px}
  .scan-input{width:100%;padding:20px;font-size:22px;text-align:center;border-radius:14px;
              border:2px solid var(--blue);background:var(--card2);color:var(--txt);outline:none;margin-top:14px}
  .count{font-size:16px;color:var(--muted);text-align:center;margin-top:12px}
  .count b{color:var(--txt);font-size:20px}
  .emp{margin-top:14px;font-size:13px;color:var(--muted);text-align:center}
  .emp a{color:var(--blue);cursor:pointer}
  .items-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:10px}
  .item{display:flex;align-items:center;gap:12px;background:var(--card);border:1px solid var(--line);
        border-radius:12px;padding:13px 15px}
  .item.received{border-color:var(--green);background:rgba(31,191,107,.07)}
  .item.redirected{border-color:var(--amber);background:rgba(245,165,36,.07)}
  .item.missing{border-color:var(--red);background:rgba(229,72,77,.06)}
  .item .tick{width:28px;height:28px;border-radius:50%;border:2px solid var(--line);
              display:flex;align-items:center;justify-content:center;font-size:16px;flex:0 0 auto}
  .item.received .tick{background:var(--green);border-color:var(--green);color:#fff}
  .item.redirected .tick{background:var(--amber);border-color:var(--amber);color:#fff}
  .item.missing .tick{background:var(--red);border-color:var(--red);color:#fff}
  .item.redirected .who{color:var(--amber)} .item.missing .who{color:var(--red)}
  .pill.closed{background:rgba(148,163,184,.18);color:var(--muted)}
  .finish-btn{margin-top:12px;width:100%}
  .item .name{font-weight:600}
  .item .sub{color:var(--muted);font-size:12px;direction:ltr;text-align:right;font-family:monospace;margin-top:2px;
             user-select:text;cursor:text}
  .item .who{color:var(--green);font-size:11px;margin-top:2px}
  .done-banner{background:var(--green);color:#fff;border-radius:14px;padding:16px;
               text-align:center;font-size:19px;font-weight:800;margin-bottom:16px}
  .row-back{margin-bottom:14px}
  a.link{color:var(--blue);text-decoration:none;cursor:pointer;font-weight:600}
  /* טבלת ניהול */
  .chips{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:20px}
  .chip{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px;text-align:center}
  .chip b{display:block;font-size:30px} .chip span{font-size:13px;color:var(--muted)}
  .chip.danger{border-color:var(--red)} .chip.danger b{color:var(--red)}
  .chip{cursor:pointer;transition:.12s} .chip:hover{border-color:var(--blue)}
  .chip.active{border-color:var(--blue);box-shadow:0 0 0 2px var(--blue) inset}
  .filters{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-bottom:16px}
  .filters input,.filters select{font-family:inherit;font-size:14px;padding:9px 12px;border-radius:10px;
    border:1px solid var(--line);background:var(--card);color:var(--txt);outline:none}
  .filters input{min-width:210px} .filters input:focus,.filters select:focus{border-color:var(--blue)}
  .filters .dlabel{display:flex;align-items:center;gap:6px;color:var(--muted);font-size:13px}
  .filters input[type=date]{min-width:auto;padding:8px 10px;color-scheme:dark}
  body.light .filters input[type=date]{color-scheme:light}
  table.admin{width:100%;border-collapse:collapse;background:var(--card);border:1px solid var(--line);
              border-radius:14px;overflow:hidden}
  table.admin th,table.admin td{padding:12px 14px;text-align:right;border-bottom:1px solid var(--line);font-size:14px}
  table.admin th{background:var(--card2);color:var(--muted);font-weight:700;font-size:13px}
  table.admin tr:last-child td{border-bottom:none}
  table.admin tbody tr{cursor:pointer}
  table.admin tbody tr:hover{background:var(--card2)}
  table.admin tr.overdue{background:rgba(229,72,77,.06)}
  table.admin tr.overdue:hover{background:rgba(229,72,77,.12)}
  .badge-late{background:var(--red);color:#fff;border-radius:6px;padding:2px 8px;font-size:11px;font-weight:700}
  .prog-cell{font-weight:700;white-space:nowrap}
  /* toast + modal */
  .toast{position:fixed;left:50%;transform:translateX(-50%);bottom:32px;
         padding:18px 34px;border-radius:14px;font-size:22px;font-weight:800;
         color:#fff;z-index:60;box-shadow:0 8px 30px rgba(0,0,0,.45);opacity:0;transition:.15s;pointer-events:none}
  .toast.show{opacity:1}
  .toast.ok{background:var(--green)} .toast.err{background:var(--red)}
  .loading{position:fixed;inset:0;z-index:90;display:none;flex-direction:column;align-items:center;
           justify-content:center;gap:14px;background:rgba(0,0,0,.28)}
  body.light .loading{background:rgba(255,255,255,.55)}
  .loading .spinner{width:46px;height:46px;border:4px solid var(--line);border-top-color:var(--blue);
                    border-radius:50%;animation:spin .8s linear infinite}

    header{padding:10px 12px;gap:8px;flex-wrap:nowrap} .wrap{padding:14px}
    /* header קומפקטי בשורה אחת: אייקונים בלבד, בלי טקסטים */

          margin:-9px -14px 12px;padding:9px 14px 6px;scrollbar-width:none}   /* padding-top לבאדג' שלא ייחתך */
    .tabs::-webkit-scrollbar{display:none}

    .tabgroup{flex:none}

    .embed-frame{height:calc(100vh - 215px)}
    /* סרגל סינון נוח לאצבע: חיפוש ברוחב מלא, פילטרים בזוגות */
    .rebal-bar input{flex:1 1 100%;min-width:0;font-size:16px;padding:12px 14px}
    .ls-searchwrap{flex:1 1 100%;max-width:none}

    table.serials{display:block;overflow-x:auto;white-space:nowrap}
    .modal{padding:18px 14px}
  }
</style>
</head>
<body>
<header>
  <div style="display:flex;align-items:center;gap:12px">
    <button class="burger" id="burgerBtn" style="display:none" onclick="toggleDrawer(true)" title="תפריט ניהול אופרציה">☰</button>
    <div class="brand">🟢 GreenOS</div>
  </div>
  <div class="right" id="hdr" style="display:none">
    <button class="btn-ghost" id="waBtn" style="display:none;position:relative;align-items:center;gap:6px" onclick="openWaTab()"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:inline-block;vertical-align:-3px"><path d="M21 11.5a8.38 8.38 0 0 1-8.38 8.38 8.5 8.5 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 1 1 16.1-3.8z"/></svg><span class="hlbl"> וואטסאפ</span><span id="waBadge" class="wa-badge" style="display:none"></span></button>
    <button class="btn-ghost" id="adminBtn" style="display:none;align-items:center;gap:6px" onclick="toggleAdmin()"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:inline-block;vertical-align:-3px"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg><span class="hlbl"> ניהול</span></button>
    <span class="hlbl">סניף: </span><b id="branchName"></b>
    <button class="btn-ghost" style="align-items:center;gap:6px" onclick="changeBranch()" title="החלף סניף"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:inline-block;vertical-align:-2px"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg><span class="hlbl"> החלף סניף</span></button>
    <button class="btn-ghost" id="themeBtn" onclick="toggleTheme()"></button>
  </div>
</header>

<div class="wrap" id="app"></div>
<div class="toast" id="toast"></div>
<div id="modalRoot"></div>
<div class="drawer-backdrop" id="drawerBack" onclick="toggleDrawer(false)"></div>
<aside class="drawer" id="drawer"></aside>

<script>
const S = { branchId:null, branchName:null, employee:null, adminKey:null,
            cfg:{admin_required:false, admin_branch_id:5}, theme:'light', lastScan:null,
            branchList:[], adminFilters:{q:'',from:'',to:'',status:'',fromDate:'',toDate:''}, _refocusFilter:false,
            view:'board', op:null, _fromAdmin:false, pollTimer:null, knownOps:null, notifTimer:null,
            adminTab:'transfers', rebalanceData:null, rebalFilter:'serial', rebalSearch:'', _refocusRebal:false,
            rebalBranch:'', rebalMfr:'', planData:null, planCount:0,
            recoData:null, recoDays:30, recoBranch:'', recoTarget:21, recoKind:'all',
            recoSearch:'', recoSupplier:'', recoCategory:'', recoMfr:'', _refocusReco:false,
            recoSort:{col:'recommended',dir:'desc'},
            orderData:null, orderCount:0, orderSearch:'', orderSupplier:'', orderCategory:'', _refocusOrder:false,
            removalsData:null, removalsDays:30, removalsFrom:'', removalsTo:'', removalsMfr:'', removalsSearch:'', _refocusRemovals:false,
            lsCat:null, lsCatAt:null, lsQuery:'', lsKind:'serial', lsCategory:'', lsMfr:'', lsStock:true,
            lsLive:{}, lsSeq:0, lsSerialHits:null, _refocusLs:false, _lsDetail:null, lsWc:{}, lsWcOff:false,
            tasksData:null, tkGroup:'', tkStatus:'open', tkSearch:'', _refocusTk:false,
            branchTab:'board', deviceToken:null };

// ── ערכת נושא (כהה/בהיר) ──
function applyTheme(){
  const light = S.theme==='light';
  document.body.classList.toggle('light', light);
  const b=document.getElementById('themeBtn');
  if(b){ b.style.display='inline-flex'; b.style.alignItems='center'; b.style.gap='6px';
    b.innerHTML = (typeof ico==='function'?ico(light?'sun':'moon',15):(light?'☀️':'🌙'))
      +'<span class="hlbl"> '+(light?'בהיר':'כהה')+'</span>'; }
}
function toggleTheme(){ S.theme = (S.theme==='light')?'dark':'light';
  localStorage.setItem('tr_theme',S.theme); applyTheme(); }

// ── סאונד ──
let actx=null;
function beep(ok){ try{
  actx=actx||new (window.AudioContext||window.webkitAudioContext)();
  const o=actx.createOscillator(),g=actx.createGain();o.connect(g);g.connect(actx.destination);
  o.frequency.value=ok?880:220;g.gain.value=0.08;o.start();o.stop(actx.currentTime+(ok?0.12:0.32));
}catch(e){} }
function vibrate(ok){ if(navigator.vibrate) navigator.vibrate(ok?40:[60,40,60]); }
// "ka-ching" — צליל קופה רושמת (פרץ רעש "צ'ה" + שני צלילי פעמון בהירים), כמו התראת מכירה בווקומרס
function kaching(){
  try{
    actx=actx||new (window.AudioContext||window.webkitAudioContext)();
    if(actx.state==='suspended') actx.resume();
    const t0=actx.currentTime;
    // "צ'ה" — פרץ רעש קצר ומסונן (פתיחת המגירה)
    const buf=actx.createBuffer(1, Math.floor(actx.sampleRate*0.08), actx.sampleRate);
    const data=buf.getChannelData(0);
    for(let i=0;i<data.length;i++) data[i]=(Math.random()*2-1)*Math.pow(1-i/data.length,2);
    const noise=actx.createBufferSource(); noise.buffer=buf;
    const nf=actx.createBiquadFilter(); nf.type='highpass'; nf.frequency.value=2200;
    const ng=actx.createGain(); ng.gain.value=0.16;
    noise.connect(nf); nf.connect(ng); ng.connect(actx.destination); noise.start(t0);
    // "צ'ינג" — שני צלילי פעמון מתכתיים בהירים
    [[1318.5,t0+0.05],[1760,t0+0.13]].forEach(([f,t])=>{
      const o=actx.createOscillator(),g=actx.createGain();
      o.type='triangle'; o.frequency.value=f;
      o.connect(g); g.connect(actx.destination);
      g.gain.setValueAtTime(0.0001,t);
      g.gain.exponentialRampToValueAtTime(0.22,t+0.01);
      g.gain.exponentialRampToValueAtTime(0.0001,t+0.55);
      o.start(t); o.stop(t+0.57);
    });
  }catch(e){}
}
// אזעקה — צליל בולט שחוזר כמה פעמים (להעברה נכנסת)
function alarm(){
  try{
    actx=actx||new (window.AudioContext||window.webkitAudioContext)();
    if(actx.state==='suspended') actx.resume();
    const seq=[880,1175,880,1175,880];
    seq.forEach((f,i)=>{ const o=actx.createOscillator(),g=actx.createGain();
      o.connect(g);g.connect(actx.destination); o.frequency.value=f; o.type='square';
      const t=actx.currentTime+i*0.22; g.gain.setValueAtTime(0.0001,t);
      g.gain.exponentialRampToValueAtTime(0.12,t+0.02); g.gain.exponentialRampToValueAtTime(0.0001,t+0.2);
      o.start(t); o.stop(t+0.21); });
  }catch(e){}
}
// כותרת לשונית מהבהבת עד שחוזרים לדף
let _titleTimer=null; const _origTitle=document.title;
function flashTitle(msg){
  if(_titleTimer || document.hasFocus()) return;
  let on=false;
  _titleTimer=setInterval(()=>{ document.title=(on=!on)?('🔴 '+msg):_origTitle; },800);
  const stop=()=>{ if(_titleTimer){clearInterval(_titleTimer);_titleTimer=null;} document.title=_origTitle;
    window.removeEventListener('focus',stop); };
  window.addEventListener('focus',stop);
}
// התראת מערכת + צליל + הבהוב על העברות חדשות
function notifyNew(fresh){
  const n=fresh.length;
  const title = n>1 ? `📦 ${n} העברות חדשות נכנסות!` : '📦 העברה חדשה נכנסת!';
  const body = fresh.map(t=>`מ${t.from_branch_name} · ${t.total_units} פריטים`).join('\n');
  if(window.Notification && Notification.permission==='granted'){
    try{ const ntf=new Notification(title,{body, tag:'gm-transfer', renotify:true});
      ntf.onclick=()=>{ window.focus(); S.view='board'; render(); ntf.close(); };
      setTimeout(()=>{ try{ntf.close();}catch(e){} }, 12000); }catch(e){}
  }
  alarm(); flashTitle(title);
}
function detectNewTransfers(list){
  const ids=list.map(t=>t.op_id);
  if(!S.knownOps){ S.knownOps=new Set(ids); return; }   // טעינה ראשונה — בסיס, בלי התראה
  const fresh=list.filter(t=>!S.knownOps.has(t.op_id));
  S.knownOps=new Set(ids);
  if(fresh.length) notifyNew(fresh);
}
function requestNotif(){
  if(!window.Notification){ toast('הדפדפן לא תומך בהתראות',false); return; }
  Notification.requestPermission().then(()=>{ render(); });
}
// התראה על שידור בקשת העברה למסך — לפי שורות חדשות (גם כשמצטרפות לטייל קיים)
function detectBroadcast(bc){
  const ids=((bc&&bc.groups)||[]).flatMap(g=>(g.lines||[]).map(l=>l.id));
  if(S._knownBcastIds===undefined){ S._knownBcastIds=new Set(ids); return; }   // טעינה ראשונה — בסיס
  const fresh=ids.filter(i=>!S._knownBcastIds.has(i));
  S._knownBcastIds=new Set(ids);
  if(fresh.length){
    const title='📡 בקשת העברה חדשה מהאתר';
    const body=`${fresh.length} פריטים להעברה`;
    if(window.Notification && Notification.permission==='granted'){
      try{ const ntf=new Notification(title,{body, tag:'gm-bcast', renotify:true});
        ntf.onclick=()=>{ window.focus(); S.view='board'; render(); ntf.close(); };
        setTimeout(()=>{ try{ntf.close();}catch(e){} }, 12000); }catch(e){}
    }
    alarm(); flashTitle(title);
  }
}
// ── 🎉 התראת הזמנה חדשה מהאתר (צליל קופה + באדג' ירוק על אייקון ההזמנות) ──
function notifyNewOrder(orders){
  // ערוץ פנימי (אפליקציה פתוחה+גלויה): צליל קופה + טוסט + הבהוב כותרת בלבד.
  // התראת מערכת מגיעה מה-push (SW), שמדלג כשהאפליקציה גלויה — כדי שלא תהיה כפילות.
  const n=orders.length;
  const title = n>1 ? `🎉 ${n} הזמנות חדשות נכנסו!` : '🎉 נכנסה הזמנה חדשה!';
  const body = orders.map(o=>`#${o.number} · ${o.item||'הזמנה'}${o.items_n>1?` (${o.items_n})`:''}`).join('\n');
  kaching(); flashTitle(title); toast(title+' '+body.split('\n')[0], true);
}
function detectNewOrders(list){
  const ids=(list||[]).map(o=>String(o.id));
  if(!S.knownOrderIds){ S.knownOrderIds=new Set(ids); return; }   // טעינה ראשונה — בסיס בלי התראה
  const fresh=(list||[]).filter(o=>!S.knownOrderIds.has(String(o.id)));
  ids.forEach(i=>S.knownOrderIds.add(i));
  if(fresh.length){
    S.newOrdersCount=(S.newOrdersCount||0)+fresh.length;
    updateOrderBadge();
    notifyNewOrder(fresh);
    maybeRefreshOrdersList();   // אם צופים בטאב ההזמנות — לרענן כדי שההזמנה תופיע מיד
  }
}
// רענון רשימת ההזמנות כשנכנסת הזמנה חדשה — רק אם צופים בטאב, בעמוד 1, בלי חיפוש/יומן/מודאל פתוח
function maybeRefreshOrdersList(){
  const onOrders=(S.view==='admin'&&S.adminTab==='wcorders')||(S.view==='board'&&S.branchTab==='wcorders');
  if(!onOrders || !S.wco) return;
  if((S.wco.page||1)>1 || (S.wco.q||'').trim()) return;          // לא לדרוס דפדוף/חיפוש פעיל
  const ae=document.activeElement;
  if(ae && ae.id==='wcoQ') return;                               // מקליד בחיפוש
  if(document.querySelector('.overlay, .wa-lb, .wco-cal')) return; // מודאל/יומן פתוח
  S.newOrdersCount=0; updateOrderBadge();                         // צופים ברשימה — ההזמנה תוצג, אין צורך בספירה
  loadWcOrders();
}
function updateOrderBadge(){
  const n=S.newOrdersCount||0;
  document.querySelectorAll('.gm-obadge').forEach(b=>{
    if(n>0){ b.textContent=n>99?'99+':String(n); b.style.display=''; }
    else b.style.display='none';
  });
}
function openOrdersTab(){
  S.newOrdersCount=0; updateOrderBadge();
  if(S.view==='admin') setAdminTab('wcorders');
  else if(typeof isAdminCtx==='function'&&isAdminCtx()) setBranchTab('wcorders');
}
function openBroadcast(toBranch){
  const bc=S.broadcast; if(!bc) return;
  const g=(bc.groups||[]).find(x=>String(x.to_branch)===String(toBranch));
  if(!g||!g.lines.length) return;
  openHTMLWindow(transferRequestHTML(bc.from_name||'האתר', g.lines));
}
async function dismissBroadcast(toBranch){
  if(!confirm('לסגור את בקשת ההעברה מהמסך? (בצע אותה דרך הקופה תחילה)')) return;
  try{ await api('/api/broadcast/dismiss',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({branch_id:Number(S.branchId), to_branch:Number(toBranch)})}); }catch(e){}
  renderBoard(document.getElementById('app'), true);
}
function toast(msg,ok){ const t=document.getElementById('toast');
  t.textContent=msg;t.className='toast show '+(ok?'ok':'err');setTimeout(()=>t.className='toast',1100); }

// ── חיווי טעינה ──
function showLoading(msg){
  let el=document.getElementById('loading');
  if(!el){ el=document.createElement('div'); el.id='loading'; el.className='loading'; document.body.appendChild(el); }
  el.innerHTML=`<div class="spinner"></div>${msg?`<span>${msg}</span>`:''}`;
  el.style.display='flex';
}
function hideLoading(){ const el=document.getElementById('loading'); if(el) el.style.display='none'; }

// ── state ──
function loadState(){
  S.branchId=localStorage.getItem('tr_branch_id');
  S.branchName=localStorage.getItem('tr_branch_name');
  S.employee=localStorage.getItem('tr_employee');
  S.adminKey=localStorage.getItem('tr_admin_key');
  S.theme=localStorage.getItem('tr_theme')||'light';
}
function changeBranch(){
  // זוכרים את הסניף הקודם — מעבר לסניף אחר במכשיר סניפי דורש אישור מנהל
  S.prevBranchId=S.branchId; S.prevBranchName=S.branchName;
  ['tr_branch_id','tr_branch_name'].forEach(k=>localStorage.removeItem(k));
  S.branchId=null;S.view='board';render();
}

// fetch עם timeout (AbortController) — שלא תיתקע בקשה לנצח (קולד-סטארט/רשת חלשה במובייל)
function fetchT(url,opts,ms){
  opts=opts||{}; const ctrl=new AbortController();
  const id=setTimeout(()=>ctrl.abort(),ms||30000);
  return fetch(url,{...opts,signal:ctrl.signal}).finally(()=>clearTimeout(id));
}
async function api(path,opts,ms){
  opts=opts||{}; opts.headers=opts.headers||{};
  if(S.adminKey) opts.headers['X-Admin-Key']=S.adminKey;
  if(S.deviceToken) opts.headers['X-Device-Token']=S.deviceToken;
  const r=await fetchT(path,opts,ms||30000);
  if(!r.ok){
    // המכשיר כבר לא מאושר (בוטל/נמחק) — חזרה למסך הבקשה
    if(r.status===401){ try{ const j=await r.clone().json();
      if(j&&j.code==='device'){ deviceBlockedFlow(); }
      else if(j&&j.code==='branch-locked'){ toast('המכשיר נעול לסניף אחר — החלפת סניף דורשת אישור מנהל',false); }
    }catch(e){} }
    const e=new Error('http '+r.status); e.status=r.status; throw e;
  }
  return r.json();
}

// ── אבטחת מכשיר: זיהוי, רישום, מסכי המתנה ──
function deviceToken(){
  let t=localStorage.getItem('tr_device');
  if(!t){ t=(crypto.randomUUID?crypto.randomUUID():(Date.now()+'-'+Math.random().toString(36).slice(2)+Math.random().toString(36).slice(2)));
    localStorage.setItem('tr_device',t); }
  return t;
}
async function deviceRegister(name){
  const body={token:S.deviceToken, name:name||'',
              had_branch: !!localStorage.getItem('tr_branch_id'),
              branch_id: localStorage.getItem('tr_branch_id')||''};
  const r=await fetchT('/api/device/register',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)},20000);
  if(!r.ok){ const j=await r.json().catch(()=>({})); throw new Error(j.detail||('http '+r.status)); }
  return (await r.json()).status;
}
function deviceAskScreen(err){
  document.getElementById('app').innerHTML=`<div class="picker" style="max-width:420px;margin:40px auto">
    <div style="font-size:46px;text-align:center">🔒</div>
    <h1 style="text-align:center">נדרש אישור מנהל</h1>
    <div class="muted" style="text-align:center;margin-bottom:14px">מכשיר זה אינו מאושר עדיין.<br>מלא את שמך ושלח בקשת גישה.</div>
    <input id="devName" placeholder="שם מבקש האישור (חובה)" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"
      style="width:100%;padding:14px;font-size:17px;border-radius:12px;border:2px solid var(--line);background:var(--card2);color:var(--txt);outline:none;text-align:center;margin-bottom:6px">
    <div class="err" style="color:var(--red);min-height:18px;text-align:center;font-size:13px">${err||''}</div>
    <button class="btn-primary" style="width:100%;padding:14px" onclick="deviceSubmit()">שלח בקשת גישה 🔐</button>
  </div>`;
  const inp=document.getElementById('devName'); if(inp){ inp.focus();
    inp.addEventListener('keydown',e=>{ if(e.key==='Enter') deviceSubmit(); }); }
}
async function deviceSubmit(){
  const name=(document.getElementById('devName').value||'').trim();
  if(name.length<2){ deviceAskScreen('יש להזין שם'); return; }
  showLoading('שולח בקשה…');
  try{ const st=await deviceRegister(name); hideLoading();
    if(st==='approved'){ bootApp(); return; }
    devicePendingScreen(name);
  }catch(e){ hideLoading(); deviceAskScreen('שגיאה בשליחה — נסה שוב'); }
}
function devicePendingScreen(name){
  document.getElementById('app').innerHTML=`<div class="picker" style="max-width:420px;margin:40px auto;text-align:center">
    <div style="font-size:46px">⏳</div>
    <h1>הבקשה נשלחה לאדמין</h1>

  S._devPoll=setInterval(async()=>{

// ── תיקון פריסת מקלדת: סריקה במקלדת עברית הופכת אותיות לטיניות לעבריות. נמיר חזרה. ──
const _HE2EN = {
  '/':'Q',"'":'W','ק':'E','ר':'R','א':'T','ט':'Y','ו':'U','ן':'I','ם':'O','פ':'P',
  'ש':'A','ד':'S','ג':'D','כ':'F','ע':'G','י':'H','ח':'J','ל':'K','ך':'L',
  'ז':'Z','ס':'X','ב':'C','ה':'V','נ':'B','מ':'N','צ':'M'
};
function fixHebrewLayout(s){
  if(!s || !/[֐-׿]/.test(s)) return s;   // אין אותיות עבריות — להשאיר
  return s.split('').map(ch => _HE2EN[ch] !== undefined ? _HE2EN[ch] : ch).join('');
}

// ── זיהוי אופן הקלט: סורק (מהיר) / ידני / הדבקה ──
function attachScan(inp, onSubmit){
  let times=[], pasted=false;
  inp.addEventListener('paste', ()=>{ pasted=true; });
  inp.addEventListener('keydown', async (e)=>{
    if(e.key==='Enter'){
      const code=fixHebrewLayout(inp.value.trim());   // תיקון מקלדת עברית
      const method=detectMethod(times, pasted, code);
      times=[]; pasted=false; inp.value='';
      if(code) await onSubmit(code, method);
      return;
    }
    if(e.key && e.key.length===1) times.push(performance.now());
  });
}
function detectMethod(times, pasted, code){
  if(pasted) return 'paste';
  const n=times.length;
  if(n>=2){ const per=(times[n-1]-times[0])/(n-1); return per<35 ? 'scanner' : 'manual'; }
  if((code||'').length>2 && n<=1) return 'paste';   // ערך שהופיע בלי הקשות
  return 'manual';
}
const METHOD_LABEL={scanner:'📷 סורק', camera:'📸 מצלמה', manual:'⌨️ ידני', paste:'📋 הדבקה'};
function methodTag(m){
  if(m==='scanner') return `<span class="mtag ok">${METHOD_LABEL.scanner}</span>`;
  if(m==='camera')  return `<span class="mtag ok">${METHOD_LABEL.camera}</span>`;
  if(m==='manual')  return `<span class="mtag warn">${METHOD_LABEL.manual}</span>`;
  if(m==='paste')   return `<span class="mtag warn">${METHOD_LABEL.paste}</span>`;
  return '';
}

const IS_MOBILE = (matchMedia('(pointer:coarse)').matches) || /Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
let _camStream=null,_camRAF=null,_camDetector=null,_zxingReader=null;
function openCameraNow(){

  else openCamera(c=>doScanBoard(c,'camera'));

function camStatus(msg){ const e=document.getElementById('camStatus'); if(e) e.textContent=msg; }
function loadScript(src){ return new Promise(res=>{ const s=document.createElement('script');
  s.src=src; s.onload=()=>res(true); s.onerror=()=>res(false); document.head.appendChild(s); }); }
async function loadZxing(){
  if(window.ZXing) return true;
  if(await loadScript('https://cdn.jsdelivr.net/npm/@zxing/library@0.21.3/umd/index.min.js') && window.ZXing) return true;
  await loadScript('https://unpkg.com/@zxing/library@0.21.3/umd/index.min.js');
  return !!window.ZXing;
}
async function openCamera(onResult){
  const root=document.getElementById('modalRoot');
  root.innerHTML=`<div class="cam-overlay">
    <video id="camVideo" playsinline muted autoplay></video>
    <div class="cam-frame"><div class="cam-line"></div></div>
    <div class="cam-hint">מקם את הברקוד הספציפי בתוך המסגרת</div>
    <div class="cam-status" id="camStatus">מאתחל מצלמה…</div>
    <button class="cam-close btn-ghost" onclick="closeCamera()">✕ סגור</button>
  </div>`;
  const video=document.getElementById('camVideo');
  // בחירת מנוע: native רק אם באמת יש פורמטים נתמכים; אחרת ZXing
  let engine='zxing';
  if('BarcodeDetector' in window){
    try{ const fmts=await window.BarcodeDetector.getSupportedFormats();
      if(fmts && fmts.length){ engine='native'; _camDetector=new window.BarcodeDetector(); } }catch(e){}
  }
  let mfr=null;
  if(engine!=='native'){
    camStatus('טוען מנוע סריקה…');
    if(!(await loadZxing())){ camStatus('טעינת מנוע הסריקה נכשלה — בדוק אינטרנט'); return; }
    mfr=new ZXing.MultiFormatReader();
  }
  // מצלמה אחת + לולאה אחת לשני המנועים; מפענחים רק את אזור המסגרת (כיוון מדויק)
  try{
    _camStream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment',width:{ideal:1280},height:{ideal:720}}});
    video.srcObject=_camStream; await video.play();
    const tr=_camStream.getVideoTracks()[0]; try{ await tr.applyConstraints({advanced:[{focusMode:'continuous'}]}); }catch(e){}
  } catch(e){ camStatus('אין גישה למצלמה — אשר הרשאה ונסה שוב'); return; }
  camStatus('מנוע: '+(engine==='native'?'מובנה':'ZXing')+' · מחפש ברקוד…');
  const canvas=document.createElement('canvas'), ctx=canvas.getContext('2d');
  const tick=async()=>{
    if(!_camStream) return;
    if(video.videoWidth){
      const vw=video.videoWidth, vh=video.videoHeight;
      // אזור מרכזי צר התואם למסגרת — מבודד ברקוד יחיד מתוך כמה צפופים
      const cw=Math.floor(vw*0.7), ch=Math.floor(vh*0.18);
      const cx=(vw-cw)>>1, cy=(vh-ch)>>1;
      canvas.width=cw; canvas.height=ch;
      ctx.drawImage(video,cx,cy,cw,ch,0,0,cw,ch);
      try{
        if(engine==='native'){
          const codes=await _camDetector.detect(canvas);
          if(codes&&codes.length){ onCamHit(codes[0].rawValue,onResult); return; }
        } else {
          const src=new ZXing.HTMLCanvasElementLuminanceSource(canvas);
          const bb=new ZXing.BinaryBitmap(new ZXing.HybridBinarizer(src));
          try{ const r=mfr.decode(bb); if(r){ onCamHit(r.getText(),onResult); return; } }
          catch(e){} finally{ try{ mfr.reset(); }catch(_){} }
        }
      }catch(e){}
    }
    _camRAF=requestAnimationFrame(tick);
  };
  _camRAF=requestAnimationFrame(tick);
}
function onCamHit(code,onResult){ beep(true); vibrate(true); closeCamera(); if(code) onResult(String(code).trim()); }
function closeCamera(){
  if(_camRAF){ cancelAnimationFrame(_camRAF); _camRAF=null; }
  if(_camStream){ _camStream.getTracks().forEach(t=>t.stop()); _camStream=null; }
  if(_zxingReader){ try{_zxingReader.reset();}catch(e){} _zxingReader=null; }
  _camDetector=null;
  const root=document.getElementById('modalRoot'); if(root) root.innerHTML='';
}

function ensureAdmin(retry){
  // אפליקציות הניהול נעולות מאחורי סיסמת הניהול הקיימת (אותה סיסמה של סניף אתר)

  modal({title:'כניסת ניהול',sub:'הכלים האלה דורשים סיסמת ניהול',placeholder:'סיסמה',type:'password',

      catch(e){ return 'סיסמה שגויה'; }

      if(retry) retry();

function hubGo(view){
  toggleDrawer(false);
  if(view==='admin'){
    if(!ensureAdmin(()=>hubGo('admin'))) return;
    S.view='admin'; S.embedApp=null; loadAdmin(true); return;
  }
  if(view==='tasks'){
    if(!ensureAdmin(()=>hubGo('tasks'))) return;
    S.view='tasks'; S.embedApp=null; loadTasks(true); return;
  }
  if(view==='sentinel'){
    if(!ensureAdmin(()=>hubGo('sentinel'))) return;

  S.view='board'; S.embedApp=null; render();

}

const TK_OPEN=['לא התחיל','בעבודה','תקוע'];
function tkFiltered(){
  const d=S.tasksData||{}; let items=(d.items||[]).slice();
  if(S.tkGroup) items=items.filter(t=>t.group_id===S.tkGroup);
  if(S.tkStatus==='open') items=items.filter(t=>TK_OPEN.includes(t.status));
  else if(S.tkStatus) items=items.filter(t=>t.status===S.tkStatus);
  const q=(S.tkSearch||'').trim().toLowerCase();
  if(q){ const q2=fixHebrewLayout(S.tkSearch.trim()).toLowerCase();
    items=items.filter(t=>{const blob=(t.name+' '+(t.notes||'')+' '+(t.tasknum||'')).toLowerCase();
      return blob.includes(q)||(q2&&q2!==q&&blob.includes(q2));}); }
  const pOrd={'קריטי':0,'גבוהה':1,'בינונית':2,'נמוכה':3}, sOrd={'תקוע':0,'בעבודה':1,'לא התחיל':2,'הושלם':3};
  items.sort((a,b)=>(sOrd[a.status]??9)-(sOrd[b.status]??9)||(pOrd[a.priority]??9)-(pOrd[b.priority]??9)
    ||String(b.created_at||'').localeCompare(String(a.created_at||'')));
  return items;
}

// ── Ops Hub: סטטוס Sentinel ──
async function loadSentinel(spinner){
  if(spinner) showLoading('טוען סטטוס Sentinel…');
  try{ S.sentinelData=await api('/api/admin/sentinel'); }catch(e){ S.sentinelData={error:true}; }
  if(spinner) hideLoading();
  if(S.view==='sentinel') renderSentinel();
}
function renderSentinel(){
  const app=document.getElementById('app');
  const d=S.sentinelData||{};
  let banner, sub='';
  if(d.error) banner=['⚠️','שגיאה בטעינה','var(--amber)'];
  else if(!d.available) banner=['⚪','אין עדיין דיווח מה-Sentinel','var(--muted)'];
  else{
    const r=d.report||{};
    const fails=(r.findings||[]).filter(f=>f.level==='FAIL');
    const warns=(r.findings||[]).filter(f=>f.level==='WARN');
    if(d.stale) banner=['🟠','ה-Sentinel לא דיווח מעל שעתיים וחצי — ייתכן שה-runner תקוע','var(--amber)'];
    else if(r.degraded) banner=['🟠',`המוניטור לא מצליח להגיע לחנות (${r.degraded_count||'?'} בדיקות רצופות)`,'var(--amber)'];
    else if(fails.length) banner=['🔴',`${fails.length} תקלות פעילות בחנות`,'var(--red)'];
    else if(warns.length) banner=['🟡',`תקין עם ${warns.length} אזהרות`,'var(--amber)'];
    else banner=['🟢','החנות תקינה — כל הבדיקות עברו','var(--green)'];
    sub=`ריצה אחרונה: ${r.ran_at||'?'} · התקבל: ${fmtTime(r.received_at)||r.received_at||''}`;
  }
  const r=(d.report||{});
  const icon=l=>l==='FAIL'?'❌':(l==='WARN'?'⚠️':'✅');
  const rows=(r.findings||[]).map(f=>`
    <tr><td style="text-align:center">${icon(f.level)}</td>
        <td style="font-weight:700">${f.title||f.key||''}</td>
        <td class="muted" style="font-size:12px">${(f.detail||'').slice(0,160)}</td></tr>`).join('');
  app.innerHTML=`<h1 class="title">🛡️ סטטוס Sentinel — בריאות החנות</h1>
    <div style="border:1px solid var(--line);border-radius:16px;background:var(--card);padding:22px;margin-bottom:16px;display:flex;gap:16px;align-items:center">
      <div style="font-size:42px;line-height:1">${banner[0]}</div>
      <div style="flex:1">
        <div style="font-size:19px;font-weight:800;color:${banner[2]}">${banner[1]}</div>
        ${sub?`<div class="muted" style="font-size:13px;margin-top:3px">${sub}</div>`:''}
      </div>
      <button class="btn-ghost" onclick="loadSentinel(true)">🔄 רענן</button>
    </div>
    ${rows?`<table class="admin"><thead><tr><th style="width:40px"></th><th>בדיקה</th><th>פרטים</th></tr></thead><tbody>${rows}</tbody></table>`
      :(d.available?'':'<div class="empty">הדיווח הראשון יגיע בריצה השעתית הבאה של ה-Sentinel (GitHub Actions). אפשר גם להריץ ידנית: workflow_dispatch.</div>')}
    <div class="muted" style="font-size:12px;margin-top:12px">המוניטור רץ כל שעה ב-GitHub Actions, בודק: גשר Dvir · תוספים קריטיים · סניפטים פעילים · שגיאות WPCode · שמירת סניף בהזמנות איסוף. התראות בזמן אמת — בטלגרם.</div>`;
}

// ── רינדור ראשי ──
function render(){
  const app=document.getElementById('app'), hdr=document.getElementById('hdr');
  if(!(S.view==='admin'&&S.adminTab==='wa')) document.body.classList.remove('wa-mode');
  // הבורגר (Ops Hub) מוצג רק במחשב שמחובר כסניף "אתר" עם סיסמת ניהול — סניפים לא רואים אותו
  const isAdminPC=S.branchId&&Number(S.branchId)===S.cfg.admin_branch_id&&(!S.cfg.admin_required||S.adminKey);
  document.getElementById('burgerBtn').style.display=isAdminPC?'inline-block':'none';
  if(!S.branchId){ hdr.style.display='none'; return renderPicker(app); }
  hdr.style.display='flex';
  document.getElementById('branchName').textContent=S.branchName;
  document.getElementById('adminBtn').style.display =
    (Number(S.branchId)===S.cfg.admin_branch_id)?'inline-flex':'none';
  document.getElementById('waBtn').style.display = isAdminPC?'inline-flex':'none';
  if(S.view==='embed') return renderEmbed(app);
  if(S.view==='tasks') return S.tasksData?renderTasks():loadTasks(true);
  if(S.view==='sentinel') return S.sentinelData?renderSentinel():loadSentinel(true);
  if(S.view==='admin') return S.adminData?renderAdmin():loadAdmin(true);
  if(S.view==='scan')  return renderScan(app);
  if(S.branchTab==='live') return S.lsCat?renderLive():loadLiveCatalog(true);
  if(S.branchTab==='wcorders'&&isAdminCtx()) return renderWcOrders();
  return renderBoard(app);
}

function pickBranch(id,name){
  // סניף הניהול (אתר) דורש סיסמה
  if(id===S.cfg.admin_branch_id && S.cfg.admin_required && !S.adminKey){
    return modal({title:'כניסת ניהול',sub:'סניף אתר דורש סיסמה',placeholder:'סיסמה',type:'password',
      onok:async(pw)=>{
        try{ await fetch('/api/admin/login',{method:'POST',headers:{'Content-Type':'application/json'},
          body:JSON.stringify({password:pw})}).then(r=>{if(!r.ok)throw 0;});
        }catch(e){ return 'סיסמה שגויה'; }
        S.adminKey=pw; localStorage.setItem('tr_admin_key',pw);
        finishPick(id,name); }});
  }
  // נעילת סניף: מכשיר סניפי שמחליף סניף קיים — דורש אישור מנהל בטלגרם
  // (כולל דרך "החלף סניף" שמאפס קודם — הסניף הקודם נשמר ב-prevBranchId)
  const cur=S.branchId||S.prevBranchId;
  if(!S.adminKey && cur && String(cur)!==String(id)){
    return requestBranchChange(id,name);
  }
  finishPick(id,name);
}
async function requestBranchChange(id,name){
  showLoading('שולח בקשת אישור למנהל…');
  let st='';
  try{
    const r=await fetchT('/api/device/branch-change',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({token:S.deviceToken, to_branch:String(id)})},20000);
    st=(await r.json()).status;
  }catch(e){}
  hideLoading();
  if(st==='approved'){ finishPick(id,name); return; }
  if(st!=='pending'){ toast('שליחת הבקשה נכשלה — נסה שוב',false); return; }
  document.getElementById('modalRoot').innerHTML=`<div class="overlay"><div class="modal" style="max-width:380px;text-align:center">
    <div style="font-size:38px">🔁</div>
    <h3 style="margin:8px 0 4px">בקשת מעבר ל${escW(name)}</h3>
    <div class="muted" id="brchgStat" style="margin-bottom:14px">נשלחה בקשה למנהל בטלגרם — ממתין לאישור…</div>
    <button class="btn-ghost" style="width:100%" onclick="closeModal();S._brchgStop=1">ביטול המתנה</button>
  </div></div>`;
  S._brchgStop=0;
  for(let i=0;i<75;i++){           // עד 5 דקות
    await new Promise(r=>setTimeout(r,4000));
    if(S._brchgStop) return;
    try{
      const r=await (await fetchT('/api/device/branch-status?token='+encodeURIComponent(S.deviceToken),{},15000)).json();
      if(r.status==='approved' && String(r.to)===String(id)){ closeModal(); toast('המעבר אושר ✓',true); finishPick(id,name); return; }
      if(r.status==='denied'){ closeModal(); toast('המנהל דחה את הבקשה',false); return; }
    }catch(e){}
  }
  const el=document.getElementById('brchgStat'); if(el) el.textContent='לא התקבל אישור — נסה שוב מאוחר יותר';
}
function finishPick(id,name){
  localStorage.setItem('tr_branch_id',id); localStorage.setItem('tr_branch_name',name);
  S.branchId=id; S.branchName=name; S.view='board'; render(); startPoll(); startNotifPoll();
}

// ── לוח בהעברה ──
async function renderBoard(app, silent){
  if(!silent) showLoading();
  let list=[], loadErr=false; try{ list=await api('/api/transfers?branch_id='+S.branchId); }catch(e){ loadErr=true; }
  let bc=null; try{ bc=await api('/api/broadcast?branch_id='+S.branchId); }catch(e){}
  if(!silent) hideLoading();
  S._boardErr=loadErr;
  // קולד-סטארט (Render Free נרדם): הבקשה נכשלה כי השרת מתעורר — מציגים חיווי ומנסים שוב מהר
  if(loadErr && S.view==='board'){
    S._wakeTries=(S._wakeTries||0)+1;
    app.innerHTML=`<h1 class="title" style="display:flex;align-items:center;gap:8px">${ico('inbox',19)} קליטת מכשירים נכנסים</h1>
      <div class="empty" style="padding-top:50px">⏳ מתחבר לשרת…<br>
      <span class="muted" style="font-size:14px">בכניסה ראשונה זה לוקח עד דקה (השרת מתעורר). מתחבר אוטומטית${S._wakeTries>1?` · ניסיון ${S._wakeTries}`:''}.</span></div>`;
    clearTimeout(S._wakeT);
    S._wakeT=setTimeout(()=>{ if(S.view==='board') renderBoard(app, true); }, 4000);
    return;
  }
  S._wakeTries=0; clearTimeout(S._wakeT);
  detectNewTransfers(list);   // התראה על העברות חדשות
  detectBroadcast(bc);        // התראה על שידור בקשת העברה
  if(S.view!=='board') return;   // המשתמש ניווט בינתיים — אל תדרוס
  S.transfers=list;
  S.broadcast=(bc&&bc.active)?bc:null;
  // טייל נפרד לכל סניף יעד — בקשות לאותו יעד מתרכזות יחד
  const bcHtml = S.broadcast
    ? (S.broadcast.groups||[]).map(g=>`<div class="bcast" onclick="openBroadcast(${g.to_branch})">
         <div class="bc-ic">${ico('radio',24)}</div>
         <div class="bc-txt"><b>בקשת העברה אל ${g.to_name}</b><span>${(g.lines||[]).length} פריטים · ${fmtTime(g.latest)} · לחץ לצפייה</span></div>
         <button class="bc-x" onclick="event.stopPropagation();dismissBroadcast(${g.to_branch})">✕</button>
       </div>`).join('') : '';
  const needEmp=!S.employee;
  const notifBtn = (window.Notification && Notification.permission!=='granted')
    ? `<button class="btn-ghost" style="margin-bottom:12px;display:inline-flex;align-items:center;gap:6px" onclick="requestNotif()">${ico('bell',14)} הפעל התראות להעברה נכנסת</button>` : '';
  const pending=list.reduce((a,t)=>a+(t.total_units-t.received_units),0);
  const ls=S.lastScan;
  const okCls = (ls&&(ls.method==='manual'||ls.method==='paste'))?'warn':'ok';
  const lastHtml = needEmp ? '' : (ls
    ? (ls.ok
       ? `<div class="lastscan ${okCls}">✓ ${ls.name||'נקלט'} <span class="sub">· פעולה ${ls.op} (${ls.prog})</span> ${methodTag(ls.method)}</div>`
       : `<div class="lastscan err">✗ ${ls.message}${ls.name?` <span class="sub">· ${ls.name}</span>`:''}${ls.code?` <span class="sub" style="unicode-bidi:isolate;direction:ltr;font-family:monospace">· ${ls.code}</span>`:''}</div>`)
    : `<div class="lastscan idle">המכשיר האחרון שתסרוק יוצג כאן</div>`);
  app.innerHTML=`
    ${branchTabsHTML()}
    <h1 class="title" style="display:flex;align-items:center;gap:8px">${ico('inbox',19)} קליטת מכשירים נכנסים</h1>
    <div style="text-align:center">${notifBtn}</div>
    ${bcHtml}
    <div class="panel board-scan">
      ${needEmp
        ? `<div class="scan-icon">👤</div>
           <input id="empInput" class="scan-input" autocomplete="off" placeholder="מי קולט? שם הנציג">
           <div class="count" style="color:var(--amber)">הזן את שמך ולחץ Enter כדי להתחיל לסרוק</div>`
        : `<div class="scan-icon">📷</div>
           <input id="boardScan" class="scan-input" autocomplete="off" placeholder="סרוק מכשיר…">
           ${IS_MOBILE?`<button class="btn-cam" onclick="openCameraNow()">📸 סרוק מהמצלמה</button>`:''}
           <div class="count">${list.length} העברות פתוחות · <b>${pending}</b> מכשירים ממתינים</div>
           <div class="emp">קולט: <b>${S.employee}</b> · <a onclick="changeEmployee()">החלף</a></div>`}
    </div>
    ${lastHtml}
    ${list.length?`<div class="board-grid">${list.map(cardHtml).join('')}</div>`
                 :(S._boardErr?'<div class="empty">בעיית רשת — מתחבר מחדש… 🔄</div>':'<div class="empty">אין כרגע העברות בדרך אליך 🎉</div>')}`;
  if(needEmp){
    const e=document.getElementById('empInput'); try{e.focus();}catch(x){}
    e.addEventListener('keydown',ev=>{ if(ev.key!=='Enter')return; const v=e.value.trim(); if(!v)return; if(submitEmployee(v)) render(); });
    return;
  }
  const inp=document.getElementById('boardScan');
  attachScan(inp, (code,method)=>doScanBoard(code,method));
  focusScan();
  if(S._flashOp){ const el=document.querySelector(`[data-op="${S._flashOp}"]`);
    if(el){ el.classList.add('flash'); setTimeout(()=>{el&&el.classList.remove('flash');},900); } S._flashOp=null; }

// סריקה ברמת הלוח — משייכת אוטומטית להעברה הנכונה (בלי op_id)
async function doScanBoard(code, method){
  if(!S.employee) return;
  let res;
  try{ res=await api('/api/scan',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({branch_id:Number(S.branchId),code,employee:S.employee,method})}); }
  catch(e){ S.lastScan={ok:false,message:'שגיאת רשת',code}; beep(false); await renderBoard(document.getElementById('app'), true); return; }
  if(res.matched){
    beep(true);vibrate(true);
    const it=res.item||{}, t=res.transfer||{};
    S.lastScan={ok:true, name:it.name||'נקלט', op:t.op_id, prog:`${t.received_units}/${t.total_units}`, method};
    S._flashOp=t.op_id;
  } else {
    beep(false);vibrate(false);
    const mr=res.misroute;
    if(mr) S.lastScan={ok:false, misroute:mr.type, message:mr.message, name:mr.product_name||'', code};

// ── מסך קליטה ──
// שם נציג תקין: לפחות 2 תווים, מכיל אות, ובלי ספרות (שלא יזינו סריאל/ברקוד בטעות)
function validEmployee(v){
  v=(v||'').trim();
  if(v.length<2) return false;
  if(/\d/.test(v)) return false;                 // יש ספרה → כנראה סריאל/ברקוד
  if(!/[A-Za-z֐-׿]/.test(v)) return false;  // חייב אות
  return true;
}
function submitEmployee(v){
  if(!validEmployee(v)){ toast('הזן שם נציג (אותיות בלבד, לא מספר/סריאל)', false); return false; }
  setEmployee(v.trim()); return true;
}

function itemHtml(it){
  const st=Number(it.received||0);
  const sub = it.serial ? it.serial : (it.barcode?('ברקוד: '+it.barcode):'— ללא סריאל —');
  let cls='', tick='', who='';
  if(st===1){ cls='received'; tick='✓';
    who=(it.received_by&&!String(it.received_by).startsWith('branch:'))?`נקלט ע״י ${it.received_by} ${methodTag(it.received_method)}`:''; }
  else if(st===2){ cls='redirected'; tick='↪'; who=`הופנה — ${it.received_by||'נקלט בסניף אחר'}`; }
  else if(st===3){ cls='missing'; tick='✗'; who='חוסר — לא הגיע'; }
  return `<div class="item ${cls}">
    <div class="tick">${tick}</div>
    <div style="flex:1;min-width:0">
      <div class="name">${it.name||it.product_id}</div>
      <div class="sub">${sub}</div>
      ${who?`<div class="who">${who}</div>`:''}
    </div>

}
async function doScan(code, method){
  if(!S.employee) return;   // לא אמור לקרות — שדה הסריקה מופיע רק אחרי שם
  let res;
  try{ res=await api('/api/scan',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({branch_id:Number(S.branchId),code,op_id:S.op.op_id,employee:S.employee,method})});
  }catch(e){ toast('שגיאת רשת',false); beep(false); return; }
  if(res.matched){ beep(true);vibrate(true);
    toast(`✓ נקלט ${METHOD_LABEL[method]||''}`,true); S.op=res.transfer; render(); }
  else{ beep(false);vibrate(false);
    toast((res.misroute&&res.misroute.message)||res.message||'לא שייך',false); }
}

function rebalFiltered(){

      return blob.includes(q) || (q2 && blob.includes(q2)); }); }
  return items;
}
async function runRebalanceScan(){
  showLoading('סורק מלאי בכל הסניפים… (~1-2 דק׳)');
  try{ await api('/api/admin/rebalance-scan',{method:'POST'}); }catch(e){ hideLoading(); return; }
  const before=(S.rebalanceData&&S.rebalanceData.last_scan)||'';
  let tries=0;
  const iv=setInterval(async()=>{
    tries++;
    let d; try{ d=await api('/api/admin/rebalance'); }catch(e){ return; }
    if((d.last_scan||'')!==before || tries>45){
      clearInterval(iv); S.rebalanceData=d; hideLoading();
      if(S.view==='admin' && S.adminTab==='rebalance') renderRebalance();
    }
  }, 4000);
}

    ? `<button class="btn-req-in" onclick='openPlanEditor(${JSON.stringify(it.product_id)})'>✓ בבקשה (${pc})</button>`

  return `<tr class="${pc>0?'has-req':''}">
    <td style="direction:ltr;text-align:right;font-family:monospace">${it.product_id||''}</td>
    <td>${it.name}</td>

function _csv(s){ s=String(s==null?'':s); return /[",\n]/.test(s)?'"'+s.replace(/"/g,'""')+'"':s; }
function exportRebalCSV(){
  const d=S.rebalanceData||{items:[],branches:[]}; const branches=d.branches||[];
  const items=rebalFiltered();
  const head=['מוצר','מק"ט','סוג',...branches.map(b=>b.name),'חסר ב','עודף ב'];
  const lines=[head.join(',')];
  items.forEach(it=>{ lines.push([_csv(it.name),it.product_id,it.kind==='serial'?'סריאלי':'ברקוד',
    ...branches.map(b=>(it.stock||{})[String(b.id)]||0),
    _csv((it.needs_names||[]).join(' | ')),_csv((it.surplus_names||[]).join(' | '))].join(',')); });
  const blob=new Blob(['﻿'+lines.join('\n')],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download='rebalance-'+new Date().toISOString().slice(0,10)+'.csv'; a.click();
}

// ── עורך בקשת העברה (תומך כמה שורות לפריט) ──
function openPlanEditor(pid){
  const it=((S.rebalanceData||{}).items||[]).find(x=>String(x.product_id)===String(pid));
  if(!it) return;
  const branches=(S.rebalanceData||{}).branches||[];
  // טען קודם את השורות השמורות לבקשה למוצר זה (עריכה אמיתית)
  const existing=(((S.planData||{}).lines)||[]).filter(l=>String(l.product_id)===String(pid));
  let lines;
  if(existing.length){
    lines=existing.map(l=>({from:l.from_branch,to:l.to_branch,qty:l.qty}));
  } else {
    const sur=it.surplus||[], need=it.needs||[]; lines=[];
    for(let i=0;i<Math.min(sur.length,need.length);i++) lines.push({from:sur[i],to:need[i],qty:1});
    if(!lines.length) lines.push({from:sur[0]||(branches[0]||{}).id, to:need[0]||(branches[0]||{}).id, qty:1});
  }
  S._planEdit={it,branches,lines};
  renderPlanEditor();
}

function planLineChange(i,f,v){ S._planEdit.lines[i][f]= f==='qty'?Math.max(1,parseInt(v)||1):Number(v); }
function planAddLine(){ const {it,branches,lines}=S._planEdit; const sur=it.surplus||[], need=it.needs||[];
  lines.push({from:sur[0]||(branches[0]||{}).id, to:need[0]||(branches[0]||{}).id, qty:1}); renderPlanEditor(); }
function planRemoveLine(i){ S._planEdit.lines.splice(i,1); renderPlanEditor(); }   // לא סוגר — מאפשר שמירה ריקה = הסרה
async function savePlan(){
  const {it,lines}=S._planEdit;
  const valid=lines.filter(l=>Number(l.from)!==Number(l.to))
    .map(l=>({product_id:it.product_id,name:it.name,from_branch:Number(l.from),to_branch:Number(l.to),qty:Number(l.qty)||1}));
  const removing = lines.length===0;
  if(!removing && !valid.length){ toast('בחר מקור ויעד שונים',false); return; }
  closeModal(); showLoading('שומר…');
  // החלפה: מוחק את שורות המוצר הקיימות ומכניס את החדשות (ריק = הסרת הבקשה)
  try{ await api('/api/admin/plan/replace',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({product_id:it.product_id, lines:valid})}); }catch(e){}
  try{ S.planData=await api('/api/admin/plan'); S.planCount=(S.planData.lines||[]).length; }catch(e){}
  hideLoading();
  if(S.adminTab==='plan') renderPlan(); else renderRebalance();   // עדכון חיווי "בבקשה"
  toast(removing?'הבקשה הוסרה':'נשמר לבקשת ההעברה ✓', !removing);
}

function openHTMLWindow(html){

function openTransferRequestPage(fromBranch){

async function broadcastBranch(fromBranch){
  const d=S.planData||{lines:[]};
  const lines=(d.lines||[]).filter(l=>String(l.from_branch)===String(fromBranch));
  if(!lines.length){ toast('אין שורות לסניף זה',false); return; }
  const fn=lines[0].from_name;
  if(!confirm('לשדר את הבקשה למסך הקליטה של סניף '+fn+'?\nהיא תופיע שם כפקודה לתצוגה (ללא סריקה).')) return;
  showLoading();
  try{
    const r=await api('/api/admin/broadcast',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({branch_id:Number(fromBranch)})});
    toast('שודר לסניף '+fn+' ('+(r.lines||lines.length)+' שורות)',true);
  }catch(e){ toast('שגיאה בשידור',false); }
  hideLoading();
}
function exportPlanCSV(fromBranch){
  const d=S.planData||{lines:[]}; let lines=d.lines||[];
  if(fromBranch!==undefined && fromBranch!==null && fromBranch!=='') lines=lines.filter(l=>String(l.from_branch)===String(fromBranch));
  const head=['מסניף','מק"ט','מוצר','כמות','לסניף'];
  const rows=[head.join(',')];
  lines.forEach(l=>rows.push([_csv(l.from_name),l.product_id,_csv(l.name),l.qty,_csv(l.to_name)].join(',')));
  const blob=new Blob(['﻿'+rows.join('\n')],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  const tag=(fromBranch&&lines[0])?('-'+lines[0].from_name):'';
  a.download='בקשת-העברה'+tag+'-'+new Date().toISOString().slice(0,10)+'.csv'; a.click();
}

async function loadReco(spinner){
  if(spinner) showLoading('מחשב המלצות הזמנה…');
  let qs=`?days=${S.recoDays}&target_days=${S.recoTarget}`;
  if(S.recoBranch) qs+=`&branch=${S.recoBranch}`;
  try{ S.recoData=await api('/api/admin/recommendations'+qs); }catch(e){}
  try{ const o=await api('/api/admin/order-plan'); S.orderData=o; S.orderCount=(o.lines||[]).length; }catch(e){}
  if(spinner) hideLoading();
  if(S.view==='admin' && S.adminTab==='reco') renderReco();
}
function setRecoDays(v){ S.recoDays=Number(v)||30; loadReco(true); }
function setRecoBranch(v){ S.recoBranch=v; loadReco(true); }
function setRecoTarget(v){ S.recoTarget=Math.max(1,parseInt(v)||21); loadReco(true); }
function setRecoKind(v){ S.recoKind=v; renderReco(); }
function setRecoSupplier(v){ S.recoSupplier=v; renderReco(); }
function setRecoCategory(v){ S.recoCategory=v; renderReco(); }
function setRecoMfr(v){ S.recoMfr=v; renderReco(); }
function setRecoSearch(v){ S.recoSearch=v; S._refocusReco=true; renderReco(); }
function orderQtyFor(pid){ const l=((S.orderData||{}).lines||[]).find(x=>String(x.product_id)===String(pid)); return l?l.qty:0; }
function recoFiltered(){
  let items=((S.recoData||{}).items||[]).slice();
  if(S.recoKind!=='all') items=items.filter(i=>i.kind===S.recoKind);
  if(S.recoSupplier) items=items.filter(i=>(i.supplier||'')===S.recoSupplier);
  if(S.recoCategory) items=items.filter(i=>(i.category||'')===S.recoCategory);
  if(S.recoMfr) items=items.filter(i=>brandOf(i.name)===S.recoMfr);
  const q=(S.recoSearch||'').trim().toLowerCase();
  if(q){ const q2=fixHebrewLayout(S.recoSearch.trim()).toLowerCase();
    items=items.filter(i=>{ const blob=((i.name||'')+' '+(i.product_id||'')+' '+(i.barcode||'')).toLowerCase();
      return blob.includes(q)||(q2&&blob.includes(q2)); }); }
  const sc=S.recoSort;
  if(sc&&sc.col){ const dir=sc.dir==='asc'?1:-1;
    items=items.slice().sort((a,b)=>((Number(a[sc.col])||0)-(Number(b[sc.col])||0))*dir
      || String(a.name).localeCompare(String(b.name))); }
  return items;
}
function setRecoSort(col){
  const s=S.recoSort||{};
  if(s.col===col) s.dir=(s.dir==='desc'?'asc':'desc'); else { s.col=col; s.dir='desc'; }
  S.recoSort={col:s.col,dir:s.dir}; renderReco();
}

function waSeen(){ if(!S._waSeen){ try{ S._waSeen=JSON.parse(localStorage.getItem('tr_wa_seen')||'{}'); }catch(e){ S._waSeen={}; } } return S._waSeen; }
function waMarkSeen(phone, ts){ const s=waSeen(); if((s[phone]||0)<ts){ s[phone]=ts; localStorage.setItem('tr_wa_seen', JSON.stringify(s)); updateWaBadge(S.waConvs||[]); } }
function waIsUnread(c){ return !!(c.unread && c.ts>(waSeen()[c.phone]||0)); }
function updateWaBadge(convs){
  // ארכיון לא נספר — אחרת סימון "כולל ארכיון" מקפיץ את הבאדג' על שיחות ישנות
  const n=(convs||[]).filter(c=>!c.archived&&waIsUnread(c)).length;
  const el=document.getElementById('waBadge');
  if(el){ el.style.display=n?'block':'none'; el.textContent=n>9?'9+':n; }
  if(S._waBadgePrev!==undefined && n>S._waBadgePrev){
    const title='💬 הודעת וואטסאפ חדשה';
    if(window.Notification && Notification.permission==='granted'){
      try{ const ntf=new Notification(title,{body:'נכנסה הודעה חדשה ב-GreenOS', tag:'gm-wa', renotify:true});
        ntf.onclick=()=>{ window.focus(); openWaTab(); ntf.close(); };
        setTimeout(()=>{ try{ntf.close();}catch(e){} }, 12000); }catch(e){}
    }
    alarm(); flashTitle(title);
  }
  S._waBadgePrev=n;
}

function waOrdAddToggle(){

function waOrdAddPaint(){
  const box=document.getElementById('woAddRes'); if(!box) return;
  const q=(S.waOrdAddQ||'').trim();
  if(!S.lsCat){ box.innerHTML='<div class="muted" style="font-size:12px;padding:4px">טוען קטלוג…</div>'; return; }
  if(q.length<2){ box.innerHTML='<div class="muted" style="font-size:12px;padding:4px">הקלד 2+ תווים</div>'; return; }
  // חיפוש חכם זהה למלאי החי: טוקנים (לא תלוי סדר) + נפילה לפריסת מקלדת עברית + מיון לפי רלוונטיות
  const toks=q.toLowerCase().split(/\s+/).filter(Boolean);
  const toks2=fixHebrewLayout(q).toLowerCase().split(/\s+/).filter(Boolean);
  const alt=toks2.join(' ')!==toks.join(' ');
  let hits=(S.lsCat||[]).filter(it=>{
    if(it.active===false) return false;
    const blob=((it.name||'')+' '+(it.product_id||'')+' '+(it.barcode||'')).toLowerCase();
    return toks.every(t=>blob.includes(t))||(alt&&toks2.every(t=>blob.includes(t)));
  });
  const ql=q.toLowerCase();
  hits.sort((a,b)=>{
    const score=x=>{ if(String(x.product_id)===q||String(x.barcode)===q) return 0;
      const n=String(x.name||'').toLowerCase(); if(n.includes(ql)) return 1; return 2; };
    return score(a)-score(b)||((b.stock||0)-(a.stock||0))||String(a.name).localeCompare(String(b.name),'he');
  });
  hits=hits.slice(0,10);
  const busy=S.waOrdAddBusy;
  box.innerHTML=hits.length?hits.map(it=>{
    const isBusy=busy&&String(busy)===String(it.product_id);
    return `<div style="display:flex;align-items:center;gap:7px;padding:6px 8px;border:1px solid var(--line);border-radius:9px;margin-top:4px;background:var(--card2);${busy?'opacity:.6;pointer-events:none':'cursor:pointer'}"
         ${busy?'':`onclick="waOrdExtraPick('${escW(String(it.product_id))}')"`}>
      <span style="flex:1;min-width:0;font-size:12.5px"><b>${escW(it.name)}</b>
        <span class="muted" style="font-size:10.5px;direction:ltr;font-family:monospace"> ${escW(String(it.product_id))}</span></span>
      ${isBusy?'<span class="wa-uri-wait" style="font-size:11.5px">מוסיף…</span>':'<span style="color:#16a34a;font-weight:700">＋</span>'}
    </div>`;}).join(''):'<div class="muted" style="font-size:12px;padding:4px">לא נמצא בקטלוג</div>';
}
async function waOrdExtraPick(pid){
  if(S.waOrdAddBusy) return;            // כבר בטעינה — מונע לחיצה כפולה
  waOrderSaveInputs();
  const cat=(S.lsCat||[]).find(x=>String(x.product_id)===String(pid))||{};
  S.waOrdAddBusy=String(pid); waOrdAddPaint();   // חיווי inline על השורה (ה-overlay הגלובלי מוסתר מאחורי המודאל)
  let d=null;
  try{ d=await api('/api/admin/wc-link/'+encodeURIComponent(pid)+'?pos=1&fallback=1&name='+encodeURIComponent(cat.name||''),null,45000); }catch(e){}
  S.waOrdAddBusy=null;
  const found=!!(d&&d.found&&d.id);
  let price=found?(Number(d.price)||0):(d&&d.pos_price!=null&&Number(d.pos_price)>1?Number(d.pos_price):0);
  // הקופה כבר קובעת צבע+נפח (variants.fixed). המשתמש בוחר רק את שאר המאפיינים (switch_attrs: SIM, אחריות).
  const hasSwitch=found&&d.variants&&(d.variants.switch_attrs||[]).length>0;
  let variation_id=(found&&d.type==='variation')?d.id:0;
  let sel={}, fixedLabel='';
  if(found&&d.variants){
    const mine={}; (d.attributes||[]).forEach(a=>{ mine[a.name]=a.option; });
    (d.variants.switch_attrs||[]).forEach(sa=>{ sel[sa.name]=mine[sa.name]||sa.options[0]; });
    fixedLabel=(d.variants.fixed||[]).map(a=>a.option).filter(Boolean).join(' · ');
  }
  const x={
    sku:String(pid), name:(found?d.name:cat.name)||String(pid), price:price, qty:1, found:found,
    wc_id:found?(d.type==='variation'?d.parent_id:d.id):0,
    variation_id:variation_id, variants:hasSwitch?d.variants:null, sel:sel, fixedLabel:fixedLabel};
  if(hasSwitch) _waOrdExtraResolve(x);   // מצמיד וריאציה+מחיר לפי הבחירה ההתחלתית
  (S.waOrd.extras=S.waOrd.extras||[]).push(x);
  S.waOrdAddOpen=false; S.waOrdAddQ='';
  waOrderRender();
  if(hasSwitch) toast('בחר SIM / אחריות בשורת הפריט',true);
  else if(!price) toast('לא נמצא מחיר לפריט — הזן מחיר ידנית בשורה',false);
}
// מצמיד variation_id + מחיר לשורת מוצר נוסף לפי הבחירה הנוכחית של ה-switch_attrs
function _waOrdExtraResolve(x){
  if(!x||!x.variants) return;
  const v=x.variants;
  const m=(v.options||[]).find(c=>(v.switch_attrs||[]).every(sa=>String(c.attrs[sa.name]||'')===String(x.sel[sa.name]||'')));
  if(m){ x.variation_id=m.id; x.price=Number(m.price)||x.price; }
}
// בחירת ערך למאפיין מתחלף בשורת מוצר נוסף (לפי אינדקסים — בטוח לערכים בעברית; התאמה אוטומטית כמו באתר/preview)
function waOrdExtraSelAttr(i,ai,oi){
  waOrderSaveInputs();
  const x=(S.waOrd.extras||[])[i]; if(!x||!x.variants) return;
  const v=x.variants; const sa=(v.switch_attrs||[])[ai]; if(!sa) return;
  const name=sa.name, opt=sa.options[oi]; if(opt==null) return;
  x.sel[name]=opt;
  const exact=(v.options||[]).some(c=>(v.switch_attrs||[]).every(sa=>String(c.attrs[sa.name]||'')===String(x.sel[sa.name]||'')));
  if(!exact){
    const withClicked=(v.options||[]).filter(c=>String(c.attrs[name]||'')===String(opt));
    if(withClicked.length){
      let best=withClicked[0], bestScore=-1;
      withClicked.forEach(c=>{ const score=(v.switch_attrs||[]).reduce((a,sa)=>a+(String(c.attrs[sa.name]||'')===String(x.sel[sa.name]||'')?1:0),0); if(score>bestScore){ bestScore=score; best=c; } });
      (v.switch_attrs||[]).forEach(sa=>{ x.sel[sa.name]=best.attrs[sa.name]||''; });
    }
  }
  _waOrdExtraResolve(x);
  waOrderRender();
}
function waOrdExtraSet(i,k,v){
  waOrderSaveInputs();
  const x=(S.waOrd.extras||[])[i]; if(!x) return;
  x[k]=(k==='name')?String(v):(k==='qty')?Math.max(1,Number(v)||1):Math.max(0,Number(v)||0);
  waOrderRender();
}
function waOrdExtraDel(i){
  waOrderSaveInputs();
  (S.waOrd.extras||[]).splice(i,1);
  waOrderRender();
}

function waPayOpen(r){
  const old=document.getElementById('waPayModal'); if(old) old.remove();
  const div=document.createElement('div');
  div.id='waPayModal'; div.className='wa-lb'; div.style.cursor='default';
  const fmt=v=>'₪'+Number(v||0).toLocaleString('he-IL');
  div.innerHTML=`<div onclick="event.stopPropagation()" style="background:var(--card);border:1px solid var(--line);border-radius:16px;width:min(560px,96vw);height:min(760px,92vh);display:flex;flex-direction:column;overflow:hidden">

      <b style="font-size:13.5px;white-space:nowrap">הזמנה #${r.number} · ${fmt(r.total)}</b>
      <span id="waPayStat" class="muted" style="font-size:12px;flex:1;text-align:left">ממתין לתשלום…</span>
      <button class="btn-ghost" onclick="waPayClose()" title="סגירה — ההזמנה נשארת פתוחה">✕</button>
    </div>
    <iframe src="${r.pay_link}" allow="payment *" style="flex:1;border:0;width:100%;background:#fff"></iframe>
  </div>`;
  div.onclick=()=>waPayClose();
  document.body.appendChild(div);
  S.waPayOrder=r;
  // polling fallback — גם אם הודעת הסיום מה-iframe לא תגיע, נתפוס את התשלום מהשרת
  // (הזמנת WC → paystatus; קישור כללי ללא הזמנה → status לפי pru)
  const stUrl=r.order_id?('/api/admin/wa/order/paystatus/'+r.order_id):('/api/admin/pay/status/'+r.pru);
  let n=0;
  if(S.waPayPoll) clearInterval(S.waPayPoll);
  S.waPayPoll=setInterval(async()=>{
    n++;
    if(n>150||!document.getElementById('waPayModal')){ clearInterval(S.waPayPoll); S.waPayPoll=null; return; }
    try{
      const st=await api(stUrl);
      if(st.paid) waPaySuccess(st);
    }catch(e){}
  },6000);
}
function waPayClose(){
  if(S.waPayPoll){ clearInterval(S.waPayPoll); S.waPayPoll=null; }
  const m=document.getElementById('waPayModal'); if(m) m.remove();
  const r=S.waPayOrder; S.waPayOrder=null;
  if(r) toast('הזמנה #'+r.number+' נשארה פתוחה (ממתינה לתשלום)',true);

function waPaySuccess(st){
  if(S.waPayPoll){ clearInterval(S.waPayPoll); S.waPayPoll=null; }

function waStockMatches(q){
  q=(q||'').trim().toLowerCase(); if(q.length<2) return [];
  const toks=q.split(/\s+/);
  const fx=fixHebrewLayout(q).toLowerCase(); const ftoks=fx.split(/\s+/);
  const out=[];
  for(const it of (S.lsCat||[])){
    const blob=((it.name||'')+' '+(it.product_id||'')+' '+(it.barcode||'')).toLowerCase();
    if(!(toks.every(t=>blob.includes(t))||ftoks.every(t=>blob.includes(t)))) continue;
    let sc=Math.min(Number(it.stock)||0,5);
    if(String(it.product_id)===q||String(it.barcode||'')===q) sc+=100;
    if((it.name||'').toLowerCase().includes(q)) sc+=20;
    out.push({it,sc});
  }
  return out.sort((a,b)=>b.sc-a.sc).slice(0,8).map(x=>x.it);
}
function waStockPaint(){
  const box=document.getElementById('waStockRes'); if(!box) return;
  const q=(S.waStockQ||'').trim();
  if(!S.lsCat){ box.innerHTML='<div class="muted" style="font-size:12px">טוען קטלוג…</div>'; return; }

  const rows=waStockMatches(q);
  if(!rows.length){ box.innerHTML='<div class="muted" style="font-size:12px">לא נמצא בקטלוג</div>'; return; }
  box.innerHTML=rows.map(it=>{
    const pid=String(it.product_id);

        <button class="btn-ghost wa-ico" style="width:32px;height:30px" title="חלונית האתר (מחירים/וריאציות/הזמנה)"

  }).join('');

function waStockChipsHTML(pid){
  const c=(S.lsLive||{})[String(pid)];
  if(!c) return '<span class="muted" style="font-size:12px">⏳ קורא מהקופה…</span>';
  if(c.err) return '<span class="muted" style="font-size:12px">שגיאת קופה — נסה שוב</span>';
  const brs=(c.data&&c.data.branches)||[];
  return (S.branchList||[]).map(b=>{
    const bo=brs.find(x=>String(x.id)===String(b.id))||{};
    const q=bo.qty||0;
    const cls=q>0?'ls-has':(q<0?'ls-neg':'ls-zero');

  }).join('');
}
