<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>סידור עבודה · גרין מובייל</title>
<style>
  :root{
    --bg:#f5f7fa; --card:#ffffff; --line:#e2e8f0; --txt:#1a2230; --mut:#64748b;
    --head:#f1f5f9; --cell:#fafbfc; --soft:#eef2f7;
    --green:#1db954; --green-d:#159c44; --blue:#2f81f7; --warn:#f0883e;
  }
  body.dark{
    --bg:#0f1419; --card:#171f29; --line:#26303d; --txt:#e6edf3; --mut:#8b97a6;
    --head:#1c2530; --cell:#0f1419; --soft:#1c2530;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Rubik,Arial,sans-serif;
       background:var(--bg);color:var(--txt);-webkit-text-size-adjust:100%}
  header{position:sticky;top:0;z-index:8;background:var(--card);border-bottom:1px solid var(--line);
         padding:11px 14px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  header h1{font-size:16px;margin:0;font-weight:700}
  header .sp{flex:1}
  button{font-family:inherit;cursor:pointer;border:0;border-radius:10px;font-size:13.5px;font-weight:600;
          padding:8px 13px;color:#fff;background:var(--green)}
  button.ghost{background:transparent;border:1px solid var(--line);color:var(--txt)}
  button.blue{background:var(--blue)}
  button:disabled{opacity:.5;cursor:default}
  .controls{position:sticky;top:53px;z-index:7;background:var(--card);border-bottom:1px solid var(--line);
            padding:9px 14px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .controls .grp{display:flex;align-items:center;gap:5px;background:var(--soft);border:1px solid var(--line);
                 border-radius:10px;padding:4px 6px}
  .controls .wklabel{font-weight:700;font-size:13.5px;min-width:140px;text-align:center}
  .controls .nav{background:transparent;border:0;color:var(--txt);font-size:16px;padding:2px 7px;cursor:pointer}
  input,select{font-family:inherit;font-size:13px;border:1px solid var(--line);border-radius:8px;
               background:var(--card);color:var(--txt);padding:6px 7px}
  .wrap{padding:12px 12px 92px}
  .hint{color:var(--mut);font-size:12.5px;margin:2px 2px 12px;line-height:1.6}
  .tablewrap{border:1px solid var(--line);border-radius:14px;overflow:hidden}
  .tscroll{overflow-x:auto;-webkit-overflow-scrolling:touch}
  table{border-collapse:separate;border-spacing:0;width:100%;min-width:900px}
  th,td{padding:6px 5px;border-bottom:1px solid var(--line);border-left:1px solid var(--line);
        text-align:center;white-space:nowrap}
  th{background:var(--head);font-size:13px;font-weight:700;position:sticky;top:0}
  th.nm,td.nm{position:sticky;right:0;background:var(--card);text-align:right;z-index:2;
              border-left:2px solid var(--line);min-width:96px;font-weight:600;
              box-shadow:-5px 0 7px -5px rgba(0,0,0,.12)}
  tr:last-child td{border-bottom:0}
  td.cell{background:var(--cell)}
  select.bsel{width:100%;min-width:78px}
  select.bsel.has{font-weight:700;border-width:1.6px}
  select.bsel.b1{border-color:#3b82f6;color:#2f6fe0;background:rgba(59,130,246,.12)}
  select.bsel.b2{border-color:#a855f7;color:#9333ea;background:rgba(168,85,247,.12)}
  select.bsel.b3{border-color:#14b8a6;color:#0d9488;background:rgba(20,184,166,.14)}
  select.bsel.b4{border-color:#f59e0b;color:#d97706;background:rgba(245,158,11,.15)}
  select.bsel.b5{border-color:#64748b;color:#475569;background:rgba(100,116,139,.14)}
  body.dark select.bsel.b1{color:#7eb0ff} body.dark select.bsel.b2{color:#cd9cff}
  body.dark select.bsel.b3{color:#5fe0d0} body.dark select.bsel.b4{color:#ffc266}
  body.dark select.bsel.b5{color:#aab6c6}
  #legend{display:flex;flex-wrap:wrap;gap:6px 12px;margin:0 2px 12px}
  #legend .lg{display:inline-flex;align-items:center;gap:6px;font-size:12.5px;color:var(--mut)}
  #legend .dot{width:11px;height:11px;border-radius:3px;display:inline-block}
  .chip{display:inline-block;border-radius:9px;padding:6px 10px;font-size:12.5px;font-weight:700;
        text-align:center;border:1.4px solid;margin:2px 0}
  .chip .chr{font-weight:500;font-size:11px;opacity:.9}
  .emptyc{color:var(--mut)}
  .chip.b1{border-color:#3b82f6;color:#2f6fe0;background:rgba(59,130,246,.12)}
  .chip.b2{border-color:#a855f7;color:#9333ea;background:rgba(168,85,247,.12)}
  .chip.b3{border-color:#14b8a6;color:#0d9488;background:rgba(20,184,166,.14)}
  .chip.b4{border-color:#f59e0b;color:#d97706;background:rgba(245,158,11,.15)}
  .chip.b5{border-color:#64748b;color:#475569;background:rgba(100,116,139,.14)}
  body.dark .chip.b1{color:#7eb0ff} body.dark .chip.b2{color:#cd9cff}
  body.dark .chip.b3{color:#5fe0d0} body.dark .chip.b4{color:#ffc266} body.dark .chip.b5{color:#aab6c6}
  .shift{margin-bottom:6px}
  .shift:last-of-type{margin-bottom:0}
  button.addshift{background:transparent;border:1px dashed var(--line);color:var(--mut);font-size:11px;
                  padding:3px 9px;border-radius:8px;margin-top:5px;font-weight:600}
  .hwrap{display:flex;align-items:center;gap:3px;margin-top:4px;justify-content:center;direction:ltr}
  .hwrap .dash{color:var(--mut);font-size:12px}
  input.th{font-size:11.5px;width:62px;text-align:center;padding:4px 2px}
  input.th::-webkit-calendar-picker-indicator{display:none;-webkit-appearance:none;margin:0;width:0}
  /* mobile card layout */
  .ecard{border:1px solid var(--line);border-radius:14px;margin-bottom:12px;overflow:hidden;background:var(--card)}
  .ehd{background:var(--head);padding:10px 13px;font-weight:700;font-size:15px}
  .drow{display:flex;align-items:flex-start;gap:10px;padding:9px 12px;border-top:1px solid var(--line)}
  .drow .dlbl{min-width:52px;font-weight:600;font-size:14px;padding-top:8px}
  .drow .dctl{flex:1;display:flex;flex-direction:column}
  .drow .dctl select.bsel{width:100%;min-width:0}
  .drow .dctl .hwrap{margin-top:7px;justify-content:flex-start}
  .drow .dctl input.th{width:84px;font-size:13px;padding:7px 4px}
  @media(max-width:1023px){
    header{position:static}
    .controls{position:static;gap:7px}
    .controls .grp,.controls input[type=date],.controls select{flex:1 1 auto}
    .controls .wklabel{min-width:90px}
    .wrap{padding:12px 10px 96px}
  }
  .savebar{position:fixed;bottom:0;right:0;left:0;background:var(--card);border-top:1px solid var(--line);
           padding:10px 14px;display:flex;align-items:center;gap:10px;z-index:9;flex-wrap:wrap}
  .savebar .st{color:var(--mut);font-size:12.5px;flex:1;min-width:120px}
  .toast{position:fixed;bottom:76px;right:50%;transform:translateX(50%);background:var(--green-d);
         color:#fff;padding:10px 18px;border-radius:22px;font-size:14px;font-weight:600;opacity:0;
         transition:opacity .25s;pointer-events:none;z-index:20;max-width:90vw;text-align:center}
  .toast.show{opacity:1}
  .center{text-align:center;color:var(--mut);padding:46px 20px;font-size:14.5px;line-height:1.7}
  /* modal */
  .overlay{position:fixed;inset:0;background:rgba(0,0,0,.66);z-index:30;display:none;
           align-items:flex-start;justify-content:center;padding:40px 12px;overflow:auto}
  .overlay.show{display:flex}
  .modal{background:var(--card);border:1px solid var(--line);border-radius:16px;width:100%;max-width:620px;
         padding:16px 18px;box-shadow:0 20px 50px rgba(0,0,0,.3);overflow:hidden}
  .modal.wide{max-width:880px}
  #sumBody{overflow-x:auto;-webkit-overflow-scrolling:touch}
  .stable{max-width:100%}
  .modal h2{margin:0 0 4px;font-size:16px}
  .modal .row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin:10px 0}
  .modal .x{float:left;background:transparent;border:0;color:var(--mut);font-size:20px;cursor:pointer;padding:0}
  .stable{width:100%;border-collapse:collapse;margin-top:8px;font-size:13.5px}
  .stable th,.stable td{border-bottom:1px solid var(--line);padding:8px 6px;text-align:right}
  .stable th{color:var(--mut);font-weight:600;font-size:12.5px}
  .stable .num{text-align:center;font-weight:700;font-variant-numeric:tabular-nums}
  .badge{display:inline-block;background:var(--soft);border:1px solid var(--line);border-radius:20px;
         padding:2px 9px;font-size:12px;margin:2px 2px 0}
  .disp-emp{display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin-top:6px}
</style>
</head>
<body>
<header>
  <h1>🗓️ סידור עבודה</h1>
  <span class="sp"></span>
  <button class="ghost" id="themeBtn" onclick="toggleTheme()" title="מצב תצוגה">🌙</button>
  <button class="ghost" onclick="addEmployee()">➕ עובד</button>
  <button class="ghost" onclick="logout()">יציאה</button>
</header>

<div class="controls" id="controls" style="display:none">
  <div class="grp">
    <button class="nav" onclick="shiftWeek(7)" title="שבוע הבא">▶</button>
    <span class="wklabel" id="wklabel">—</span>
    <button class="nav" onclick="shiftWeek(-7)" title="שבוע קודם">◀</button>
  </div>
  <input type="date" id="weekPick" onchange="pickWeek(this.value)" title="קפיצה לשבוע">
  <select id="empFilter" onchange="STATE.emp=this.value;renderGrid()" title="סינון לפי עובד"></select>
  <select id="brFilter" onchange="STATE.branch=this.value;renderGrid()" title="סינון לפי סניף"></select>
  <span class="sp"></span>
  <button class="blue" onclick="openSummary()">📊 סיכומים</button>
  <button onclick="openDispatch()">📤 שיגור</button>
</div>

<div class="wrap">
  <div class="hint" id="hint">טוען…</div>
  <div id="legend"></div>
  <div id="grid"></div>
</div>

<div class="savebar" id="savebar" style="display:none">
  <button class="ghost" onclick="location.href='/'" title="חזרה ל-GreenOS">⬅ GreenOS</button>
  <span class="st" id="st">💾 נשמר אוטומטית</span>
</div>

<!-- summary modal -->
<div class="overlay" id="sumOv">
  <div class="modal wide">
    <button class="x" onclick="closeOv('sumOv')">✕</button>
    <h2>📊 סיכומים פר עובד</h2>
    <div class="row">
      <label>מ־</label><input type="date" id="sumFrom">
      <label>עד</label><input type="date" id="sumTo">
      <button class="blue" onclick="runSummary()">חשב</button>
      <span id="sumMeta" style="color:var(--mut);font-size:12.5px"></span>
    </div>
    <div id="sumBody"></div>
  </div>
</div>

<!-- dispatch modal -->
<div class="overlay" id="dispOv">
  <div class="modal">
    <button class="x" onclick="closeOv('dispOv')">✕</button>
    <h2>📤 שיגור הסידור</h2>
    <div class="hint" id="dispWk" style="margin:6px 0 2px"></div>
    <div class="row" style="flex-direction:column;align-items:stretch">
      <div>
        <b>לכל עובד — את הסידור שלו (DM אישי):</b>
        <div class="disp-emp">
          <button onclick="dispatch('employee','')">📨 שגר לכולם</button>
          <select id="dispEmp"></select>
          <button class="ghost" onclick="dispatch('employee',document.getElementById('dispEmp').value)">שגר לנבחר/ת</button>
          <button class="ghost" onclick="previewView(document.getElementById('dispEmp').value)">👁 תצוגה</button>
        </div>
      </div>
      <div style="margin-top:12px;border-top:1px solid var(--line);padding-top:12px">
        <b>סידור כללי — לקבוצת ההתראות בטלגרם:</b>
        <div class="disp-emp">
          <button class="blue" onclick="dispatch('group','')">📢 שגר לקבוצה</button>
          <button class="ghost" onclick="previewView('')">👁 תצוגה</button>
          <span style="color:var(--mut);font-size:12px">(דורש הגדרת קבוצת התראות)</span>
        </div>
      </div>
    </div>
    <div id="dispRes" style="margin-top:10px;font-size:13px"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API = '';
function applyTheme(){
  const dark = localStorage.getItem('sched_theme')==='dark';
  document.body.classList.toggle('dark', dark);
  const b=document.getElementById('themeBtn'); if(b) b.textContent = dark?'☀️':'🌙';
}
function toggleTheme(){
  localStorage.setItem('sched_theme', localStorage.getItem('sched_theme')==='dark'?'light':'dark'); applyTheme();
}
applyTheme();

let DATA = null;                    // {branches, days, employees, week, this_week, weeks, roster}
let ROWS = [];                      // [{employee, cells:{dow:{branch_id,hours}}}]
const STATE = { week:null, emp:'', branch:'' };

// ── auth ──
function key(force){
  if(localStorage.getItem('tr_schedule_key') && !force) return localStorage.getItem('tr_schedule_key');
  let k = localStorage.getItem('tr_admin_key');
  if(!k || force){ k = prompt('🔐 סיסמת גישה לסידור:') || '';
    if(k) localStorage.setItem('tr_schedule_key', k); }
  return k || '';
}
function logout(){ localStorage.removeItem('tr_schedule_key'); location.reload(); }
function hdrSafe(v){ v=v||''; return /^[\x00-\xFF]*$/.test(v)?v:''; }
async function api(path, opts){
  opts = opts||{};
  opts.headers = Object.assign({'Content-Type':'application/json',
    'X-Schedule-Key': hdrSafe(localStorage.getItem('tr_schedule_key')),
    'X-Admin-Key': hdrSafe(localStorage.getItem('tr_admin_key'))}, opts.headers||{});
  const r = await fetch(API+path, opts);
  if(r.status===401){ localStorage.removeItem('tr_schedule_key');
    document.getElementById('hint').textContent='סיסמה שגויה — נסה שוב (אפשר להדביק).'; key(true); load(); throw new Error('401'); }
  return r;
}

// ── date helpers ──
function parseD(s){ return new Date(s+'T12:00:00'); }
function fmtISO(d){ return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function sundayOf(s){ const d=parseD(s); d.setDate(d.getDate()-d.getDay()); return fmtISO(d); }
function addDays(s,n){ const d=parseD(s); d.setDate(d.getDate()+n); return fmtISO(d); }
function ddmm(s){ const d=parseD(s); return String(d.getDate()).padStart(2,'0')+'/'+String(d.getMonth()+1).padStart(2,'0'); }
function weekLabel(ws){ return 'א׳ '+ddmm(ws)+' – ש׳ '+ddmm(addDays(ws,6)); }

function toast(t){ const e=document.getElementById('toast'); e.textContent=t; e.classList.add('show'); setTimeout(()=>e.classList.remove('show'),2200); }
function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function orderHours(h){ // מסדר 'a-b' כך שהמוקדם=התחלה (חסין ל-RTL/קלט הפוך)
  const p=String(h||'').split('-'); if(p.length!==2) return String(h||'');
  const a=p[0].trim(), b=p[1].trim(); if(!a||!b) return (a||'')+'-'+(b||'');
  const m=s=>{const x=s.split(':'); return (+x[0]||0)*60+(+x[1]||0);};
  return m(a)<=m(b) ? a+'-'+b : b+'-'+a;
}
function closeOv(id){ document.getElementById(id).classList.remove('show'); }

// ── week loading ──
async function loadWeek(){
  const r = await api('/api/schedule/data?week='+encodeURIComponent(STATE.week));
  DATA = await r.json();
  STATE.week = DATA.week;
  document.getElementById('wklabel').textContent = weekLabel(STATE.week)
    + (STATE.week===DATA.this_week?' · השבוע':'');
  document.getElementById('weekPick').value = STATE.week;
  buildEmpFilter();
  buildBranchFilter();
  renderLegend();
  rosterToRows();
  renderGrid();
}
const BCOL = {1:'#3b82f6',2:'#a855f7',3:'#14b8a6',4:'#f59e0b',5:'#64748b'};
function renderLegend(){
  const el=document.getElementById('legend');
  el.innerHTML=(DATA.branches||[]).map(b=>'<span class="lg"><span class="dot" style="background:'+(BCOL[b.id]||'#64748b')+'"></span>'+esc(b.name)+'</span>').join('');
}
async function shiftWeek(n){ await flushSave(); STATE.week = addDays(STATE.week, n); loadWeek(); }
async function pickWeek(v){ if(v){ await flushSave(); STATE.week = sundayOf(v); loadWeek(); } }

function buildEmpFilter(){
  const names = allNames();
  const sel=document.getElementById('empFilter');
  sel.innerHTML='<option value="">כל העובדים</option>'+names.map(n=>'<option value="'+esc(n)+'"'+(STATE.emp===n?' selected':'')+'>'+esc(n)+'</option>').join('');
}
function buildBranchFilter(){
  const sel=document.getElementById('brFilter');
  sel.innerHTML='<option value="">כל הסניפים</option>'+(DATA.branches||[]).map(b=>'<option value="'+b.id+'"'+(String(STATE.branch)===String(b.id)?' selected':'')+'>'+esc(b.name)+'</option>').join('');
}
function branchName(id){ const b=(DATA.branches||[]).find(x=>String(x.id)===String(id)); return b?b.name:id; }
function allNames(){
  const names=[]; (DATA.employees||[]).forEach(n=>{ if(names.indexOf(n)<0) names.push(n); });
  (DATA.roster||[]).forEach(r=>{ if(r.employee && names.indexOf(r.employee)<0) names.push(r.employee); });
  ROWS.forEach(r=>{ if(names.indexOf(r.employee)<0) names.push(r.employee); });
  return names;
}
function rosterToRows(){
  const names=[]; (DATA.employees||[]).forEach(n=>{ if(names.indexOf(n)<0) names.push(n); });
  (DATA.roster||[]).forEach(r=>{ if(r.employee && names.indexOf(r.employee)<0) names.push(r.employee); });
  ROWS = names.map(n=>({employee:n, cells:{}}));
  const byName={}; ROWS.forEach(r=>byName[r.employee]=r);
  (DATA.roster||[]).forEach(r=>{ const row=byName[r.employee]; if(!row) return;
    (row.cells[r.dow]=row.cells[r.dow]||[]).push({branch_id:r.branch_id, hours:r.hours||''}); });
}

function isMobile(){ return window.innerWidth < 1024; }
function shiftHTML(ri, dow, idx, c){
  const bcls = c.branch_id ? ('has b'+c.branch_id) : '';
  let s='<div class="shift"><select onchange="onSel('+ri+','+dow+','+idx+',this)" class="bsel '+bcls+'">';
  s+='<option value="">—</option>';
  (DATA.branches||[]).forEach(b=>{ s+='<option value="'+b.id+'"'+(String(c.branch_id)===String(b.id)?' selected':'')+'>'+esc(b.name)+'</option>'; });
  s+='</select>';
  const hh=orderHours(c.hours).split('-');
  const t1=(hh[0]||'').trim()?(' value="'+esc(hh[0].trim())+'"'):'';
  const t2=(hh[1]||'').trim()?(' value="'+esc(hh[1].trim())+'"'):'';
  const hide=c.branch_id?'':' style="display:none"';
  s+='<div class="hwrap"'+hide+'><input type="time" class="th" title="התחלה"'+t1+' onchange="onTime('+ri+','+dow+','+idx+',this)">'
    +'<span class="dash">–</span><input type="time" class="th" title="סיום"'+t2+' onchange="onTime('+ri+','+dow+','+idx+',this)"></div></div>';
  return s;
}
function cellHTML(ri, dow){
  const arr = (ROWS[ri].cells[dow] || []);
  const list = arr.length ? arr : [{}];
  let s = list.map((c,idx)=>shiftHTML(ri,dow,idx,c)).join('');
  if(arr.length && arr[arr.length-1] && arr[arr.length-1].branch_id)
    s += '<button class="addshift" onclick="addShift('+ri+','+dow+')">➕ משמרת</button>';
  return s;
}
function rowHasBranch(row){
  if(!STATE.branch) return true;
  return Object.keys(row.cells).some(dow=>(row.cells[dow]||[]).some(c=>String(c.branch_id)===String(STATE.branch)));
}
function cellRender(ri, dow){
  if(!STATE.branch) return cellHTML(ri, dow);   // עריכה רגילה
  const arr=(ROWS[ri].cells[dow]||[]).filter(c=>String(c.branch_id)===String(STATE.branch));
  if(!arr.length) return '<span class="emptyc">—</span>';
  return arr.map(c=>{
    const hrs=orderHours(c.hours);
    return '<div class="chip b'+c.branch_id+'">'+esc(branchName(c.branch_id))+(hrs?'<br><span class="chr" dir="ltr">🕐 '+esc(hrs)+'</span>':'')+'</div>';
  }).join('');
}
function renderGrid(){
  if(!ROWS.length){
    document.getElementById('grid').innerHTML =
      '<div class="center">אין עדיין עובדים רשומים.<br>עובדים נכנסים לבוט <b>@Greenm_alert_bot</b>, בוחרים שם — ואז יופיעו כאן.<br>או הוסף שם ידנית עם ➕.</div>';
    return;
  }
  isMobile() ? renderCards() : renderTable();
}
function visibleRows(){ return ROWS.filter(r=>(!STATE.emp||r.employee===STATE.emp) && rowHasBranch(r)); }
function renderTable(){
  const visible=visibleRows(), days=DATA.days;
  if(!visible.length){ document.getElementById('grid').innerHTML='<div class="center">אין שיבוצים שתואמים לסינון השבוע.</div>'; return; }
  let h='<div class="tablewrap"><div class="tscroll"><table><thead><tr><th class="nm">עובד</th>';
  days.forEach(d=> h+='<th>'+d+'</th>');
  h+='</tr></thead><tbody>';
  visible.forEach(row=>{
    const ri=ROWS.indexOf(row);
    h+='<tr><td class="nm">'+esc(row.employee)+'</td>';
    for(let dow=0; dow<days.length; dow++) h+='<td class="cell">'+cellRender(ri,dow)+'</td>';
    h+='</tr>';
  });
  h+='</tbody></table></div></div>';
  document.getElementById('grid').innerHTML=h;
}
function renderCards(){
  const visible=visibleRows(), days=DATA.days;
  if(!visible.length){ document.getElementById('grid').innerHTML='<div class="center">אין שיבוצים שתואמים לסינון השבוע.</div>'; return; }
  let h='';
  visible.forEach(row=>{
    const ri=ROWS.indexOf(row);
    h+='<div class="ecard"><div class="ehd">'+esc(row.employee)+'</div>';
    for(let dow=0; dow<days.length; dow++)
      h+='<div class="drow"><span class="dlbl">'+days[dow]+'</span><div class="dctl">'+cellRender(ri,dow)+'</div></div>';
    h+='</div>';
  });
  document.getElementById('grid').innerHTML=h;
}
let _rsTimer=null, _wasMobile=isMobile();
window.addEventListener('resize',()=>{ clearTimeout(_rsTimer); _rsTimer=setTimeout(()=>{
  if(isMobile()!==_wasMobile){ _wasMobile=isMobile(); if(DATA && ROWS.length) renderGrid(); } }, 200); });

function onSel(ri,dow,idx,el){
  const arr = ROWS[ri].cells[dow] = ROWS[ri].cells[dow] || [];
  if(el.value){
    if(!arr[idx]) arr[idx] = {branch_id:0, hours:''};
    arr[idx].branch_id = parseInt(el.value);
  } else {
    if(arr[idx]) arr.splice(idx,1);
    if(!arr.length) delete ROWS[ri].cells[dow];
  }
  renderGrid(); queueSave();
}
function onTime(ri,dow,idx,el){
  const arr=ROWS[ri].cells[dow]; if(!arr||!arr[idx]) return;
  const ins=el.closest('.hwrap').querySelectorAll('input.th');
  const a=ins[0].value, b=ins[1].value;
  arr[idx].hours=(a||b)?orderHours((a||'')+'-'+(b||'')):'';
  queueSave();
}
function addShift(ri,dow){
  (ROWS[ri].cells[dow] = ROWS[ri].cells[dow] || []).push({});
  renderGrid();
}
function addEmployee(){
  const n=(prompt('שם העובד (כפי שמופיע בסידור):')||'').trim();
  if(!n) return;
  if(ROWS.some(r=>r.employee===n)){ toast('כבר קיים'); return; }
  ROWS.push({employee:n, cells:{}}); buildEmpFilter(); renderGrid();
}

// ── autosave (debounced, full-week replace) ──
let saveTimer=null, saveWeek=null;
function setStatus(t){ const e=document.getElementById('st'); if(e) e.textContent=t; }
function queueSave(){
  saveWeek=STATE.week; setStatus('שומר…');
  clearTimeout(saveTimer); saveTimer=setTimeout(()=>doSave(saveWeek), 650);
}
async function doSave(wk){
  saveTimer=null;
  const rows=[];
  ROWS.forEach(r=>{ for(const dow in r.cells){ (r.cells[dow]||[]).forEach(c=>{
    if(c.branch_id) rows.push({employee:r.employee, dow:parseInt(dow), branch_id:c.branch_id, hours:c.hours||''}); }); } });
  try{
    const r=await api('/api/schedule/save',{method:'POST',body:JSON.stringify({week:wk, rows})});
    const j=await r.json();
    setStatus(j.ok?'✅ נשמר אוטומטית':'⚠ שגיאת שמירה');
  }catch(e){ if(String(e.message)!=='401') setStatus('⚠ שגיאת שמירה'); }
}
async function flushSave(){ if(saveTimer){ clearTimeout(saveTimer); saveTimer=null; await doSave(saveWeek||STATE.week); } }

// ── summary ──
function monthBounds(){
  const t=parseD(STATE.week||fmtISO(new Date()));
  const from=new Date(t.getFullYear(),t.getMonth(),1), to=new Date(t.getFullYear(),t.getMonth()+1,0);
  return [fmtISO(from), fmtISO(to)];
}
async function openSummary(){
  await flushSave();
  const [f,t]=monthBounds();
  document.getElementById('sumFrom').value=f; document.getElementById('sumTo').value=t;
  document.getElementById('sumBody').innerHTML=''; document.getElementById('sumMeta').textContent='';
  document.getElementById('sumOv').classList.add('show'); runSummary();
}
async function runSummary(){
  const f=document.getElementById('sumFrom').value, t=document.getElementById('sumTo').value;
  if(!f||!t) return;
  document.getElementById('sumBody').innerHTML='<div class="center">מחשב…</div>';
  try{
    const r=await api('/api/schedule/summary?date_from='+f+'&date_to='+t);
    const j=await r.json();
    document.getElementById('sumMeta').textContent=(j.weeks||0)+' שבועות בטווח';
    if(!j.summary||!j.summary.length){ document.getElementById('sumBody').innerHTML='<div class="center">אין שיבוצים בטווח הזה.</div>'; return; }
    let h='<table class="stable"><thead><tr><th>עובד</th><th class="num">משמרות</th><th class="num">שעות</th><th>סניפים</th></tr></thead><tbody>';
    j.summary.forEach(s=>{
      const hrs=(s.minutes/60); const hh=hrs%1===0?hrs.toFixed(0):hrs.toFixed(1);
      const br=Object.keys(s.branches||{}).map(k=>'<span class="badge">'+esc(k)+' ×'+s.branches[k]+'</span>').join('');
      h+='<tr><td>'+esc(s.employee)+'</td><td class="num">'+s.shifts+'</td><td class="num">'+hh+'</td><td>'+br+'</td></tr>';
    });
    h+='</tbody></table>';
    document.getElementById('sumBody').innerHTML=h;
  }catch(e){ if(String(e.message)!=='401') document.getElementById('sumBody').innerHTML='<div class="center">שגיאה.</div>'; }
}

// ── dispatch ──
function openDispatch(){
  document.getElementById('dispWk').textContent='שבוע '+weekLabel(STATE.week);
  const names=allNames();
  document.getElementById('dispEmp').innerHTML=names.map(n=>'<option value="'+esc(n)+'">'+esc(n)+'</option>').join('');
  document.getElementById('dispRes').innerHTML='';
  document.getElementById('dispOv').classList.add('show');
}
async function previewView(emp){
  await flushSave();
  try{
    const r=await api('/api/schedule/view-link?week='+encodeURIComponent(STATE.week)+(emp?('&emp='+encodeURIComponent(emp)):''));
    const j=await r.json(); if(j.url) window.open(j.url,'_blank');
  }catch(e){ if(String(e.message)!=='401') toast('שגיאה'); }
}
async function dispatch(mode, employee){
  await flushSave();
  const res=document.getElementById('dispRes'); res.innerHTML='שולח…';
  try{
    const r=await api('/api/schedule/dispatch',{method:'POST',body:JSON.stringify({week:STATE.week, mode, employee})});
    const j=await r.json();
    if(r.status!==200){ res.innerHTML='⚠ '+(j.detail||'שגיאה'); return; }
    if(mode==='group'){ res.innerHTML=j.ok?'✅ נשלח לקבוצת ההתראות':'⚠ השליחה נכשלה'; toast(j.ok?'✅ נשלח לקבוצה':'נכשל'); }
    else{
      let m='✅ נשלחו '+j.sent+' הודעות';
      if(j.missing&&j.missing.length) m+='<br>⚠ לא רשומים בבוט: '+j.missing.map(esc).join(', ');
      res.innerHTML=m; toast('✅ נשלחו '+j.sent);
    }
  }catch(e){ if(String(e.message)!=='401') res.innerHTML='שגיאה.'; }
}

// ── boot ──
async function load(){
  try{
    key();
    STATE.week = STATE.week || sundayOf(fmtISO(new Date()));
    await loadWeek();
    const cnt=(DATA.employees||[]).length;
    document.getElementById('hint').innerHTML=
      'שבץ כל עובד לסניף בכל יום שהוא במשמרת (תא = סניף + שעות). ההתראות נשלחות אוטומטית למי שמשובץ בסניף שאליו משודרת בקשת העברה.<br>'+
      '<b>'+cnt+'</b> עובדים רשומים בבוט · נווט בין שבועות, סנן לפי עובד, חשב סיכומים, ושגר את הסידור.';
    document.getElementById('controls').style.display='flex';
    document.getElementById('savebar').style.display='flex';
  }catch(e){ if(String(e.message)!=='401') document.getElementById('hint').textContent='שגיאת טעינה: '+e.message; }
}
load();
</script>
